---
namespace: "infra"
name: "ado"
version: 1.0.1
readme: README.md
authors:
  - Automation Development Office

description: >-
  Automation Development Office roles for AAP, OpenShift, RHEL, Satellite,
  IdM, RHBK, and platform bootstrap workflows.
license_file: LICENSE

tags:
  - aap
  - automation
  - bootstrap
  - idm
  - openshift
  - rhel
  - satellite
# Runtime collections are installed by the execution environment/container.
# Keeping this empty lets offline local artifact installs use the already
# bundled collection tarballs instead of trying to resolve Galaxy dependencies.
dependencies: {}

repository: https://github.com/automation-development-office/ado
documentation: >-
  https://github.com/automation-development-office/ado/blob/main/README.md
homepage: https://github.com/automation-development-office/ado
issues: https://github.com/automation-development-office/ado/issues

# File glob-like patterns to filter from the built collection artifact.
build_ignore:
  - .gitignore
  - changelogs/.plugin-cache.yaml
