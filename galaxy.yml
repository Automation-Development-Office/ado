---
namespace: "infra"
name: "ado"
version: 1.0.0
readme: README.md
authors:
  - Automation Development Office

description: >-
  Automation Development Office roles for AAP, OpenShift, RHEL, Satellite,
  IdM, RHBK, and platform bootstrap workflows.
license_file: LICENSE

tags:
  - aap
  - automation
  - bootstrap
  - idm
  - openshift
  - rhel
  - satellite
dependencies:
  "ansible.controller": ">=4.6.0"
  "ansible.posix": ">=1.5.0"
  "ansible.utils": ">=2.10.0"
  "awx.awx": ">=24.0.0"
  "ado.openshift": ">=27.0.0"
  "community.crypto": ">=2.0.0"
  "community.general": ">=8.0.0"
  "community.grafana": ">=1.9.0"
  "community.libvirt": ">=1.3.0"
  "grafana.grafana": ">=5.0.0"
  "hashicorp.vault": ">=6.0.0"
  "infra.aap_configuration": ">=3.1.0"
  "infra.controller_configuration": ">=2.9.0"
  "kubernetes.core": ">=2.4.0"
  "redhat.openshift_virtualization": ">=1.0.0"
  "redhat.rhbk": ">=3.0.0"
  "redhat.rhel_idm": ">=1.10.0"
  "redhat.rhel_system_roles": ">=1.21.0"
  "redhat.satellite": ">=5.0.0"

repository: https://github.com/automation-development-office/ado
documentation: >-
  https://github.com/automation-development-office/ado/blob/main/README.md
homepage: https://github.com/automation-development-office/ado
issues: https://github.com/automation-development-office/ado/issues

# File glob-like patterns to filter from the built collection artifact.
build_ignore:
  - .gitignore
  - changelogs/.plugin-cache.yaml
