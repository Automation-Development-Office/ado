---
minor_changes:
  - >-
    Check AAP controller API connectivity before applying bootstrap controller
    objects and run a configurable demo job template smoke test.
bugfixes:
  - >-
    bootstrap_controller - Report safe AAP connectivity failure details instead
    of stopping on a fully censored no_log result, and persist the UI or CLI
    TLS validation setting into generated AAP vars.
  - >-
    bootstrap_controller - Use the AAP 2.5 and 2.6 controller gateway API
    path for connectivity and smoke-test checks while keeping the AAP 2.4
    controller API path.
  - >-
    bootstrap_controller - Continue bootstrap runs when the optional smoke-test
    job template is missing after AAP connectivity succeeds.
