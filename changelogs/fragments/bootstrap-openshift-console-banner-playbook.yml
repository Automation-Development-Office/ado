---
bugfixes:
  - >-
    bootstrap_generate_playbook_repo - generate an OpenShift-scoped console
    banner playbook when the OpenShift console banner option is selected so
    UI and CLI runs create the workflow job target under `playbooks/openshift`.
  - >-
    bootstrap_controller - include the console banner job template in generated
    OpenShift workflows and expose add/update/delete survey choices for banner
    management.
  - >-
    bootstrap_generate_env_vars - infer OpenShift console banner and HTPasswd
    option apps from submitted option values as a fallback for older UI payloads
    that omitted `component_options`.
minor_changes:
  - >-
    ocp_console_banner - accept add/update/delete state aliases while keeping
    present/new/absent compatibility.
