---
bugfixes:
  - Satellite bootstrap playbooks now load generated env vars from the project
    root when running under AAP and enable become where host changes require it.
  - Satellite RHN organization IDs and activation keys are written as
    vault-backed values, with activation keys preserved when supplied by the UI.
  - Satellite install VG name is now generated from preflight/CLI input and raw
    installer-only fields are no longer duplicated under generic component
    config.
  - Satellite storage install variables now use the names consumed by the
    storage tasks, including `satellite_install_vg_name`,
    `satellite_install_req_dirs`, and `satellite_install_data_*`.
  - Satellite install role defaults and task references now consistently use
    `satellite_install_rhn_*`, `satellite_install_size*`,
    `satellite_install_min_*`, and other non-duplicated install variable names.
  - Generated env var YAML now suppresses YAML anchors and preserves machine
    credential SSH private keys with a trailing newline instead of extra spaces.
