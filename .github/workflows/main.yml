name: Ansible Collection CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  NAMESPACE: ado
  COLLECTION_DIR: ${{ github.workspace }}

jobs:
  # Quality stage
  linting:
    name: Ansible Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.ref != 'refs/heads/main' &&
       github.ref != 'refs/heads/Dev' &&
       !startsWith(github.ref, 'refs/tags/'))
    container:
      image: registry.gitlab.com/pipeline-components/ansible-lint:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ansible-lint
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -v --offline --show-relpath -p | ansible-lint-junit -o ansible-lint.xml
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-report
          path: ansible-lint.xml

  # Testing stage - manual trigger only, available on all branches
  discover-molecule-scenarios:
    name: Discover Molecule Scenarios
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      scenarios: ${{ steps.discover.outputs.scenarios }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover scenario directories
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find extensions/molecule -type f -name molecule.yml -printf '%h\n' | sort)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No Molecule scenarios found under extensions/molecule"
            echo "scenarios=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${dirs[@]}" | jq -Rsc 'split("\n")[:-1]')
          echo "Discovered scenarios: $json"
          echo "scenarios=$json" >> "$GITHUB_OUTPUT"

  molecule:
    name: Molecule - ${{ matrix.scenario_dir }}
    runs-on: ubuntu-latest
    needs: discover-molecule-scenarios
    if: |
      github.event_name == 'workflow_dispatch' &&
      needs.discover-molecule-scenarios.outputs.scenarios != '[]'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        scenario_dir: ${{ fromJson(needs.discover-molecule-scenarios.outputs.scenarios) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ansible-core molecule[docker] docker

      - name: Debug scenario directory
        working-directory: ${{ matrix.scenario_dir }}
        run: |
          pwd
          ls -la

      - name: Run Molecule tests
        working-directory: extensions/molecule
        run: |
          set -euo pipefail
          scenario_name="$(basename "${{ matrix.scenario_dir }}")"
          ln -sfn . molecule
          trap 'rm -f molecule' EXIT
          molecule test -s "$scenario_name"

  # Building stage
  prepare:
    name: Prepare Build Variables
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.vars.outputs.version }}
      name: ${{ steps.vars.outputs.name }}
      namespace: ${{ steps.vars.outputs.namespace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq

      - name: Extract variables from galaxy.yml
        id: vars
        run: |
          VERSION=$(grep '^\bversion\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAME=$(grep '^\bname\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAMESPACE=$(grep '^\bnamespace\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: prepare
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Update galaxy.yml version for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yq
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          yq -i ".version = \"$VERSION\"" galaxy.yml
          yq -i '.namespace = strenv(NAMESPACE)' galaxy.yml

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build --force --output-path .
        env:
          COLLECTION_DIR: ${{ github.workspace }}

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-build
          path: ${{ needs.prepare.outputs.namespace }}-${{ needs.prepare.outputs.name }}-*.tar.gz
          retention-days: 90
