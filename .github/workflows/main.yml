name: Ansible Collection CI/CD

on:
  push:
  pull_request:

env:
  NAMESPACE: ado
  COLLECTION_DIR: ${{ github.workspace }}

jobs:
  # Quality stage
  linting:
    name: Ansible Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && 
       github.ref != 'refs/heads/main' && 
       github.ref != 'refs/heads/Dev' && 
       !startsWith(github.ref, 'refs/tags/'))
    container:
      image: registry.gitlab.com/pipeline-components/ansible-lint:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache curl bash
          curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/bin/yq
          chmod +x /usr/bin/yq
          yq --version

      - name: Update galaxy.yml with version
        run: |
          yq -i '.version = strenv(VERSION)' galaxy.yml
          yq -i '.namespace = strenv(NAMESPACE)' galaxy.yml
        env:
          VERSION: ${{ github.ref_name }}

      - name: Run ansible-lint
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -v --offline --show-relpath ${{ github.workspace }} -p | ansible-lint-junit -o ansible-lint.xml
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-report
          path: ansible-lint.xml

  # Building stage
  prepare:
    name: Prepare Build Variables
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.vars.outputs.version }}
      name: ${{ steps.vars.outputs.name }}
      namespace: ${{ steps.vars.outputs.namespace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq

      - name: Extract variables from galaxy.yml
        id: vars
        run: |
          VERSION=$(grep '^\bversion\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAME=$(grep '^\bname\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAMESPACE=$(grep '^\bnamespace\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: prepare
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build --force --output-path .
        env:
          COLLECTION_DIR: ${{ github.workspace }}

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-build
          path: ${{ needs.prepare.outputs.namespace }}-${{ needs.prepare.outputs.name }}-*.tar.gz
          retention-days: 90

  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    # if: |
    #   github.ref == 'refs/heads/main' ||
    #   github.ref == 'refs/heads/Dev' ||
    #   startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ansible-core ansible-lint pyyaml
          pip install antsibull-docs

      # 
      - name: Update documentation
        run: antsibull-docs collection --use-current --dest-dir ./docs infra.ado

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push documentation changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: auto-update documentation"
          git push


