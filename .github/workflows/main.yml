name: Ansible Collection CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration_manage_vm_image:
        description: "Run integration_manage_vm_image"
        required: false
        default: true
        type: boolean
      run_integration_utilities_cron_full_special:
        description: "Run integration_utilities_cron_full_special"
        required: false
        default: true
        type: boolean
      run_integration_utilities_cron_full_special_removal:
        description: "Run integration_utilities_cron_full_special_removal"
        required: false
        default: true
        type: boolean
      run_integration_utilities_cron_single_special:
        description: "Run integration_utilities_cron_single_special"
        required: false
        default: true
        type: boolean
      run_integration_utilities_cron_single_special_removal:
        description: "Run integration_utilities_cron_single_special_removal"
        required: false
        default: true
        type: boolean
      run_integration_utils_mount_mount_auto_detect:
        description: "Run integration_utils_mount_mount_auto_detect"
        required: false
        default: true
        type: boolean
      run_integration_utils_mount_mount_explicit_fstype:
        description: "Run integration_utils_mount_mount_explicit_fstype"
        required: false
        default: true
        type: boolean
      run_integration_utils_mount_remove_from_fstab:
        description: "Run integration_utils_mount_remove_from_fstab"
        required: false
        default: true
        type: boolean
      run_integration_utils_mount_unmount_filesystem:
        description: "Run integration_utils_mount_unmount_filesystem"
        required: false
        default: true
        type: boolean

env:
  NAMESPACE: ado
  COLLECTION_DIR: ${{ github.workspace }}

jobs:
  # Quality stage
  linting:
    name: Ansible Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.ref != 'refs/heads/main' &&
       github.ref != 'refs/heads/Dev' &&
       !startsWith(github.ref, 'refs/tags/'))
    container:
      image: registry.gitlab.com/pipeline-components/ansible-lint:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible collections
        run: |
          if [ -f collections/requirements.yml ]; then
            ansible-galaxy collection install -r collections/requirements.yml --pre;
          fi

      - name: Run ansible-lint
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -v --offline --show-relpath -p | ansible-lint-junit -o ansible-lint.xml
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-report
          path: ansible-lint.xml

  # Testing stage
  discover-molecule-scenarios:
    name: Discover Molecule Scenarios
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    outputs:
      scenarios: ${{ steps.discover.outputs.scenarios }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover scenario directories
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          dirs=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            declare -A checks=(
              [integration_manage_vm_image]="${{ github.event.inputs.run_integration_manage_vm_image }}"
              [integration_utilities_cron_full_special]="${{ github.event.inputs.run_integration_utilities_cron_full_special }}"
              [integration_utilities_cron_full_special_removal]="${{ github.event.inputs.run_integration_utilities_cron_full_special_removal }}"
              [integration_utilities_cron_single_special]="${{ github.event.inputs.run_integration_utilities_cron_single_special }}"
              [integration_utilities_cron_single_special_removal]="${{ github.event.inputs.run_integration_utilities_cron_single_special_removal }}"
              [integration_utils_mount_mount_auto_detect]="${{ github.event.inputs.run_integration_utils_mount_mount_auto_detect }}"
              [integration_utils_mount_mount_explicit_fstype]="${{ github.event.inputs.run_integration_utils_mount_mount_explicit_fstype }}"
              [integration_utils_mount_remove_from_fstab]="${{ github.event.inputs.run_integration_utils_mount_remove_from_fstab }}"
              [integration_utils_mount_unmount_filesystem]="${{ github.event.inputs.run_integration_utils_mount_unmount_filesystem }}"
            )
            for scenario in "${!checks[@]}"; do
              if [[ "${checks[$scenario]}" == "true" ]]; then
                dirs+=("extensions/molecule/$scenario")
              fi
            done
            IFS=$'\n' dirs=($(sort <<< "${dirs[*]}"))
          else
            mapfile -t dirs < <(find extensions/molecule -type f -name molecule.yml -printf '%h\n' | sort)
          fi
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No Molecule scenarios found under extensions/molecule"
            echo "scenarios=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${dirs[@]}" | jq -Rsc 'split("\n")[:-1]')
          echo "Discovered scenarios: $json"
          echo "scenarios=$json" >> "$GITHUB_OUTPUT"

  molecule:
    name: Molecule - ${{ matrix.scenario_dir }}
    runs-on: ubuntu-latest
    needs: discover-molecule-scenarios
    if: |
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      needs.discover-molecule-scenarios.outputs.scenarios != '[]'
    strategy:
      fail-fast: false
      matrix:
        scenario_dir: ${{ fromJson(needs.discover-molecule-scenarios.outputs.scenarios) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils
          pip install --upgrade pip
          pip install ansible-core molecule[docker] docker

      - name: Install collection from local source
        run: |
          ansible-galaxy collection install . --force -p ~/.ansible/collections
          ansible-galaxy collection install ansible.posix --force -p ~/.ansible/collections
        env:
          ANSIBLE_COLLECTIONS_PATH: ~/.ansible/collections

      - name: Set ANSIBLE_COLLECTIONS_PATH for subsequent steps
        run: echo "ANSIBLE_COLLECTIONS_PATH=$HOME/.ansible/collections" >> "$GITHUB_ENV"

      - name: Debug scenario directory
        working-directory: ${{ matrix.scenario_dir }}
        run: |
          pwd
          ls -la

      - name: Compute scenario metadata
        id: scenario_meta
        run: |
          scenario_name="$(basename "${{ matrix.scenario_dir }}")"
          echo "scenario_name=$scenario_name" >> "$GITHUB_OUTPUT"

      - name: Run Molecule tests
        working-directory: extensions/molecule
        run: |
          set -euo pipefail
          scenario_name="${{ steps.scenario_meta.outputs.scenario_name }}"
          mkdir -p "$GITHUB_WORKSPACE/molecule-reports"
          ln -sfn . molecule
          trap 'rm -f molecule' EXIT
          summary_file="$GITHUB_WORKSPACE/molecule-reports/${scenario_name}.summary.txt"
          log_file="$GITHUB_WORKSPACE/molecule-reports/${scenario_name}.log"
          {
            echo "scenario: $scenario_name"
            echo "directory: ${{ matrix.scenario_dir }}"
            echo "started_at_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$summary_file"
          if molecule test -s "$scenario_name" 2>&1 | tee "$log_file"; then
            echo "status: passed" >> "$summary_file"
          else
            echo "status: failed" >> "$summary_file"
            exit 1
          fi

      - name: Upload Molecule report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-report-${{ steps.scenario_meta.outputs.scenario_name }}
          path: molecule-reports/
          if-no-files-found: error

  pr-gate:
    name: PR Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - linting
      - discover-molecule-scenarios
      - molecule
    steps:
      - name: Assert Molecule scenarios exist
        run: |
          test '${{ needs.discover-molecule-scenarios.outputs.scenarios }}' != '[]'

      - name: Assert required jobs passed
        run: >-
          python -c "assert set([
          '${{ needs.linting.result }}',
          '${{ needs.discover-molecule-scenarios.result }}',
          '${{ needs.molecule.result }}'
          ]) <= {'success'}"

  # Building stage
  prepare:
    name: Prepare Build Variables
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.vars.outputs.version }}
      name: ${{ steps.vars.outputs.name }}
      namespace: ${{ steps.vars.outputs.namespace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq

      - name: Extract variables from galaxy.yml
        id: vars
        run: |
          VERSION=$(grep '^\bversion\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAME=$(grep '^\bname\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAMESPACE=$(grep '^\bnamespace\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: prepare
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Update galaxy.yml version for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yq
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          yq -i ".version = \"$VERSION\"" galaxy.yml
          yq -i '.namespace = strenv(NAMESPACE)' galaxy.yml

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build --force --output-path .
        env:
          COLLECTION_DIR: ${{ github.workspace }}

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-build
          path: ${{ needs.prepare.outputs.namespace }}-${{ needs.prepare.outputs.name }}-*.tar.gz
          retention-days: 90
