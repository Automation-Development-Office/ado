name: Ansible Collection CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration_vm_image_management:
        description: "Run integration_vm_image_management"
        required: false
        default: false
        type: boolean
      run_integration_aap_build_ee:
        description: "Run integration_aap_build_ee"
        required: false
        default: false
        type: boolean
      run_integration_aap_configuration:
        description: "Run integration_aap_configuration"
        required: false
        default: false
        type: boolean
      run_integration_rhel_patching:
        description: "Run integration_rhel_patching"
        required: false
        default: false
        type: boolean
      run_integration_rhel_cron_full_special:
        description: "Run integration_rhel_cron_full_special"
        required: false
        default: false
        type: boolean
      run_integration_rhel_cron_full_special_removal:
        description: "Run integration_rhel_cron_full_special_removal"
        required: false
        default: false
        type: boolean
      run_integration_rhel_cron_single_special:
        description: "Run integration_rhel_cron_single_special"
        required: false
        default: false
        type: boolean
      run_integration_rhel_cron_single_special_removal:
        description: "Run integration_rhel_cron_single_special_removal"
        required: false
        default: false
        type: boolean
      run_integration_rhel_mount_mount_auto_detect:
        description: "Run integration_rhel_mount_mount_auto_detect"
        required: false
        default: false
        type: boolean
      run_integration_rhel_mount_mount_explicit_fstype:
        description: "Run integration_rhel_mount_mount_explicit_fstype"
        required: false
        default: false
        type: boolean
      run_integration_rhel_mount_remove_from_fstab:
        description: "Run integration_rhel_mount_remove_from_fstab"
        required: false
        default: false
        type: boolean
      run_integration_rhel_mount_unmount_filesystem:
        description: "Run integration_rhel_mount_unmount_filesystem"
        required: false
        default: false
        type: boolean
      run_readme_verification:
        description: "Run README format verification"
        required: false
        default: true
        type: boolean
      run_security_checks:
        description: "Run security_checks.py and security_data_exposure_scan.py on collection roles"
        required: false
        default: false
        type: boolean
      run_platform_repos_default:
        description: "Run platform_repos default scenario"
        required: false
        default: false
        type: boolean
      run_platform_repos_rhsm:
        description: "Run platform_repos RHSM scenario"
        required: false
        default: false
        type: boolean
      run_integration_satellite_content_view_create:
        description: "Run integration_satellite_content_view_create"
        required: false
        default: false
        type: boolean
      run_integration_satellite_content_view_publish:
        description: "Run integration_satellite_content_view_publish"
        required: false
        default: false
        type: boolean
      run_integration_satellite_content_view_promote:
        description: "Run integration_satellite_content_view_promote"
        required: false
        default: false
        type: boolean
      run_ocp_scenarios:
        description: "Run all ocp_* Molecule scenarios (requires OpenShift cluster secrets)"
        required: false
        default: false
        type: boolean

env:
  NAMESPACE: ado
  COLLECTION_DIR: ${{ github.workspace }}

jobs:
  # Quality stage
  linting:
    name: Ansible Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.ref != 'refs/heads/main' &&
       github.ref != 'refs/heads/Dev' &&
       !startsWith(github.ref, 'refs/tags/'))
    container:
      image: registry.gitlab.com/pipeline-components/ansible-lint:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible collections
        run: |
          set -euo pipefail
          collections_path="${{ github.workspace }}/.ansible/collections"
          mkdir -p "$collections_path"
          if [ -f collections/requirements.yml ]; then
            attempts=3
            for attempt in $(seq 1 "$attempts"); do
              if ansible-galaxy collection install -r collections/requirements.yml -p "$collections_path"; then
                break
              fi
              if [ "$attempt" -eq "$attempts" ]; then
                echo "Collection install failed after ${attempts} attempts."
                exit 1
              fi
              sleep_seconds=$((attempt * 15))
              echo "Collection install failed on attempt ${attempt}/${attempts}. Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            done
          fi
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections
          ANSIBLE_GALAXY_SERVER_TIMEOUT: "120"

      - name: Run ansible-lint
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -v --offline --show-relpath -p | ansible-lint-junit -o ansible-lint.xml
        continue-on-error: true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-report
          path: ansible-lint.xml

  readme-format-check:
    name: README Format Verification
    runs-on: ubuntu-latest
    # Runs on PRs for visibility; informational only until added to pr-gate.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.run_readme_verification == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run README format verification
        id: readme_verify
        # Informational only for now; enable PR gate check when ready to enforce.
        continue-on-error: true
        run: |
          set +e
          python scripts/verify_readme.py --template docs/templates/role_readme_format_template.md \
            > readme-verification.txt 2>&1
          exit_code=$?
          cat readme-verification.txt
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Add README verification summary
        if: always()
        run: |
          {
            echo "## README Format Verification"
            echo
            echo '```text'
            cat readme-verification.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload README verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readme-verification-report
          path: readme-verification.txt
          if-no-files-found: error
          retention-days: 30

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    # Runs on manual dispatch when selected; PRs use the standalone security-check.yml workflow.
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_security_checks == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install scan dependencies
        run: pip install pyyaml

      - name: Run security checks
        id: security_check
        continue-on-error: true
        run: |
          set +e
          python scripts/security_checks.py roles \
            --json-report security-check-report.json \
            --summary-markdown security-check-summary.md \
            > security-check-report.txt 2>&1
          security_exit=$?
          cat security-check-report.txt

          python scripts/security_data_exposure_scan.py roles \
            --json-report data-exposure-report.json \
            --summary-markdown data-exposure-summary.md \
            > data-exposure-report.txt 2>&1
          exposure_exit=$?
          cat data-exposure-report.txt

          if [ "$security_exit" -ne 0 ] || [ "$exposure_exit" -ne 0 ]; then
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      - name: Add security check dashboard to job summary
        if: always()
        run: |
          if [ -f security-check-summary.md ]; then
            cat security-check-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Security Check Dashboard"
              echo
              echo "Summary file was not generated."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f data-exposure-summary.md ]; then
            cat data-exposure-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Data Exposure Scan Dashboard"
              echo
              echo "Summary file was not generated."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload security check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-check-report
          path: |
            security-check-report.txt
            security-check-report.json
            security-check-summary.md
            data-exposure-report.txt
            data-exposure-report.json
            data-exposure-summary.md
          if-no-files-found: error
          retention-days: 30

  # Testing stage
  discover-molecule-scenarios:
    name: Discover Molecule Scenarios
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    outputs:
      scenarios: ${{ steps.discover.outputs.scenarios }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover scenario directories
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          EXCLUDE_FILE="extensions/molecule/pr_exclude.txt"

          is_pr_excluded() {
            local scenario="$1"
            [[ ! -f "$EXCLUDE_FILE" ]] && return 1
            while IFS= read -r pattern || [[ -n "$pattern" ]]; do
              pattern="${pattern%%#*}"
              pattern="$(echo "$pattern" | xargs)"
              [[ -z "$pattern" ]] && continue
              [[ "$scenario" == $pattern ]] && return 0
            done < "$EXCLUDE_FILE"
            return 1
          }

          add_unique_dir() {
            local candidate="$1"
            local existing
            for existing in "${dirs[@]:-}"; do
              [[ "$existing" == "$candidate" ]] && return 0
            done
            dirs+=("$candidate")
          }

          dirs=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            declare -A checks=(
              [integration_vm_image_management]="${{ github.event.inputs.run_integration_vm_image_management }}"
              [integration_aap_build_ee]="${{ github.event.inputs.run_integration_aap_build_ee }}"
              [integration_aap_configuration]="${{ github.event.inputs.run_integration_aap_configuration }}"
              [integration_rhel_patching]="${{ github.event.inputs.run_integration_rhel_patching }}"
              [integration_rhel_cron_full_special]="${{ github.event.inputs.run_integration_rhel_cron_full_special }}"
              [integration_rhel_cron_full_special_removal]="${{ github.event.inputs.run_integration_rhel_cron_full_special_removal }}"
              [integration_rhel_cron_single_special]="${{ github.event.inputs.run_integration_rhel_cron_single_special }}"
              [integration_rhel_cron_single_special_removal]="${{ github.event.inputs.run_integration_rhel_cron_single_special_removal }}"
              [integration_rhel_mount_mount_auto_detect]="${{ github.event.inputs.run_integration_rhel_mount_mount_auto_detect }}"
              [integration_rhel_mount_mount_explicit_fstype]="${{ github.event.inputs.run_integration_rhel_mount_mount_explicit_fstype }}"
              [integration_rhel_mount_remove_from_fstab]="${{ github.event.inputs.run_integration_rhel_mount_remove_from_fstab }}"
              [integration_rhel_mount_unmount_filesystem]="${{ github.event.inputs.run_integration_rhel_mount_unmount_filesystem }}"
              [integration_satellite_content_view_create]="${{ github.event.inputs.run_integration_satellite_content_view_create }}"
              [integration_satellite_content_view_publish]="${{ github.event.inputs.run_integration_satellite_content_view_publish }}"
              [integration_satellite_content_view_promote]="${{ github.event.inputs.run_integration_satellite_content_view_promote }}"
            )
            for scenario in "${!checks[@]}"; do
              if [[ "${checks[$scenario]}" == "true" ]]; then
                add_unique_dir "extensions/molecule/$scenario"
              fi
            done
            if [[ "${{ github.event.inputs.run_ocp_scenarios }}" == "true" ]]; then
              while IFS= read -r dir; do
                add_unique_dir "$dir"
              done < <(
                find extensions/molecule -mindepth 2 -maxdepth 2 -type f -name molecule.yml -printf '%h\n' \
                  | awk -F/ '$NF ~ /^ocp_/' \
                  | sort
              )
            fi
            IFS=$'\n' dirs=($(sort <<< "${dirs[*]:-}"))
          else
            while IFS= read -r dir; do
              scenario="$(basename "$dir")"
              if is_pr_excluded "$scenario"; then
                echo "Skipping PR scenario (pr_exclude.txt): $scenario" >&2
                continue
              fi
              add_unique_dir "$dir"
            done < <(
              find extensions/molecule -mindepth 2 -maxdepth 2 -type f -name molecule.yml -printf '%h\n' | sort
            )
          fi
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No Molecule scenarios found under extensions/molecule"
            echo "scenarios=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${dirs[@]}" | jq -Rsc 'split("\n")[:-1]')
          echo "Discovered scenarios: $json"
          echo "scenarios=$json" >> "$GITHUB_OUTPUT"

  molecule:
    name: Molecule - ${{ matrix.scenario_dir }}
    runs-on: ubuntu-latest
    needs: discover-molecule-scenarios
    if: |
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      needs.discover-molecule-scenarios.outputs.scenarios != '[]'
    strategy:
      fail-fast: false
      matrix:
        scenario_dir: ${{ fromJson(needs.discover-molecule-scenarios.outputs.scenarios) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils podman
          pip install --upgrade pip
          pip install ansible-core 'molecule-plugins[docker,podman]' docker

      - name: Install collection from local source
        run: |
          ansible-galaxy collection install . --force -p ~/.ansible/collections
          ansible-galaxy collection install ansible.posix --force -p ~/.ansible/collections
          ansible-galaxy collection install community.general --force -p ~/.ansible/collections
          ansible-galaxy collection install containers.podman --force -p ~/.ansible/collections
        env:
          ANSIBLE_COLLECTIONS_PATH: ~/.ansible/collections

      - name: Install scenario collection requirements
        continue-on-error: true
        run: |
          set -euo pipefail
          requirements_file="${{ github.workspace }}/${{ matrix.scenario_dir }}/requirements.yml"
          if [ -f "$requirements_file" ]; then
            ansible-galaxy collection install -r "$requirements_file" -p ~/.ansible/collections
          fi
        env:
          ANSIBLE_COLLECTIONS_PATH: ~/.ansible/collections
          ANSIBLE_GALAXY_SERVER_TIMEOUT: "120"

      - name: Set ANSIBLE_COLLECTIONS_PATH for subsequent steps
        run: echo "ANSIBLE_COLLECTIONS_PATH=$HOME/.ansible/collections" >> "$GITHUB_ENV"

      - name: Debug scenario directory
        working-directory: ${{ matrix.scenario_dir }}
        run: |
          pwd
          ls -la

      - name: Compute scenario metadata
        id: scenario_meta
        run: |
          scenario_name="$(basename "${{ matrix.scenario_dir }}")"
          echo "scenario_name=$scenario_name" >> "$GITHUB_OUTPUT"

      - name: Run Molecule tests
        working-directory: extensions/molecule
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
          ANSIBLE_COLLECTIONS_PATH: ~/.ansible/collections
        run: |
          set -euo pipefail
          scenario_name="${{ steps.scenario_meta.outputs.scenario_name }}"
          mkdir -p "$GITHUB_WORKSPACE/molecule-reports"
          ln -sfn . molecule
          trap 'rm -f molecule' EXIT
          summary_file="$GITHUB_WORKSPACE/molecule-reports/${scenario_name}.summary.txt"
          log_file="$GITHUB_WORKSPACE/molecule-reports/${scenario_name}.log"
          {
            echo "scenario: $scenario_name"
            echo "directory: ${{ matrix.scenario_dir }}"
            echo "started_at_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$summary_file"
          if molecule test -s "$scenario_name" 2>&1 | tee "$log_file"; then
            echo "status: passed" >> "$summary_file"
          else
            echo "status: failed" >> "$summary_file"
            exit 1
          fi

      - name: Upload Molecule report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-report-${{ steps.scenario_meta.outputs.scenario_name }}
          path: molecule-reports/
          if-no-files-found: error

  pr-gate:
    name: PR Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - linting
      - discover-molecule-scenarios
      - molecule
    steps:
      - name: Assert Molecule scenarios exist
        run: |
          test '${{ needs.discover-molecule-scenarios.outputs.scenarios }}' != '[]'

      - name: Assert required jobs passed
        run: >-
          python -c "assert set([
          '${{ needs.linting.result }}',
          '${{ needs.discover-molecule-scenarios.result }}',
          '${{ needs.molecule.result }}'
          ]) <= {'success'}"

  # Building stage
  prepare:
    name: Prepare Build Variables
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.vars.outputs.version }}
      name: ${{ steps.vars.outputs.name }}
      namespace: ${{ steps.vars.outputs.namespace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq

      - name: Extract variables from galaxy.yml
        id: vars
        run: |
          VERSION=$(grep '^\bversion\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAME=$(grep '^\bname\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          NAMESPACE=$(grep '^\bnamespace\b' galaxy.yml | awk -F: '{print $2}' | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: prepare
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/Dev' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Update galaxy.yml version for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yq
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          yq -i ".version = \"$VERSION\"" galaxy.yml
          yq -i '.namespace = strenv(NAMESPACE)' galaxy.yml

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build --force --output-path .
        env:
          COLLECTION_DIR: ${{ github.workspace }}

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-build
          path: ${{ needs.prepare.outputs.namespace }}-${{ needs.prepare.outputs.name }}-*.tar.gz
          retention-days: 90
