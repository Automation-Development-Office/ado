---
name: Generate changelog from fragments
description: Run antsibull-changelog release for a tag version and optionally commit to main

inputs:
  tag:
    description: Git tag name (e.g. v1.2.0)
    required: true
  commit_to_main:
    description: Commit generated changelog files back to the main branch
    required: false
    default: "true"
  consume_fragments:
    description: Consume changelog fragments with antsibull-changelog release (official releases only)
    required: false
    default: "true"

outputs:
  version:
    description: Release version (tag without v prefix)
    value: ${{ steps.release.outputs.version }}
  generated:
    description: Whether a new changelog release was generated
    value: ${{ steps.release.outputs.generated }}
  notes_file:
    description: Path to generated release notes for this version
    value: ${{ steps.release.outputs.notes_file }}
  changelog_file:
    description: Path to generated CHANGELOG.rst
    value: ${{ steps.release.outputs.changelog_file }}

runs:
  using: composite
  steps:
    - name: Generate release changelog
      id: release
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ inputs.tag }}"
        VERSION="${VERSION#v}"
        CONSUME_FRAGMENTS="${{ inputs.consume_fragments }}"
        NOTES_FILE="${GITHUB_WORKSPACE}/changelog-release-notes.rst"
        CHANGELOG_FILE="${GITHUB_WORKSPACE}/CHANGELOG.rst"

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
        echo "changelog_file=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"
        echo "generated=false" >> "$GITHUB_OUTPUT"

        pip install antsibull-changelog pyyaml ansible-core semantic-version
        CHECK_VERSION="$VERSION" python3 "${GITHUB_WORKSPACE}/scripts/validate_release_version.py"

        release_exists() {
          CHECK_VERSION="$VERSION" python3 -c '
        import os
        import sys
        import yaml

        version = os.environ["CHECK_VERSION"]
        with open("changelogs/changelog.yaml", "r", encoding="utf-8") as handle:
            data = yaml.safe_load(handle) or {}
        releases = data.get("releases") or {}
        sys.exit(0 if version in releases else 1)
        '
        }

        release_exists_on_ref() {
          local ref="$1"
          CHECK_VERSION="$VERSION" CHECK_REF="$ref" python3 -c '
        import os
        import subprocess
        import sys
        import yaml

        version = os.environ["CHECK_VERSION"]
        ref = os.environ["CHECK_REF"]
        payload = subprocess.check_output(["git", "show", f"{ref}:changelogs/changelog.yaml"])
        data = yaml.safe_load(payload) or {}
        releases = data.get("releases") or {}
        sys.exit(0 if version in releases else 1)
        '
        }

        fragments_present() {
          shopt -s nullglob
          local files=(changelogs/fragments/*.yml changelogs/fragments/*.yaml)
          [ "${#files[@]}" -gt 0 ]
        }

        sync_changelog_from_ref() {
          local ref="$1"
          echo "Syncing changelog files from ${ref}."
          git checkout "${ref}" -- CHANGELOG.rst changelogs/changelog.yaml changelogs/fragments/
        }

        write_changelog_outputs() {
          antsibull-changelog generate \
            --output "$CHANGELOG_FILE" \
            --output-format rst
          antsibull-changelog generate "$VERSION" \
            --output "$NOTES_FILE" \
            --output-format rst \
            --only-latest
        }

        GENERATED=false

        if [ "$CONSUME_FRAGMENTS" != "true" ]; then
          echo "Fragment consumption disabled; syncing or rendering existing changelog only."
          git fetch origin main
          if release_exists_on_ref "origin/main"; then
            sync_changelog_from_ref "origin/main"
            write_changelog_outputs
          elif release_exists; then
            write_changelog_outputs
          else
            echo "No compiled changelog found for ${VERSION}; skipping generation."
            exit 0
          fi
        elif release_exists; then
          echo "Changelog release ${VERSION} already exists in the current checkout."
          write_changelog_outputs
        else
          git fetch origin main
          if release_exists_on_ref "origin/main"; then
            sync_changelog_from_ref "origin/main"
            write_changelog_outputs
          elif fragments_present; then
            echo "Generating changelog release ${VERSION} from fragments."
            antsibull-changelog release --version "$VERSION"
            write_changelog_outputs
            GENERATED=true
          else
            echo "No changelog fragments found and release ${VERSION} is not recorded in changelogs/changelog.yaml."
            echo "Skipping changelog generation."
            exit 0
          fi
        fi

        echo "generated=$GENERATED" >> "$GITHUB_OUTPUT"

    - name: Commit changelog to main
      if: inputs.commit_to_main == 'true' && inputs.consume_fragments == 'true' && steps.release.outputs.generated == 'true'
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${{ steps.release.outputs.version }}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add CHANGELOG.rst changelogs/changelog.yaml changelogs/fragments/
        if git diff --cached --quiet; then
          echo "No changelog changes to commit."
          exit 0
        fi

        git commit -m "Changelog for release ${VERSION}"
        git push origin HEAD:main
