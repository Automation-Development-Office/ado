---
platforms:
  - name: na

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_SCENARIO_DIRECTORY}/../../../roles:${ANSIBLE_ROLES_PATH}"
  playbooks:
    prepare: ../utils/playbooks/utilities_rhel_ext_system_roles_prepare.yml
    converge: ../utils/playbooks/utilities_rhel_ext_system_roles_converge.yml
    verify: ../utils/playbooks/utilities_rhel_ext_system_roles_verify.yml
    destroy: ../utils/playbooks/utilities_rhel_ext_system_roles_destroy.yml
  config_options:
    defaults:
      collections_path: ${ANSIBLE_COLLECTIONS_PATH}

scenario:
  test_sequence:
    - prepare
    - converge
    - idempotence
    - verify
  destroy_sequence:
    - destroy
