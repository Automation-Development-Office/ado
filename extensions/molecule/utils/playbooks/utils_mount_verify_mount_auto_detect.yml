---
- name: Verify - utils_mount mount auto-detect scenario
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    utils_mount_test_root: /tmp/utils_mount_molecule_mount_auto_detect
    utils_mount_mount_path: "{{ utils_mount_test_root }}/mnt"

  tasks:
    - name: Assert filesystem is mounted
      ansible.builtin.assert:
        that:
          - ansible_mounts | selectattr("mount", "equalto", utils_mount_mount_path) | list | length > 0
        fail_msg: "Expected mount at {{ utils_mount_mount_path }}"
        success_msg: "Mount exists at {{ utils_mount_mount_path }}"

    - name: Check fstab contains mount path
      ansible.builtin.command: "grep -F {{ utils_mount_mount_path }} /etc/fstab"
      register: utils_mount_verify_fstab_result
      changed_when: false
      failed_when: false

    - name: Assert fstab contains mount path
      ansible.builtin.assert:
        that:
          - utils_mount_verify_fstab_result.rc == 0
        fail_msg: "Expected fstab entry for {{ utils_mount_mount_path }}"
        success_msg: "fstab entry exists for {{ utils_mount_mount_path }}"
