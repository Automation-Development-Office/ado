---
- name: Preparing molecule - create a qcow image from a local base image
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    vm_image_management_test_root: /tmp/vm_image_management_molecule
    vm_image_management_action: create
    vm_image_management_dest_path: "{{ vm_image_management_test_root }}"
    vm_image_management_dest_name: cloned-test.qcow2
    vm_image_management_base_path: "{{ vm_image_management_test_root }}"
    vm_image_management_base_name: base-test.qcow2
    vm_image_management_format: qcow2
    vm_image_management_download: false

  tasks:
    - name: Ensure qemu-img is available
      ansible.builtin.command: qemu-img --version
      changed_when: false

    - name: Ensure Molecule test directory exists
      ansible.builtin.file:
        path: "{{ vm_image_management_test_root }}"
        state: directory
        mode: "0755"

    - name: Create base qcow2 image for the role to clone
      ansible.builtin.command: >
        qemu-img create -f qcow2
        {{ vm_image_management_test_root }}/{{ vm_image_management_base_name }}
        64M
      args:
        creates: "{{ vm_image_management_test_root }}/{{ vm_image_management_base_name }}"
