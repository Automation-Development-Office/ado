---
- name: Converge - applications_elastic scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    applications_elastic_enable_live_checks: "{{ (lookup('env', 'APPLICATIONS_ELASTIC_ENABLE_LIVE_CHECKS') | default('false', true)) | bool }}"

  tasks:
    - name: Explain live-check toggle
      ansible.builtin.debug:
        msg: >-
          applications_elastic role execution is skipped by default in Molecule.
          Set APPLICATIONS_ELASTIC_ENABLE_LIVE_CHECKS=true and provide access to
          a reachable Elasticsearch endpoint to run live status checks.
      when: not applications_elastic_enable_live_checks

    - name: Run applications_elastic role with live checks enabled
      ansible.builtin.include_role:
        name: infra.ado.applications_elastic
      vars:
        applications_elastic_state: status
        applications_elastic_url: "{{ lookup('env', 'APPLICATIONS_ELASTIC_URL') | default('http://localhost:9200', true) }}"
        applications_elastic_user: "{{ lookup('env', 'APPLICATIONS_ELASTIC_USER') | default('', true) }}"
        applications_elastic_pass: "{{ lookup('env', 'APPLICATIONS_ELASTIC_PASS') | default('', true) }}"
      when: applications_elastic_enable_live_checks
