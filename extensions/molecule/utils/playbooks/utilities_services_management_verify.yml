---
- name: Verify - utilities_services_management scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    readme_path: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/README.md"

  tasks:
    - name: Check if README.md exists
      ansible.builtin.stat:
        path: "{{ readme_path }}"
      register: utilities_services_management_verify_readme_file

    - name: Assert README.md exists
      ansible.builtin.assert:
        that:
          - utilities_services_management_verify_readme_file.stat.exists
        fail_msg: "README.md is missing in the scenario directory."
        success_msg: "README.md exists in the scenario directory."

    - name: Load README.md content
      ansible.builtin.slurp:
        path: "{{ readme_path }}"
      register: utilities_services_management_verify_readme_raw

    - name: Set README content fact
      ansible.builtin.set_fact:
        utilities_services_management_verify_readme: "{{ utilities_services_management_verify_readme_raw.content | b64decode }}"

    - name: Verify README has Role heading
      ansible.builtin.assert:
        that:
          - utilities_services_management_verify_readme is regex('(?m)^#\\s+Role:')
        fail_msg: "README.md should include a top-level '# Role:' heading."
        success_msg: "README.md has a valid role heading."

    - name: Verify README has Variables section
      ansible.builtin.assert:
        that:
          - utilities_services_management_verify_readme is search('(?m)^##\\s+Variables')
        fail_msg: "README.md should include a '## Variables' section."
        success_msg: "README.md includes a Variables section."
