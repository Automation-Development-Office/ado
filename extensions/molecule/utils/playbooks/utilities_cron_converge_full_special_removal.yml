---
- name: Converge - utilities_cron full special removal scenario
  hosts: localhost
  gather_facts: false
  become: true

  tasks:
    - name: Include utilities_cron role to remove all special schedules # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.utilities_cron
      vars:
        cron_type: special
        cron_state: absent
        cron_yearly_jobs:
          - { name: "yearly_test", job: "test" }
          - { name: "yearly_prod", job: "prod" }
        cron_monthly_jobs:
          - { name: "monthly_test", job: "test" }
          - { name: "monthly_prod", job: "prod" }
        cron_hourly_jobs:
          - { name: "hourly_test", job: "test" }
          - { name: "hourly_prod", job: "prod" }
        cron_daily_jobs:
          - { name: "daily_test", job: "test" }
          - { name: "daily_prod", job: "prod" }
        cron_reboot_jobs:
          - { name: "reboot_test", job: "test" }
          - { name: "reboot_prod", job: "prod" }
        cron_weekly_jobs:
          - { name: "weekly_test", job: "test" }
          - { name: "weekly_prod", job: "prod" }
        cron_annual_jobs:
          - { name: "annual_test", job: "test" }
          - { name: "annual_prod", job: "prod" }
