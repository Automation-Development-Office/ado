---
- name: Destroy - utils_mount mount explicit fstype scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    utils_mount_test_root: /tmp/utils_mount_molecule_mount_explicit_fstype
    utils_mount_mount_path: "{{ utils_mount_test_root }}/mnt"

  tasks:
    - name: Ensure mount path is absent from fstab and unmounted
      ansible.posix.mount:
        path: "{{ utils_mount_mount_path }}"
        state: absent

    - name: Remove scenario test root
      ansible.builtin.file:
        path: "{{ utils_mount_test_root }}"
        state: absent
