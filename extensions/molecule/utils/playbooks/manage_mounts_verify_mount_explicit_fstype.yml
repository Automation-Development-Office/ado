---
- name: Verify - manage_mounts mount explicit fstype scenario
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    manage_mounts_test_root: /tmp/manage_mounts_molecule_mount_explicit_fstype
    manage_mounts_mount_path: "{{ manage_mounts_test_root }}/mnt"

  tasks:
    - name: Assert filesystem is mounted
      ansible.builtin.assert:
        that:
          - ansible_mounts | selectattr("mount", "equalto", manage_mounts_mount_path) | list | length > 0
        fail_msg: "Expected mount at {{ manage_mounts_mount_path }}"
        success_msg: "Mount exists at {{ manage_mounts_mount_path }}"

    - name: Check fstab contains mount path
      ansible.builtin.command: "grep -F {{ manage_mounts_mount_path }} /etc/fstab"
      register: manage_mounts_verify_fstab_result
      changed_when: false
      failed_when: false

    - name: Assert fstab contains mount path
      ansible.builtin.assert:
        that:
          - manage_mounts_verify_fstab_result.rc == 0
        fail_msg: "Expected fstab entry for {{ manage_mounts_mount_path }}"
        success_msg: "fstab entry exists for {{ manage_mounts_mount_path }}"
