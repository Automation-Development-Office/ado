---
- name: Verify - satellite_content_view scenario
  hosts: localhost
  gather_facts: false

  vars:
    readme_path: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/../../../roles/satellite_content_view/README.md"
    role_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/../../../roles/satellite_content_view"
    detected_role_name: satellite_content_view

  tasks:
    - name: Show detected role name
      ansible.builtin.debug:
        msg: "Detected role name: {{ detected_role_name }}"

    - name: Verify role name does NOT use hyphens
      ansible.builtin.assert:
        that:
          - detected_role_name is match('^[A-Za-z0-9_]+$')
          - detected_role_name.find('-') == -1
        fail_msg: "Role name '{{ detected_role_name }}' contains a hyphen."
        success_msg: "Role name '{{ detected_role_name }}' is valid."

    - name: Check if README.md exists
      ansible.builtin.stat:
        path: "{{ readme_path }}"
      register: satellite_content_view_verify_readme_file

    - name: Fail when README.md is missing
      ansible.builtin.fail:
        msg: "README.md is required at {{ readme_path }}."
      when: not satellite_content_view_verify_readme_file.stat.exists

    - name: Load README.md
      ansible.builtin.slurp:
        path: "{{ readme_path }}"
      register: satellite_content_view_verify_readme_raw

    - name: Set README content fact
      ansible.builtin.set_fact:
        satellite_content_view_verify_readme: "{{ satellite_content_view_verify_readme_raw.content | b64decode }}"

    - name: Verify README has required heading
      ansible.builtin.assert:
        that:
          - satellite_content_view_verify_readme is regex('(?m)^#\\s+Role:')
        fail_msg: "README.md should start with '# Role: <collection.role>'."
        success_msg: "README.md has correct heading format."

    - name: Verify README has variables table
      ansible.builtin.assert:
        that:
          - satellite_content_view_verify_readme is search('\\|\\s*Variable\\s*\\|\\s*Description\\s*\\|', multiline=True)
        fail_msg: "README.md should include a variables table with '| Variable | Description |'."
        success_msg: "README.md includes a variables table."

    - name: Verify README has example code block
      ansible.builtin.assert:
        that:
          - satellite_content_view_verify_readme is search('```(yaml|yml|ansible|bash)[\\s\\S]*?```', multiline=True)
        fail_msg: "README.md should include a fenced code block with an example."
        success_msg: "README.md includes an example code block."

    - name: Verify Requirements section exists
      ansible.builtin.assert:
        that:
          - satellite_content_view_verify_readme is search('(?m)^##\\s+Requirements', multiline=True)
        fail_msg: "Missing '## Requirements' section."
        success_msg: "Found Requirements section."

    - name: Verify Role Variables section exists
      ansible.builtin.assert:
        that:
          - satellite_content_view_verify_readme is search('(?m)^##\\s+Role Variables', multiline=True)
        fail_msg: "Missing '## Role Variables' section."
        success_msg: "Found Role Variables section."

    - name: Verify Example Playbooks section exists
      ansible.builtin.assert:
        that:
          - satellite_content_view_verify_readme is search('(?m)^##\\s+Example Playbooks', multiline=True)
        fail_msg: "Missing '## Example Playbooks' section."
        success_msg: "Found Example Playbooks section."
