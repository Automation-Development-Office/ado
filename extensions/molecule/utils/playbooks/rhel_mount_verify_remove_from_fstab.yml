---
- name: Verify - rhel_mount remove from fstab scenario
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    rhel_mount_test_root: /tmp/rhel_mount_molecule_remove_from_fstab
    rhel_mount_path: "{{ rhel_mount_test_root }}/mnt"

  tasks:
    - name: Assert filesystem is not mounted
      ansible.builtin.assert:
        that:
          - ansible_mounts | selectattr("mount", "equalto", rhel_mount_path) | list | length == 0
        fail_msg: "Mount {{ rhel_mount_path }} should be absent"
        success_msg: "Mount {{ rhel_mount_path }} is absent"

    - name: Check fstab does not contain mount path
      ansible.builtin.command: "grep -F {{ rhel_mount_path }} /etc/fstab"
      register: rhel_mount_verify_fstab_result
      changed_when: false
      failed_when: false

    - name: Assert fstab does not contain mount path
      ansible.builtin.assert:
        that:
          - rhel_mount_verify_fstab_result.rc != 0
        fail_msg: "Did not expect fstab entry for {{ rhel_mount_path }}"
        success_msg: "fstab entry removed for {{ rhel_mount_path }}"
