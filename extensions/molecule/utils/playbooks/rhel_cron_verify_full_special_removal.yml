---
- name: Verify - rhel_cron full special removal scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    rhel_cron_expected_job_names:
      - yearly_test
      - yearly_prod
      - monthly_test
      - monthly_prod
      - hourly_test
      - hourly_prod
      - daily_test
      - daily_prod
      - reboot_test
      - reboot_prod
      - weekly_test
      - weekly_prod
      - annual_test
      - annual_prod

  tasks:
    - name: Get root crontab content
      ansible.builtin.command: crontab -l -u root
      register: rhel_cron_verify_crontab
      changed_when: false
      failed_when: false

    - name: Assert expected special cron jobs are absent
      ansible.builtin.assert:
        that:
          - rhel_cron_verify_crontab.rc != 0 or (rhel_cron_verify_crontab.stdout is not search(item))
        fail_msg: "Expected cron entry '{{ item }}' to be absent from root crontab."
        success_msg: "Cron entry '{{ item }}' is absent from root crontab."
      loop: "{{ rhel_cron_expected_job_names }}"
