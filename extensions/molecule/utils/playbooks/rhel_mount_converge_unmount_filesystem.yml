---
- name: Converge - rhel_mount unmount filesystem scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
 #  rhel_mount_test_root: /tmp/rhel_mount_molecule_unmount_filesystem
 #  rhel_mount_path: "{{ rhel_mount_test_root }}/mnt"

  tasks:
    - name: Include rhel_mount role for unmount # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.rhel_mount
      vars:
        rhel_mount_action: unmounted
        rhel_mount_path: /tmp/rhel_mount_molecule_unmount_filesystem/mnt
