---
- name: Converge - ocp_compliance_scan scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    ocp_compliance_scan_enable_live_checks: >-
      {{
        (lookup('env', 'OCP_COMPLIANCE_SCAN_ENABLE_LIVE_CHECKS')
        | default('false', true)) | bool
      }}
    ocp_compliance_scan_schedule_scan_env: >-
      {{
        (lookup('env', 'OCP_COMPLIANCE_SCAN_SCHEDULE_SCAN')
        | default('true', true)) | bool
      }}
    ocp_compliance_scan_run_scan_env: >-
      {{
        (lookup('env', 'OCP_COMPLIANCE_SCAN_RUN_SCAN')
        | default('true', true)) | bool
      }}

  tasks:
    - name: Explain live-check toggle
      ansible.builtin.debug:
        msg: >-
          ocp_compliance_scan execution is skipped by default in Molecule.
          Set OCP_COMPLIANCE_SCAN_ENABLE_LIVE_CHECKS=true and provide required
          OpenShift/Compliance values to run live checks.
      when: not ocp_compliance_scan_enable_live_checks

    - name: Validate required live-check inputs
      ansible.builtin.assert:
        that:
          - (lookup('env', 'OCP_COMPLIANCE_SCAN_PROFILE') | default('', true) | length) > 0
          - (lookup('env', 'OCP_COMPLIANCE_SCAN_SCAN_NAME') | default('', true) | length) > 0
          - (lookup('env', 'OCP_COMPLIANCE_SCAN_SUITE_NAME') | default('', true) | length) > 0
        fail_msg: >-
          Set OCP_COMPLIANCE_SCAN_PROFILE, OCP_COMPLIANCE_SCAN_SCAN_NAME, and
          OCP_COMPLIANCE_SCAN_SUITE_NAME for live-check execution.
      when: ocp_compliance_scan_enable_live_checks

    - name: Run ocp_compliance_scan role with live checks enabled
      ansible.builtin.include_role:
        name: infra.ado.ocp_compliance_scan
      vars:
        ocp_compliance_scan_schedule_scan: "{{ ocp_compliance_scan_schedule_scan_env }}"
        ocp_compliance_scan_run_scan: "{{ ocp_compliance_scan_run_scan_env }}"
        ocp_compliance_scan_scan_name: "{{ lookup('env', 'OCP_COMPLIANCE_SCAN_SCAN_NAME') | default('', true) }}"
        ocp_compliance_scan_suite_name: "{{ lookup('env', 'OCP_COMPLIANCE_SCAN_SUITE_NAME') | default('', true) }}"
        ocp_compliance_scan_profile: "{{ lookup('env', 'OCP_COMPLIANCE_SCAN_PROFILE') | default('', true) }}"
        ocp_compliance_scan_operator_namespace: >-
          {{ lookup('env', 'OCP_COMPLIANCE_SCAN_OPERATOR_NAMESPACE') | default('openshift-compliance', true) }}
        ocp_compliance_scan_content_image: >-
          {{ lookup('env', 'OCP_COMPLIANCE_SCAN_CONTENT_IMAGE') | default('quay.io/complianceascode/content:latest', true) }}
      when: ocp_compliance_scan_enable_live_checks
