---
- name: Converge - platform_repos default scenario
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Enable a test repository with yum_repository method
      ansible.builtin.include_role:
        name: infra.ado.platform_repos
      vars: # noqa: var-naming[no-role-prefix]
        repos_action: "enable"
        repos_to_enable: "test-repo-disabled"
        repos_enable_method: "yum_repository"
        platform_repos_clean_cache: false

    - name: Disable a test repository with file-edit method
      ansible.builtin.include_role:
        name: infra.ado.platform_repos
      vars: # noqa: var-naming[no-role-prefix]
        repos_action: "disable"
        repos_to_disable: "test-repo-enabled"
        repos_disable_method: "file-edit"
        platform_repos_backup_files: true
