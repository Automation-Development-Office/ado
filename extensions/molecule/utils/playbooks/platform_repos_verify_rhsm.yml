---
- name: Verify - platform_repos RHSM scenario
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Check subscription-manager binary availability
      ansible.builtin.command: which subscription-manager
      register: platform_repos_rhsm_verify_sm_check
      changed_when: false
      failed_when: false

    - name: Validate package manager commands still function
      ansible.builtin.shell: |
        set -o pipefail
        {{ ansible_pkg_mgr }} repolist all --quiet || true
      register: platform_repos_rhsm_verify_repolist
      changed_when: false
      failed_when: false

    - name: Validate subscription-manager command does not crash
      ansible.builtin.shell: |
        subscription-manager status || true
      register: platform_repos_rhsm_verify_status
      changed_when: false
      failed_when: false

    - name: Assert RHSM scenario sanity checks
      ansible.builtin.assert:
        that:
          - platform_repos_rhsm_verify_repolist.rc in [0, 1]
          - platform_repos_rhsm_verify_status.rc in [0, 1]
        fail_msg: "RHSM verify sanity checks failed unexpectedly"
        success_msg: "RHSM verify sanity checks passed"

    - name: Show RHSM verify summary
      ansible.builtin.debug:
        msg: |
          RHSM verify summary:
          - subscription-manager present: {{ platform_repos_rhsm_verify_sm_check.rc == 0 }}
          - repolist rc: {{ platform_repos_rhsm_verify_repolist.rc }}
          - subscription status rc: {{ platform_repos_rhsm_verify_status.rc }}
