---
- name: Converge - utils_mount unmount filesystem scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    utils_mount_test_root: /tmp/utils_mount_molecule_unmount_filesystem
    utils_mount_mount_path: "{{ utils_mount_test_root }}/mnt"

  tasks:
    - name: Include utils_mount role for unmount # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.utils_mount
      vars:
        mount_action: unmounted
        mount_path: "{{ utils_mount_mount_path }}"
