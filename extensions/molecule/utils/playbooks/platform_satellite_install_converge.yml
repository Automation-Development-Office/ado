---
- name: Converge - run platform_satellite_install pre_check
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    platform_satellite_install_pre_check: true
    platform_satellite_install_satellite_deployment_version: "6.16"
    platform_satellite_install_satellite_location: molecule-test
    platform_satellite_install_satellite_min_memory_size: 1024
    platform_satellite_install_satellite_min_cpu_count: 1
    platform_satellite_install_satellite_rhn_connected: false
    platform_satellite_install_satellite_vg_name: satellite
    platform_satellite_install_satellite_data_device: /dev
    platform_satellite_install_satellite_req_dirs: []

  tasks:
    - name: Include platform_satellite_install role for pre_check # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.platform_satellite_install
