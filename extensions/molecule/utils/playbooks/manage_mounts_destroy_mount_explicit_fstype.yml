---
- name: Destroy - manage_mounts mount explicit fstype scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    manage_mounts_test_root: /tmp/manage_mounts_molecule_mount_explicit_fstype
    manage_mounts_mount_path: "{{ manage_mounts_test_root }}/mnt"

  tasks:
    - name: Ensure mount path is absent from fstab and unmounted
      ansible.posix.mount:
        path: "{{ manage_mounts_mount_path }}"
        state: absent

    - name: Remove scenario test root
      ansible.builtin.file:
        path: "{{ manage_mounts_test_root }}"
        state: absent
