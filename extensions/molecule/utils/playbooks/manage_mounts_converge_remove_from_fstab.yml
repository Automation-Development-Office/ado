---
- name: Converge - manage_mounts remove from fstab scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    manage_mounts_test_root: /tmp/manage_mounts_molecule_remove_from_fstab
    manage_mounts_mount_path: "{{ manage_mounts_test_root }}/mnt"

  tasks:
    - name: Include manage_mounts role for fstab removal # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.manage_mounts
      vars:
        mount_action: absent
        mount_path: "{{ manage_mounts_mount_path }}"
