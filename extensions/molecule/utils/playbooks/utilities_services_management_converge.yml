---
- name: Converge - utilities_services_management scenario
  hosts: all
  gather_facts: false
  become: false
  remote_user: root

  vars:
    service_names:
      - crond
      - tuned
      - httpd
      - tomcat
    service_state: stopped
    service_enabled: false

  roles:
    - role: infra.ado.utilities_services_management
