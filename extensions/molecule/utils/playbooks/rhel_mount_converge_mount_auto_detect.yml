---
- name: Converge - rhel_mount mount auto-detect scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:


  tasks:
    - name: Include rhel_mount role for auto-detect mount # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.rhel_mount
      vars:
        rhel_mount_action: mounted
        rhel_mount_path: /tmp/rhel_mount_molecule_mount_auto_detect/mnt
        rhel_mount_target_device: /tmp/rhel_mount_molecule_mount_auto_detect/device.img
        rhel_mount_fstype_detection: true
