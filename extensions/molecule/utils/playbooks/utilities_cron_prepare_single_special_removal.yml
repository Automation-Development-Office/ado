---
- name: Prepare - utilities_cron single special removal scenario
  hosts: localhost
  gather_facts: false
  become: true

  tasks:
    - name: Seed yearly test cron job before removal converge # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: utilities_cron
      vars:
        utilities_cron_type: special
        cron_state: present
        cron_yearly_jobs:
          - { name: "yearly_test", job: "test" }
