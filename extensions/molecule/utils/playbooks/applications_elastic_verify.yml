---
- name: Verify - applications_elastic scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    readme_path: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/../../../roles/applications_elastic/README.md"

  tasks:
    - name: Check if role README.md exists
      ansible.builtin.stat:
        path: "{{ readme_path }}"
      register: applications_elastic_verify_readme_file

    - name: Assert role README.md exists
      ansible.builtin.assert:
        that:
          - applications_elastic_verify_readme_file.stat.exists
        fail_msg: "README.md is missing for applications_elastic."
