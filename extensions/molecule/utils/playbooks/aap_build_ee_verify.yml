---
- name: Verify integration_aap_build_ee scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    aap_build_ee_test_root: /tmp/aap_build_ee_integration
    aap_build_ee_context: >-
      {{ aap_build_ee_test_root }}/build-context

  tasks:
    - name: Check generated execution-environment definition
      ansible.builtin.stat:
        path: "{{ aap_build_ee_context }}/execution-environment.yml"
      register: aap_build_ee_definition_stat

    - name: Check generated requirements definition
      ansible.builtin.stat:
        path: "{{ aap_build_ee_context }}/requirements.yml"
      register: aap_build_ee_requirements_stat

    - name: Check mock build output marker
      ansible.builtin.stat:
        path: "{{ aap_build_ee_context }}/.mock-built-image-tag"
      register: aap_build_ee_mock_marker_stat

    - name: Assert generated files and marker exist
      ansible.builtin.assert:
        that:
          - aap_build_ee_definition_stat.stat.exists
          - aap_build_ee_requirements_stat.stat.exists
          - aap_build_ee_mock_marker_stat.stat.exists

    - name: Read generated requirements definition
      ansible.builtin.slurp:
        path: "{{ aap_build_ee_context }}/requirements.yml"
      register: aap_build_ee_requirements_raw

    - name: Read generated execution-environment definition
      ansible.builtin.slurp:
        path: "{{ aap_build_ee_context }}/execution-environment.yml"
      register: aap_build_ee_definition_raw

    - name: Set generated requirements content
      ansible.builtin.set_fact:
        aap_build_ee_requirements_content: "{{ aap_build_ee_requirements_raw.content | b64decode }}"
        aap_build_ee_definition_content: "{{ aap_build_ee_definition_raw.content | b64decode }}"

    - name: Assert generated requirements contain pinned version
      ansible.builtin.assert:
        that:
          - aap_build_ee_requirements_content is search('name:\\s+\"ansible\\.posix\"', multiline=True)
          - aap_build_ee_requirements_content is search('version:\\s+\"1\\.5\\.4\"', multiline=True)

    - name: Assert generated EE definition contains explicit package manager path
      ansible.builtin.assert:
        that:
          - aap_build_ee_definition_content is search('package_manager_path:\\s+\"/usr/bin/microdnf\"', multiline=True)

    - name: Assert generated EE definition contains ansible dependencies
      ansible.builtin.assert:
        that:
          - aap_build_ee_definition_content is search('ansible_core:\\s+\"2\\.16\"', multiline=True)
          - aap_build_ee_definition_content is search('ansible_runner:\\s+\"2\\.4\"', multiline=True)
