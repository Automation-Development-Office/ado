---
- name: Converge - applications_grafana_manage_folder scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    applications_grafana_manage_folder_enable_live_checks: >-
      {{
        (lookup('env', 'APPLICATIONS_GRAFANA_MANAGE_FOLDER_ENABLE_LIVE_CHECKS')
        | default('false', true)) | bool
      }}

  tasks:
    - name: Explain live-check toggle
      ansible.builtin.debug:
        msg: >-
          applications_grafana_manage_folder execution is skipped by default in Molecule.
          Set APPLICATIONS_GRAFANA_MANAGE_FOLDER_ENABLE_LIVE_CHECKS=true and provide
          required Grafana credentials to run live checks.
      when: not applications_grafana_manage_folder_enable_live_checks

    - name: Run applications_grafana_manage_folder role with live checks enabled
      ansible.builtin.include_role:
        name: infra.ado.applications_grafana_manage_folder
      vars:
        applications_grafana_manage_folder_state: present
        applications_grafana_manage_folder_name: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_MANAGE_FOLDER_NAME') | default('General', true) }}
        applications_grafana_manage_folder_hostname: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_MANAGE_FOLDER_HOSTNAME') | default('', true) }}
        applications_grafana_manage_folder_admin_user: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_MANAGE_FOLDER_ADMIN_USER') | default('', true) }}
        applications_grafana_manage_folder_admin_password: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_MANAGE_FOLDER_ADMIN_PASSWORD') | default('', true) }}
      when: applications_grafana_manage_folder_enable_live_checks
