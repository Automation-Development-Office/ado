---
- name: Converge - applications_grafana_create_datasource scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    applications_grafana_create_datasource_enable_live_checks: >-
      {{
        (lookup('env', 'APPLICATIONS_GRAFANA_CREATE_DATASOURCE_ENABLE_LIVE_CHECKS')
        | default('false', true)) | bool
      }}

  tasks:
    - name: Explain live-check toggle
      ansible.builtin.debug:
        msg: >-
          applications_grafana_create_datasource execution is skipped by default in Molecule.
          Set APPLICATIONS_GRAFANA_CREATE_DATASOURCE_ENABLE_LIVE_CHECKS=true and provide
          required Grafana credentials and OpenShift access to run live checks.
      when: not applications_grafana_create_datasource_enable_live_checks

    - name: Run applications_grafana_create_datasource role with live checks enabled
      ansible.builtin.include_role:
        name: infra.ado.applications_grafana_create_datasource
      vars:
        applications_grafana_create_datasource_state: present
        applications_grafana_create_datasource_name: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_CREATE_DATASOURCE_NAME') | default('prometheus', true) }}
        applications_grafana_create_datasource_hostname: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_CREATE_DATASOURCE_HOSTNAME') | default('', true) }}
        applications_grafana_create_datasource_admin_user: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_CREATE_DATASOURCE_ADMIN_USER') | default('', true) }}
        applications_grafana_create_datasource_admin_password: >-
          {{ lookup('env', 'APPLICATIONS_GRAFANA_CREATE_DATASOURCE_ADMIN_PASSWORD') | default('', true) }}
      when: applications_grafana_create_datasource_enable_live_checks
