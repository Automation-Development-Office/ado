---
- name: Prepare - manage_mounts mount explicit fstype scenario
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    manage_mounts_test_root: /tmp/manage_mounts_molecule_mount_explicit_fstype
    manage_mounts_image_path: "{{ manage_mounts_test_root }}/device.img"
    manage_mounts_mount_path: "{{ manage_mounts_test_root }}/mnt"

  tasks:
    - name: Ensure Debian package dependencies are present
      ansible.builtin.apt:
        name:
          - e2fsprogs
          - util-linux
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Ensure scenario test root exists
      ansible.builtin.file:
        path: "{{ manage_mounts_test_root }}"
        state: directory
        mode: "0755"

    - name: Ensure scenario mount path exists
      ansible.builtin.file:
        path: "{{ manage_mounts_mount_path }}"
        state: directory
        mode: "0755"

    - name: Ensure loopback image exists
      ansible.builtin.command: "truncate -s 64M {{ manage_mounts_image_path }}"
      args:
        creates: "{{ manage_mounts_image_path }}"

    - name: Detect existing filesystem signature in loopback image
      ansible.builtin.command: "blkid {{ manage_mounts_image_path }}"
      register: manage_mounts_prepare_blkid_result
      changed_when: false
      failed_when: false

    - name: Create ext4 filesystem in loopback image when missing
      ansible.builtin.command: "mkfs.ext4 -F {{ manage_mounts_image_path }}"
      when: manage_mounts_prepare_blkid_result.rc != 0
      changed_when: true

    - name: Ensure test mount path is absent from fstab and unmounted
      ansible.posix.mount:
        path: "{{ manage_mounts_mount_path }}"
        state: absent
