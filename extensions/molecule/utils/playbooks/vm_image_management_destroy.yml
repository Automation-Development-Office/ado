---
- name: Destroy - clean up Molecule test artifacts
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    vm_image_management_test_root: /tmp/vm_image_management_molecule

  tasks:
    - name: Remove Molecule image test directory
      ansible.builtin.file:
        path: "{{ vm_image_management_test_root }}"
        state: absent
