---
- name: Converge - ocp_compliance_remediation scenario
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    ocp_compliance_remediation_enable_live_checks: >-
      {{
        (lookup('env', 'OCP_COMPLIANCE_REMEDIATION_ENABLE_LIVE_CHECKS')
        | default('false', true)) | bool
      }}

  tasks:
    - name: Explain live-check toggle
      ansible.builtin.debug:
        msg: >-
          ocp_compliance_remediation execution is skipped by default in Molecule.
          Set OCP_COMPLIANCE_REMEDIATION_ENABLE_LIVE_CHECKS=true and provide
          ACS input values to run live checks.
      when: not ocp_compliance_remediation_enable_live_checks

    - name: Validate required live-check inputs
      ansible.builtin.assert:
        that:
          - (lookup('env', 'OCP_COMPLIANCE_REMEDIATION_ACS_API_URL') | default('', true) | length) > 0
          - (lookup('env', 'OCP_COMPLIANCE_REMEDIATION_ACS_TOKEN') | default('', true) | length) > 0
          - (lookup('env', 'OCP_COMPLIANCE_REMEDIATION_PROFILE') | default('', true) | length) > 0
          - (lookup('env', 'OCP_COMPLIANCE_REMEDIATION_SCAN_ID') | default('', true) | length) > 0
        fail_msg: >-
          Set OCP_COMPLIANCE_REMEDIATION_ACS_API_URL,
          OCP_COMPLIANCE_REMEDIATION_ACS_TOKEN,
          OCP_COMPLIANCE_REMEDIATION_PROFILE, and
          OCP_COMPLIANCE_REMEDIATION_SCAN_ID for live-check execution.
      when: ocp_compliance_remediation_enable_live_checks

    - name: Run ocp_compliance_remediation role with live checks enabled
      ansible.builtin.include_role:
        name: infra.ado.ocp_compliance_remediation
      vars:
        ocp_compliance_remediation_enabled: true
        ocp_compliance_remediation_acs_api_url: >-
          {{ lookup('env', 'OCP_COMPLIANCE_REMEDIATION_ACS_API_URL') | default('', true) }}
        ocp_compliance_remediation_acs_token: >-
          {{ lookup('env', 'OCP_COMPLIANCE_REMEDIATION_ACS_TOKEN') | default('', true) }}
        ocp_compliance_remediation_profile: >-
          {{ lookup('env', 'OCP_COMPLIANCE_REMEDIATION_PROFILE') | default('', true) }}
        ocp_compliance_remediation_scan_id: >-
          {{ lookup('env', 'OCP_COMPLIANCE_REMEDIATION_SCAN_ID') | default('', true) }}
      when: ocp_compliance_remediation_enable_live_checks
