---
- name: Verify - utils_mount unmount filesystem scenario
  hosts: localhost
  gather_facts: true
  become: true

  vars:
    utils_mount_test_root: /tmp/utils_mount_molecule_unmount_filesystem
    utils_mount_mount_path: "{{ utils_mount_test_root }}/mnt"

  tasks:
    - name: Assert filesystem is not mounted
      ansible.builtin.assert:
        that:
          - ansible_mounts | selectattr("mount", "equalto", utils_mount_mount_path) | list | length == 0
        fail_msg: "Mount {{ utils_mount_mount_path }} should be absent"
        success_msg: "Mount {{ utils_mount_mount_path }} is absent"

    - name: Check fstab still contains mount path
      ansible.builtin.command: "grep -F {{ utils_mount_mount_path }} /etc/fstab"
      register: utils_mount_verify_fstab_result
      changed_when: false
      failed_when: false

    - name: Assert fstab still contains mount path
      ansible.builtin.assert:
        that:
          - utils_mount_verify_fstab_result.rc == 0
        fail_msg: "Expected fstab entry to remain for {{ utils_mount_mount_path }}"
        success_msg: "fstab entry remains for {{ utils_mount_mount_path }}"
