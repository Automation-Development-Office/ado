---
- name: Destroy - rhel_mount unmount filesystem scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    rhel_mount_test_root: /tmp/rhel_mount_molecule_unmount_filesystem
    rhel_mount_path: "{{ rhel_mount_test_root }}/mnt"

  tasks:
    - name: Ensure mount path is absent from fstab and unmounted
      ansible.posix.mount:
        path: "{{ rhel_mount_path }}"
        state: absent

    - name: Remove scenario test root
      ansible.builtin.file:
        path: "{{ rhel_mount_test_root }}"
        state: absent
