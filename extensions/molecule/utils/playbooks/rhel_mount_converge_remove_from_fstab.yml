---
- name: Converge - rhel_mount remove from fstab scenario
  hosts: localhost
  gather_facts: false
  become: true

  vars:
 #  rhel_mount_test_root: /tmp/rhel_mount_molecule_remove_from_fstab
 #  rhel_mount_path: "{{ rhel_mount_test_root }}/mnt"

  tasks:
    - name: Include rhel_mount role for fstab removal # noqa: var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.ado.rhel_mount
      vars:
        rhel_mount_action: absent
        rhel_mount_path: /tmp/rhel_mount_molecule_remove_from_fstab/mnt
