---
- name: Cleanup generated bootstrap molecule content
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Remove generated molecule artifacts
      ansible.builtin.file:
        path: "{{ playbook_dir }}/{{ item }}"
        state: absent
      loop:
        - playbooks
        - configs
        - group_vars
        - inventory
        - ado-preflight-all.json
