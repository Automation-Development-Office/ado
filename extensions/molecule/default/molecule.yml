---
dependency:
  name: shell
  command: echo "default scenario placeholder"

driver:
  name: default

platforms:
  - name: localhost

provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
  playbooks:
    converge: converge.yml

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
