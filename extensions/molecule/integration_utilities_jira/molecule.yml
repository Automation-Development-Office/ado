---
platforms:
  - name: na

provisioner:
  name: ansible
  playbooks:
    converge: ../utils/playbooks/utilities_jira_converge.yml
    destroy: ../utils/playbooks/utilities_jira_destroy.yml
    verify: ../utils/playbooks/utilities_jira_verify.yml
    prepare: ../utils/playbooks/utilities_jira_prepare.yml
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_SCENARIO_DIRECTORY}/../../../roles:${ANSIBLE_ROLES_PATH}"
  config_options:
    defaults:
      collections_path: ${ANSIBLE_COLLECTIONS_PATH}

scenario:
  test_sequence:
    - prepare
    - converge
    - idempotence
    - verify
  destroy_sequence:
    - destroy
