---
platforms:
  - name: na

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_SCENARIO_DIRECTORY}/../../../roles:${ANSIBLE_ROLES_PATH}"
  playbooks:
    prepare: ../utils/playbooks/rhel_repos_prepare_rhsm.yml
    converge: ../utils/playbooks/rhel_repos_converge_rhsm.yml
    verify: ../utils/playbooks/rhel_repos_verify_rhsm.yml
    destroy: ../utils/playbooks/rhel_repos_destroy_rhsm.yml
  config_options:
    defaults:
      collections_path: ${ANSIBLE_COLLECTIONS_PATH}

scenario:
  test_sequence:
    - prepare
    - converge
    - idempotence
    - verify
  destroy_sequence:
    - destroy
