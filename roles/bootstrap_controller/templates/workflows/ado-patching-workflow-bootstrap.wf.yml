---
controller_workflow_job_templates:
  - name: ADO | Patching Workflow
    description: >-
      Bootstrap workflow - register to Satellite, patch RHEL host, and register
      to IDM
    organization: "{{ bootstrap_controller_organization }}"
    inventory: "{{ bootstrap_controller_rhel_inventory_name }}"
    state: present
    destroy_current_nodes: true
    labels:
      - ADO | bootstrap
      - ADO | patching
    simplified_workflow_nodes:
      - identifier: Register to Satellite
        unified_job_template: ADO | Register Host to Satellite
        lookup_organization: "{{ bootstrap_controller_organization }}"
        success_nodes:
          - Patch RHEL Host

      - identifier: Patch RHEL Host
        unified_job_template: ADO | RHEL Patch Host
        lookup_organization: "{{ bootstrap_controller_organization }}"
        success_nodes:
          - Manage IDM Client

      - identifier: Manage IDM Client
        unified_job_template: ADO | IdM Manage Client
        lookup_organization: "{{ bootstrap_controller_organization }}"
