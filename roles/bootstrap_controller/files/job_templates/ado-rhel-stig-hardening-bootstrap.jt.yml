---
controller_templates:
  - name: ADO | RHEL STIG Hardening
    description: Bootstrap - ADO | RHEL STIG Hardening
    organization: '{{ bootstrap_controller_organization }}'
    playbook: playbooks/rhel/ado-stig-hardening-bootstrap.yml
    inventory: '{{ bootstrap_controller_inventory_name }}'
    project: '{{ bootstrap_controller_project_name }}'
    execution_environment: '{{ bootstrap_controller_execution_environment_name }}'  # yamllint disable-line rule:line-length
    credentials:
      - '{{ bootstrap_controller_creds }}'
      # ADO_MACHINE_CREDENTIAL
    related: null
    labels:
      - name: ADO | bootstrap
        organization: '{{ bootstrap_controller_organization }}'
      - name: ADO | stig
        organization: '{{ bootstrap_controller_organization }}'
      - name: ADO | rhel
        organization: '{{ bootstrap_controller_organization }}'
    extra_vars: {}
    survey_enabled: true
    survey_spec:
      name: ADO | RHEL STIG Hardening Survey
      description: Configuration options for ADO | RHEL STIG Hardening
      spec:
        - question_name: ADO | What environment?
          question_description: Target environment
          required: true
          type: multiplechoice
          variable: env
          choices: '{{ bootstrap_controller_environment_choices }}'
          default: '{{ bootstrap_controller_default_environment }}'
        - question_name: ADO | Compliance profile
          question_description: >-
            Compliance profile context for this hardening run
          required: true
          type: multiplechoice
          variable: compliance_profile
          choices:
            - STIG
            - PCI-DSS
            - NIST 800-53
            - CIS
          default: STIG
        - question_name: ADO | STIG profile
          question_description: STIG baseline to apply
          required: true
          type: multiplechoice
          variable: stig_profile
          choices:
            - RHEL 9 STIG
            - RHEL 8 STIG
            - stig
          default: RHEL 9 STIG
