---
controller_templates:
  - name: ADO | Configure Console Banner
    description: Bootstrap - Configure Console Banner
    organization: '{{ bootstrap_controller_organization }}'
    playbook: >-
      playbooks/openshift/ado-configure-console-banner-bootstrap.yml
    inventory: '{{ bootstrap_controller_inventory_name }}'
    project: '{{ bootstrap_controller_project_name }}'
    execution_environment: >-
      {{ bootstrap_controller_execution_environment_name }}
    credentials:
      - '{{ bootstrap_controller_creds }}'
    related: null
    labels:
      - name: ADO | bootstrap
        organization: '{{ bootstrap_controller_organization }}'
      - name: ADO | console
        organization: '{{ bootstrap_controller_organization }}'
    extra_vars: {}
    survey_enabled: true
    survey_spec:
      name: ADO | Configure Console Banner Survey
      description: Configuration options for Console Banner
      spec:
        - question_name: ADO | Console banner action
          question_description: >-
            Add creates a banner if that exact text is missing, update removes
            ADO-managed banners and creates one replacement, and delete removes
            ADO-managed banners.
          required: true
          type: multiplechoice
          variable: state
          choices: '{{ bootstrap_controller_console_banner_state_choices }}'
          default: update
        - question_name: ADO | What environment?
          question_description: Target environment
          required: true
          type: multiplechoice
          variable: env
          choices: '{{ bootstrap_controller_environment_choices }}'
          default: '{{ bootstrap_controller_default_environment }}'
