---
bootstrap_controller_jira_common_survey:
- question_name: ADO | Jira Feature/Epic Key
  question_description: Optional parent Feature/Epic key, for example TET-123
  required: false
  type: text
  variable: jira_feature_key
  default: ''
controller_templates:
- name: ADO | Jira - Day 2 Issue
  description: Create Jira story for an operational Day-2 issue
  organization: '{{ bootstrap_controller_organization }}'
  playbook: playbooks/jira/ado-create-stories-bootstrap.yml
  inventory: '{{ bootstrap_controller_inventory_name }}'
  project: '{{ bootstrap_controller_project_name }}'
  execution_environment: '{{ bootstrap_controller_execution_environment_name }}'
  credentials:
  - '{{ bootstrap_controller_creds }}'
related:
  labels:
  - name: ADO | bootstrap
    organization: '{{ bootstrap_controller_organization }}'
