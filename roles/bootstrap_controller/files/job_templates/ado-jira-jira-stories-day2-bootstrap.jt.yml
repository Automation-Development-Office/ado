---

controller_bootstrap_jira_common_survey:
  - question_name: Jira Feature/Epic Key
    question_description: Optional parent Feature/Epic key, for example TET-123
    required: false
    type: text
    variable: jira_feature_key
    default: ""

controller_bootstrap_templates:

  - name: Jira - Day 2 Issue
    description: Create Jira story for an operational Day-2 issue
    organization: "{{ controller_bootstrap_organization }}"
    playbook: playbooks/jira/ado-create-stories-bootstrap.yml
    inventory: "{{ controller_bootstrap_inventory_name }}"
    project: "{{ controller_bootstrap_project_name }}"
    execution_environment: "{{ controller_bootstrap_execution_environment_name }}"
    credentials:
      - "{{ controller_bootstrap_creds }}"
    related:
  labels:
  - name: bootstrap
    organization: '{{ controller_bootstrap_organization }}'
  - name: jira
    organization: '{{ controller_bootstrap_organization }}'
    extra_vars:
      jira_track: day2
    survey_enabled: true
    survey_spec:
      name: Jira Day 2 Issue Survey
      description: Create Day-2 issue story
      spec:
        - question_name: Product
          required: true
          type: text
          variable: product
          default: RHBK
        - question_name: Group / Jira Component
          required: true
          type: text
          variable: group
          default: Platform
        - question_name: Environment
          required: true
          type: multiplechoice
          variable: enviroment
          choices: [lab, dev, test, stage, prod]
          default: lab
        - question_name: Issue Summary
          required: true
          type: text
          variable: issue_summary
        - question_name: Issue Description
          required: true
          type: textarea
          variable: issue_description
        - question_name: Impact
          required: true
          type: textarea
          variable: impact
        - question_name: Detected Via
          required: true
          type: multiplechoice
          variable: detection_method
          choices: [alert, user report, audit, drift, manual check]
          default: manual check
        - question_name: Severity
          required: true
          type: multiplechoice
          variable: severity
          choices: [low, medium, high, critical]
          default: low
        - question_name: Customer Impact
          required: true
          type: multiplechoice
          variable: customer_impact
          choices: ["no", "yes", "unknown"]
          default: "no"
