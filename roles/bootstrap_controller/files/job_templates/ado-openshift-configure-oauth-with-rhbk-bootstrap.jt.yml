---
controller_bootstrap_templates:
- name: Configure Oauth/RHBK in Openshift Bootstrap
  description: Bootstrap - Configure OAuth/RHBK in OpenShift
  organization: '{{ controller_bootstrap_organization }}'
  playbook: playbooks/openshift/ado-configure-oauth-with-rhbk-bootstrap.yml
  inventory: '{{ controller_bootstrap_inventory_name }}'
  project: '{{ controller_bootstrap_project_name }}'
  execution_environment: '{{ controller_bootstrap_execution_environment_name }}'
  credentials:
  - '{{ controller_bootstrap_creds }}'
  related:
  labels:
  - name: bootstrap
    organization: '{{ controller_bootstrap_organization }}'
  - name: openshift
    organization: '{{ controller_bootstrap_organization }}'
  extra_vars: {}
  survey_enabled: true
  survey_spec:
    name: Configure OAuth/RHBK Survey
    description: Configuration options for OAuth/RHBK in OpenShift
    spec:
    - question_name: Do you want to install or remove?
      question_description: Install (present) or Remove (absent)
      required: true
      type: multiplechoice
      variable: state
      choices: '{{ controller_bootstrap_state_choices }}'
      default: '{{ controller_bootstrap_default_state }}'
    - question_name: What environment?
      question_description: Target environment
      required: true
      type: multiplechoice
      variable: env
      choices: '{{ controller_bootstrap_environment_choices }}'
      default: '{{ controller_bootstrap_default_environment }}'
