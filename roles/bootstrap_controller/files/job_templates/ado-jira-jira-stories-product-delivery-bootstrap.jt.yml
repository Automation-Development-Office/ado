---

controller_bootstrap_jira_common_survey:
  - question_name: Jira Feature/Epic Key
    question_description: Optional parent Feature/Epic key, for example TET-123
    required: false
    type: text
    variable: jira_feature_key
    default: ""

controller_bootstrap_templates:

  - name: Jira - Platform 4 Phase Delivery
    description: Create Jira stories for standard 4-phase product delivery
    organization: "{{ controller_bootstrap_organization }}"
    playbook: playbooks/jira/ado-create-stories-bootstrap.yml
    inventory: "{{ controller_bootstrap_inventory_name }}"
    project: "{{ controller_bootstrap_project_name }}"
    execution_environment: "{{ controller_bootstrap_execution_environment_name }}"
    credentials:
      - "{{ controller_bootstrap_creds }}"
    related:
  labels:
  - name: bootstrap
    organization: '{{ controller_bootstrap_organization }}'
  - name: jira
    organization: '{{ controller_bootstrap_organization }}'
    extra_vars:
      jira_track: platform_4phase
    survey_enabled: true
    survey_spec:
      name: Jira Platform Delivery Survey
      description: Create platform/service delivery stories
      spec:
        - question_name: Product
          required: true
          type: multiplechoice
          variable: product
          choices:
            - ACM
            - ACS
            - OpenShift
            - ROSA
            - RHBK
            - AAP
            - Quay
            - Satellite
            - RHEL
            - DeveloperHub
            - DevSpaces
            - IDM
            - DirectoryServer
            - OpenStack
            - RHV
            - DataGrid
            - Runtimes
            - LightSpeed
          default: ACM
        - question_name: Group / Jira Component
          required: true
          type: text
          variable: group
          default: Platform
        - question_name: Environment
          required: true
          type: multiplechoice
          variable: enviroment
          choices: [lab, dev, test, stage, prod]
          default: lab
        - question_name: Role Name
          required: true
          type: text
          variable: role_name
          default: Consultant
        - question_name: Jira Feature/Epic Key
          required: false
          type: text
          variable: jira_feature_key
          default: ""

