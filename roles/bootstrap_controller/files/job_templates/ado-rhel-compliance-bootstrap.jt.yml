---
controller_templates:
  - name: ADO | RHEL Compliance
    description: Bootstrap - ADO | RHEL Compliance
    organization: '{{ bootstrap_controller_organization }}'
    playbook: playbooks/rhel/ado-compliance-bootstrap.yml
    inventory: '{{ bootstrap_controller_rhel_inventory_name }}'
    project: '{{ bootstrap_controller_project_name }}'
    execution_environment: '{{ bootstrap_controller_execution_environment_name }}'  # yamllint disable-line rule:line-length
    credentials:
      - '{{ bootstrap_controller_creds }}'
      # ADO_MACHINE_CREDENTIAL
    related: null
    labels:
      - name: ADO | bootstrap
        organization: '{{ bootstrap_controller_organization }}'
      - name: ADO | compliance
        organization: '{{ bootstrap_controller_organization }}'
      - name: ADO | rhel
        organization: '{{ bootstrap_controller_organization }}'
    extra_vars: {}
    survey_enabled: true
    survey_spec:
      name: ADO | RHEL Compliance Survey
      description: Configuration options for ADO | RHEL Compliance
      spec:
        - question_name: ADO | What environment?
          question_description: Target environment
          required: true
          type: multiplechoice
          variable: env
          choices: '{{ bootstrap_controller_environment_choices }}'
          default: '{{ bootstrap_controller_default_environment }}'
        - question_name: ADO | Compliance profile
          question_description: Compliance profile context for this run
          required: true
          type: multiplechoice
          variable: compliance_profile
          choices:
            - PCI-DSS
            - NIST 800-53
            - CIS
            - STIG
          default: PCI-DSS
