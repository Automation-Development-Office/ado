---
controller_templates:
  - name: ADO | ADO Satellite Register Host
    organization: '{{ controller_bootstrap_organization }}'
    description: Register RHEL host to Satellite
    playbook: playbooks/satellite/ado-register-to-satellite-bootstrap.yml
    inventory: '{{ controller_bootstrap_inventory_name }}'
    project: '{{ controller_bootstrap_project_name }}'
    execution_environment: '{{ controller_bootstrap_execution_environment_name }}'
    credentials:
      - '{{ controller_bootstrap_creds }}'
    labels:
      - name: ADO | bootstrap
        organization: '{{ controller_bootstrap_organization }}'
      - name: ADO | satellite
        organization: '{{ controller_bootstrap_organization }}'
    survey_enabled: true
    survey:
      name: ADO | Register Host to Satellite Survey
      description: Satellite registration inputs
      spec:
        - question_name: ADO | Environment
          question_description: Environment name
          required: true
          type: multiplechoice
          variable: env
          choices: '{{ controller_bootstrap_environment_choices }}'
          default: '{{ controller_bootstrap_default_environment }}'
