---
controller_workflow_job_templates:
  - name: ADO | Satellite Server Workflow
    description: Bootstrap workflow - install and configure Satellite server
    organization: "{{ bootstrap_controller_organization }}"
    inventory: "{{ bootstrap_controller_satellite_inventory_name }}"
    state: present
    destroy_current_nodes: true
    labels:
      - ADO | bootstrap
      - ADO | satellite
    simplified_workflow_nodes:
      - identifier: Satellite Server Install
        unified_job_template: ADO | Satellite Server Install
        lookup_organization: "{{ bootstrap_controller_organization }}"
        success_nodes:
          - Satellite Server Configure

      - identifier: Satellite Server Configure
        unified_job_template: ADO | Satellite Server Configure
        lookup_organization: "{{ bootstrap_controller_organization }}"
