---
controller_templates:
  - name: ADO Satellite Content View Bootstrap
    organization: '{{ controller_bootstrap_organization }}'
    description: Manage Satellite content views
    playbook: playbooks/satellite/ado-content-view-bootstrap.yml
    inventory: '{{ controller_bootstrap_inventory_name }}'
    project: '{{ controller_bootstrap_project_name }}'
    execution_environment: '{{ controller_bootstrap_execution_environment_name }}'
    credentials:
      - '{{ controller_bootstrap_creds }}'
    labels:
      - name: bootstrap
        organization: '{{ controller_bootstrap_organization }}'
      - name: satellite
        organization: '{{ controller_bootstrap_organization }}'
