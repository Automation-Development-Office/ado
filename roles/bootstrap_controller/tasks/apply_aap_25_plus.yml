---
# yamllint disable rule:line-length
# Organizations first using direct module call
# avoids gateway/resource sync issues in infra.aap_configuration 4.6.x

- name: AAP 2.5+ | Reload generated controller configs before direct apply
  ansible.builtin.include_tasks: load_controller_configs.yml

- name: AAP 2.5+ | Normalize controller objects before apply  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    bootstrap_controller_controller_organizations: "{{ controller_bootstrap_controller_organizations | default(bootstrap_controller_controller_organizations | default(controller_organizations | default([]), true), true) }}"
    bootstrap_controller_controller_projects: "{{ controller_bootstrap_controller_projects | default(bootstrap_controller_controller_projects | default(controller_projects | default([]), true), true) }}"
    bootstrap_controller_controller_inventories: "{{ controller_bootstrap_controller_inventories | default(bootstrap_controller_controller_inventories | default(controller_inventories | default([]), true), true) }}"
    bootstrap_controller_controller_inventory_sources: "{{ controller_bootstrap_controller_inventory_sources | default(bootstrap_controller_controller_inventory_sources | default(controller_inventory_sources | default([]), true), true) }}"
    bootstrap_controller_controller_credentials: "{{ controller_bootstrap_controller_credentials | default(bootstrap_controller_controller_credentials | default(controller_credentials | default([]), true), true) }}"
    bootstrap_controller_controller_execution_environments: "{{ controller_bootstrap_controller_execution_environments | default(bootstrap_controller_controller_execution_environments | default(controller_execution_environments | default([]), true), true) }}"

- name: AAP 2.5+ | Debug controller orgs before apply
  ansible.builtin.debug:
    var: bootstrap_controller_controller_organizations

- name: AAP 2.5+ | Create organizations directly
  ansible.controller.organization:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    controller_host: "{{ controller_host | default(vault_controller_hostname) }}"
    controller_oauthtoken: "{{ controller_oauthtoken | default(vault_controller_oauthtoken | default(omit)) }}"
    controller_username: "{{ controller_username | default(vault_controller_username | default(omit)) }}"
    controller_password: "{{ controller_password | default(vault_controller_password | default(omit)) }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
  loop: "{{ bootstrap_controller_controller_organizations | default([]) }}"
  when:
    - bootstrap_controller_controller_organizations | default([]) | length > 0
    - not (bootstrap_controller_hub_update_collection_only | default(false) | bool)

# Inventories direct because infra.aap_configuration 4.6.19 stringifies variables
- name: AAP 2.5+ | Create inventories directly
  ansible.controller.inventory:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    organization: "{{ item.organization }}"
    variables: "{{ item.variables | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    controller_host: "{{ controller_host | default(vault_controller_hostname) }}"
    controller_oauthtoken: "{{ controller_oauthtoken | default(vault_controller_oauthtoken | default(omit)) }}"
    controller_username: "{{ controller_username | default(vault_controller_username | default(omit)) }}"
    controller_password: "{{ controller_password | default(vault_controller_password | default(omit)) }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
  loop: "{{ bootstrap_controller_controller_inventories | default([]) }}"
  when:
    - bootstrap_controller_controller_inventories | default([]) | length > 0
    - not (bootstrap_controller_hub_update_collection_only | default(false) | bool)

- name: AAP 2.5+ | Set AAP Hub collection publish defaults
  ansible.builtin.set_fact:
    bootstrap_controller_hub_publish_repository: "{{ (hub_collections | first).repository | default('validated') }}"
    bootstrap_controller_hub_publish_working_dir: "/var/tmp/ado-hub-publish"
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Reset AAP Hub collection publish working dir
  ansible.builtin.file:
    path: "{{ bootstrap_controller_hub_publish_working_dir }}"
    state: absent
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Create AAP Hub collection publish working dir
  ansible.builtin.file:
    path: "{{ bootstrap_controller_hub_publish_working_dir }}"
    state: directory
    mode: "0755"
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Copy ADO collection source for AAP Hub publish
  ansible.builtin.copy:
    src: "{{ __hub_collection_item.collection_local_path }}/"
    dest: "{{ bootstrap_controller_hub_publish_working_dir }}/{{ __hub_collection_item.collection_name }}"
    remote_src: true
    mode: "0755"
  loop: "{{ hub_collections }}"
  loop_control:
    loop_var: __hub_collection_item
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0
    - __hub_collection_item.collection_local_path is defined

- name: AAP 2.5+ | Build ADO collection for AAP Hub publish
  ansible.hub.ah_build:
    path: "{{ bootstrap_controller_hub_publish_working_dir }}/{{ __hub_collection_item.collection_name }}"
    output_path: "{{ bootstrap_controller_hub_publish_working_dir }}/{{ __hub_collection_item.collection_name }}"
    force: true
  register: bootstrap_controller_hub_build_results
  loop: "{{ hub_collections }}"
  loop_control:
    loop_var: __hub_collection_item
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Check built ADO collection artifact path
  ansible.builtin.stat:
    path: "{{ __hub_build_result_item.path }}"
  register: bootstrap_controller_hub_build_stat_results
  loop: "{{ bootstrap_controller_hub_build_results.results | default([]) }}"
  loop_control:
    loop_var: __hub_build_result_item
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Find built ADO collection artifact
  ansible.builtin.find:
    paths: "{{ (__hub_build_stat_item.stat.isdir) | ternary(__hub_build_stat_item.stat.path, (__hub_build_stat_item.stat.path | dirname)) }}"
    patterns: "{{ (__hub_build_stat_item.stat.isdir) | ternary('*.tar.gz', (__hub_build_stat_item.stat.path | basename)) }}"
  register: bootstrap_controller_hub_find_results
  loop: "{{ bootstrap_controller_hub_build_stat_results.results | default([]) }}"
  loop_control:
    loop_var: __hub_build_stat_item
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Set built ADO collection artifact list
  ansible.builtin.set_fact:
    bootstrap_controller_hub_collection_artifacts: "{{ bootstrap_controller_hub_find_results.results | default([]) | map(attribute='files') | flatten | map(attribute='path') | list }}"
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0

- name: AAP 2.5+ | Publish ADO collection to validated AAP Hub repository
  ansible.hub.ah_collection:
    namespace: "{{ (__hub_collection_file | basename).split('-')[0] }}"
    name: "{{ (__hub_collection_file | basename).split('-')[1] }}"
    version: "{{ (__hub_collection_file | basename).split('-')[2:] | join('-') | splitext | first | splitext | first }}"
    path: "{{ __hub_collection_file }}"
    repository: "{{ bootstrap_controller_hub_publish_repository }}"
    auto_approve: "{{ bootstrap_controller_hub_mark_ado_validated | default(true) | bool }}"
    overwrite_existing: "{{ bootstrap_controller_hub_force_ado_collection_update | default(true) | bool }}"
    wait: "{{ bootstrap_controller_hub_publish_wait | default(false) | bool }}"
    timeout: "{{ bootstrap_controller_hub_publish_timeout | default(300) | int }}"
    request_timeout: "{{ bootstrap_controller_hub_publish_request_timeout | default(60) | int }}"
    ah_host: "{{ controller_host | default(vault_controller_hostname) }}"
    ah_username: "{{ controller_username | default(vault_controller_username | default(omit)) }}"
    ah_password: "{{ controller_password | default(vault_controller_password | default(omit)) }}"
    ah_token: "{{ controller_oauthtoken | default(vault_controller_oauthtoken | default(omit)) }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
  loop: "{{ bootstrap_controller_hub_collection_artifacts | default([]) }}"
  loop_control:
    loop_var: __hub_collection_file
  when:
    - bootstrap_controller_hub_publish_ado_collection | default(true) | bool
    - hub_collections | default([]) | length > 0
    - bootstrap_controller_hub_collection_artifacts | default([]) | length > 0

- name: AAP 2.5+ | Stop after ADO Hub collection update
  ansible.builtin.meta: end_host
  when: bootstrap_controller_hub_update_collection_only | default(false) | bool

- name: AAP 2.5+ | Reset generated job template list  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    controller_templates: []

- name: AAP 2.5+ | Load generated job template configs  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    controller_templates: >-
      {{
        controller_templates
        +
        (
          (lookup('ansible.builtin.file', item) | from_yaml).controller_templates
          | default([])
        )
      }}
  loop: "{{ query('ansible.builtin.fileglob', playbook_dir ~ '/configs/job_templates/*.jt.yml') }}"
  when: bootstrap_apply_aap_configs | default(false) | bool

- name: AAP 2.5+ | Debug loaded job template count
  ansible.builtin.debug:
    msg: "Loaded controller_templates count={{ controller_templates | length }}"

- name: AAP 2.5+ | Reset generated workflow list  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    controller_workflow_job_templates: []

- name: AAP 2.5+ | Load generated workflow configs  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    controller_workflow_job_templates: >-
      {{
        controller_workflow_job_templates
        +
        (
          (lookup('ansible.builtin.file', item) | from_yaml).controller_workflow_job_templates
          | default([])
        )
      }}
  loop: "{{ query('ansible.builtin.fileglob', playbook_dir ~ '/configs/workflows/*.wf.yml') }}"
  when: bootstrap_apply_aap_configs | default(false) | bool

- name: AAP 2.5+ | Debug loaded workflow count
  ansible.builtin.debug:
    msg: "Loaded controller_workflow_job_templates count={{ controller_workflow_job_templates | length }}"

- name: AAP 2.5+ | Build labels to create from generated config files
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    import json
    from pathlib import Path
    import yaml

    organization = "{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }}"
    root = Path("{{ playbook_dir }}/configs")
    labels = []

    def label_name(label):
        if isinstance(label, dict):
            return label.get("name")
        return label

    def normalize_labels(item):
        if not isinstance(item, dict):
            return False

        item_labels = []
        if organization:
            item_labels.append(organization)

        item_labels.extend(
            name for name in (label_name(label) for label in item.get("labels") or [])
            if name
        )

        related = item.get("related")
        if isinstance(related, dict):
            item_labels.extend(
                name for name in (label_name(label) for label in related.get("labels") or [])
                if name
            )
            related.pop("labels", None)
            if not related:
                item.pop("related", None)

        if not item_labels:
            return False

        normalized = list(dict.fromkeys(item_labels))
        if item.get("labels") == normalized:
            return False

        item["labels"] = normalized
        return True

    def add_label(label):
        if isinstance(label, dict):
            name = label.get("name")
            org = label.get("organization") or organization
        else:
            name = label
            org = organization

        if name:
            labels.append({"name": str(name), "organization": str(org)})

    def collect(obj):
        if isinstance(obj, dict):
            for label in obj.get("labels") or []:
                add_label(label)

            related = obj.get("related")
            if isinstance(related, dict):
                for label in related.get("labels") or []:
                    add_label(label)

            for value in obj.values():
                collect(value)
        elif isinstance(obj, list):
            for item in obj:
                collect(item)

    add_label({"name": organization, "organization": organization})

    for pattern, key in (
        ("job_templates/*.jt.yml", "controller_templates"),
        ("workflows/*.wf.yml", "controller_workflow_job_templates"),
    ):
        for file_name in sorted(root.glob(pattern)):
            data = yaml.safe_load(file_name.read_text()) or {}
            changed = False
            for item in data.get(key, []) or []:
                changed = normalize_labels(item) or changed
            if changed:
                file_name.write_text(
                    "---\n" + yaml.safe_dump(data, sort_keys=False, width=1000)
                )
            collect(data)

    deduped = []
    seen = set()
    for label in labels:
        key = (label["name"], label["organization"])
        if key not in seen:
            seen.add(key)
            deduped.append(label)

    print(json.dumps(deduped))
    PYCODE
  args:
    executable: /bin/bash
  register: bootstrap_controller_labels_to_create_result
  changed_when: false

- name: AAP 2.5+ | Store labels to create
  ansible.builtin.set_fact:
    bootstrap_controller_labels_to_create: >-
      {{ bootstrap_controller_labels_to_create_result.stdout | from_json }}

- name: AAP 2.5+ | Debug labels before job templates
  ansible.builtin.debug:
    msg:
      - "labels_to_create={{ bootstrap_controller_labels_to_create | default([]) | length }}"
      - "{{ bootstrap_controller_labels_to_create | default([]) | map(attribute='name') | list }}"
  when: bootstrap_controller_labels_to_create | default([]) | length > 0

- name: AAP 2.5+ | Final sanitize labels before creation
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    import json

    labels = {{ bootstrap_controller_labels_to_create | default([]) | to_json }}
    organization = {{ (controller_bootstrap_organization | default(bootstrap_controller_organization | default(''))) | to_json }}

    clean_labels = []
    seen = set()

    for label in labels:
        if isinstance(label, dict):
            name = label.get("name")
            label_organization = label.get("organization") or organization
        else:
            name = label
            label_organization = organization

        if not name:
            continue

        key = (str(name), str(label_organization))
        if key in seen:
            continue

        seen.add(key)
        clean_labels.append({
            "name": str(name),
            "organization": str(label_organization),
        })

    print(json.dumps(clean_labels))
    PYCODE
  args:
    executable: /bin/bash
  register: bootstrap_controller_labels_sanitize_result
  changed_when: false

- name: AAP 2.5+ | Store sanitized labels before creation
  ansible.builtin.set_fact:
    bootstrap_controller_labels_to_create: >-
      {{ bootstrap_controller_labels_sanitize_result.stdout | from_json }}

- name: AAP 2.5+ | Resolve controller API URL for label verification
  ansible.builtin.set_fact:
    bootstrap_controller_aap_api_url: >-
      {{
        bootstrap_controller_aap_api_url
        | default(
            bootstrap_controller_controller_host
            if (
              bootstrap_controller_controller_host
              | regex_search('^https?://')
            )
            else 'https://' ~ bootstrap_controller_controller_host,
            true
          )
      }}
    bootstrap_controller_aap_effective_api_path: >-
      {{
        bootstrap_controller_aap_effective_api_path
        | default('/api/controller/v2', true)
      }}

- name: AAP 2.5+ | Create labels directly before job templates
  ansible.controller.label:
    name: "{{ item.name }}"
    organization: "{{ item.organization | default(controller_bootstrap_organization | default(bootstrap_controller_organization), true) }}"
    state: "{{ item.state | default('present') }}"
    controller_host: "{{ controller_host | default(vault_controller_hostname) }}"
    controller_oauthtoken: "{{ controller_oauthtoken | default(vault_controller_oauthtoken | default(omit)) }}"
    controller_username: "{{ controller_username | default(vault_controller_username | default(omit)) }}"
    controller_password: "{{ controller_password | default(vault_controller_password | default(omit)) }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
  loop: "{{ bootstrap_controller_labels_to_create }}"
  when: bootstrap_controller_labels_to_create | default([]) | length > 0
  register: bootstrap_controller_created_labels_result

- name: AAP 2.5+ | Verify organization label exists in AAP
  no_log: "{{ bootstrap_controller_aap_connectivity_no_log | default(true) }}"
  ansible.builtin.uri:
    url: >-
      {{
        bootstrap_controller_aap_api_url
        ~ bootstrap_controller_aap_effective_api_path
        ~ '/labels/?name='
        ~ (
          controller_bootstrap_organization
          | default(bootstrap_controller_organization)
          | urlencode
        )
        ~ '&organization__name='
        ~ (
          controller_bootstrap_organization
          | default(bootstrap_controller_organization)
          | urlencode
        )
      }}
    method: GET
    headers: >-
      {{
        {
          'Authorization':
          'Bearer ' ~ bootstrap_controller_controller_oauthtoken
        }
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length > 0
        )
        else {}
      }}
    url_username: >-
      {{
        bootstrap_controller_controller_username
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length == 0
        )
        else omit
      }}
    url_password: >-
      {{
        bootstrap_controller_controller_password
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length == 0
        )
        else omit
      }}
    force_basic_auth: >-
      {{
        bootstrap_controller_controller_oauthtoken
        | default('')
        | length == 0
      }}
    validate_certs: "{{ controller_validate_certs | default(false) }}"
    return_content: true
    status_code:
      - 200
  register: bootstrap_controller_org_label_lookup
  when:
    - bootstrap_controller_labels_to_create | default([]) | length > 0
    - controller_bootstrap_organization | default(bootstrap_controller_organization, true) | length > 0

- name: AAP 2.5+ | Report organization label verification
  ansible.builtin.debug:
    msg: >-
      Verified org label
      '{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }}'
      in AAP: count={{
        bootstrap_controller_org_label_lookup.json.count
        | default('unknown')
      }}
  when: bootstrap_controller_org_label_lookup is defined

- name: AAP 2.5+ | Fail if organization label was not found
  ansible.builtin.assert:
    that:
      - bootstrap_controller_org_label_lookup.json.count | default(0) | int > 0
    fail_msg: >-
      AAP accepted the bootstrap run but the organization label
      '{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }}'
      was not found in /api/controller/v2/labels after creation.
  when: bootstrap_controller_org_label_lookup is defined

- name: AAP 2.5+ | Detect Satellite dynamic inventory configuration
  ansible.builtin.set_fact:
    bootstrap_controller_aap_api_url: >-
      {{
        bootstrap_controller_aap_api_url
        | default(
            bootstrap_controller_controller_host
            if (
              bootstrap_controller_controller_host
              | regex_search('^https?://')
            )
            else 'https://' ~ bootstrap_controller_controller_host,
            true
          )
      }}
    bootstrap_controller_aap_effective_api_path: >-
      {{
        bootstrap_controller_aap_effective_api_path
        | default('/api/controller/v2', true)
      }}
    bootstrap_controller_satellite_dynamic_inventory_sources: >-
      {{
        bootstrap_controller_controller_inventory_sources
        | default([])
        | selectattr('source', 'defined')
        | selectattr('source', 'match', '^satellite6$')
        | list
      }}
    bootstrap_controller_satellite_credentials: >-
      {{
        bootstrap_controller_controller_credentials
        | default([])
        | selectattr('credential_type', 'defined')
        | selectattr('credential_type', 'match', '^Red Hat Satellite 6$')
        | list
      }}

- name: AAP 2.5+ | Look up Satellite credential type
  no_log: "{{ bootstrap_controller_aap_connectivity_no_log | default(true) }}"
  ansible.builtin.uri:
    url: >-
      {{
        bootstrap_controller_aap_api_url
        ~ bootstrap_controller_aap_effective_api_path
        ~ '/credential_types/?name=Red%20Hat%20Satellite%206'
      }}
    method: GET
    headers: >-
      {{
        {
          'Authorization':
          'Bearer ' ~ bootstrap_controller_controller_oauthtoken
        }
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length > 0
        )
        else {}
      }}
    url_username: >-
      {{
        bootstrap_controller_controller_username
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length == 0
        )
        else omit
      }}
    url_password: >-
      {{
        bootstrap_controller_controller_password
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length == 0
        )
        else omit
      }}
    force_basic_auth: >-
      {{
        bootstrap_controller_controller_oauthtoken
        | default('')
        | length == 0
      }}
    validate_certs: "{{ controller_validate_certs | default(false) }}"
    return_content: true
    status_code: 200
  register: bootstrap_controller_satellite_credential_type_lookup
  failed_when: false
  when:
    - >-
      bootstrap_controller_satellite_dynamic_inventory_sources
      | default([])
      | length > 0
    - >-
      bootstrap_controller_satellite_credentials
      | default([])
      | length > 0

- name: AAP 2.5+ | Skip unavailable Satellite dynamic inventory type  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    bootstrap_controller_controller_credentials: >-
      {{
        bootstrap_controller_controller_credentials
        | default([])
        | rejectattr('credential_type', 'defined')
        | list
        +
        (
          bootstrap_controller_controller_credentials
          | default([])
          | selectattr('credential_type', 'defined')
          | rejectattr('credential_type', 'match', '^Red Hat Satellite 6$')
          | list
        )
      }}
    bootstrap_controller_controller_inventory_sources: >-
      {{
        bootstrap_controller_controller_inventory_sources
        | default([])
        | rejectattr('source', 'defined')
        | list
        +
        (
          bootstrap_controller_controller_inventory_sources
          | default([])
          | selectattr('source', 'defined')
          | rejectattr('source', 'match', '^satellite6$')
          | list
        )
      }}
    controller_credentials: >-
      {{
        controller_credentials
        | default([])
        | rejectattr('credential_type', 'defined')
        | list
        +
        (
          controller_credentials
          | default([])
          | selectattr('credential_type', 'defined')
          | rejectattr('credential_type', 'match', '^Red Hat Satellite 6$')
          | list
        )
      }}
    controller_inventory_sources: >-
      {{
        controller_inventory_sources
        | default([])
        | rejectattr('source', 'defined')
        | list
        +
        (
          controller_inventory_sources
          | default([])
          | selectattr('source', 'defined')
          | rejectattr('source', 'match', '^satellite6$')
          | list
        )
      }}
  when:
    - >-
      bootstrap_controller_skip_unavailable_satellite_dynamic_inventory
      | default(false)
      | bool
    - >-
      bootstrap_controller_satellite_dynamic_inventory_sources
      | default([])
      | length > 0
    - >-
      bootstrap_controller_satellite_credentials
      | default([])
      | length > 0
    - >-
      bootstrap_controller_satellite_credential_type_lookup.status
      | default(0)
      | int != 200
      or
      bootstrap_controller_satellite_credential_type_lookup.json.count
      | default(0)
      | int == 0

- name: AAP 2.5+ | Show skipped Satellite dynamic inventory
  ansible.builtin.debug:
    msg: >-
      AAP does not expose the Red Hat Satellite 6 credential type, so the
      optional Satellite dynamic inventory credential and inventory source were
      skipped. The rest of the bootstrap will continue.
  when:
    - >-
      bootstrap_controller_skip_unavailable_satellite_dynamic_inventory
      | default(false)
      | bool
    - >-
      bootstrap_controller_satellite_dynamic_inventory_sources
      | default([])
      | length > 0
    - >-
      bootstrap_controller_satellite_credentials
      | default([])
      | length > 0
    - >-
      bootstrap_controller_satellite_credential_type_lookup.status
      | default(0)
      | int != 200
      or
      bootstrap_controller_satellite_credential_type_lookup.json.count
      | default(0)
      | int == 0

# Create/update credentials and EEs first
- name: AAP 2.5+ | Apply credentials and execution environments
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch
  vars:
    gateway_configuration_dispatcher_roles: []
    hub_configuration_dispatcher_roles: []
    eda_configuration_dispatcher_roles: []
    controller_configuration_dispatcher_roles:
      - role: controller_credentials
        var: controller_credentials
        tags: credentials
      - role: controller_execution_environments
        var: controller_execution_environments
        tags: execution_environments

- name: AAP 2.5+ | Apply inventory sources directly
  ansible.controller.inventory_source:
    name: "{{ item.name }}"
    description: "{{ item.description | default(omit) }}"
    inventory: "{{ item.inventory }}"
    organization: "{{ item.organization | default(omit) }}"
    source: "{{ item.source | default(omit) }}"
    credential: "{{ item.credential | default(omit) }}"
    overwrite: "{{ item.overwrite | default(omit) }}"
    overwrite_vars: "{{ item.overwrite_vars | default(omit) }}"
    update_on_launch: "{{ item.update_on_launch | default(omit) }}"
    update_cache_timeout: "{{ item.update_cache_timeout | default(omit) }}"
    verbosity: "{{ item.verbosity | default(omit) }}"
    host_filter: "{{ item.host_filter | default(omit) }}"
    source_vars: "{{ item.source_vars | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    controller_host: "{{ controller_host | default(vault_controller_hostname) }}"
    controller_oauthtoken: "{{ controller_oauthtoken | default(vault_controller_oauthtoken | default(omit)) }}"
    controller_username: "{{ controller_username | default(vault_controller_username | default(omit)) }}"
    controller_password: "{{ controller_password | default(vault_controller_password | default(omit)) }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
  loop: "{{ controller_inventory_sources | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: controller_inventory_sources | default([]) | length > 0

- name: AAP 2.5+ | Load controller configs before project sync
  ansible.builtin.include_tasks: load_controller_configs.yml

- name: AAP 2.5+ | Debug controller object counts before project sync
  ansible.builtin.debug:
    msg:
      - "controller_templates={{ controller_templates | default([]) | length }}"
      - "controller_workflow_job_templates={{ controller_workflow_job_templates | default([]) | length }}"

# Create/update projects separately so we can force sync before job templates
- name: AAP 2.5+ | Normalize controller projects before apply
  ansible.builtin.set_fact:
    bootstrap_controller_controller_projects: "{{ controller_bootstrap_controller_projects | default(controller_projects | default([]), true) }}"

- name: AAP 2.5+ | Debug controller projects before apply
  ansible.builtin.debug:
    var: controller_projects

- name: AAP 2.5+ | Apply projects
  ansible.builtin.include_role:
    name: infra.aap_configuration.controller_projects
  when: controller_projects | default([]) | length > 0

- name: AAP 2.5+ | Force project sync before creating job templates
  ansible.controller.project_update:
    project: "{{ item.name }}"
    organization: "{{ item.organization | default(controller_bootstrap_organization | default(bootstrap_controller_organization), true) }}"
    wait: true
    timeout: "{{ bootstrap_controller_project_sync_timeout | default(600) }}"
    controller_host: "{{ controller_host | default(vault_controller_hostname) }}"
    controller_oauthtoken: "{{ controller_oauthtoken | default(vault_controller_oauthtoken | default(omit)) }}"
    controller_username: "{{ controller_username | default(vault_controller_username | default(omit)) }}"
    controller_password: "{{ controller_password | default(vault_controller_password | default(omit)) }}"
    validate_certs: "{{ controller_validate_certs | default(false) }}"
  loop: "{{ controller_projects | default([]) }}"
  when:
    - controller_projects | default([]) | length > 0
    - item.scm_type | default('') | length > 0

- name: AAP 2.5+ | Wait for project playbooks to become available
  ansible.builtin.pause:
    seconds: "{{ bootstrap_controller_project_playbook_wait_seconds | default(30) }}"
  when: controller_projects | default([]) | length > 0

# Hosts before templates
- name: AAP 2.5+ | Apply hosts
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch
  vars:
    gateway_configuration_dispatcher_roles: []
    hub_configuration_dispatcher_roles: []
    eda_configuration_dispatcher_roles: []
    controller_configuration_dispatcher_roles:
      - role: controller_hosts
        var: controller_hosts
        tags: hosts
  when: controller_hosts | default([]) | length > 0

# Now job templates can see synced playbooks
- name: AAP 2.5+ | Sanitize generated job template and workflow labels for infra.aap_configuration
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path
    import yaml

    root = Path("{{ playbook_dir }}/configs")

    def label_name(label):
        if isinstance(label, dict):
            return label.get("name")
        return label

    def fix_labels(obj):
        if isinstance(obj, dict):
            labels = []
            org_name = "{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }}"
            if org_name:
                labels.append(org_name)

            if isinstance(obj.get("labels"), list):
                labels.extend(
                    name for name in (label_name(x) for x in obj["labels"])
                    if name
                )

            related = obj.get("related")
            if isinstance(related, dict) and isinstance(related.get("labels"), list):
                labels.extend(
                    name for name in (label_name(x) for x in related["labels"])
                    if name
                )
                related.pop("labels", None)

            if labels:
                obj["labels"] = list(dict.fromkeys(labels))

            ujt = obj.get("unified_job_template")
            if isinstance(ujt, dict):
                org = ujt.get("organization")
                if isinstance(org, dict):
                    org_name = org.get("name")
                    if org_name and org_name.startswith("ADO | "):
                        ujt.pop("organization", None)

            for v in obj.values():
                fix_labels(v)

        elif isinstance(obj, list):
            for v in obj:
                fix_labels(v)

    for pattern in ("job_templates/*.jt.yml", "workflows/*.wf.yml"):
        for f in sorted(root.glob(pattern)):
            data = yaml.safe_load(f.read_text()) or {}
            fix_labels(data)
            f.write_text(yaml.safe_dump(data, sort_keys=False))
            print(f"sanitized {f}")
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true

- name: AAP 2.5+ | Load controller configs before job template dispatch
  ansible.builtin.include_tasks: load_controller_configs.yml

- name: AAP 2.5+ | Debug controller object counts before dispatch
  ansible.builtin.debug:
    msg:
      - "controller_templates={{ controller_templates | default([]) | length }}"
      - "controller_workflow_job_templates={{ controller_workflow_job_templates | default([]) | length }}"
      - "controller_workflows={{ controller_workflows | default([]) | length }}"

- name: AAP 2.5+ | Apply job templates and workflows
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch
  vars:
    gateway_configuration_dispatcher_roles: []
    hub_configuration_dispatcher_roles: []
    eda_configuration_dispatcher_roles: []
    controller_configuration_dispatcher_roles:
      - role: controller_job_templates
        var: controller_templates
        tags: job_templates
      - role: controller_workflow_job_templates
        var: controller_workflows
        tags: workflow_job_templates

- name: AAP 2.5+ | Verify generated templates exist with organization prefix
  no_log: "{{ bootstrap_controller_aap_connectivity_no_log | default(true) }}"
  ansible.builtin.uri:
    url: >-
      {{
        bootstrap_controller_aap_api_url
        ~ bootstrap_controller_aap_effective_api_path
        ~ '/unified_job_templates/?name__startswith='
        ~ (((controller_bootstrap_organization | default(bootstrap_controller_organization)) ~ ' |') | urlencode)
        ~ '&type=job_template%2Cworkflow_job_template&page_size=10'
      }}
    method: GET
    headers: >-
      {{
        {
          'Authorization':
          'Bearer ' ~ bootstrap_controller_controller_oauthtoken
        }
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length > 0
        )
        else {}
      }}
    url_username: >-
      {{
        bootstrap_controller_controller_username
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length == 0
        )
        else omit
      }}
    url_password: >-
      {{
        bootstrap_controller_controller_password
        if (
          bootstrap_controller_controller_oauthtoken
          | default('')
          | length == 0
        )
        else omit
      }}
    force_basic_auth: >-
      {{
        bootstrap_controller_controller_oauthtoken
        | default('')
        | length == 0
      }}
    validate_certs: "{{ controller_validate_certs | default(false) }}"
    return_content: true
    status_code:
      - 200
  register: bootstrap_controller_org_template_lookup
  when:
    - >-
      (controller_templates | default([]) | length > 0)
      or
      (controller_workflows | default([]) | length > 0)
    - controller_bootstrap_organization | default(bootstrap_controller_organization, true) | length > 0

- name: AAP 2.5+ | Report organization template verification
  ansible.builtin.debug:
    msg: >-
      Verified generated AAP templates with prefix
      '{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }} |':
      count={{
        bootstrap_controller_org_template_lookup.json.count
        | default('unknown')
      }}
  when: bootstrap_controller_org_template_lookup is defined

- name: AAP 2.5+ | Fail if generated organization templates were not found
  ansible.builtin.assert:
    that:
      - bootstrap_controller_org_template_lookup.json.count | default(0) | int > 0
    fail_msg: >-
      AAP did not return any generated job or workflow templates with the
      organization prefix
      '{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }} |'
      after template creation.
  when: bootstrap_controller_org_template_lookup is defined
