---
- name: Generate env var files
  ansible.builtin.include_role:
    name: infra.ado.bootstrap_generate_env_vars
  when: generate_env_vars | default(false) | bool

- name: Load generated AAP config vars before repo generation
  ansible.builtin.include_vars:
    file: "group_vars/all/{{ env }}/aap_config_vars.yml"
  when:
    - generate_playbooks | default(false) | bool
    - env is defined

- name: Load generated AAP vault vars before repo generation
  ansible.builtin.include_vars:
    file: "group_vars/all/{{ env }}/aap_vault.yml"
  when:
    - generate_playbooks | default(false) | bool
    - env is defined

- name: Generate playbook repo
  ansible.builtin.include_role:
    name: infra.ado.bootstrap_generate_playbook_repo
  vars:
    generate_playbook_repo_selected_components: "{{ generate_env_vars_components | default(['openshift']) }}"
  when: generate_playbooks | default(false) | bool

- name: Generate AAP config files
  ansible.builtin.include_tasks: generate_aap_configs.yml
  vars:
    controller_bootstrap_selected_components: "{{ generate_env_vars_components | default(['openshift']) }}"
  when: generate_aap_configs | default(false) | bool

- name: Apply AAP controller objects
  ansible.builtin.include_tasks: aap.yml
  when: apply_aap_configs | default(false) | bool
