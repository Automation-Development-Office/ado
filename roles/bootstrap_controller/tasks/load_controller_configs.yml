---
- name: Find controller config YAML files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/configs/controller"
    patterns: "*.yml"
    file_type: file
  register: controller_bootstrap_config_files
  when: (playbook_dir + '/configs/controller') is directory

- name: Load controller config YAML files
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
  loop: "{{ controller_bootstrap_config_files.files | default([]) }}"
  when: controller_bootstrap_config_files.files | default([]) | length > 0

- name: Find generated job template YAML files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/configs/job_templates"
    patterns: "*.yml"
    file_type: file
  register: controller_bootstrap_job_template_config_files
  when: (playbook_dir + '/configs/job_templates') is directory

- name: Load generated job template definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: controller_bootstrap_loaded_job_template_file
  loop: "{{ controller_bootstrap_job_template_config_files.files | default([]) }}"
  register: controller_bootstrap_loaded_job_template_results
  when: controller_bootstrap_job_template_config_files.files | default([]) | length > 0

- name: Merge all loaded job templates
  ansible.builtin.set_fact:
    controller_bootstrap_controller_templates: >-
      {{
        controller_bootstrap_loaded_job_template_results.results
        | default([])
        | map(attribute='ansible_facts.controller_bootstrap_loaded_job_template_file.controller_bootstrap_templates')
        | select('defined')
        | flatten
        | list
      }}

- name: Mirror generated templates to legacy controller_bootstrap_templates
  ansible.builtin.set_fact:
    controller_bootstrap_templates: "{{ controller_bootstrap_controller_templates | default([]) }}"

- name: Find generated workflow YAML files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/configs/workflows"
    patterns: "*.yml"
    file_type: file
  register: controller_bootstrap_workflow_config_files
  when: (playbook_dir + '/configs/workflows') is directory

- name: Load generated workflow definitions
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
    name: controller_bootstrap_loaded_workflow_file
  loop: "{{ controller_bootstrap_workflow_config_files.files | default([]) }}"
  register: controller_bootstrap_loaded_workflow_results
  when: controller_bootstrap_workflow_config_files.files | default([]) | length > 0

- name: Merge all loaded workflows
  ansible.builtin.set_fact:
    controller_bootstrap_workflow_job_templates: >-
      {{
        controller_bootstrap_loaded_workflow_results.results
        | default([])
        | map(attribute='ansible_facts.controller_bootstrap_loaded_workflow_file.controller_bootstrap_workflow_job_templates')
        | select('defined')
        | flatten
        | list
      }}

- name: Debug loaded controller config counts
  ansible.builtin.debug:
    msg:
      - "job_template_files={{ controller_bootstrap_job_template_config_files.files | default([]) | length }}"
      - "controller_bootstrap_templates={{ controller_bootstrap_templates | default([]) | length }}"
      - "workflow_files={{ controller_bootstrap_workflow_config_files.files | default([]) | length }}"
      - "controller_bootstrap_workflow_job_templates={{ controller_bootstrap_workflow_job_templates | default([]) | length }}"
      - "template_names={{ controller_bootstrap_templates | default([]) | map(attribute='name') | list }}"
      - "workflow_names={{ controller_bootstrap_workflow_job_templates | default([]) | map(attribute='name') | list }}"
