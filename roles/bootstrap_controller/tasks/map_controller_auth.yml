---
- name: >-
    Map vault controller vars to controller and
    infra.aap_configuration auth vars
  no_log: true
  ansible.builtin.set_fact:
    bootstrap_controller_controller_hostname: "{{ vault_controller_hostname }}"
    bootstrap_controller_controller_host: "{{ vault_controller_hostname }}"
    bootstrap_controller_controller_oauthtoken: >-
      {{ vault_controller_oauthtoken }}
    bootstrap_controller_controller_username: "{{ vault_controller_username }}"
    bootstrap_controller_controller_password: "{{ vault_controller_password }}"
    bootstrap_controller_controller_validate_certs: >-
      {{ controller_validate_certs | default(false) }}

    aap_hostname: "{{ vault_controller_hostname }}"
    aap_host: "{{ vault_controller_hostname }}"
    aap_api_hostname: "{{ vault_controller_hostname }}"
    aap_oauthtoken: "{{ vault_controller_oauthtoken }}"
    aap_token: "{{ vault_controller_oauthtoken }}"
    aap_username: "{{ vault_controller_username }}"
    aap_password: "{{ vault_controller_password }}"
    aap_validate_certs: "{{ controller_validate_certs | default(false) }}"
    aap_ssl_verify: "{{ controller_validate_certs | default(false) }}"
    # noqa: var-naming[no-role-prefix]
