---
- name: Map vault controller vars to controller + infra.aap_configuration auth vars # noqa: var-naming  mapping only
  no_log: true
  ansible.builtin.set_fact:
    # Existing controller_* vars (fine to keep)
    controller_bootstrap_controller_hostname: "{{ vault_controller_hostname }}"
    controller_bootstrap_controller_host: "{{ vault_controller_hostname }}"
    controller_bootstrap_controller_oauthtoken: "{{ vault_controller_oauthtoken }}"
    controller_bootstrap_controller_username: "{{ vault_controller_username }}"
    controller_bootstrap_controller_password: "{{ vault_controller_password }}"
    controller_bootstrap_controller_validate_certs: "{{ controller_validate_certs | default(false) }}"
    # **CRITICAL**: vars expected by infra.aap_configuration roles
    aap_hostname: "{{ vault_controller_hostname }}"
    aap_host: "{{ vault_controller_hostname }}"
    aap_api_hostname: "{{ vault_controller_hostname }}"
    aap_oauthtoken: "{{ vault_controller_oauthtoken }}"
    aap_token: "{{ vault_controller_oauthtoken }}"
    aap_username: "{{ vault_controller_username }}"
    aap_password: "{{ vault_controller_password }}"
    aap_validate_certs: "{{ controller_validate_certs | default(false) }}"
    aap_ssl_verify: "{{ controller_validate_certs | default(false) }}"
