---
- name: AAP configs | Load generated AAP config vars
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/group_vars/all/{{ env }}/aap_config_vars.yml"
  when:
    - env is defined
    - (playbook_dir ~ '/group_vars/all/' ~ env ~ '/aap_config_vars.yml') is file

- name: AAP configs | Load generated AAP vault vars
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/group_vars/all/{{ env }}/aap_vault.yml"
  when:
    - env is defined
    - (playbook_dir ~ '/group_vars/all/' ~ env ~ '/aap_vault.yml') is file

- name: AAP configs | Find generated component vault files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/group_vars/all/{{ env }}"
    patterns:
      - "vault_*.yml"
    file_type: file
  register: bootstrap_controller_generated_component_vault_files
  when:
    - env is defined
    - (playbook_dir ~ '/group_vars/all/' ~ env) is directory

- name: AAP configs | Load generated component vault files
  ansible.builtin.include_vars:
    file: "{{ item.path }}"
  loop: >-
    {{
      bootstrap_controller_generated_component_vault_files.files
      | default([])
      | sort(attribute='path')
    }}
  no_log: true

- name: AAP configs | Validate Satellite dynamic inventory credential inputs
  ansible.builtin.assert:
    that:
      - >-
        vault_satellite_service_account_username
        | default('', true)
        | length > 0
      - >-
        vault_satellite_service_account_password
        | default('', true)
        | length > 0
      - >-
        controller_bootstrap_controller_credentials
        | default([])
        | selectattr('credential_type', 'match', '^Red Hat Satellite 6$')
        | selectattr('inputs.host', 'defined')
        | list
        | length > 0
    fail_msg: >-
      Satellite dynamic inventory is enabled, but the generated Satellite
      service account username, password, or server URL is missing. Confirm the
      Satellite service account fields are present in the preflight JSON.
  when:
    - >-
      controller_bootstrap_controller_inventory_sources
      | default([])
      | selectattr('source', 'match', '^satellite6$')
      | list
      | length > 0

- name: AAP configs | Ensure config directories exist
  ansible.builtin.file:
    path: "{{ playbook_dir }}/configs/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - controller
    - job_templates
    - workflows

- name: AAP configs | Expand patching component dependencies
  ansible.builtin.set_fact:
    bootstrap_controller_effective_components: >-
      {{
        (
          bootstrap_controller_selected_components
          | default(['openshift'])
        )
        +
        (
          ['satellite']
          if 'patching' in
             (
               bootstrap_controller_selected_components
               | default(['openshift'])
             )
          else []
        )
        | unique
        | list
      }}

- name: AAP configs | Render controller config templates
  ansible.builtin.template:
    src: "controller_config.yml.j2"
    dest: "{{ playbook_dir }}/configs/{{ item.dest }}"
    mode: "0644"
  loop:
    - var_name: controller_bootstrap_controller_organizations
      dest: controller/organizations.yml

    - var_name: controller_bootstrap_controller_credentials
      dest: controller/credentials.yml

    - var_name: controller_bootstrap_controller_projects
      dest: controller/projects.yml

    - var_name: controller_bootstrap_controller_inventories
      dest: controller/inventories.yml

    - var_name: controller_bootstrap_controller_inventory_sources
      dest: controller/inventory_sources.yml

    - var_name: controller_bootstrap_controller_execution_environments
      dest: controller/execution_environments.yml

    - var_name: bootstrap_controller_controller_hosts
      dest: controller/hosts.yml

    - var_name: controller_bootstrap_controller_labels
      dest: controller/labels.yml

    - var_name: bootstrap_controller_workflow_job_templates
      dest: workflows/bootstrap_workflows.yml

