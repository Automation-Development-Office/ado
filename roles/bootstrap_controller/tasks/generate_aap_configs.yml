- name: AAP configs | Build selected job template file list
  ansible.builtin.set_fact:
    bootstrap_controller_job_template_files_selected: >-
      {{
        bootstrap_controller_job_template_component_map
        | dict2items
        | selectattr('key', 'in', bootstrap_controller_effective_components)
        | map(attribute='value')
        | flatten
        | unique
        | list
      }}

# yamllint disable rule:line-length
- name: AAP configs | Copy job templates for generated playbooks only
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path

    src_dir = Path("{{ role_path }}/files/job_templates")
    dest_dir = Path("{{ playbook_dir }}/configs/job_templates")
    dest_dir.mkdir(parents=True, exist_ok=True)

    organization = "{{ bootstrap_controller_organization | default(controller_bootstrap_organization, true) }}"
    inventory = "{{ bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true) }}"
    local_inventory = "{{ bootstrap_controller_local_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"
    rhel_inventory = "{{ bootstrap_controller_rhel_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"
    idm_inventory = "{{ bootstrap_controller_idm_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"
    satellite_inventory = "{{ bootstrap_controller_satellite_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"
    project = "{{ bootstrap_controller_project_name | default(controller_bootstrap_project_name, true) }}"
    execution_environment = "{{ bootstrap_controller_execution_environment_name | default(controller_bootstrap_execution_environment_name, true) }}"
    credential = "{{ bootstrap_controller_creds | default(controller_bootstrap_creds, true) }}"
    machine_credential = "{{ bootstrap_controller_machine_credential | default(controller_bootstrap_machine_credential | default('', true), true) }}"
    state_choices_yaml = "present\nabsent"
    default_state = "{{ bootstrap_controller_default_state | default('present', true) }}"
    environment_choices = {{ (
        bootstrap_controller_environment_choices
        | default(controller_bootstrap_environment_choices
        | default(['dev', 'test', 'preprod', 'prod']))
        + [env | default('prod')]
      ) | unique | list | to_json }}
    environment_choices_yaml = "\n".join(environment_choices)
    default_environment = "{{ env | default(bootstrap_controller_default_environment | default('prod'), true) }}"

    selected = {{ bootstrap_controller_job_template_files_selected | default([]) | to_json }}
    if not selected:
        selected = [p.name for p in sorted(src_dir.glob("*.jt.yml"))]

    lb = "{" * 2
    rb = "}" * 2

    replacements = {
        f"{lb} bootstrap_controller_organization {rb}": organization,
        f"{lb} controller_bootstrap_organization {rb}": organization,
        f"{lb} bootstrap_controller_inventory_name {rb}": inventory,
        f"{lb} controller_bootstrap_inventory_name {rb}": inventory,
        f"{lb} bootstrap_controller_local_inventory_name {rb}": local_inventory,
        f"{lb} controller_bootstrap_local_inventory_name {rb}": local_inventory,
        f"{lb} bootstrap_controller_rhel_inventory_name {rb}": rhel_inventory,
        f"{lb} controller_bootstrap_rhel_inventory_name {rb}": rhel_inventory,
        f"{lb} bootstrap_controller_idm_inventory_name {rb}": idm_inventory,
        f"{lb} controller_bootstrap_idm_inventory_name {rb}": idm_inventory,
        f"{lb} bootstrap_controller_satellite_inventory_name {rb}": satellite_inventory,
        f"{lb} controller_bootstrap_satellite_inventory_name {rb}": satellite_inventory,
        f"{lb} bootstrap_controller_project_name {rb}": project,
        f"{lb} controller_bootstrap_project_name {rb}": project,
        f"{lb} bootstrap_controller_execution_environment_name {rb}": execution_environment,
        f"{lb} controller_bootstrap_execution_environment_name {rb}": execution_environment,
        f"{lb} bootstrap_controller_creds {rb}": credential,
        f"{lb} controller_bootstrap_creds {rb}": credential,
        f"{lb} bootstrap_controller_machine_credential {rb}": machine_credential,
        f"{lb} controller_bootstrap_machine_credential {rb}": machine_credential,
        f"{lb} bootstrap_controller_state_choices {rb}": state_choices_yaml,
        f"{lb} controller_bootstrap_state_choices {rb}": state_choices_yaml,
        f"{lb} bootstrap_controller_default_state {rb}": default_state,
        f"{lb} controller_bootstrap_default_state {rb}": default_state,
        f"{lb} bootstrap_controller_environment_choices {rb}": environment_choices_yaml,
        f"{lb} controller_bootstrap_environment_choices {rb}": environment_choices_yaml,
        f"{lb} bootstrap_controller_default_environment {rb}": default_environment,
        f"{lb} controller_bootstrap_default_environment {rb}": default_environment,
    }

    quoted_replacements = {}
    for old, new in replacements.items():
        quoted_replacements["'" + old + "'"] = new
        quoted_replacements['"' + old + '"'] = new
    replacements.update(quoted_replacements)

    replacements[f"{lb} bootstrap_controller_state_choices {rb}"] = state_choices_yaml
    replacements[f"{lb} controller_bootstrap_state_choices {rb}"] = state_choices_yaml
    replacements[f"'{lb} bootstrap_controller_state_choices {rb}'"] = f'"{state_choices_yaml}"'
    replacements[f"'{lb} controller_bootstrap_state_choices {rb}'"] = f'"{state_choices_yaml}"'

    replacements[f"{lb} bootstrap_controller_default_state {rb}"] = default_state
    replacements[f"{lb} controller_bootstrap_default_state {rb}"] = default_state
    replacements[f"'{lb} bootstrap_controller_default_state {rb}'"] = default_state
    replacements[f"'{lb} controller_bootstrap_default_state {rb}'"] = default_state

    replacements[f"{lb} bootstrap_controller_environment_choices {rb}"] = environment_choices_yaml
    replacements[f"{lb} controller_bootstrap_environment_choices {rb}"] = environment_choices_yaml
    replacements[f"'{lb} bootstrap_controller_environment_choices {rb}'"] = f'"{environment_choices_yaml}"'
    replacements[f"'{lb} controller_bootstrap_environment_choices {rb}'"] = f'"{environment_choices_yaml}"'

    replacements[f"{lb} bootstrap_controller_default_environment {rb}"] = default_environment
    replacements[f"{lb} controller_bootstrap_default_environment {rb}"] = default_environment
    replacements[f"'{lb} bootstrap_controller_default_environment {rb}'"] = default_environment
    replacements[f"'{lb} controller_bootstrap_default_environment {rb}'"] = default_environment

    copied = []
    for name in selected:
        src = src_dir / name
        if not src.exists():
            continue

        text = src.read_text()

        for old, new in replacements.items():
            if old:
                text = text.replace(old, new)

        if machine_credential:
            text = text.replace(
                "      # ADO_MACHINE_CREDENTIAL",
                f"      - '{machine_credential}'",
            )
        else:
            text = text.replace("      # ADO_MACHINE_CREDENTIAL\n", "")

        text = text.replace("- name: bootstrap", f"- name: {organization}")
        text = text.replace("ADO |", f"{organization} |")
        text = text.replace(f"{organization} | ADO ", f"{organization} | ")

        (dest_dir / name).write_text(text)
        copied.append(name)

    selected_set = set(selected)
    for existing in dest_dir.glob("*.jt.yml"):
        if existing.name not in selected_set:
            existing.unlink()

    print("Copied job templates:", len(copied))
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true
# yamllint enable rule:line-length

- name: >-
    AAP configs | Ensure workflow config directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/configs/workflows"
    state: directory
    mode: "0755"

- name: AAP configs | Copy patching workflow when selected
  ansible.builtin.copy:
    src: workflows/ado-patching-workflow-bootstrap.wf.yml
    dest: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-patching-workflow-bootstrap.wf.yml
    mode: "0644"
  when:
    - >-
        'rhel' in bootstrap_controller_effective_components
        and 'satellite' in bootstrap_controller_effective_components
        and 'idm' in bootstrap_controller_effective_components
        and (
          'patching' in bootstrap_controller_effective_components
          or 'rhel' in bootstrap_controller_effective_components
        )

- name: AAP configs | Copy RHEL workflow when selected
  ansible.builtin.copy:
    src: workflows/ado-rhel-workflow-bootstrap.wf.yml
    dest: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-rhel-workflow-bootstrap.wf.yml
    mode: "0644"
  when:
    - >-
        'rhel' in bootstrap_controller_effective_components
        and 'satellite' in bootstrap_controller_effective_components
        and 'idm' in bootstrap_controller_effective_components
        and 'compliance' in bootstrap_controller_effective_components
        and 'stig' in bootstrap_controller_effective_components

- name: AAP configs | Copy Satellite workflow when selected
  ansible.builtin.copy:
    src: workflows/ado-satellite-workflow-bootstrap.wf.yml
    dest: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-satellite-workflow-bootstrap.wf.yml
    mode: "0644"
  when:
    - "'satellite' in bootstrap_controller_effective_components"

- name: AAP configs | Copy OpenShift workflow when selected
  ansible.builtin.copy:
    src: workflows/ado-openshift-workflow-bootstrap.wf.yml
    dest: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-openshift-workflow-bootstrap.wf.yml
    mode: "0644"
  when:
    - "'openshift' in bootstrap_controller_effective_components"

- name: AAP configs | Remove patching workflow when unselected
  ansible.builtin.file:
    path: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-patching-workflow-bootstrap.wf.yml
    state: absent
  when:
    - >-
        'rhel' not in bootstrap_controller_effective_components
        or 'satellite' not in bootstrap_controller_effective_components
        or 'idm' not in bootstrap_controller_effective_components

- name: AAP configs | Remove RHEL workflow when unselected
  ansible.builtin.file:
    path: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-rhel-workflow-bootstrap.wf.yml
    state: absent
  when:
    - >-
        'rhel' not in bootstrap_controller_effective_components
        or 'satellite' not in bootstrap_controller_effective_components
        or 'idm' not in bootstrap_controller_effective_components
        or 'compliance' not in bootstrap_controller_effective_components
        or 'stig' not in bootstrap_controller_effective_components

- name: AAP configs | Remove Satellite workflow when unselected
  ansible.builtin.file:
    path: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-satellite-workflow-bootstrap.wf.yml
    state: absent
  when:
    - "'satellite' not in bootstrap_controller_effective_components"

- name: AAP configs | Remove OpenShift workflow when unselected
  ansible.builtin.file:
    path: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-openshift-workflow-bootstrap.wf.yml
    state: absent
  when:
    - "'openshift' not in bootstrap_controller_effective_components"

- name: AAP configs | Apply organization prefix to workflow templates
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: "ADO \\|"
    replace: >-
      {{
        bootstrap_controller_organization
        | default(controller_bootstrap_organization, true)
      }} |
  loop: >-
    {{
      query(
        'ansible.builtin.fileglob',
        playbook_dir ~ '/configs/workflows/*.wf.yml'
      )
    }}

# yamllint disable rule:line-length
- name: AAP configs | Apply generated values to workflow templates
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path

    workflow_dir = Path("{{ playbook_dir }}/configs/workflows")
    organization = "{{ bootstrap_controller_organization | default(controller_bootstrap_organization, true) }}"
    inventory = "{{ bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true) }}"
    rhel_inventory = "{{ bootstrap_controller_rhel_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"
    idm_inventory = "{{ bootstrap_controller_idm_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"
    satellite_inventory = "{{ bootstrap_controller_satellite_inventory_name | default(bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true), true) }}"

    lb = "{" * 2
    rb = "}" * 2
    replacements = {
        f"{lb} bootstrap_controller_organization {rb}": organization,
        f"{lb} controller_bootstrap_organization {rb}": organization,
        f"{lb} bootstrap_controller_inventory_name {rb}": inventory,
        f"{lb} controller_bootstrap_inventory_name {rb}": inventory,
        f"{lb} bootstrap_controller_rhel_inventory_name {rb}": rhel_inventory,
        f"{lb} controller_bootstrap_rhel_inventory_name {rb}": rhel_inventory,
        f"{lb} bootstrap_controller_idm_inventory_name {rb}": idm_inventory,
        f"{lb} controller_bootstrap_idm_inventory_name {rb}": idm_inventory,
        f"{lb} bootstrap_controller_satellite_inventory_name {rb}": satellite_inventory,
        f"{lb} controller_bootstrap_satellite_inventory_name {rb}": satellite_inventory,
    }

    changed = 0
    for path in sorted(workflow_dir.glob("*.wf.yml")):
        text = path.read_text()
        updated = text
        for old, new in replacements.items():
            updated = updated.replace(old, new)
        if updated != text:
            path.write_text(updated)
            changed += 1

    print("Rendered workflow templates:", changed)
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true

- name: AAP configs | Prune workflow nodes without generated job templates
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path
    import yaml

    playbook_dir = Path("{{ playbook_dir }}")
    workflow_dir = playbook_dir / "configs" / "workflows"
    job_template_dir = playbook_dir / "configs" / "job_templates"
    cert_manager_mode = "{{ bootstrap_controller_cert_manager_mode | default('cert', true) }}"

    available_templates = set()
    for path in sorted(job_template_dir.glob("*.jt.yml")):
        data = yaml.safe_load(path.read_text()) or {}
        for item in data.get("controller_templates", []) or []:
            name = item.get("name")
            if name:
                available_templates.add(name)

    edge_keys = ("success_nodes", "failure_nodes", "always_nodes")
    changed = 0
    for path in sorted(workflow_dir.glob("*.wf.yml")):
        data = yaml.safe_load(path.read_text()) or {}
        workflows = data.get("controller_workflow_job_templates", []) or []
        keep_file = False

        for workflow in workflows:
            nodes = workflow.get("simplified_workflow_nodes", []) or []
            kept_nodes = [
                node for node in nodes
                if node.get("unified_job_template") in available_templates
            ]
            if cert_manager_mode == "cert":
                kept_nodes = [
                    node for node in kept_nodes
                    if node.get("identifier") not in (
                        "Configure IDM ACME ClusterIssuer",
                        "Deploy AWSPCA Cert Manager",
                    )
                ]
            elif cert_manager_mode == "idm_acme":
                kept_nodes = [
                    node for node in kept_nodes
                    if node.get("identifier") != "Deploy AWSPCA Cert Manager"
                ]
            elif cert_manager_mode == "aws_pca":
                kept_nodes = [
                    node for node in kept_nodes
                    if node.get("identifier") != "Configure IDM ACME ClusterIssuer"
                ]
            kept_ids = {node.get("identifier") for node in kept_nodes}

            for node in kept_nodes:
                for edge_key in edge_keys:
                    if edge_key in node:
                        node[edge_key] = [
                            item for item in (node.get(edge_key) or [])
                            if item in kept_ids
                        ]
                        if not node[edge_key]:
                            node.pop(edge_key, None)

            workflow["simplified_workflow_nodes"] = kept_nodes
            if kept_nodes:
                keep_file = True

        if not keep_file:
            path.unlink()
            changed += 1
            continue

        updated = "---\n" + yaml.safe_dump(data, sort_keys=False, width=1000)
        if updated != path.read_text():
            path.write_text(updated)
            changed += 1

    print("Pruned workflow templates:", changed)
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true

- name: AAP configs | Attach organization label to generated templates
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path
    import yaml

    organization = "{{ controller_bootstrap_organization | default(bootstrap_controller_organization) }}"
    root = Path("{{ playbook_dir }}/configs")
    changed = 0

    def label_name(label):
        if isinstance(label, dict):
            return label.get("name")
        return label

    def normalize_labels(item):
        if not isinstance(item, dict):
            return False

        labels = []
        if organization:
            labels.append(organization)

        labels.extend(
            name for name in (label_name(label) for label in item.get("labels") or [])
            if name
        )

        related = item.get("related")
        if isinstance(related, dict):
            labels.extend(
                name for name in (label_name(label) for label in related.get("labels") or [])
                if name
            )
            related.pop("labels", None)
            if not related:
                item.pop("related", None)

        if not labels:
            return False

        normalized = list(dict.fromkeys(labels))
        if item.get("labels") == normalized:
            return False

        item["labels"] = normalized
        return True

    for pattern, key in (
        ("job_templates/*.jt.yml", "controller_templates"),
        ("workflows/*.wf.yml", "controller_workflow_job_templates"),
    ):
        for path in sorted(root.glob(pattern)):
            original = path.read_text()
            data = yaml.safe_load(original) or {}
            file_changed = False

            for item in data.get(key, []) or []:
                file_changed = normalize_labels(item) or file_changed

            if file_changed:
                path.write_text("---\n" + yaml.safe_dump(data, sort_keys=False, width=1000))
                changed += 1

    print("Attached organization labels:", changed)
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true
