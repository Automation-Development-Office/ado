---
- name: AAP configs | Ensure config directories exist
  ansible.builtin.file:
    path: "{{ playbook_dir }}/configs/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - controller
    - job_templates
    - workflows

- name: AAP configs | Expand patching component dependencies
  ansible.builtin.set_fact:
    bootstrap_controller_effective_components: >-
      {{
        (
          bootstrap_controller_selected_components
          | default(['openshift'])
        )
        +
        (
          ['satellite']
          if 'patching' in
             (
               bootstrap_controller_selected_components
               | default(['openshift'])
             )
          else []
        )
        | unique
        | list
      }}

- name: AAP configs | Render controller config templates
  ansible.builtin.template:
    src: "controller_config.yml.j2"
    dest: "{{ playbook_dir }}/configs/{{ item.dest }}"
    mode: "0644"
  loop:
    - var_name: controller_bootstrap_controller_organizations
      dest: controller/organizations.yml

    - var_name: controller_bootstrap_controller_credentials
      dest: controller/credentials.yml

    - var_name: controller_bootstrap_controller_projects
      dest: controller/projects.yml

    - var_name: controller_bootstrap_controller_inventories
      dest: controller/inventories.yml

    - var_name: controller_bootstrap_controller_inventory_sources
      dest: controller/inventory_sources.yml

    - var_name: controller_bootstrap_controller_execution_environments
      dest: controller/execution_environments.yml

    - var_name: bootstrap_controller_controller_hosts
      dest: controller/hosts.yml

    - var_name: controller_bootstrap_controller_labels
      dest: controller/labels.yml

    - var_name: bootstrap_controller_workflow_job_templates
      dest: workflows/bootstrap_workflows.yml

- name: AAP configs | Define job template component map
  ansible.builtin.set_fact:
    bootstrap_controller_job_template_component_map:
      aap:
        - ado-aap-aap24-deploy-and-configure-bootstrap.jt.yml
        - ado-aap-aap25-deploy-and-configure-bootstrap.jt.yml
        - ado-aap-aap26-deploy-and-configure-bootstrap.jt.yml
        - ado-aap-aap27-deploy-and-configure-bootstrap.jt.yml

      acs:
        - ado-acs-deploy-and-configure-bootstrap.jt.yml

      cert_manager:
        - ado-cert-manager-configure-idm-acme-clusterissuer.jt.yml
        - ado-cert-manager-deploy-and-configure-bootstrap.jt.yml
        - ado-cert-manager-install-and-configure-awspca-bootstrap.jt.yml

      console:
        - ado-console-configure-bootstrap.jt.yml

      devspaces:
        - ado-devspaces-deploy-and-configure-bootstrap.jt.yml

      dirsrv:
        - ado-dirsrv-deploy-and-configure-bootstrap.jt.yml
        - ado-dirsrv-ldap-modify-bootstrap.jt.yml
        - ado-dirsrv-search-user-bootstrap.jt.yml
        - ado-dirsrv-search-users-groups-bootstrap.jt.yml

      eck:
        - ado-eck-deploy-and-configure-bootstrap.jt.yml

      gitlab:
        - ado-gitlab-deploy-and-configure-bootstrap.jt.yml

      gitops:
        - ado-gitops-deploy-bootstrap.jt.yml

      grafana:
        - ado-grafana-create-custom-route.jt.yml
        - ado-grafana-deploy-bootstrap.jt.yml
        - ado-grafana-deploy-dashboards-bootstrap.jt.yml

      idm:
        - ado-idm-install-replica-bootstrap.jt.yml
        - ado-idm-install-server-bootstrap.jt.yml
        - ado-idm-manage-client-bootstrap.jt.yml
        - ado-idm-manage-dns-bootstrap.jt.yml
        - ado-idm-manage-server-settings-bootstrap.jt.yml
        - ado-idm-manage-sudo-bootstrap.jt.yml
        - ado-idm-manage-topology-bootstrap.jt.yml

      jira:
        - ado-jira-create-stories-bootstrap.jt.yml
        - ado-jira-jira-stories-collections-delivery-bootstrap.jt.yml
        - ado-jira-jira-stories-day2-bootstrap.jt.yml
        - ado-jira-jira-stories-feature-request-bootstrap.jt.yml
        - ado-jira-jira-stories-mfa-delivery-bootstrap.jt.yml
        - ado-jira-jira-stories-product-delivery-bootstrap.jt.yml
        - ado-jira-jira-stories-spike-bootstrap.jt.yml

      kafka:
        - ado-kafka-deploy-and-configure-bootstrap.jt.yml
        - ado-kafka-setup-alerting-bootstrap.jt.yml

      oadp:
        - ado-oadp-deploy-bootstrap.jt.yml

      openshift:
        - ado-openshift-configure-ldap-auth-bootstrap.jt.yml
        - ado-openshift-configure-oauth-with-rhbk-bootstrap.jt.yml
        - ado-openshift-create-htpass-user-bootstrap.jt.yml
        - ado-openshift-deploy-discover-routes-and-print-bootstrap.jt.yml
        - ado-openshift-discover-routes-bootstrap.jt.yml
        - ado-openshift-update-pull-secret-bootstrap.jt.yml

      pega:
        - ado-pega-install-and-configure-bootstrap.jt.yml

      quay:
        - ado-quay-deploy-and-configure-bootstrap.jt.yml

      rhbk:
        - ado-rhbk-deploy-and-configure-bootstrap.jt.yml
        - ado-rhbk-manage-client-bootstrap.jt.yml
        - ado-rhbk-manage-entraid-idp.jt.yml
        - ado-rhbk-manage-realm-bootstrap.jt.yml
        - ado-rhbk-realm-bootstrap.jt.yml

      rhel:
        - ado-rhel-patch-host-bootstrap.jt.yml
        - ado-rhel-stig-hardening-bootstrap.jt.yml

      satellite:
        - ado-satellite-register-host-bootstrap.jt.yml

      patching:
        - ado-rhel-patch-host-bootstrap.jt.yml

      stig:
        - ado-rhel-stig-hardening-bootstrap.jt.yml

- name: AAP configs | Build selected job template file list
  ansible.builtin.set_fact:
    bootstrap_controller_job_template_files_selected: >-
      {{
        bootstrap_controller_job_template_component_map
        | dict2items
        | selectattr('key', 'in', bootstrap_controller_effective_components)
        | map(attribute='value')
        | flatten
        | unique
        | list
      }}

# yamllint disable rule:line-length
- name: AAP configs | Copy job templates for generated playbooks only
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path

    src_dir = Path("{{ role_path }}/files/job_templates")
    dest_dir = Path("{{ playbook_dir }}/configs/job_templates")
    dest_dir.mkdir(parents=True, exist_ok=True)

    organization = "{{ bootstrap_controller_organization | default(controller_bootstrap_organization, true) }}"
    inventory = "{{ bootstrap_controller_inventory_name | default(controller_bootstrap_inventory_name, true) }}"
    project = "{{ bootstrap_controller_project_name | default(controller_bootstrap_project_name, true) }}"
    execution_environment = "{{ bootstrap_controller_execution_environment_name | default(controller_bootstrap_execution_environment_name, true) }}"
    credential = "{{ bootstrap_controller_creds | default(controller_bootstrap_creds, true) }}"
    machine_credential = "{{ bootstrap_controller_machine_credential | default(controller_bootstrap_machine_credential | default('', true), true) }}"
    state_choices_yaml = "present\nabsent"
    default_state = "{{ bootstrap_controller_default_state | default('present', true) }}"
    environment_choices = {{ (
        bootstrap_controller_environment_choices
        | default(controller_bootstrap_environment_choices
        | default(['dev', 'test', 'preprod', 'prod']))
        + [env | default('prod')]
      ) | unique | list | to_json }}
    environment_choices_yaml = "\n".join(environment_choices)
    default_environment = "{{ env | default(bootstrap_controller_default_environment | default('prod'), true) }}"

    selected = {{ bootstrap_controller_job_template_files_selected | default([]) | to_json }}
    if not selected:
        selected = [p.name for p in sorted(src_dir.glob("*.jt.yml"))]

    lb = "{" * 2
    rb = "}" * 2

    replacements = {
        f"{lb} bootstrap_controller_organization {rb}": organization,
        f"{lb} controller_bootstrap_organization {rb}": organization,
        f"{lb} bootstrap_controller_inventory_name {rb}": inventory,
        f"{lb} controller_bootstrap_inventory_name {rb}": inventory,
        f"{lb} bootstrap_controller_project_name {rb}": project,
        f"{lb} controller_bootstrap_project_name {rb}": project,
        f"{lb} bootstrap_controller_execution_environment_name {rb}": execution_environment,
        f"{lb} controller_bootstrap_execution_environment_name {rb}": execution_environment,
        f"{lb} bootstrap_controller_creds {rb}": credential,
        f"{lb} controller_bootstrap_creds {rb}": credential,
        f"{lb} bootstrap_controller_machine_credential {rb}": machine_credential,
        f"{lb} controller_bootstrap_machine_credential {rb}": machine_credential,
        f"{lb} bootstrap_controller_state_choices {rb}": state_choices_yaml,
        f"{lb} controller_bootstrap_state_choices {rb}": state_choices_yaml,
        f"{lb} bootstrap_controller_default_state {rb}": default_state,
        f"{lb} controller_bootstrap_default_state {rb}": default_state,
        f"{lb} bootstrap_controller_environment_choices {rb}": environment_choices_yaml,
        f"{lb} controller_bootstrap_environment_choices {rb}": environment_choices_yaml,
        f"{lb} bootstrap_controller_default_environment {rb}": default_environment,
        f"{lb} controller_bootstrap_default_environment {rb}": default_environment,
    }

    quoted_replacements = {}
    for old, new in replacements.items():
        quoted_replacements["'" + old + "'"] = new
        quoted_replacements['"' + old + '"'] = new
    replacements.update(quoted_replacements)

    replacements[f"{lb} bootstrap_controller_state_choices {rb}"] = state_choices_yaml
    replacements[f"{lb} controller_bootstrap_state_choices {rb}"] = state_choices_yaml
    replacements[f"'{lb} bootstrap_controller_state_choices {rb}'"] = f'"{state_choices_yaml}"'
    replacements[f"'{lb} controller_bootstrap_state_choices {rb}'"] = f'"{state_choices_yaml}"'

    replacements[f"{lb} bootstrap_controller_default_state {rb}"] = default_state
    replacements[f"{lb} controller_bootstrap_default_state {rb}"] = default_state
    replacements[f"'{lb} bootstrap_controller_default_state {rb}'"] = default_state
    replacements[f"'{lb} controller_bootstrap_default_state {rb}'"] = default_state

    replacements[f"{lb} bootstrap_controller_environment_choices {rb}"] = environment_choices_yaml
    replacements[f"{lb} controller_bootstrap_environment_choices {rb}"] = environment_choices_yaml
    replacements[f"'{lb} bootstrap_controller_environment_choices {rb}'"] = f'"{environment_choices_yaml}"'
    replacements[f"'{lb} controller_bootstrap_environment_choices {rb}'"] = f'"{environment_choices_yaml}"'

    replacements[f"{lb} bootstrap_controller_default_environment {rb}"] = default_environment
    replacements[f"{lb} controller_bootstrap_default_environment {rb}"] = default_environment
    replacements[f"'{lb} bootstrap_controller_default_environment {rb}'"] = default_environment
    replacements[f"'{lb} controller_bootstrap_default_environment {rb}'"] = default_environment

    copied = []
    for name in selected:
        src = src_dir / name
        if not src.exists():
            continue

        text = src.read_text()

        for old, new in replacements.items():
            if old:
                text = text.replace(old, new)

        if machine_credential:
            text = text.replace(
                "      # ADO_MACHINE_CREDENTIAL",
                f"      - '{machine_credential}'",
            )
        else:
            text = text.replace("      # ADO_MACHINE_CREDENTIAL\n", "")

        text = text.replace("- name: bootstrap", "- name: ado")
        text = text.replace("ADO |", f"{organization} |")
        text = text.replace(f"{organization} | ADO ", f"{organization} | ")

        (dest_dir / name).write_text(text)
        copied.append(name)

    selected_set = set(selected)
    for existing in dest_dir.glob("*.jt.yml"):
        if existing.name not in selected_set:
            existing.unlink()

    print("Copied job templates:", len(copied))
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true
# yamllint enable rule:line-length

- name: >-
    AAP configs | Ensure workflow config directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/configs/workflows"
    state: directory
    mode: "0755"

- name: AAP configs | Copy patching workflow when selected
  ansible.builtin.copy:
    src: workflows/ado-patching-workflow-bootstrap.wf.yml
    dest: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-patching-workflow-bootstrap.wf.yml
    mode: "0644"
  when:
    - >-
        'rhel' in bootstrap_controller_effective_components
        or 'patching' in bootstrap_controller_effective_components

- name: AAP configs | Remove patching workflow when unselected
  ansible.builtin.file:
    path: >-
      {{
        playbook_dir
      }}/configs/workflows/ado-patching-workflow-bootstrap.wf.yml
    state: absent
  when:
    - >-
        'rhel' not in bootstrap_controller_effective_components
        and 'patching' not in bootstrap_controller_effective_components

- name: AAP configs | Apply organization prefix to workflow templates
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: "ADO \\|"
    replace: >-
      {{
        bootstrap_controller_organization
        | default(controller_bootstrap_organization, true)
      }} |
  loop: >-
    {{
      query(
        'ansible.builtin.fileglob',
        playbook_dir ~ '/configs/workflows/*.wf.yml'
      )
    }}
