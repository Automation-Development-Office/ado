---
# tasks file for cron

- name: Creating Special Cron Jobs
  ansible.builtin.import_tasks: special_crons.yml
  when: >
    (rhel_cron_weekly_jobs is defined or
    rhel_cron_annual_jobs is defined or
    rhel_cron_monthly_jobs is defined or
    rhel_cron_hourly_jobs is defined or
    rhel_cron_reboot_jobs is defined or
    rhel_cron_daily_jobs is defined or
    rhel_cron_annual_jobs is defined or
    rhel_cron_yearly_jobs is defined) and rhel_cron_type == "special"
