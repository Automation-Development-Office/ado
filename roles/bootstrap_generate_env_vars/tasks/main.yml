---
- name: Load preflight JSON input
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_preflight: >-
      {{ lookup('ansible.builtin.file', preflight_json) | from_json }}
  when:
    - preflight_json is defined
    - preflight_json | length > 0

# yamllint disable rule:line-length
- name: Set values from preflight JSON
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_env: >-
      {{
        bootstrap_generate_env_vars_preflight.environment
        | default('prod')
      }}
    bootstrap_generate_env_vars_base_domain: >-
      {{
        bootstrap_generate_env_vars_preflight.domain
        | default('prod.rhlab')
      }}
    bootstrap_generate_env_vars_component: >-
      {{
        bootstrap_generate_env_vars_preflight.component
        | default('all')
      }}
    bootstrap_generate_env_vars_platform: >-
      {{
        bootstrap_generate_env_vars_preflight.platform
        | default(['all'])
        | first
        | lower
      }}
    bootstrap_generate_env_vars_components: >-
      {{
        (
          bootstrap_generate_env_vars_preflight.components
          | default(bootstrap_generate_env_vars_preflight.platform | default([]))
          | map('lower')
          | list
        )
        if (
          bootstrap_generate_env_vars_preflight.components is defined
          or bootstrap_generate_env_vars_preflight.component_apps is defined
        )
        else (
          bootstrap_generate_env_vars_preflight.selected_component_apps
          if (
            bootstrap_generate_env_vars_preflight.selected_component_apps
            is defined
            and bootstrap_generate_env_vars_preflight.selected_component_apps
            | length > 0
          )
          else (
            bootstrap_generate_env_vars_preflight.platform | default(['all'])
          )
        )
        | reject('equalto', '')
        | unique
        | list
      }}
    bootstrap_generate_env_vars_use_aap: >-
      {{
        (
          bootstrap_generate_env_vars_preflight.aap
          | default({})
        ).enabled
        | default(true)
        | bool
      }}
    bootstrap_generate_env_vars_enable_jira: >-
      {{
        (
          bootstrap_generate_env_vars_preflight.jira
          | default({})
        ).enabled
        | default(false)
        | bool
      }}
  when: bootstrap_generate_env_vars_preflight is defined
# yamllint enable rule:line-length

# yamllint disable rule:line-length
- name: Prefer component app selections over stale selected_component_apps
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components: >-
      {{
        (
          ['openshift', 'keycloak', 'satellite', 'grafana', 'jira', 'patching']
          if 'all' in bootstrap_generate_env_vars_preflight_components
          else (
            (
              ['openshift']
              if 'openshift' in bootstrap_generate_env_vars_preflight_components
              else []
            )
            +
            (
              (
                bootstrap_generate_env_vars_preflight.component_apps.openshift
                | default([])
              )
              if 'openshift' in bootstrap_generate_env_vars_preflight_components
              else []
            )
            +
            (
              (
                bootstrap_generate_env_vars_preflight.component_apps.rhel
                | default([])
              )
              if 'rhel' in bootstrap_generate_env_vars_preflight_components
              else []
            )
            +
            (
              (
                bootstrap_generate_env_vars_preflight.component_apps.patching
                | default([])
              )
              if 'patching' in bootstrap_generate_env_vars_preflight_components
              else []
            )
            +
            (
              (
                bootstrap_generate_env_vars_preflight.component_apps.provision
                | default([])
              )
              if 'provision' in bootstrap_generate_env_vars_preflight_components
              else []
            )
            +
            (
              ['admin_htpasswd']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and (
                  'admin_htpasswd' in (
                    bootstrap_generate_env_vars_preflight.component_options.openshift
                    | default([])
                  )
                  or (
                    bootstrap_generate_env_vars_preflight_openshift.admin_username
                    is defined
                  )
                  or (
                    bootstrap_generate_env_vars_preflight_openshift.admin_password
                    is defined
                  )
                )
              )
              else []
            )
            +
            (
              ['console']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and (
                  'console_banner' in (
                    bootstrap_generate_env_vars_preflight.component_options.openshift
                    | default([])
                  )
                  or (
                    bootstrap_generate_env_vars_preflight_openshift.banner_text
                    is defined
                  )
                )
              )
              else []
            )
            +
            (
              ['openshift_ldap_auth']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and 'ldap_auth' in (
                  bootstrap_generate_env_vars_preflight.component_options.openshift
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['openshift_oauth_rhbk']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and 'oauth_rhbk' in (
                  bootstrap_generate_env_vars_preflight.component_options.openshift
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['openshift_discover_routes_print']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and 'discover_routes_print' in (
                  bootstrap_generate_env_vars_preflight.component_options.openshift
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['openshift_discover_routes_alt']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and 'discover_routes_alt' in (
                  bootstrap_generate_env_vars_preflight.component_options.openshift
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['openshift_update_pull_secret']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and 'update_pull_secret' in (
                  bootstrap_generate_env_vars_preflight.component_options.openshift
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['rhbk_realm']
              if (
                bootstrap_generate_env_vars_preflight_rhbk_selected
                and 'realm' in (
                  bootstrap_generate_env_vars_preflight.component_options.rhbk
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['rhbk_client']
              if (
                bootstrap_generate_env_vars_preflight_rhbk_selected
                and 'client' in (
                  bootstrap_generate_env_vars_preflight.component_options.rhbk
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['rhbk_idp']
              if (
                bootstrap_generate_env_vars_preflight_rhbk_selected
                and 'idp' in (
                  bootstrap_generate_env_vars_preflight.component_options.rhbk
                  | default([])
                )
              )
              else []
            )
            +
            (
              ['rhbk_federation']
              if (
                bootstrap_generate_env_vars_preflight_rhbk_selected
                and 'federation' in (
                  bootstrap_generate_env_vars_preflight.component_options.rhbk
                  | default([])
                )
              )
              else []
            )
            +
            (
              bootstrap_generate_env_vars_preflight_components
              | difference(['openshift', 'rhel', 'patching', 'provision'])
              | list
            )
          )
        )
        | reject('equalto', '')
        | unique
        | list
      }}
  vars:
    bootstrap_generate_env_vars_preflight_components: >-
      {{
        bootstrap_generate_env_vars_preflight.components
        | default(bootstrap_generate_env_vars_preflight.platform | default([]))
        | map('lower')
        | list
      }}
    bootstrap_generate_env_vars_preflight_component_apps: >-
      {{ bootstrap_generate_env_vars_preflight.component_apps | default({}) }}
    bootstrap_generate_env_vars_preflight_component_options: >-
      {{
        bootstrap_generate_env_vars_preflight.component_options
        | default({})
      }}
    bootstrap_generate_env_vars_preflight_openshift: >-
      {{ bootstrap_generate_env_vars_preflight.openshift | default({}) }}
    bootstrap_generate_env_vars_preflight_rhbk_selected: >-
      {{
        'rhbk' in bootstrap_generate_env_vars_preflight_components
        or 'rhbk' in (
          bootstrap_generate_env_vars_preflight_component_apps.openshift
          | default([])
        )
      }}
  when:
    - bootstrap_generate_env_vars_preflight is defined
    - >-
      (
        bootstrap_generate_env_vars_preflight_component_apps.openshift
        | default([])
        | length > 0
      )
      or (
        bootstrap_generate_env_vars_preflight_component_apps.rhel
        | default([])
        | length > 0
      )
      or (
        bootstrap_generate_env_vars_preflight_component_apps.patching
        | default([])
        | length > 0
      )
      or (
        bootstrap_generate_env_vars_preflight_component_apps.provision
        | default([])
        | length > 0
      )
      or (
        bootstrap_generate_env_vars_preflight_component_options.openshift
        | default([])
        | length > 0
      )
      or (
        bootstrap_generate_env_vars_preflight_component_options.rhbk
        | default([])
        | length > 0
      )
# yamllint enable rule:line-length

- name: Preserve top-level preflight components with no child selections
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components: >-
      {{
        (
          bootstrap_generate_env_vars_components
          + (
              ['openshift']
              if (
                'openshift' in bootstrap_generate_env_vars_preflight_components
                and (
                  bootstrap_generate_env_vars_preflight.component_apps.openshift
                  | default([])
                  | length
                ) == 0
              )
              else []
            )
          + (
              ['rhel']
              if (
                'rhel' in bootstrap_generate_env_vars_preflight_components
                and (
                  bootstrap_generate_env_vars_preflight.component_apps.rhel
                  | default([])
                  | length
                ) == 0
              )
              else []
            )
          + (
              ['patching']
              if (
                'patching' in bootstrap_generate_env_vars_preflight_components
                and (
                  bootstrap_generate_env_vars_preflight.component_apps.patching
                  | default([])
                  | length
                ) == 0
              )
              else []
            )
          + (
              ['provision']
              if (
                'provision' in bootstrap_generate_env_vars_preflight_components
                and (
                  bootstrap_generate_env_vars_preflight.component_apps.provision
                  | default([])
                  | length
                ) == 0
              )
              else []
            )
        )
        | unique
        | list
      }}
  vars:
    bootstrap_generate_env_vars_preflight_components: >-
      {{
        bootstrap_generate_env_vars_preflight.components
        | default(bootstrap_generate_env_vars_preflight.platform | default([]))
        | map('lower')
        | list
      }}
  when:
    - bootstrap_generate_env_vars_preflight is defined

- name: Add components implied by RHEL options from preflight JSON
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components: >-
      {{
        (
          bootstrap_generate_env_vars_components
          +
          (
            ['stig']
            if 'stig' in
              (
                bootstrap_generate_env_vars_preflight.component_options.rhel
                | default([])
                | map('lower')
                | list
              )
            else []
          )
        )
        | unique
        | list
      }}
  when:
    - bootstrap_generate_env_vars_preflight is defined

- name: Validate env was provided
  ansible.builtin.assert:
    that:
      - env is defined
      - env | string | length > 0
    fail_msg: |
      Environment must be provided.

      Example:
      ansible-playbook -c local -i inventory run-ado-scaffolding.yml \
        -e env=prod \
        --vault-password-file ~/.vault_pass

- name: Set internal env variable from provided env
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_env: "{{ env }}"

- name: Set environment directory
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_env_dir: >-
      {{
        (bootstrap_generate_env_vars_base_dir
         | default(generate_env_vars_base_dir | default('group_vars/all')))
      }}/{{ bootstrap_generate_env_vars_env }}

- name: Ask whether to create/update repo directories
  ansible.builtin.pause:
    prompt: >-
        Create/update generated bootstrap repository files and
        directory structure? [Y/n]
  register: bootstrap_generate_env_vars_prompt_create_dirs
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Set create dirs answer interactive
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_create_dirs: >-
      {{
        bootstrap_generate_env_vars_prompt_create_dirs.user_input
        | default('y')
      }}
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Set create dirs answer preflight
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_create_dirs: true
  when: bootstrap_generate_env_vars_preflight is defined

- name: Ensure generated repo directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ bootstrap_generate_env_vars_env_dir }}"
    - "{{ playbook_dir }}/playbooks"
    - "{{ playbook_dir }}/configs"
    - "{{ playbook_dir }}/configs/controller"
    - "{{ playbook_dir }}/configs/job_templates"
    - "{{ playbook_dir }}/configs/workflows"
  when: bootstrap_generate_env_vars_create_dirs | bool

- name: Ask for base domain
  ansible.builtin.pause:
    prompt: "What is the base environment domain? (example: example.com)"
  register: bootstrap_generate_env_vars_prompt_base_domain
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Set base domain interactive
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_base_domain: >-
      {{ bootstrap_generate_env_vars_prompt_base_domain.user_input }}
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Ensure base domain was provided
  ansible.builtin.assert:
    that:
      - bootstrap_generate_env_vars_base_domain is defined
      - bootstrap_generate_env_vars_base_domain | length > 0
    fail_msg: "Base domain is required."

- name: Ask platform
  ansible.builtin.pause:
    prompt: "Platform [all/openshift/linux]"
  register: bootstrap_generate_env_vars_prompt_platform
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Set platform answer interactive
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_platform: >-
      {{ bootstrap_generate_env_vars_prompt_platform.user_input }}
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Ask OpenShift questions
  when:
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_platform in ['all', 'openshift']
  block:
    - name: Ask OpenShift API host
      ansible.builtin.pause:
        prompt: "OpenShift API host"
      register: bootstrap_generate_env_vars_prompt_ocp_host

    - name: Ask OpenShift domain
      ansible.builtin.pause:
        prompt: "OpenShift domain"
      register: bootstrap_generate_env_vars_prompt_ocp_domain

- name: Set all components when platform is all
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components:
      - openshift
      - keycloak
      - satellite
      - grafana
      - jira
      - patching
      - stig
  when:
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_platform == 'all'

- name: Ask for enabled components when platform is not all
  ansible.builtin.pause:
    prompt: >-
      What additional components do you want to enable?
      (comma separated)
      Options: openshift,keycloak,satellite,grafana,jira,patching,stig
  register: bootstrap_generate_env_vars_prompt_components
  when:
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_platform != 'all'

- name: Set enabled components when platform is openshift
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components: >-
      {{
        (
          ['openshift'] +
          (
            bootstrap_generate_env_vars_prompt_components.user_input
            | default('', true)
            | lower
            | replace(' ', '')
            | split(',')
            | reject('equalto', '')
            | list
          )
        )
        | unique
        | list
      }}
  when:
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_platform == 'openshift'

- name: Set enabled components when platform is linux
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components: >-
      {{
        (
          bootstrap_generate_env_vars_prompt_components.user_input
          | default('patching', true)
          | lower
          | replace(' ', '')
          | split(',')
          | reject('equalto', '')
          | list
        )
        | unique
        | list
      }}
  when:
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_platform == 'linux'

- name: Show selected components
  ansible.builtin.debug:
    var: bootstrap_generate_env_vars_components

- name: Normalize patching selection to RHEL component vars
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_components: >-
      {{
        (
          bootstrap_generate_env_vars_components
          + (
              ['rhel']
              if 'patching' in bootstrap_generate_env_vars_components
              else []
            )
        )
        | reject('equalto', 'patching')
        | unique
        | list
      }}

- name: Show normalized selected components
  ansible.builtin.debug:
    var: bootstrap_generate_env_vars_components

- name: Find existing generated component vars files
  ansible.builtin.find:
    paths:
      - "{{ bootstrap_generate_env_vars_env_dir }}"
    patterns:
      - "vars_*.yml"
    file_type: file
  register: bootstrap_generate_env_vars_existing_component_vars

- name: Find existing generated component vault files
  ansible.builtin.find:
    paths:
      - "{{ bootstrap_generate_env_vars_env_dir }}"
    patterns:
      - "vault_*.yml"
    file_type: file
  register: bootstrap_generate_env_vars_existing_component_vaults

- name: Remove stale generated component vars files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ bootstrap_generate_env_vars_existing_component_vars.files }}"
  when:
    - item.path | basename not in (
        bootstrap_generate_env_vars_components
        | map('regex_replace', '^(.*)$', 'vars_\\1.yml')
        | list
      )

- name: Remove stale generated component vault files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ bootstrap_generate_env_vars_existing_component_vaults.files }}"
  when:
    - item.path | basename not in (
        bootstrap_generate_env_vars_components
        | map('regex_replace', '^(.*)$', 'vault_\\1.yml')
        | list
      )

- name: Write component vars files
  ansible.builtin.template:
    src: component_vars.yml.j2
    dest: >-
      {{
        bootstrap_generate_env_vars_env_dir
      }}/vars_{{ component_name }}.yml
    mode: "0644"
    force: "{{ bootstrap_generate_env_vars_force | bool }}"
  loop: "{{ bootstrap_generate_env_vars_components }}"
  loop_control:
    loop_var: component_name

- name: Write component vault files
  ansible.builtin.template:
    src: component_vault.yml.j2
    dest: >-
      {{
        bootstrap_generate_env_vars_env_dir
      }}/vault_{{ component_name }}.yml
    mode: "0600"
    force: "{{ bootstrap_generate_env_vars_force | bool }}"
  loop: "{{ bootstrap_generate_env_vars_components }}"
  loop_control:
    loop_var: component_name

# yamllint disable rule:line-length
- name: Overlay preflight component values into generated vars/vault files
  ansible.builtin.shell: |
    set -euo pipefail
    python3 <<'PYCODE'
    from pathlib import Path
    import json
    import yaml

    preflight_file = Path("{{ preflight_json }}")
    env_dir = Path("{{ bootstrap_generate_env_vars_env_dir }}")
    selected_components = set({{ bootstrap_generate_env_vars_components | to_json }})

    preflight = json.loads(preflight_file.read_text())

    def is_secret_key(key):
        k = str(key or "").lower()
        return any(x in k for x in ["password", "token", "secret", "vault", "credential", "tls_key"])

    def load_yaml(path):
        if not path.exists():
            return {}
        data = yaml.safe_load(path.read_text()) or {}
        return data if isinstance(data, dict) else {}

    def write_yaml(path, data, mode="0644"):
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text("---\n" + yaml.safe_dump(data, sort_keys=False, width=1000))
        path.chmod(int(mode, 8))

    def merge_component(component, cfg):
        if not isinstance(cfg, dict):
            return

        vars_path = env_dir / f"vars_{component}.yml"
        vault_path = env_dir / f"vault_{component}.yml"

        vars_data = load_yaml(vars_path)
        vault_data = load_yaml(vault_path)

        public_values = {k: v for k, v in cfg.items() if not is_secret_key(k)}
        secret_values = {k: v for k, v in cfg.items() if is_secret_key(k)}

        if public_values:
            vars_data.setdefault("component_config", {})
            vars_data["component_config"][component] = {
                **vars_data["component_config"].get(component, {}),
                **public_values,
            }

            for k, v in public_values.items():
                vars_data[k] = v

            if component == "grafana":
                vars_data.setdefault("components_env", {}).setdefault("grafana", {})
                if public_values.get("storage"):
                    vars_data["components_env"]["grafana"]["storage"] = public_values["storage"]
                if public_values.get("folder_name"):
                    vars_data["components_env"]["grafana"]["grafana_folder"] = public_values["folder_name"]
                if public_values.get("hostname"):
                    vars_data["components_env"]["grafana"]["hostname"] = public_values["hostname"]

            if component == "rhbk":
                vars_data.setdefault("components_env", {}).setdefault("rhbk", {})
                if public_values.get("storage"):
                    vars_data["components_env"]["rhbk"]["storage"] = public_values["storage"]
                if public_values.get("realm"):
                    vars_data["components_env"]["rhbk"]["rhbk_realm"] = public_values["realm"]
                if public_values.get("hostname"):
                    vars_data["components_env"]["rhbk"]["hostname"] = public_values["hostname"]

            if component == "satellite":
                vars_data.setdefault("components_env", {}).setdefault("satellite", {})
                vars_data["components_env"]["satellite"].pop("storage", None)
                if public_values.get("hostname"):
                    satellite_url = str(public_values["hostname"])
                    if not satellite_url.startswith(("http://", "https://")):
                        satellite_url = "https://" + satellite_url
                    vars_data["components_env"]["satellite"]["hostname"] = public_values["hostname"]
                    vars_data["satellite_config_server_url"] = satellite_url
                if public_values.get("organization"):
                    vars_data["satellite_config_organization"] = public_values["organization"]
                if public_values.get("activation_key"):
                    vars_data["satellite_activation_key"] = public_values["activation_key"]
                if public_values.get("service_account_username"):
                    vars_data["satellite_config_username"] = public_values["service_account_username"]
                    vars_data["satellite_service_account_username"] = public_values["service_account_username"]
                    vault_data["vault_satellite_service_account_username"] = public_values["service_account_username"]
                if "validate_certs" in public_values:
                    vars_data["satellite_config_validate_certs"] = public_values["validate_certs"]

            if component == "cert_manager":
                if public_values.get("mode"):
                    vars_data["ocp_cert_manager_mode"] = public_values["mode"]
                if public_values.get("idm_acme_directory_url"):
                    vars_data.setdefault("idm", {})
                    vars_data["idm"]["acme_directory_url"] = public_values["idm_acme_directory_url"]
                if public_values.get("idm_ca_bundle_file"):
                    vars_data.setdefault("idm", {})
                    vars_data["idm"]["ca_bundle_file"] = public_values["idm_ca_bundle_file"]
                if public_values.get("awspca_namespace"):
                    vars_data["ocp_awspca_namespace"] = public_values["awspca_namespace"]
                if public_values.get("awspca_secret_name"):
                    vars_data["ocp_awspca_secret_name"] = public_values["awspca_secret_name"]
                if public_values.get("awspca_issuer_name"):
                    vars_data["ocp_awspca_issuer_name"] = public_values["awspca_issuer_name"]
                if public_values.get("awspca_region"):
                    vars_data["ocp_awspca_region"] = public_values["awspca_region"]
                if public_values.get("awspca_pca_arn"):
                    vars_data["ocp_awspca_pca_arn"] = public_values["awspca_pca_arn"]
                if public_values.get("tls_crt"):
                    vault_data["tls_crt"] = public_values["tls_crt"]

            if component == "idm":
                vars_data.setdefault("components_env", {}).setdefault("idm", {})
                public_values.pop("storage", None)
                vars_data["component_config"][component].pop("storage", None)
                vars_data.pop("storage", None)
                vars_data["components_env"]["idm"].pop("storage", None)
                if public_values.get("hostname"):
                    vars_data["components_env"]["idm"]["hostname"] = public_values["hostname"]
                    vars_data["idm_hostname"] = public_values["hostname"]
                    vars_data["idm_server_name"] = public_values["hostname"]
                    vars_data["idm_configure_replica_server"] = public_values["hostname"]
                if public_values.get("domain"):
                    vars_data["idm_domain"] = public_values["domain"]
                    vars_data["idm_configure_replica_domain"] = public_values["domain"]
                if public_values.get("realm"):
                    vars_data["idm_realm"] = public_values["realm"]
                    vars_data["idm_configure_replica_realm"] = public_values["realm"]
                if public_values.get("replica_hostname"):
                    vars_data["idm_replica_hostname"] = public_values["replica_hostname"]
                    vars_data["idm_configure_replica_hostname"] = public_values["replica_hostname"]
                if "replica_install_dns" in public_values:
                    vars_data["idm_replica_install_dns"] = public_values["replica_install_dns"]
                    vars_data["idm_configure_replica_setup_dns"] = public_values["replica_install_dns"]
                if "replica_install_ca" in public_values:
                    vars_data["idm_replica_install_ca"] = public_values["replica_install_ca"]
                    vars_data["idm_configure_replica_setup_ca"] = public_values["replica_install_ca"]
                if "auto_forwarders" in public_values:
                    vars_data["idm_auto_forwarders"] = public_values["auto_forwarders"]
                    vars_data["idm_configure_replica_auto_forwarders"] = public_values["auto_forwarders"]
                if public_values.get("custom_cert_file"):
                    vars_data["idm_custom_cert_file"] = public_values["custom_cert_file"]
                if public_values.get("custom_cert_key_file"):
                    vars_data["idm_custom_cert_key_file"] = public_values["custom_cert_key_file"]
                if public_values.get("custom_cert_chain_file"):
                    vars_data["idm_custom_cert_chain_file"] = public_values["custom_cert_chain_file"]

            if component == "rhel":
                vars_data.setdefault("components_env", {}).setdefault("rhel", {})
                vars_data["components_env"]["rhel"].update(public_values)

            if component == "stig":
                rhel_values = (preflight.get("component_config") or {}).get("rhel") or {}
                if rhel_values.get("compliance_profile"):
                    vars_data["compliance_profile"] = rhel_values["compliance_profile"]
                if rhel_values.get("stig_profile"):
                    vars_data["stig_profile"] = rhel_values["stig_profile"]
                    vars_data["rhel_stig_profile"] = rhel_values["stig_profile"]
                if public_values.get("profile"):
                    vars_data["stig_profile"] = public_values["profile"]
                    vars_data["rhel_stig_profile"] = public_values["profile"]

            write_yaml(vars_path, vars_data, "0644")

        if secret_values:
            vault_data.setdefault("component_vault_config", {})
            vault_data["component_vault_config"][component] = {
                **vault_data["component_vault_config"].get(component, {}),
                **secret_values,
            }

            for k, v in secret_values.items():
                vault_data[k] = v

            if component == "satellite":
                if secret_values.get("service_account_password") is not None:
                    vault_data["vault_satellite_service_account_password"] = secret_values["service_account_password"]
                    vault_data["satellite_config_password"] = secret_values["service_account_password"]
                if secret_values.get("admin_password") is not None:
                    vault_data["vault_satellite_admin_password"] = secret_values["admin_password"]
                    vault_data["satellite_config_admin_password"] = secret_values["admin_password"]

            if component == "cert_manager":
                if secret_values.get("tls_key") is not None:
                    vault_data["tls_key"] = secret_values["tls_key"]
                if secret_values.get("awspca_access_key_id") is not None:
                    vault_data["ocp_awspca_access_key_id"] = secret_values["awspca_access_key_id"]
                if secret_values.get("awspca_secret_access_key") is not None:
                    vault_data["ocp_awspca_secret_access_key"] = secret_values["awspca_secret_access_key"]

            if component == "idm":
                if secret_values.get("admin_password") is not None:
                    vault_data["vault_idm_admin_password"] = secret_values["admin_password"]
                    vault_data["idm_server_ipaadmin_password"] = secret_values["admin_password"]
                    vault_data["idm_configure_replica_admin_password"] = secret_values["admin_password"]
                if secret_values.get("directory_manager_password") is not None:
                    vault_data["vault_idm_directory_manager_password"] = secret_values["directory_manager_password"]
                    vault_data["idm_configure_replica_dm_password"] = secret_values["directory_manager_password"]

            write_yaml(vault_path, vault_data, "0600")

    component_options = preflight.get("component_options") or {}
    openshift_options = set(component_options.get("openshift") or [])
    openshift = preflight.get("openshift") or {}
    if openshift:
        if "openshift" not in selected_components:
            openshift = {}

    if openshift:
        vars_path = env_dir / "vars_openshift.yml"
        vault_path = env_dir / "vault_openshift.yml"

        vars_data = load_yaml(vars_path)
        vault_data = load_yaml(vault_path)

        if openshift.get("api_host") is not None:
            vars_data["api_host"] = openshift.get("api_host")
            vars_data["host"] = openshift.get("api_host")

        if preflight.get("domain") is not None:
            vars_data["domain"] = preflight.get("domain")

        if openshift.get("apps_domain") is not None:
            vars_data["apps_domain"] = openshift.get("apps_domain")
            vars_data["app_domain"] = openshift.get("apps_domain")

        skip_tls_verify = bool(openshift.get("skip_tls_verify", True))
        vars_data["skip_tls_verify"] = skip_tls_verify
        vars_data["verify_ssl"] = not skip_tls_verify
        vars_data["validate_certs"] = not skip_tls_verify

        if openshift.get("token") is not None:
            vault_data["token"] = openshift.get("token")
            vault_data["openshift_token"] = openshift.get("token")

        if "admin_htpasswd" in openshift_options and (
            openshift.get("admin_username") or openshift.get("admin_password")
        ):
            admin_username = openshift.get("admin_username") or "admin"
            admin_password = openshift.get("admin_password") or ""
            vault_data["htpasswd_users"] = [
                {
                    "name": admin_username,
                    "password": admin_password,
                    "role": openshift.get("admin_role") or "cluster-admin",
                }
            ]
            vault_data["htpasswd_pass"] = admin_password
        else:
            vault_data.pop("htpasswd_users", None)
            vault_data.pop("htpasswd_pass", None)

        if "console_banner" in openshift_options and openshift.get("banner_text"):
            vars_data["ocp_console_banner_text"] = openshift.get("banner_text")
            vars_data["console_banner_text"] = openshift.get("banner_text")
            if openshift.get("banner_location"):
                vars_data["ocp_console_banner_location"] = openshift.get("banner_location")
            if openshift.get("banner_background_color"):
                vars_data["ocp_console_banner_background_color"] = openshift.get("banner_background_color")
            if openshift.get("banner_text_color"):
                vars_data["ocp_console_banner_text_color"] = openshift.get("banner_text_color")
        else:
            vars_data.pop("ocp_console_banner_text", None)
            vars_data.pop("console_banner_text", None)
            vars_data.pop("ocp_console_banner_location", None)
            vars_data.pop("ocp_console_banner_background_color", None)
            vars_data.pop("ocp_console_banner_text_color", None)

        write_yaml(vars_path, vars_data, "0644")
        write_yaml(vault_path, vault_data, "0600")

    for component, cfg in (preflight.get("component_config") or {}).items():
        if component not in selected_components:
            continue
        merge_component(component, cfg)

    print(f"Overlayed preflight component values into {env_dir}")
    PYCODE
  args:
    executable: /bin/bash
  changed_when: true
  when:
    - bootstrap_generate_env_vars_preflight is defined
    - preflight_json is defined
    - preflight_json | length > 0
# yamllint enable rule:line-length

- name: Ask if using AAP
  ansible.builtin.pause:
    prompt: "Are you using AAP? [Y/n]"
  register: bootstrap_generate_env_vars_prompt_use_aap
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Set AAP enabled answer interactive
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_use_aap: >-
            bootstrap_generate_env_vars_prompt_use_aap.user_input
  when: bootstrap_generate_env_vars_preflight is not defined

- name: Ask AAP questions
  when:
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_use_aap | bool
  block:
    - name: Ask AAP hostname
      ansible.builtin.pause:
        prompt: "AAP hostname"
      register: bootstrap_generate_env_vars_prompt_aap_hostname

    - name: Ask AAP OAuth token
      ansible.builtin.pause:
        prompt: "AAP OAuth token"
        echo: false
      register: bootstrap_generate_env_vars_prompt_aap_token

    - name: Ask AAP admin username
      ansible.builtin.pause:
        prompt: "AAP admin username [admin]"
      register: bootstrap_generate_env_vars_prompt_aap_username

    - name: Ask AAP admin password
      ansible.builtin.pause:
        prompt: "AAP admin password"
        echo: false
      register: bootstrap_generate_env_vars_prompt_aap_password

    - name: Ask AAP version
      ansible.builtin.pause:
        prompt: "AAP version [2.4/2.5/2.6]"
      register: bootstrap_generate_env_vars_prompt_aap_version

    - name: Ask AAP organization
      ansible.builtin.pause:
        prompt: "AAP organization"
      register: bootstrap_generate_env_vars_prompt_aap_org

    - name: Ask AAP inventory name
      ansible.builtin.pause:
        prompt: "AAP inventory name"
      register: bootstrap_generate_env_vars_prompt_aap_inventory

    - name: Ask AAP project name
      ansible.builtin.pause:
        prompt: "AAP project name"
      register: bootstrap_generate_env_vars_prompt_aap_project

    - name: Ask AAP project Git URL
      ansible.builtin.pause:
        prompt: "AAP project Git URL"
      register: bootstrap_generate_env_vars_prompt_aap_project_scm_url

    - name: Ask AAP project Git branch
      ansible.builtin.pause:
        prompt: >-
          AAP project Git branch
          [{{ bootstrap_generate_env_vars_default_git_branch
              | default('main') }}]
      register: bootstrap_generate_env_vars_prompt_aap_project_scm_branch

    - name: Ask AAP project Git token
      ansible.builtin.pause:
        prompt: "AAP project Git token [blank to skip]"
        echo: false
      register: bootstrap_generate_env_vars_prompt_aap_project_scm_token
      when:
        - bootstrap_generate_env_vars_preflight is not defined
        - generate_playbook_repo_git_push | default(true) | bool

    - name: Ask whether to auto push generated repo
      ansible.builtin.pause:
        prompt: "Automatically commit and push generated repo to Git? [y/N]"
      register: bootstrap_generate_env_vars_prompt_git_auto_push
      when:
        - bootstrap_generate_env_vars_preflight is not defined

    - name: Ask AAP default execution environment
      ansible.builtin.pause:
        prompt: "AAP default execution environment [ee-supported-rhel9]"
      register: bootstrap_generate_env_vars_prompt_aap_ee

    - name: Ask AAP vault credential name
      ansible.builtin.pause:
        prompt: "AAP vault credential name"
      register: bootstrap_generate_env_vars_prompt_aap_vault_cred

    - name: Ask whether to enable Jira
      ansible.builtin.pause:
        prompt: "Enable Jira issue tracker? [y/N]"
      register: bootstrap_generate_env_vars_prompt_enable_jira

    - name: Set Jira enabled answer
      ansible.builtin.set_fact:
        bootstrap_generate_env_vars_enable_jira: >-
          {{
            (bootstrap_generate_env_vars_prompt_enable_jira.user_input
             | default('n', true)
             | lower)
            in ['y', 'yes']
          }}

    - name: Ask Jira questions
      when: bootstrap_generate_env_vars_enable_jira | bool
      block:
        - name: Ask Jira URL
          ansible.builtin.pause:
            prompt: "Jira URL"
          register: bootstrap_generate_env_vars_prompt_jira_url

        - name: Ask Jira project key
          ansible.builtin.pause:
            prompt: "Jira project key"
          register: bootstrap_generate_env_vars_prompt_jira_project_key

        - name: Ask Jira custom AC field
          ansible.builtin.pause:
            prompt: "Jira custom AC field [blank for null]"
          register: bootstrap_generate_env_vars_prompt_jira_custom_ac_field

        - name: Ask whether to enable Jira subtasks
          ansible.builtin.pause:
            prompt: "Enable Jira subtasks? [Y/n]"
          register: bootstrap_generate_env_vars_prompt_jira_create_subtasks

        - name: Ask Jira templates directory
          ansible.builtin.pause:
            prompt: "Jira templates dir [blank for null]"
          register: bootstrap_generate_env_vars_prompt_jira_templates_dir

        - name: Ask Jira username
          ansible.builtin.pause:
            prompt: "Jira username"
          register: bootstrap_generate_env_vars_prompt_jira_username

        - name: Ask Jira token
          ansible.builtin.pause:
            prompt: "Jira token"
            echo: false
          register: bootstrap_generate_env_vars_prompt_jira_token

- name: Normalize AAP version interactive
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_aap_version_number: >-
      {% set v = (bootstrap_generate_env_vars_prompt_aap_version.user_input
                  | default('2.6', true)
                  | replace(',', '.')
                  | trim) %}
      {% if v == '2.4' %}
      24
      {% elif v == '2.5' %}
      25
      {% elif v == '2.6' %}
      26
      {% elif v == '2.7' %}
      27
      {% else %}
      26
      {% endif %}
  when:
    - bootstrap_generate_env_vars_use_aap | bool

- name: Write AAP config vars
  ansible.builtin.template:
    src: aap_config_vars.yml.j2
    dest: "{{ bootstrap_generate_env_vars_env_dir }}/aap_config_vars.yml"
    mode: "0644"
    force: >-
      {{
        bootstrap_generate_env_vars_force | bool
        or bootstrap_generate_env_vars_preflight is defined
      }}
  when:
    - bootstrap_generate_env_vars_use_aap | bool

- name: Write AAP vault vars
  ansible.builtin.template:
    src: aap_vault.yml.j2
    dest: "{{ bootstrap_generate_env_vars_env_dir }}/aap_vault.yml"
    mode: "0600"
    force: >-
      {{
        bootstrap_generate_env_vars_force | bool
        or bootstrap_generate_env_vars_preflight is defined
      }}
  when:
    - bootstrap_generate_env_vars_use_aap | bool

- name: Write machine credential vault vars
  ansible.builtin.template:
    src: vault_machine_cred.yml.j2
    dest: "{{ bootstrap_generate_env_vars_env_dir }}/vault_machine_cred.yml"
    mode: "0600"
    force: >-
      {{
        bootstrap_generate_env_vars_force | bool
        or bootstrap_generate_env_vars_preflight is defined
      }}
  when:
    - bootstrap_generate_env_vars_use_aap | bool

- name: Write Jira vault file
  ansible.builtin.template:
    src: vault_jira.yml.j2
    dest: "{{ bootstrap_generate_env_vars_env_dir }}/vault_jira.yml"
    mode: "0600"
    force: >-
      {{
        bootstrap_generate_env_vars_force | bool
        or bootstrap_generate_env_vars_preflight is defined
      }}
  when:
    - bootstrap_generate_env_vars_use_aap | bool
    - bootstrap_generate_env_vars_enable_jira | default(false) | bool

- name: Set vault encryption from preflight JSON
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_encrypt_vault_files: >-
      {{
        (
          bootstrap_generate_env_vars_preflight.vault
          | default({})
        ).encrypt
        | default(bootstrap_generate_env_vars_encrypt_vault_files)
        | bool
      }}
  when: bootstrap_generate_env_vars_preflight is defined

- name: Set provided vault password file
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_effective_vault_password_file: >-
      {{
        bootstrap_generate_env_vars_vault_password_file
        | default(generate_env_vars_vault_password_file | default(''), true)
      }}
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - >-
      (
        bootstrap_generate_env_vars_vault_password_file
        | default(generate_env_vars_vault_password_file | default(''), true)
        | string
        | length
      ) > 0

- name: Ask whether to encrypt generated vault files
  ansible.builtin.pause:
    prompt: "Encrypt generated vault files with ansible-vault? [Y/n]"
  register: bootstrap_generate_env_vars_prompt_encrypt_vault_files
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files is not defined
    - bootstrap_generate_env_vars_preflight is not defined

- name: Set vault encryption answer
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_encrypt_vault_files: >-
      {{
        (bootstrap_generate_env_vars_prompt_encrypt_vault_files.user_input
         | default('y', true)
         | lower)
        not in ['n', 'no']
      }}
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files is not defined
    - bootstrap_generate_env_vars_preflight is not defined

- name: Ask for vault password when encrypting vault files
  ansible.builtin.pause:
    prompt: "Vault password"
    echo: false
  register: bootstrap_generate_env_vars_prompt_vault_password
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_preflight is not defined
    - bootstrap_generate_env_vars_effective_vault_password_file is not defined

- name: Set preflight vault password
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_preflight_vault_password: >-
      {{
        (
          bootstrap_generate_env_vars_preflight.vault
          | default({})
        ).password
        | default(
            (
              bootstrap_generate_env_vars_preflight.aap
              | default({})
            ).vault_password
            | default(
                bootstrap_generate_env_vars_preflight.vault_password
                | default(''),
                true
              ),
            true
          )
      }}
  no_log: true
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_preflight is defined
    - bootstrap_generate_env_vars_effective_vault_password_file is not defined

- name: Ensure vault password is available for preflight encryption
  ansible.builtin.assert:
    that:
      - >-
          bootstrap_generate_env_vars_preflight_vault_password
          | default('')
          | length > 0
    fail_msg: >-
      Vault encryption is enabled, but no vault password was provided. Set
      preflight vault.password, aap.vault_password, vault_password, or pass
      bootstrap_generate_env_vars_vault_password_file.
  no_log: true
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_preflight is defined
    - bootstrap_generate_env_vars_effective_vault_password_file is not defined

- name: Create temporary vault password file
  ansible.builtin.tempfile:
    state: file
    suffix: vault-pass
  register: bootstrap_generate_env_vars_temp_vault_password_file
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_effective_vault_password_file is not defined

- name: Write temporary vault password file
  ansible.builtin.copy:
    dest: "{{ bootstrap_generate_env_vars_temp_vault_password_file.path }}"
    content: >-
      {{
        bootstrap_generate_env_vars_preflight_vault_password
        | default(bootstrap_generate_env_vars_prompt_vault_password.user_input)
      }}
    mode: "0600"
  no_log: true
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_effective_vault_password_file is not defined

- name: Set temporary vault password file
  ansible.builtin.set_fact:
    bootstrap_generate_env_vars_effective_vault_password_file: >-
      {{ bootstrap_generate_env_vars_temp_vault_password_file.path }}
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_effective_vault_password_file is not defined

- name: Find generated vault files
  ansible.builtin.find:
    paths: "{{ bootstrap_generate_env_vars_env_dir }}"
    patterns: "vault*.yml,*_vault.yml"
    file_type: file
  register: bootstrap_generate_env_vars_vault_files
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool

- name: Check generated vault file encryption state
  ansible.builtin.command:
    cmd: "head -n 1 {{ item.path }}"
  loop: "{{ bootstrap_generate_env_vars_vault_files.files | default([]) }}"
  register: bootstrap_generate_env_vars_vault_file_headers
  changed_when: false
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool

- name: Encrypt generated vault files
  ansible.builtin.shell: |
    set -euo pipefail
    ansible-vault encrypt "{{ item.item.path }}" \
      --vault-password-file \
      "{{ bootstrap_generate_env_vars_effective_vault_password_file }}"
  args:
    executable: /bin/bash
  loop: >-
    {{
      bootstrap_generate_env_vars_vault_file_headers.results
      | default([])
    }}
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - item.stdout is not search('^\\$ANSIBLE_VAULT;')
  changed_when: true

- name: Remove temporary vault password file
  ansible.builtin.file:
    path: "{{ bootstrap_generate_env_vars_temp_vault_password_file.path }}"
    state: absent
  when:
    - bootstrap_generate_env_vars_encrypt_vault_files | bool
    - bootstrap_generate_env_vars_temp_vault_password_file.path is defined
