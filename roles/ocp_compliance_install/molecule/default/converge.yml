---
- name: Converge ocp_compliance_install role
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    ocp_compliance_install_enable_live_checks: >-
      {{
        (lookup('env', 'OCP_COMPLIANCE_INSTALL_ENABLE_LIVE_CHECKS')
        | default('false', true)) | bool
      }}

  tasks:
    - name: Explain live-check toggle
      ansible.builtin.debug:
        msg: >-
          ocp_compliance_install execution is skipped by default in Molecule.
          Set OCP_COMPLIANCE_INSTALL_ENABLE_LIVE_CHECKS=true to run live checks.
      when: not ocp_compliance_install_enable_live_checks

    - name: Run ocp_compliance_install role with live checks enabled
      ansible.builtin.include_role:
        name: infra.ado.ocp_compliance_install
      vars:
        ocp_compliance_install_operator_namespace: >-
          {{ lookup('env', 'OCP_COMPLIANCE_INSTALL_OPERATOR_NAMESPACE') | default('openshift-compliance', true) }}
      when: ocp_compliance_install_enable_live_checks
