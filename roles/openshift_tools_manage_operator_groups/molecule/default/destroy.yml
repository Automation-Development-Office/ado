---
- name: Destroy — remove resources
  hosts: localhost
  gather_facts: false
  module_defaults:
    kubernetes.core.k8s:
      validate_certs: false
    kubernetes.core.k8s_info:
      validate_certs: false
  vars:
    name_space: test-namespace-molecule
    openshift_tools_operator_groups: test-openshift_tools_operator_groups-molecule
    present: absent
  tasks:
    - name: Include the role under test
      ansible.builtin.include_role:
        name: ado.openshift.namespace
      vars:
        state: absent
    - name: Include the role under test
      ansible.builtin.include_role:
        name: ado.openshift.openshift_tools_operator_groups
      vars:
        state: absent

    # ⬇️ Post-create check (no separate verify step needed)
    # ---- Verify openshift_tools_operator_groups removal ----
    - name: Wait for openshift_tools_operator_groups to be deleted
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1
        kind: openshift_tools_operator_groups
        name: "{{ openshift_tools_operator_groups }}"
        namespace: "{{ name_space }}"
        validate_certs: "{{ k8s_validate_certs | default(false) }}" # set true if you trust the CA
      register: openshift_tools_manage_operator_groups_og_gone
      failed_when: false # tolerate NotFound / namespace gone
      until: (openshift_tools_manage_operator_groups_og_gone.resources | default([])) | length == 0
      retries: 12
      delay: 5

    - name: Assert openshift_tools_operator_groups deleted
      ansible.builtin.assert:
        that:
          - (openshift_tools_manage_operator_groups_og_gone.resources | default([])) | length == 0
        success_msg: >-
          ✅ k8s confirms openshift_tools_operator_groups '{{ openshift_tools_operator_groups }}' is not present in namespace '{{ name_space }}'.
        fail_msg: >-
          ❌ openshift_tools_operator_groups '{{ openshift_tools_operator_groups }}' still present in namespace '{{ name_space }}'
          (found {{ (openshift_tools_manage_operator_groups_og_gone.resources | default([])) | length }} result(s)).

    # ---- Optional: verify the namespace is gone too ----
    - name: Check namespace after deletion (optional)
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ name_space }}"
        validate_certs: "{{ k8s_validate_certs | default(false) }}"
      register: openshift_tools_manage_operator_groups_ns_after
      failed_when: false

    - name: Report namespace state (optional)
      ansible.builtin.debug:
        msg: >-
          {{ (openshift_tools_manage_operator_groups_ns_after.resources | default([])) | length == 0
              | ternary("ℹ️ Namespace '" ~ name_space ~ "' is gone.",
                        "ℹ️ Namespace '" ~ name_space ~ "' still exists.") }}
