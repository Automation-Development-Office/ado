- name: Check if operator namespace exists (delete guard)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ name_space }}"
  register: operatorgroup_op_ns
  failed_when: false
  when: (state | default('present')) == 'absent'

- name: Check if OperatorGroup exists (delete guard)
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    name: "{{ operatorgroup }}"
    namespace: "{{ name_space }}"
  register: operatorgroup_og
  failed_when: false
  when:
    - (state | default('present')) == 'absent'
    - (operatorgroup_op_ns.resources | default([])) | length == 1

- name: Delete OperatorGroup when present
  kubernetes.core.k8s:
    state: absent
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    name: "{{ operatorgroup }}"
    namespace: "{{ name_space }}"
  when:
    - (state | default('present')) == 'absent'
    - (operatorgroup_op_ns.resources | default([])) | length == 1
    - (operatorgroup_og.resources | default([])) | length == 1

- name: Note already-absent state
  ansible.builtin.debug:
    msg: >-
      {{
        (operatorgroup_op_ns.resources | default([])) | length == 0
          | ternary("ℹ️ Namespace '" ~ name_space ~ "' already absent; OperatorGroup implicitly absent.",
                    "ℹ️ OperatorGroup '" ~ operatorgroup ~ "' already absent in namespace '" ~ name_space ~ "'.")
      }}
  when:
    - (state | default('present')) == 'absent'
    - (operatorgroup_op_ns.resources | default([])) | length == 0
      or (operatorgroup_og.resources | default([])) | length == 0

- name: Confirm OperatorGroup is gone (final check)
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1
    kind: OperatorGroup
    name: "{{ operatorgroup }}"
    namespace: "{{ name_space }}"
  register: operatorgroup_gone
  failed_when: false
  when: (state | default('present')) == 'absent'

- name: Assert OperatorGroup deleted
  ansible.builtin.assert:
    that:
      - (operatorgroup_gone.resources | default([])) | length == 0
    success_msg: "✅ k8s confirms OperatorGroup '{{ operatorgroup }}' is not present in namespace '{{ name_space }}'."
    fail_msg: "❌ OperatorGroup '{{ operatorgroup }}' still present in namespace '{{ name_space }}'."
  when: (state | default('present')) == 'absent'
