- name: Query cluster health
  ansible.builtin.uri:
    url: "{{ applications_elastic_url }}/_cluster/health"
    method: GET
    return_content: true
    force_basic_auth: "{{ applications_elastic_user != '' }}"
    url_username: "{{ applications_elastic_user | default(omit) }}"
    url_password: "{{ applications_elastic_pass | default(omit) }}"
    status_code: 200
  register: elastic_health
  failed_when: elastic_health.status != 200

- name: Show health summary
  ansible.builtin.debug:
    msg:
      status: "{{ elastic_health.json.status }}"
      relocating_shards: "{{ elastic_health.json.relocating_shards }}"
      initializing_shards: "{{ elastic_health.json.initializing_shards }}"
      unassigned_shards: "{{ elastic_health.json.unassigned_shards }}"
      number_of_nodes: "{{ elastic_health.json.number_of_nodes }}"
      active_primary_shards: "{{ elastic_health.json.active_primary_shards }}"
