- name: Add IdM configure replica entry
  ansible.builtin.assert:
    that:
      - idm_configure_replica_state | default('present') in ["present", "absent"]
      - idm_configure_replica_hostname | default('') | length > 0
      - idm_configure_replica_domain | default('') | length > 0
      - idm_configure_replica_realm | default('') | length > 0
      - idm_configure_replica_server | default('') | length > 0
      - idm_configure_replica_state | default('present') == "absent" or idm_configure_replica_dm_password | default('') | length > 0
      - idm_configure_replica_state | default('present') == "absent" or idm_configure_replica_admin_password | default('') | length > 0
    fail_msg: >-
      Invalid idm_configure_replica inputs. For present state, provide
      idm_configure_replica_hostname, idm_configure_replica_domain, idm_configure_replica_realm,
      idm_configure_replica_server, idm_configure_replica_admin_password, and
      idm_configure_replica_dm_password.
    success_msg: idm_configure_replica input validation passed.

- name: Add IdM configure replica entry
  ansible.builtin.import_tasks: install-idm-configure-replica.yml
