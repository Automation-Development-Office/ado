- name: Add IdM configure replica entry
  ansible.builtin.assert:
    that:
      - idm_configure_replica_state in ["present", "absent"]
      - idm_configure_replica_hostname | length > 0
      - idm_configure_replica_domain | length > 0
      - idm_configure_replica_realm | length > 0
      - idm_configure_replica_server | length > 0
      - idm_configure_replica_state == "absent" or idm_configure_replica_dm_password | length > 0
      - idm_configure_replica_state == "absent" or idm_configure_replica_admin_password | length > 0
    fail_msg: >-
      Invalid idm_configure_replica inputs. For present state, provide
      idm_configure_replica_hostname, idm_configure_replica_domain, idm_configure_replica_realm,
      idm_configure_replica_server, idm_configure_replica_admin_password, and
      idm_configure_replica_dm_password.
    success_msg: idm_configure_replica input validation passed.

- name: Add IdM configure replica entry
  ansible.builtin.import_tasks: install-idm-configure-replica.yml
