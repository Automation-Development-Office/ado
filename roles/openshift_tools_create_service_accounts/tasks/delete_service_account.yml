# roles/ado.openshift/service_accounts/tasks/delete_service_account.yml
---
# Included per item as `sa`
- name: Assert per-item inputs (delete)
  ansible.builtin.assert:
    that:
      - sa is defined
      - sa.service_account is defined
    fail_msg: "delete_service_account.yml requires 'sa.service_account'."

# Resolve namespaces like in create
- name: Ensure openshift_tools_create_service_accounts_exclude_namespaces exists
  ansible.builtin.set_fact:
    openshift_tools_create_service_accounts_exclude_namespaces: "{{ openshift_tools_create_service_accounts_exclude_namespaces | default([]) }}"

- name: Use provided target_namespaces if available
  ansible.builtin.set_fact:
    openshift_tools_create_service_accounts_target_namespaces: "{{ target_namespaces }}"
  when: target_namespaces is defined

- name: Gather all namespaces (only when name_space == 'all' and target_namespaces not provided)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
  register: openshift_tools_create_service_accounts_all_ns
  when:
    - openshift_tools_create_service_accounts_target_namespaces is not defined
    - name_space | lower == 'all'

- name: Compute namespaces to operate on
  ansible.builtin.set_fact:
    openshift_tools_create_service_accounts_target_namespaces: >-
      {{
        (
          openshift_tools_create_service_accounts_all_ns.resources | default([]) | map(attribute='metadata.name')
          | reject('in', openshift_tools_create_service_accounts_exclude_namespaces) | list
        )
        if (openshift_tools_create_service_accounts_target_namespaces is not defined and (name_space | lower == 'all'))
        else (openshift_tools_create_service_accounts_target_namespaces | default([ name_space ]))
      }}

# Normalize role/scope/SCC list
- name: Normalize role/scope/SCC list
  ansible.builtin.set_fact:
    openshift_tools_create_service_accounts_role_kind: "{{ sa.role_kind | default('ClusterRole') }}"
    openshift_tools_create_service_accounts_bind_scope: >-
      {{ sa.bind_scope | default('cluster' if (sa.role_kind | default('ClusterRole')) == 'ClusterRole' else 'namespace') }}
    openshift_tools_create_service_accounts_sccs: >-
      {{
        (
          ([sa.scc_context]  if (sa.scc_context  is defined and sa.scc_context  not in ['none','', None]) else [])
          + (sa.scc_contexts | default([]))
          + ([sa.css_context] if (sa.css_context is defined and sa.css_context not in ['none','', None]) else [])
        ) | unique
      }}

# Delete RBAC for the role
- name: Delete ClusterRoleBinding(s) (pattern-based)
  when:
    - sa.role is defined
    - sa.role | length > 0
    - openshift_tools_create_service_accounts_bind_scope == 'cluster'
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "rb-{{ sa.service_account }}-{{ ns }}-{{ (sa.role | replace(':', '-')) }}"
  loop: "{{ openshift_tools_create_service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "crb: rb-{{ sa.service_account }}-{{ ns }}-{{ (sa.role | replace(':', '-')) }}"

- name: Delete RoleBinding(s) (namespace-scope)
  when:
    - sa.role is defined
    - sa.role | length > 0
    - openshift_tools_create_service_accounts_bind_scope == 'namespace'
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "rb-{{ sa.service_account }}-{{ ns }}-{{ (sa.role | replace(':', '-')) }}"
        namespace: "{{ ns }}"
  loop: "{{ openshift_tools_create_service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "rb: {{ ns }}/rb-{{ sa.service_account }}-{{ ns }}-{{ (sa.role | replace(':', '-')) }}"

# Delete SCC RoleBindings
- name: Delete SCC RoleBindings
  when: openshift_tools_create_service_accounts_sccs | length > 0
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "use-{{ scc }}-scc-{{ sa.service_account }}"
        namespace: "{{ ns }}"
  loop: "{{ query('nested', openshift_tools_create_service_accounts_target_namespaces, openshift_tools_create_service_accounts_sccs) }}"
  loop_control:
    label: "rb: {{ item.0 }}/use-{{ item.1 }}-scc-{{ sa.service_account }}"
  vars:
    ns: "{{ item.0 }}"
    scc: "{{ item.1 }}"

# Delete manually created token Secret (best-effort)
- name: Delete ServiceAccount token Secret (best-effort)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: "{{ sa.service_account }}-token"
    namespace: "{{ ns }}"
  loop: "{{ openshift_tools_create_service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "secret: {{ ns }}/{{ sa.service_account }}-token"
  no_log: true

# Delete the ServiceAccount
- name: Delete ServiceAccount
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ sa.service_account }}"
        namespace: "{{ ns }}"
  loop: "{{ openshift_tools_create_service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "sa: {{ ns }}/{{ sa.service_account }}"
