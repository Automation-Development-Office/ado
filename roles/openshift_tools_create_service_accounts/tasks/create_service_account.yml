---

- name: Assert per-item inputs
  ansible.builtin.assert:
    that:
      - sa is defined
      - sa.service_account is defined
      - (sa.state | default(state | default('present'))) in ['present','absent']
    fail_msg: "Each item must have service_account; optional state must be present|absent."

- name: Ensure service_accounts_exclude_namespaces exists
  ansible.builtin.set_fact:
    service_accounts_exclude_namespaces: "{{ service_accounts_exclude_namespaces | default(exclude_namespaces | default([])) }}"

# Resolve namespaces only if caller didn't pass target_namespaces
- name: Use provided target_namespaces if available
  ansible.builtin.set_fact:
    service_accounts_target_namespaces: "{{ target_namespaces }}"
  when: target_namespaces is defined

- name: Gather all namespaces (only when name_space == 'all' and target_namespaces not provided)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
  register: service_accounts_all_ns
  when:
    - service_accounts_target_namespaces is not defined
    - name_space | lower == 'all'

- name: Compute namespaces to operate on
  ansible.builtin.set_fact:
    service_accounts_target_namespaces: >-
      {{
        (
          service_accounts_all_ns.resources | default([]) | map(attribute='metadata.name')
          | reject('in', service_accounts_exclude_namespaces) | list
        )
        if (service_accounts_target_namespaces is not defined and (name_space | lower == 'all'))
        else (service_accounts_target_namespaces | default([ name_space ]))
      }}

# Normalize state & SCC list for this SA
- name: Normalize per-item state and SCC list
  ansible.builtin.set_fact:
    service_accounts_sa_state: "{{ sa.state | default(state | default('present')) }}"
    service_accounts_sccs: >-
      {{
        (
          ([sa.scc_context]  if (sa.scc_context  is defined and sa.scc_context  not in ['none','', None]) else [])
          + (sa.scc_contexts | default([]))
          + ([sa.css_context] if (sa.css_context is defined and sa.css_context not in ['none','', None]) else [])
        ) | unique
      }}

# Ensure ServiceAccount
- name: Ensure ServiceAccount is in each namespace
  kubernetes.core.k8s:
    state: "{{ service_accounts_sa_state }}"
    namespace: "{{ ns }}"
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ sa.service_account }}"
    validate_certs: "{{ verify_cert | default(true) }}"
  loop: "{{ service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "{{ ns }}/sa/{{ sa.service_account }} [state: {{ service_accounts_sa_state }}]"

# RBAC bindings
- name: Cluster-scope RBAC (ClusterRoleBinding) for {{ sa.service_account }}
  vars:
    role_kind: "{{ sa.role_kind | default('ClusterRole') }}"
    bind_scope: "{{ sa.bind_scope | default('cluster' if role_kind == 'ClusterRole' else 'namespace') }}"
    rb_name: "rb-{{ sa.service_account }}-{{ ns }}-{{ (sa.role | default('') | replace(':', '-')) }}"
  when:
    - sa.role is defined
    - sa.role | length > 0
    - bind_scope == 'cluster'
  kubernetes.core.k8s:
    state: "{{ service_accounts_sa_state }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "{{ rb_name }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: "{{ role_kind }}"
        name: "{{ sa.role }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ sa.service_account }}"
          namespace: "{{ ns }}"
    validate_certs: "{{ verify_cert | default(true) }}"
  loop: "{{ service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "{{ ns }}/crb/{{ sa.service_account }} -> {{ sa.role }} ({{ service_accounts_sa_state }})"

- name: Namespace-scope RBAC (RoleBinding) for {{ sa.service_account }}
  vars:
    role_kind: "{{ sa.role_kind | default('Role') }}"
    bind_scope: "{{ sa.bind_scope | default('namespace') }}"
    rb_name: "rb-{{ sa.service_account }}-{{ ns }}-{{ (sa.role | default('') | replace(':', '-')) }}"
  when:
    - sa.role is defined
    - sa.role | length > 0
    - bind_scope == 'namespace'
  kubernetes.core.k8s:
    state: "{{ service_accounts_sa_state }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ rb_name }}"
        namespace: "{{ ns }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: "{{ role_kind }}"
        name: "{{ sa.role }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ sa.service_account }}"
          namespace: "{{ ns }}"
    validate_certs: "{{ verify_cert | default(true) }}"
  loop: "{{ service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "{{ ns }}/rb/{{ sa.service_account }} -> {{ sa.role }} ({{ service_accounts_sa_state }})"

# SCC grants
- name: Grant SCCs to service account in each namespace
  kubernetes.core.k8s:
    state: "{{ service_accounts_sa_state }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "use-{{ item.1 }}-scc-{{ sa.service_account }}"
        namespace: "{{ item.0 }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "system:openshift:scc:{{ item.1 }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ sa.service_account }}"
          namespace: "{{ item.0 }}"
    validate_certs: "{{ verify_cert | default(true) }}"
  loop: "{{ service_accounts_target_namespaces | product(service_accounts_sccs) | list }}"
  loop_control:
    label: "{{ item.0 }}/scc/{{ item.1 }} -> {{ sa.service_account }} ({{ service_accounts_sa_state }})"

# Token handling (create/export only when present & token: true)
- name: Decide if token is requested for {{ sa.service_account }}
  no_log: true
  ansible.builtin.set_fact:
    service_accounts_want_token: "{{ (sa.token | default(false)) | bool and service_accounts_sa_state == 'present' }}"

- name: Create token Secret for {{ sa.service_account }}
  when: service_accounts_want_token
  no_log: true
  kubernetes.core.k8s:
    state: present
    namespace: "{{ ns }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ sa.service_account }}-token"
        annotations:
          kubernetes.io/service-account.name: "{{ sa.service_account }}"
      type: kubernetes.io/service-account-token
    validate_certs: "{{ verify_cert | default(true) }}"
  loop: "{{ service_accounts_target_namespaces }}"
  loop_control:
    loop_var: ns
    label: "{{ ns }}/secret/{{ sa.service_account }}-token"

# Wait for token (loop over namespaces) -> yields service_accounts_sa_secret.results
- name: Wait for token to be populated for {{ sa.service_account }}
  when: service_accounts_want_token
  no_log: true
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ sa.service_account }}-token"
    namespace: "{{ ns }}"
    validate_certs: "{{ verify_cert | default(true) }}"
  register: service_accounts_sa_secret
  until: service_accounts_sa_secret.resources | length > 0 and
         (service_accounts_sa_secret.resources[0].data is defined) and
         (service_accounts_sa_secret.resources[0].data.token | default('')) | length > 0
  retries: 15
  delay: 2
  loop: "{{ service_accounts_target_namespaces }}"   # <-- FIXED
  loop_control:
    loop_var: ns
    label: "{{ ns }}/secret/{{ sa.service_account }}-token"

# Init token aggregator
- name: Init token aggregator (once)
  when: service_accounts_want_token
  no_log: true
  ansible.builtin.set_fact:
    service_accounts_tokens: "{{ service_accounts_tokens | default({}) }}"

# Aggregate from service_accounts_sa_secret.results; use metadata.namespace instead of item.item
- name: Aggregate bearer token(s)
  when: service_accounts_want_token
  no_log: true
  # remove no_log while debugging; re-enable later if you like
  ansible.builtin.set_fact:
    service_accounts_tokens: >-
      {{
        service_accounts_tokens | default({}) | combine({
          (item.resources[0].metadata.namespace): (
            service_accounts_tokens.get(item.resources[0].metadata.namespace, {}) | combine({
              sa.service_account: (item.resources[0].data.token | b64decode)
            })
          )
        }, recursive=True)
      }}
  loop: >-
    {{
      (service_accounts_sa_secret.results | default([]))
      | selectattr('resources', 'defined')
      | rejectattr('resources', 'equalto', [])
      | list
    }}
  loop_control:
    label: "{{ item.resources[0].metadata.namespace }}/token/{{ sa.service_account }}"

# Build the allow-list from service_accounts where token: true
- name: Build SA allow-list for printing
  ansible.builtin.set_fact:
    service_accounts_print_allow: >-
      {{ service_accounts
         | selectattr('token','defined')
         | selectattr('token','equalto', true)
         | map(attribute='service_account')
         | list }}

# Render lines for only those SAs with token: true
- name: Print SA tokens to screen (driven by per-item token)
  when:
    - service_accounts_tokens | default({}) | length > 0
    - service_accounts_print_allow | length > 0
  no_log: true
  vars:
    _token_lines: |-
      {% for ns, sdict in service_accounts_tokens.items() -%}
      {% for sa_name, token in sdict.items() -%}
      {% if sa_name in service_accounts_print_allow -%}
      {{ ns }}/{{ sa_name }}: {{ token }}
      {% endif -%}
      {% endfor -%}
      {% endfor -%}
  ansible.builtin.debug:
    msg: "{{ _token_lines }}"
