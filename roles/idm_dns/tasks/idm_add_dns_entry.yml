- name: Add A record to IdM DNS using redhat.rhel_idm.dnsrecord
  redhat.rhel_idm.dnsrecord:
    ipa_host: "{{ idm_dns_ipa_host }}"
    ipa_user: "{{ idm_dns_ipa_user }}"
    ipa_pass: "{{ idm_dns_ipa_pass }}"
    validate_certs: "{{ idm_dns_validate_certs }}"
    zone_name: "{{ idm_dns_zone }}"
    record_name: "{{ idm_dns_record }}"
    state: "{{ idm_dns_state }}"
    arecord:
      - "{{ idm_dns_ip_address }}"
    record_ttl: "{{ idm_dns_record_ttl }}"
  no_log: true
