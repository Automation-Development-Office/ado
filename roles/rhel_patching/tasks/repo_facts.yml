---

- name: Obtaining Repo Information
  ansible.builtin.command:
    cmd: "dnf repolist"
  register: rhel_patching_repo_facts
  changed_when: false

- name: (debug) Show rhel_patching_yum_repo
  ansible.builtin.debug:
    var: rhel_patching_repo_facts.stdout_lines
    verbosity: 1
  when: rhel_patching_repo_facts is defined
