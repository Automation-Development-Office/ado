---


# - name: Inform about unsupported OS
#   ansible.builtin.debug:
#     msg: "RHEL{{ ansible_distribution_major_version }} is out-of-support and will not be registered."
#   when: ansible_distribution_major_version | int < 8

# - name: Stop playbook for unsupported RHEL
#   ansible.builtin.meta: end_host
#   when: ansible_distribution_major_version | int < 8

- name: Gather facts (when not defined)
  ansible.builtin.setup:
    gather_subset:
      - distribution
      - hardware
  when:
    - ansible_facts['distribution_major_version'] is not defined or
      ansible_facts['uptime_seconds'] is not defined

- name: Fail if unsupported RHEL version is detected (Out of Support)
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "RedHat"
      - (ansible_facts['distribution_major_version'] | int >= 8)
    fail_msg: "RHEL{{ ansible_facts['distribution_major_version'] }} and earlier machines are out-of-support and will not be patched."
    success_msg: "RHEL{{ ansible_facts['distribution_major_version'] }} detected. Proceeding with patching."


- name: Obtain Information on Repositories
  ansible.builtin.include_tasks: repo_facts.yml

- name: Register pre-patching statistics
  ansible.builtin.set_fact:
    rhel_patching_pre_kernel: "{{ ansible_kernel }}"
    rhel_patching_pre_uptime: "{{ (ansible_facts.uptime_seconds / 86400) | round }}"

- name: Normalize patching package inputs
  ansible.builtin.set_fact:
    rhel_patching_package_list_effective: >-
      {{
        (
          rhel_patching_package_list
          if rhel_patching_package_list is not string
          else (
            rhel_patching_package_list
            | regex_replace('\r', '')
            | split('\n')
            | map('trim')
            | reject('equalto', '')
            | map('split', ',')
            | flatten
            | map('trim')
            | reject('equalto', '')
            | list
          )
        )
        | default(['*'], true)
      }}
    rhel_patching_exclude_list_effective: >-
      {{
        (
          rhel_patching_exclude_list
          if rhel_patching_exclude_list is not string
          else (
            rhel_patching_exclude_list
            | regex_replace('\r', '')
            | split('\n')
            | map('trim')
            | reject('equalto', '')
            | map('split', ',')
            | flatten
            | map('trim')
            | reject('equalto', '')
            | list
          )
        )
        | default([], true)
      }}
    rhel_patching_disable_repos_effective: >-
      {{
        (
          rhel_patching_disable_repos
          if rhel_patching_disable_repos is not string
          else (
            rhel_patching_disable_repos
            | regex_replace('\r', '')
            | split('\n')
            | map('trim')
            | reject('equalto', '')
            | map('split', ',')
            | flatten
            | map('trim')
            | reject('equalto', '')
            | list
          )
        )
        | default([], true)
      }}

- name: Cleanup package cache
  ansible.builtin.dnf:
    update_cache: "{{ rhel_patching_update_cache | bool }}"

- name: Remove old kernels from /boot
  ansible.builtin.dnf:
    name: kernel
    state: absent
    autoremove: true
    exclude: "kernel-{{ ansible_kernel }}"
  when: rhel_patching_package_cleanup | bool

- name: Obtain Information on Installed Packages
  ansible.builtin.include_tasks: package_facts.yml

- name: Display Number of of patches needed
  ansible.builtin.debug:
    msg: "Number of Updates: {{ rhel_patching_yum_updates.results | map(attribute='envra') | list | length }}"

- name: Updating packages with dnf
  ansible.builtin.dnf:
    name: "{{ rhel_patching_package_list_effective | default(['*']) }}"
    state: "{{ rhel_patching_versions }}"
    exclude: "{{ rhel_patching_exclude_list_effective }}"
    disablerepo: "{{ rhel_patching_disable_repos_effective }}"
    skip_broken: "{{ rhel_patching_skip_broken }}"
  register: rhel_patching_yum_patch
  when:
    - rhel_patching_package_list_effective is defined
    - rhel_patching_package_list_effective | length > 0

- name: (debug) Show rhel_patching_yum_patch
  ansible.builtin.debug:
    var: rhel_patching_yum_patch.results
    verbosity: 1
  when: rhel_patching_yum_patch is defined

- name: Reboot if needed or requested
  ansible.builtin.include_tasks: reboot.yml
  when: rhel_patching_reboot | bool  and rhel_patching_yum_patch.changed|default(false)

- name: Obtain Information on Installed Packages
  ansible.builtin.include_tasks: package_facts.yml

- name: Display Number of of patches needed
  ansible.builtin.debug:
    msg: "Number of Updates: {{ rhel_patching_yum_updates.results | map(attribute='envra') | list | length }}"

- name: Display Patching Statistics (When rebooted)
  ansible.builtin.debug:
    msg:
      - "Pre-patch Uptime: {{ rhel_patching_pre_uptime }} days"
      - "Post-patch Uptime: {{ rhel_patching_post_uptime }} days"
      - "Pre-Kernel Version: {{ rhel_patching_pre_kernel }}"
      - "Post-Kernel Version: {{ rhel_patching_post_kernel }}"
  when: rhel_patching_post_uptime is defined and rhel_patching_post_kernel is defined
