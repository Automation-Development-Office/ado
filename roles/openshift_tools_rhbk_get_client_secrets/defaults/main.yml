---
# Role: openshift_install_rhbk_get_client_secret

# Which client to fetch
openshift_tools_rhbk_get_client_secrets_client_key: "" # e.g. "openshift_install_grafana_client" (key under openshift_install_rhbk_clients dict)
openshift_tools_rhbk_get_client_secrets_client_id: "" # e.g. "grafana" or "openshift-prod" (Keycloak clientId)

# If provided, set this variable name with the fetched secret (example: openshift_install_grafana_oidc_client_secret)
openshift_tools_rhbk_get_client_secrets_set_var_name: ""

# Don’t clobber if var already exists (keeps precedence contract)
openshift_tools_rhbk_get_client_secrets_do_not_override_existing: true

# TLS verification for Keycloak API calls
openshift_tools_rhbk_get_client_secrets_validate_certs: false

# If you have a route for Keycloak that requires /auth or not, adjust base path:
# In modern Keycloak (incl. RHBK), admin endpoints are /admin/realms/<realm>/...
openshift_tools_rhbk_get_client_secrets_base_path: "" # leave empty unless you need a prefix

# Realm (defaults to openshift_install_rhbk_realm if present)
openshift_tools_rhbk_get_client_secrets_realm: ""

# Admin creds (prefer to come from vault/env)
openshift_tools_rhbk_get_client_secrets_admin_user: "{{ openshift_install_rhbk_admin_user | default('admin') }}"
openshift_tools_rhbk_get_client_secrets_admin_password: "{{ openshift_install_rhbk_admin_password | default(omit) }}"

openshift_tools_rhbk_get_client_secrets_no_log: "{{ openshift_install_rhbk_no_log | default(true) | bool }}"
