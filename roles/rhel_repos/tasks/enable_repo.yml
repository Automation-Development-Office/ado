---
# Task file for enabling repositories on Red Hat OS

- name: Ensure required variables are defined
  ansible.builtin.assert:
    that:
      - repos_to_enable is defined
      - repos_to_enable | length > 0
    fail_msg: "Variable 'repos_to_enable' must be defined and contain at least one repository"
    success_msg: "Repository enable variables are properly defined"

- name: Validate Red Hat OS compatibility
  ansible.builtin.assert:
    that:
      - ansible_os_family == "RedHat"
    fail_msg: "This task is only compatible with Red Hat-based operating systems"
    success_msg: "Operating system compatibility confirmed"

- name: Display repositories to be enabled
  ansible.builtin.debug:
    msg: "Enabling the following repositories: {{ repos_to_enable.split(',') }}"

- name: Check if subscription-manager is available
  ansible.builtin.command: which subscription-manager
  register: rhel_repos_subscription_manager_check
  failed_when: false
  changed_when: false

- name: Enable repositories using rhsm_repository module (preferred for RHEL)
  community.general.rhsm_repository:
    name: "{{ item }}"
    state: enabled
  loop: "{{ repos_to_enable.split(',') | map('trim') | list }}"
  register: rhel_repos_rhsm_repository_enable
  when:
    - rhel_repos_subscription_manager_check.rc == 0
    - repos_enable_method is not defined or repos_enable_method == "rhsm_repository"

- name: Enable repositories using yum_repository module
  ansible.builtin.yum_repository:
    name: "{{ item }}"
    enabled: true
    state: present
    description: "Repository {{ item }} enabled by Ansible"
    baseurl: "{{ repos_baseurl[item] | default(omit) }}"
    mirrorlist: "{{ repos_mirrorlist[item] | default(omit) }}"
    metalink: "{{ repos_metalink[item] | default(omit) }}"
  loop: "{{ repos_to_enable.split(',') }}"
  register: rhel_repos_yum_repository_enable
  when:
    - repos_enable_method is not defined or repos_enable_method == "yum_repository"
    - rhel_repos_subscription_manager_check.rc != 0 or (repos_enable_method is defined and repos_enable_method == "yum_repository")

- name: Enable repositories by modifying repo files directly (fallback method)
  ansible.builtin.replace:
    path: "/etc/yum.repos.d/{{ item }}.repo"
    regexp: '^enabled\s*=\s*0'
    replace: 'enabled=1'
    backup: "{{ rhel_repos_backup_files | default(repos_backup_files | default(true)) }}"
  loop: "{{ repos_to_enable.split(',') }}"
  register: rhel_repos_file_enable
  failed_when: false
  when:
    - repos_enable_method is defined and repos_enable_method == "file-edit"

- name: Verify repositories are enabled (rhsm_repository method)
  ansible.builtin.shell: |
    set -o pipefail
    subscription-manager repos --list-enabled | grep -E '^Repo ID:\s*{{ item }}$'
  loop: "{{ repos_to_enable.split(',') }}"
  register: rhel_repos_verify_rhsm_enabled
  failed_when: false
  changed_when: false
  when:
    - rhel_repos_subscription_manager_check.rc == 0
    - repos_enable_method is not defined or repos_enable_method == "rhsm_repository"

- name: Verify repositories are enabled (yum_repository method)
  ansible.builtin.shell: |
    set -o pipefail
    {{ ansible_pkg_mgr }} repolist enabled | grep -E '^{{ item }}\s+'
  loop: "{{ repos_to_enable.split(',') }}"
  register: rhel_repos_verify_yum_enabled
  failed_when: false
  changed_when: false
  when:
    - repos_enable_method is not defined or repos_enable_method == "yum_repository"
    - rhel_repos_subscription_manager_check.rc != 0 or (repos_enable_method is defined and repos_enable_method == "yum_repository")

- name: Verify repositories are enabled (file-edit method)
  ansible.builtin.shell: "grep -E '^enabled\\s*=\\s*1' /etc/yum.repos.d/{{ item }}.repo"
  loop: "{{ repos_to_enable.split(',') }}"
  register: rhel_repos_verify_file_enabled
  failed_when: false
  changed_when: false
  when:
    - repos_enable_method is defined and repos_enable_method == "file-edit"

- name: Display enable results
  ansible.builtin.debug:
    msg: |
      Repository enable summary:
      {% for repo in repos_to_enable.split(',')  | map('trim') | list %}
      - {{ repo }}: {{
          (
            (rhel_repos_rhsm_repository_enable.results | selectattr('item', 'equalto', repo) | list | first).changed
            if rhel_repos_rhsm_repository_enable.results is defined
            else
            (rhel_repos_yum_repository_enable.results | selectattr('item', 'equalto', repo) | list | first).changed
            if rhel_repos_yum_repository_enable.results is defined
            else
            (rhel_repos_file_enable.results | selectattr('item', 'equalto', repo) | list | first).changed
            if rhel_repos_file_enable.results is defined
            else None
          ) | ternary('Successfully enabled', 'Already enabled or no change needed', 'Status unknown')
        }}
      {% endfor %}

- name: Clean package cache after enabling repositories
  ansible.builtin.command: "{{ ansible_pkg_mgr }} clean all"
  changed_when: true
  when: rhel_repos_clean_cache | default(repos_clean_cache | default(false))
