---
- name: settings | Validate admin user password
  ansible.builtin.uri:
    url: "{{ satellite_config_server_url }}/api/status"
    user: admin
    password: "{{ satellite_config_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: satellite_config_admin_auth
  failed_when: false
  changed_when: false

- name: settings | Set password for admin user
  redhat.satellite.user:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    login: admin
    user_password: "{{ satellite_config_admin_password }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
    state: present
  when: satellite_config_admin_auth.status != 200

- name: settings | Set Red Hat Satellite Settings
  redhat.satellite.setting:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    name: "{{ item['name'] }}"
    value: "{{ item['value'] }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  loop: "{{ satellite_config_settings }}"

- name: settings | Disable subscription connection for disconnected satellite
  when: satellite_config_rhn_connected is false
  redhat.satellite.setting:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    name: "subscription_connection_enabled"
    value: "No"
    validate_certs: "{{ satellite_config_validate_certs }}"

- name: settings | Create HTTP proxy object
  redhat.satellite.http_proxy:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    name: "{{ satellite_config_proxy_server }}"
    url: "{{ satellite_config_proxy_scheme }}://{{ satellite_config_proxy_server }}:{{ satellite_config_proxy_port }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  when:
    - satellite_config_proxy_server is defined
    - satellite_config_rhn_connected is true

- name: settings | Set HTTP proxy setting
  redhat.satellite.setting:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    name: content_default_http_proxy
    value: "{{ satellite_config_proxy_server }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  when:
    - satellite_config_proxy_server is defined
    - satellite_config_rhn_connected is true

- name: settings | Download katello-server certificate from connected satellite # noqa: risky-file-permissions
  ansible.builtin.get_url:
    url: "https://{{ satellite_config_connected_fqdn }}/pub/katello-server-ca.crt"
    dest: "/etc/rhsm/ca/katello-server-ca.crt"
    validate_certs: false
  when: satellite_config_rhn_connected is false

- name: settings | Grab cert content from file
  ansible.builtin.slurp:
    src: "/etc/rhsm/ca/katello-server-ca.crt"
  register: satellite_config_katello_cert_content
  when: satellite_config_rhn_connected is false

- name: settings | Create content credential for disconnected satellite
  redhat.satellite.content_credential:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    organization: "{{ satellite_config_organization }}"
    name: "{{ satellite_config_connected_fqdn }}"
    content_type: cert
    content: "{{ katello_cert_content['content'] | b64decode }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  when: satellite_config_rhn_connected is false

- name: settings | Get ID of content credential for cdn
  redhat.satellite.content_credential:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    organization: "{{ satellite_config_organization }}"
    name: "{{ satellite_config_connected_fqdn }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  register: satellite_config_cred_output
  when: satellite_config_rhn_connected is false

- name: settings | Set variable for credential ID
  ansible.builtin.set_fact:
    satellite_config_cdn_credential_id: >-
      {{
        satellite_config_cred_output['entity']['content_credentials']
        | map(attribute='id')
        | join(', ')
        | int
      }}
  when: not satellite_config_rhn_connected

- name: settings | Set CDN to sync from connected satellite # noqa: no-changed-when
  ansible.builtin.command: >-
    hammer organization configure-cdn
    --name={{ satellite_config_organization }}
    --type=network_sync
    --url https://{{ satellite_config_connected_fqdn }}
    --username {{ satellite_config_upstream_admin_username }}
    --password {{ satellite_config_upstream_admin_password }}
    --ssl-ca-credential-id "{{ cdn_credential_id }}"
    --upstream-organization-label="{{ satellite_config_organization }}"
    --upstream-lifecycle-environment-label="Library"
    --upstream-content-view-label="Default_Organization_View"
  when: satellite_config_rhn_connected is false
...
