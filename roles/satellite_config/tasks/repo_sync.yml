---
- name: repo_sync | Search for products with at least 1 repo
  ansible.builtin.uri:
    url: "{{ satellite_config_server_url }}/katello/api/organizations/1/products?per_page=500"
    method: GET
    return_content: true
    user: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    force_basic_auth: true
    validate_certs: false
  register: satellite_config_products_output

- name: repo_sync | Create list of products
  ansible.builtin.set_fact:
    satellite_config_enabled_products: "{{ satellite_config_enabled_products | default([]) + [item['name']] }}"
  loop: "{{ satellite_config_products_output['json']['results'] }}"
  when:
    - item['repository_count'] > 0

- name: repo_sync | Sync all repos for enabled products
  redhat.satellite.repository_sync:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    product: "{{ item }}"
    organization: "{{ satellite_config_organization }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  loop: "{{ satellite_config_enabled_products }}"
  register: satellite_config_repo_sync_status
  async: "{{ satellite_config_repo_sync_wait_time | int }}"
  poll: 0

- name: repo_sync | Wait for repo sync to finish
  ansible.builtin.async_status:
    jid: "{{ item['ansible_job_id'] }}"
  register: satellite_config_repo_sync_status_results
  retries: "{{ (satellite_config_repo_sync_wait_time // 10) }}"
  delay: 10
  until: satellite_config_repo_sync_status_jobs['finished']
  loop: "{{ satellite_config_repo_sync_status['results'] }}"
...
