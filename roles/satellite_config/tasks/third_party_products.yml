---
- name: third_party_products | Copy the gpg-key files to Satellite
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/pki/rpm-gpg/"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ satellite_config_gpg_key_files }}"

- name: third_party_products | Create content credentials on Satellite
  ansible.builtin.include_role:
    name: redhat.satellite.content_credentials

- name: third_party_products | Create 3rd party products and repos on satellite
  ansible.builtin.include_role:
    name: redhat.satellite.repositories
  when: satellite_products is defined and satellite_product | bool


- name: third_party_products | Create custom repo destination directory
  ansible.builtin.file:
    path: "{{ satellite_config_custom_repo_dest }}"
    owner: root
    group: root
    mode: '0700'
    state: directory

- name: third_party_products | Unarchive custom repo files
  ansible.builtin.unarchive:
    src: "{{ satellite_config_custom_repo_src }}/{{ item }}"
    dest: "{{ satellite_config_custom_repo_dest }}"
    owner: root
    group: root
    mode: '0600'
    remote_src: true
  loop: "{{ satellite_config_custom_repo_files }}"

- name: third_party_products | Upload custom repos"
  redhat.satellite.content_upload:
    username: "{{ satellite_config_username }}"
    password: "{{ satellite_config_password }}"
    server_url: "{{ satellite_config_server_url }}"
    organization: "{{ satellite_config_organization }}"
    src: "{{ satellite_config_custom_repo_dest }}/{{ item.1 }}"
    product: "{{ item.0.product }}"
    repository: "{{ item.0.repository }}"
    validate_certs: "{{ satellite_config_validate_certs }}"
  loop: "{{ satellite_config_custom_repos | subelements('files') }}"
...
