---
- name: Create GitLab TLS Secret
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-tls-secret
        namespace: "{{ name_space }}"
      type: kubernetes.io/tls
      stringData:
        tls.crt: "{{ tls_crt }}"
        tls.key: "{{ tls_key }}"

- name: Create GitLab Root Password Secret
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-root-password-secret
        namespace: "{{ name_space }}"
      type: Opaque
      stringData:
        password: "{{ gitlab_root_password }}"
  no_log: true

- name: Create GitLab DB Secret
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-db-secret
        namespace: "{{ name_space }}"
      type: Opaque
      stringData:
        POSTGRES_USER: "{{ gitlab_admin_user }}"
        POSTGRES_PASSWORD: "{{ gitlab_admin_password }}"
  no_log: true

- name: Deploy GitLab Custom Resource (Operator/Helm)
  kubernetes.core.k8s:
    definition:
      apiVersion: apps.gitlab.com/v1beta1
      kind: GitLab
      metadata:
        name: gitlab
        namespace: "{{ name_space }}"
      spec:
        chart:
          version: "9.4.0" # Supported version!
        certmanager:
          install: false
        gitlab:
          rootPassword:
            valueFrom:
              secretKeyRef:
                name: gitlab-root-password-secret
                key: password
        router:
          tls:
            secretName: gitlab-tls-secret
          hostname: "{{ gitlab_hostname }}"
        postgresql:
          enabled: false
          host: gitlab-postgresql
          username:
            valueFrom:
              secretKeyRef:
                name: gitlab-db-secret
                key: POSTGRES_USER
          password:
            valueFrom:
              secretKeyRef:
                name: gitlab-db-secret
                key: POSTGRES_PASSWORD
          database: gitlabhq_production
        persistence:
          enabled: true
          storage:
            size: "{{ gitlab_storage_size }}"
            class: "{{ storage }}"
