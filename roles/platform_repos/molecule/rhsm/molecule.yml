---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: repos-rhel8-rhsm
    image: quay.io/ansible/creator-ee:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command: "/usr/sbin/init"
    networks:
      - name: molecule
    env:
      ANSIBLE_REMOTE_TEMP: /tmp
      ANSIBLE_LOCAL_TEMP: /tmp
      ANSIBLE_REMOTE_TMP: /tmp
      ANSIBLE_LOCAL_TMP: /tmp
      ANSIBLE_HOST_KEY_CHECKING: "False"
provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: junit
      stdout_callback: yaml
      remote_tmp: /tmp
      local_tmp: /tmp
      host_key_checking: False
      timeout: 30
    ssh_connection:
      pipelining: True
  ansible_args:
    - --timeout=30
  env:
    ANSIBLE_REMOTE_TEMP: /tmp
    ANSIBLE_LOCAL_TEMP: /tmp
    ANSIBLE_REMOTE_TMP: /tmp
    ANSIBLE_LOCAL_TMP: /tmp
    ANSIBLE_HOST_KEY_CHECKING: "False"
  inventory:
    host_vars:
      repos-rhel8-rhsm:
        ansible_user: root
        ansible_connection: docker
        ansible_remote_tmp: /tmp
        ansible_local_tmp: /tmp
verifier:
  name: testinfra
  options:
    # Generate JUnit XML for CI reporting
    junit-xml: junit.xml
    v: 1
scenario:
  name: rhsm
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    # - prepare
    - converge
    - side_effect
    - verify
    - cleanup
    - destroy
