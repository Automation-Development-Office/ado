---
- name: Verify repos role functionality
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Verify repository management tools are available
      ansible.builtin.command: "{{ item }}"
      loop:
        - "which {{ ansible_pkg_mgr }}"
        - "{{ ansible_pkg_mgr }} --version"
      register: tool_check
      failed_when: tool_check.rc != 0
      changed_when: false

    - name: Verify test repository files exist
      ansible.builtin.stat:
        path: /etc/yum.repos.d/test-repos.repo
      register: test_repo_file
      failed_when: not test_repo_file.stat.exists

    - name: Verify backup files were created (when using file-edit method)
      ansible.builtin.find:
        paths: /etc/yum.repos.d/
        patterns: "test-repos.repo.*"
      register: backup_files

    - name: Verify backup functionality
      ansible.builtin.debug:
        msg: "Backup files found: {{ backup_files.matched }}"

    - name: Check repository states
      block:
        - name: Get enabled repositories
          ansible.builtin.shell: |
            {{ ansible_pkg_mgr }} repolist enabled --quiet
          register: enabled_repos
          changed_when: false

        - name: Get disabled repositories
          ansible.builtin.shell: |
            {{ ansible_pkg_mgr }} repolist disabled --quiet
          register: disabled_repos
          changed_when: false
          failed_when: false

        - name: Display repository states
          ansible.builtin.debug:
            msg: |
              Enabled repositories: {{ enabled_repos.stdout_lines | length }}
              Disabled repositories: {{ disabled_repos.stdout_lines | length if disabled_repos.rc == 0 else 'N/A' }}

    - name: Verify yum cache was cleaned (if requested)
      ansible.builtin.stat:
        path: /var/cache/{{ ansible_pkg_mgr }}/
      register: cache_dir

    - name: Test repository configuration validation
      block:
        - name: Check test-repo-disabled configuration
          ansible.builtin.shell: |
            {{ ansible_pkg_mgr }} repoinfo test-repo-disabled
          register: repo_info
          failed_when: false
          changed_when: false

        - name: Display repository information
          ansible.builtin.debug:
            var: repo_info.stdout_lines
          when: repo_info.rc == 0

    - name: Verify role idempotency markers
      block:
        - name: Check for Ansible-managed repository descriptions
          ansible.builtin.shell: |
            grep -r "enabled by Ansible" /etc/yum.repos.d/ || true
          register: ansible_markers
          changed_when: false

        - name: Display Ansible management markers
          ansible.builtin.debug:
            msg: "Found Ansible management markers: {{ ansible_markers.stdout_lines | length > 0 }}"

    - name: Final verification summary
      ansible.builtin.debug:
        msg: |
          Verification Summary:
          - Repository management tools: Available
          - Test repository files: Present
          - Backup functionality: {{ 'Working' if backup_files.matched > 0 else 'Not tested' }}
          - Repository states: Verified
          - Ansible markers: {{ 'Found' if ansible_markers.stdout_lines | length > 0 else 'Not found' }}

          All basic functionality tests completed successfully!
