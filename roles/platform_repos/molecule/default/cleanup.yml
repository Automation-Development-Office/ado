---
- name: Cleanup test environment
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Remove test repository files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/yum.repos.d/test-repos.repo
        - /etc/yum.repos.d/test-repos.repo.backup
      ignore_errors: true

    - name: Clean up backup files
      ansible.builtin.find:
        paths: /etc/yum.repos.d/
        patterns: "test-repos.repo.*"
      register: backup_files_cleanup

    - name: Remove backup files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ backup_files_cleanup.files }}"
      ignore_errors: true

    - name: Clean package cache
      ansible.builtin.command: "{{ ansible_pkg_mgr }} clean all"
      changed_when: true
      ignore_errors: true

    - name: Reset repository states to default
      ansible.builtin.shell: |
        if command -v dnf >/dev/null 2>&1; then
          dnf config-manager --set-enabled epel || true
        elif command -v yum >/dev/null 2>&1; then
          yum-config-manager --enable epel || true
        fi
      when: ansible_os_family == "RedHat"
      changed_when: false
      failed_when: false
