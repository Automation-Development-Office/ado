---
# Task file for disabling repositories on Red Hat OS

- name: Ensure required variables are defined
  ansible.builtin.assert:
    that:
      - repos_to_disable is defined
      - repos_to_disable | length > 0
    fail_msg: "Variable 'repos_to_disable' must be defined and contain at least one repository"
    success_msg: "Repository disable variables are properly defined"

- name: Validate Red Hat OS compatibility
  ansible.builtin.assert:
    that:
      - ansible_os_family == "RedHat"
    fail_msg: "This task is only compatible with Red Hat-based operating systems"
    success_msg: "Operating system compatibility confirmed"

- name: Display repositories to be disabled
  ansible.builtin.debug:
    msg: "Disabling the following repositories: {{ repos_to_disable.split(',') }}"

- name: Check if subscription-manager is available
  ansible.builtin.command: which subscription-manager
  register: platform_repos_subscription_manager_check
  failed_when: false
  changed_when: false

- name: Disable repositories using rhsm_repository module (preferred for RHEL)
  community.general.rhsm_repository:
    name: "{{ item }}"
    state: disabled
  loop: "{{ repos_to_disable.split(',') | map('trim') | list }}"
  register: platform_repos_rhsm_repository_disable
  when:
    - platform_repos_subscription_manager_check.rc == 0
    - repos_disable_method is not defined or repos_disable_method == "rhsm_repository"

- name: Disable repositories using yum_repository module
  ansible.builtin.yum_repository:
    name: "{{ item }}"
    enabled: false
    state: absent
    description: "Repository {{ item }} disabled by Ansible"
  loop: "{{ repos_to_disable.split(',') }}"
  register: platform_repos_yum_repository_disable
  when:
    - repos_disable_method is not defined or repos_disable_method == "yum_repository"
    - platform_repos_subscription_manager_check.rc != 0 or (repos_disable_method is defined and repos_disable_method == "yum_repository")

- name: Disable repositories by modifying repo files directly (fallback method)
  ansible.builtin.replace:
    path: "/etc/yum.repos.d/{{ item }}.repo"
    regexp: '^enabled\s*=\s*1'
    replace: 'enabled=0'
    backup: "{{ platform_repos_backup_files | default(repos_backup_files | default(true)) }}"
  loop: "{{ repos_to_disable.split(',') | map('trim') | list }}"
  register: platform_repos_file_disable
  failed_when: false
  when:
    - repos_disable_method is defined and repos_disable_method == "file-edit"

- name: Verify repositories are disabled (rhsm_repository method)
  ansible.builtin.shell: |
    set -o pipefail
    subscription-manager repos --list-disabled | grep -E '^Repo ID:\s*{{ item }}$'
  loop: "{{ repos_to_disable.split(',') }}"
  register: platform_repos_verify_rhsm_disabled
  failed_when: false
  changed_when: false
  when:
    - platform_repos_subscription_manager_check.rc == 0
    - repos_disable_method is not defined or repos_disable_method == "rhsm_repository"

- name: Verify repositories are disabled (yum_repository method)
  ansible.builtin.shell: |
    set -o pipefail
    {{ ansible_pkg_mgr }} repolist disabled | grep -E '^{{ item }}\s+'
  loop: "{{ repos_to_disable.split(',') }}"
  register: platform_repos_verify_yum_disabled
  failed_when: false
  changed_when: false
  when:
    - repos_disable_method is not defined or repos_disable_method == "yum_repository"
    - platform_repos_subscription_manager_check.rc != 0 or (repos_disable_method is defined and repos_disable_method == "yum_repository")

- name: Verify repositories are disabled (file-edit method)
  ansible.builtin.shell: "grep -E '^enabled\\s*=\\s*0' /etc/yum.repos.d/{{ item }}.repo"
  loop: "{{ repos_to_disable.split(',') }}"
  register: platform_repos_verify_file_disabled
  failed_when: false
  changed_when: false
  when:
    - repos_disable_method is defined and repos_disable_method == "file-edit"

- name: Display disable results
  ansible.builtin.debug:
    msg: |
      Repository disable summary:
      {% for repo in repos_to_disable.split(',')  | map('trim') | list %}
      - {{ repo }}: {{
          (
            (platform_repos_rhsm_repository_disable.results | selectattr('item', 'equalto', repo) | list | first).changed
            if platform_repos_rhsm_repository_disable.results is defined
            else
            (platform_repos_yum_repository_disable.results | selectattr('item', 'equalto', repo) | list | first).changed
            if platform_repos_yum_repository_disable.results is defined
            else
            (platform_repos_file_disable.results | selectattr('item', 'equalto', repo) | list | first).changed
            if platform_repos_file_disable.results is defined
            else None
          ) | ternary('Successfully disabled', 'Already disabled or no change needed', 'Status unknown')
        }}
      {% endfor %}

- name: Clean package cache after disabling repositories
  ansible.builtin.command: "{{ ansible_pkg_mgr }} clean all"
  changed_when: true
  when: platform_repos_clean_cache | default(repos_clean_cache | default(false))
