---
# Namespace where the Secret lives (AWSPCAClusterIssuer is cluster-scoped)
openshift_configure_awspca_namespace: cert-manager

# Secret holding AWS creds
openshift_configure_awspca_secret_name: awspca-creds

# ClusterIssuer name
openshift_configure_awspca_issuer_name: awspca-clusterissuer

# AWS PCA
openshift_configure_awspca_region: us-gov-west-1
openshift_configure_awspca_pca_arn: ""

# Credentials (prefer vault vars). If not set, fall back to environment.
openshift_configure_awspca_access_key_id: ""
openshift_configure_awspca_secret_access_key: ""

# Secret key names expected by the AWS PCA issuer
openshift_configure_awspca_secret_key_id_field: AWS_ACCESS_KEY_ID
openshift_configure_awspca_secret_secret_key_field: AWS_SECRET_ACCESS_KEY

# Wait for Ready=True
openshift_configure_awspca_wait_ready: true
openshift_configure_awspca_wait_retries: 30
openshift_configure_awspca_wait_delay: 10

# Safety
openshift_configure_awspca_no_log: true
