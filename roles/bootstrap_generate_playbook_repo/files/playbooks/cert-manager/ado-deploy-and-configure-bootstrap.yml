---
- name: Install {{ component_friendly_name }}
  hosts: localhost
  gather_facts: false

  vars:
    component: cert_manager

  vars_files:
    - "group_vars/all/{{ env }}/infra_config_vars.yml"
    - "group_vars/all/{{ env }}/vault_{{ component }}.yml"
    - "group_vars/all/{{ env }}/vars_{{ component }}.yml"
    flatten_var_root: "cert_manager"
    flatten_var_root_defaults: "{{ flatten_var_root }}_defaults"
    flatten_var_root_env: "{{ flatten_var_root }}_env"

  environment:
    K8S_AUTH_HOST: "{{ host }}"
    K8S_AUTH_API_KEY: "{{ token }}"
    K8S_AUTH_VERIFY_SSL: "{{ (verify_ssl | bool) | ternary('yes','no') }}"

  pre_tasks:
  pre_tasks:
    - name: Set flattened vars into "{{ flatten_var_root }}" variable
      set_fact:
        "{{ flatten_var_root }}": "{{ vars[flatten_var_root_defaults] | combine(vars[flatten_var_root_env]|default({}), recursive=True) }}"

    - name: Flatten component vars to top-level (if using generic flatten_vars role)
      include_role:
        name: flatten_vars
  roles:
    #- role: ado.openshift.namespace
    #- role: ado.openshift.operatorgroup
    #- role: ado.openshift.subscription_operator
    #- role: ado.openshift.rhbk
    #- role: ado.openshift.wait_for_pods_running
    - role: ado.openshift.get_routes
