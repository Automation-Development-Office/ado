---
- name: Discover alternate routes
  hosts: localhost
  gather_facts: false

  vars:
    component: routes

  vars_files:
    - "group_vars/all/{{ env }}/infra_config_vars.yml"
    - "group_vars/all/{{ env }}/vault_{{ component }}.yml"
    - "group_vars/all/{{ env }}/vars_{{ component }}.yml"

  environment:
    K8S_AUTH_HOST: "{{ host }}"
    K8S_AUTH_API_KEY: "{{ token }}"
    K8S_AUTH_VERIFY_SSL: "{{ (verify_ssl | bool) | ternary('yes','no') }}"

  pre_tasks:
    - name: Resolve vars for component from framework defaults + env overrides
      ansible.builtin.include_role:
        name: resolve_component

  roles:
    - role: openshift_tools_discover_routes
      vars:
        openshift_tools_discover_routes_route_alt_primary_suffix: "{{ app_domain }}"
        openshift_tools_discover_routes_route_alt_suffix: "{{ app_domain_alt }}"
        openshift_tools_discover_routes_route_alt_output_var: route_alt_candidates
        openshift_tools_discover_routes_route_alt_print: true
