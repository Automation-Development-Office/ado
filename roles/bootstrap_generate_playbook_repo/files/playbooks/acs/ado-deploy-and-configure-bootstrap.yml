- name: Deploy and Configure ACS
  hosts: localhost
  gather_facts: false
  vars:
    component: acs

  vars_files:
    - "group_vars/all/{{ env }}/infra_config_vars.yml"
    - "group_vars/all/{{ env }}/vault_{{ component }}.yml"
    - "group_vars/all/{{ env }}/vars_{{ component }}.yml"

  environment:
    K8S_AUTH_HOST: "{{ host }}"
    K8S_AUTH_API_KEY: "{{ token }}"
    K8S_AUTH_VERIFY_SSL: "{{ (verify_ssl | bool) | ternary('yes','no') }}"

  pre_tasks:
    - name: Resolve vars for component from framework defaults + env overrides
      ansible.builtin.include_role:
        name: resolve_component

    # Bridge vars so your existing roles keep working
    - name: Map ACS namespaces
      ansible.builtin.set_fact:
        bootstrap_generate_playbook_repo_operator_namespace: "{{ operator_namespace | default(acs.operator_namespace | default('openshift-operators')) }}"
        bootstrap_generate_playbook_repo_acs_namespace: "{{ acs_namespace | default(acs.namespace | default('stackrox')) }}"

  roles:
    # These should operate in operator namespace
    - role: openshift_tools_manage_namespace
      vars:
        openshift_tools_manage_namespace_name_space: "{{ bootstrap_generate_playbook_repo_operator_namespace }}"

    - role: openshift_tools_subscription_operator
      vars:
        openshift_tools_subscription_operator_name_space: "{{ bootstrap_generate_playbook_repo_operator_namespace }}"

    # Your ACS role uses acs_namespace for the Central CR
    - role: openshift_install_acs

    - role: openshift_tools_wait_for_pods_running
      vars:
        openshift_tools_wait_for_pods_running_name_space: "{{ bootstrap_generate_playbook_repo_acs_namespace }}"
