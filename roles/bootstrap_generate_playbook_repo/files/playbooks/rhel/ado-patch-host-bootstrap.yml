---
- name: Patch Host to satellite server
  hosts: all
  gather_facts: false

  vars:
    ipaadmin_principal: "admin@SERVER.LAB"
    ipaadmin_password: "{{ ipaadmin_password }}"
    zone_name: server.lab
    record_name: eras01
    record_ttl: 3600
    record_ip: 192.168.0.150

  tasks:
    - name:  Start patch process
      ansible.builtin.pause:
        seconds: 30	
