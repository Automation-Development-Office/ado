---
- name: Playbook to configure Intial IPA server
  hosts: ipaserver

  vars_files:


  pre_tasks:
 
  tasks:
    - community.general.ipa_sudocmd:
        name: /usr/bin/su
        description: Allow to run su via sudo
        ipa_host: idm.server.lab 
        ipa_user: admin
        ipa_pass: '' 

    - freeipa.ansible_freeipa.ipasudocmdgroup:
        ipaadmin_password: '' 
        name: sysadmin 
        sudocmd:
        - /usr/bin/su
        action: sudocmdgroup
        state: present 
