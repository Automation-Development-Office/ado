---
- name: ADO | Playbook to configure Intial IPA server
  hosts: ipaserver
  vars:
    ipaadmin_password: ""
    ipatopology_segments: null
  vars_files: null
  tasks:
    - name: ADO | Add topology segment
      freeipa.ansible_freeipa.ipatopologysegment:
        ipaadmin_password: '{{ ipaadmin_password }}'
        suffix: '{{ item.suffix }}'
        name: ADO | {{ item.name | default(omit) }}
        left: '{{ item.left }}'
        right: '{{ item.right }}'
        state: '{{ item.state }}'
      loop: '{{ ipatopology_segments | default([]) }}'
