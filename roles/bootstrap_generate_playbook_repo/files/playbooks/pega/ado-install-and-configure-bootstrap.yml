---
- name: Deploy PEGA on ROSA/OpenShift
  hosts: localhost
  gather_facts: false

  vars:
    component: pega

  vars_files:
    - "group_vars/all/{{ env }}/infra_config_vars.yml"
    - "group_vars/all/{{ env }}/vault_{{ component }}.yml"
    - "group_vars/all/{{ env }}/vars_{{ component }}.yml"
    pega_namespace: pega
    pega_deployment_name: pega
    pega_app_domain: apps.ocp.prod.rhlab

    pega_push_images_to_internal_registry: false
    pega_image: "default-route-openshift-image-registry.apps.ocp.prod.rhlab/pega/pega:23.1.1"
    pega_srs_image: "default-route-openshift-image-registry.apps.ocp.prod.rhlab/pega/search-n-reporting-service-os:1.35.0"
    pega_installer_image: "default-route-openshift-image-registry.apps.ocp.prod.rhlab/pega/installer:23.1.1"
    pega_storage_class: "synology-nfs-csi"
    pega_opensearch_replicas: 1

  environment:
    K8S_AUTH_HOST: "{{ host }}"
    K8S_AUTH_API_KEY: "{{ token }}"
    K8S_AUTH_VERIFY_SSL: "{{ (verify_ssl | bool) | ternary('yes','no') }}"

  pre_tasks:
    - name: Resolve vars for component from framework defaults + env overrides
      ansible.builtin.include_role:
        name: resolve_component

  roles:
    - pega
