---
- name: Create Kafka ServiceMonitor
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Apply Kafka ServiceMonitor
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: kafka-metrics
            namespace: kafka
            labels:
              app: kafka
          spec:
            namespaceSelector:
              matchNames:
                - kafka
            selector:
              matchLabels:
                app: kafka
            endpoints:
              - port: tcp-prometheus
                interval: 30s
                path: /metrics
