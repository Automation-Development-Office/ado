---
- name: Deploy and Configure Grafana and Grafana dashboards
  hosts: localhost
  gather_facts: false

  vars:
    component: grafana

  vars_files:
    - "group_vars/all/{{ env }}/infra_config_vars.yml"
    - "group_vars/all/{{ env }}/vault_{{ component }}.yml"
    - "group_vars/all/{{ env }}/vars_{{ component }}.yml"

  environment:
    K8S_AUTH_HOST: "{{ host }}"
    K8S_AUTH_API_KEY: "{{ token }}"
    K8S_AUTH_VERIFY_SSL: "{{ (verify_ssl | bool) | ternary('yes','no') }}"

  pre_tasks:
    - name: Resolve vars for component from framework defaults + env overrides
      ansible.builtin.include_role:
        name: resolve_component

    - name: Fetch Keycloak secret for Grafana client (sets grafana_oidc_client_secret)
      ansible.builtin.include_role:
        name: rhbk_get_client_secrets
      vars:
        rhbk_secret_client_key: "grafana_client"

  roles:
    #- role: ado.openshift.namespace        
    #- role: operatorgroup
    #- role: ado.openshift.subscription_operator
    #- role: grafana
    - role: ado.openshift.wait_for_pods_running
    - role: ado.applications.grafana_create_datasource
    - role: ado.applications.grafana_manage_folder
    - role: grafana_upload_dashboards


