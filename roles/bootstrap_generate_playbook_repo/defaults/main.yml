---
bootstrap_generate_playbook_repo_dest: "{{ playbook_dir }}"
bootstrap_generate_playbook_repo_seed_src: >-
  "{{ role_path }}/files/playbook_repo_seed"
bootstrap_generate_playbook_repo_force: true

bootstrap_generate_playbook_repo_git_mode: manual
bootstrap_generate_playbook_repo_git_remote: origin
bootstrap_generate_playbook_repo_git_branch: main
bootstrap_generate_playbook_repo_git_message: "Generate bootstrap playbook repo"
bootstrap_generate_playbook_repo_git_username: oauth2
bootstrap_generate_playbook_repo_git_token: ""
bootstrap_generate_playbook_repo_pause_after_generate: false

bootstrap_generate_playbook_repo_component: all

bootstrap_generate_playbook_repo_component_map:
  all:
    - all

  openshift:
    - aap
    - acs
    - acm
    - cert_manager
    - console
    - devspaces
    - dirsrv
    - eck
    - gitops
    - gitlab
    - grafana
    - kafka
    - oadp
    - openshift
    - pega
    - quay
    - rhbk

  rhel:
    - rhel
    - satellite
    - idm
    - aap
    - dirsrv
    - eck
    - gitlab
    - grafana
    - kafka
    - rhbk

  patching:
    - rhel
    - satellite
    - idm

  aap:
    - aap

  rhbk:
    - rhbk

  grafana:
    - grafana

  kafka:
    - kafka

  gitlab:
    - gitlab

  satellite:
    - satellite

  idm:
    - idm

  rhel-patching:
    - rhel

  pega:
    - pega

  elastic:
    - eck

bootstrap_generate_playbook_repo_generated_playbooks:

  - src: aap/ado-aap24-deploy-and-configure-bootstrap.yml
