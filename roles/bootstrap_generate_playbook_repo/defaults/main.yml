---
generate_playbook_repo_dest: "{{ playbook_dir }}"
generate_playbook_repo_seed_src: "{{ role_path }}/files/playbook_repo_seed"
generate_playbook_repo_force: true

generate_playbook_repo_git_mode: manual
generate_playbook_repo_git_remote: origin
generate_playbook_repo_git_branch: main
generate_playbook_repo_git_message: "Generate bootstrap playbook repo"
generate_playbook_repo_git_username: oauth2
generate_playbook_repo_git_token: ""
generate_playbook_repo_pause_after_generate: false

generate_playbook_repo_component: all

generate_playbook_repo_component_map:
  all:
    - all

  openshift:
    - aap
    - acs
    - acm
    - cert_manager
    - console
    - devspaces
    - dirsrv
    - eck
    - gitops
    - gitlab
    - grafana
    - kafka
    - oadp
    - openshift
    - pega
    - quay
    - rhbk

  rhel:
    - rhel
    - satellite
    - idm
    - aap
    - dirsrv
    - eck
    - gitlab
    - grafana
    - kafka
    - rhbk

  patching:
    - rhel
    - satellite
    - idm

  aap:
    - aap

  rhbk:
    - rhbk

  grafana:
    - grafana

  kafka:
    - kafka

  gitlab:
    - gitlab

  satellite:
    - satellite

  idm:
    - idm

  rhel-patching:
    - rhel

  pega:
    - pega

  elastic:
    - eck

