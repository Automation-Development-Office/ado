---
- name: Generate playbook repo | Resolve destination
  ansible.builtin.set_fact:
    bootstrap_generate_playbook_repo_dest_resolved: >-
      {{
        bootstrap_generate_playbook_repo_dest
        | default(playbook_dir, true)
      }}

- name: Generate playbook repo | Ensure repo root exists
  ansible.builtin.file:
    path: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
    state: directory
    mode: "0755"

- name: Generate playbook repo | Ensure playbooks directory exists
  ansible.builtin.file:
    path: >-
      {{
        bootstrap_generate_playbook_repo_dest_resolved
      }}/playbooks
    state: directory
    mode: "0755"

- name: Generate playbook repo | Ensure configs directory exists
  ansible.builtin.file:
    path: >-
      {{
        bootstrap_generate_playbook_repo_dest_resolved
      }}/configs
    state: directory
    mode: "0755"

- name: Generate playbook repo | Copy seed repo content
  ansible.builtin.copy:
    src: "{{ bootstrap_generate_playbook_repo_seed_src }}/"
    dest: "{{ bootstrap_generate_playbook_repo_dest_resolved }}/"
    mode: preserve
    force: >-
      {{ bootstrap_generate_playbook_repo_force | default(false) | bool }}
  when: bootstrap_generate_playbook_repo_seed_src is defined

- name: Generate playbook repo | Normalize component selector
  ansible.builtin.set_fact:
    bootstrap_generate_playbook_repo_component_effective: >-
      {{
        component
        | default(playbook_component, true)
        | default(bootstrap_generate_playbook_repo_component, true)
        | default('all', true)
      }}

- name: Generate playbook repo | Resolve selected apps from component
  ansible.builtin.set_fact:
    bootstrap_generate_playbook_repo_selected_apps: >-
      {{
        bootstrap_generate_playbook_repo_component_map[
          bootstrap_generate_playbook_repo_component_effective
        ] | default([])
      }}

- name: Generate playbook repo | Validate component selector
  ansible.builtin.assert:
    that:
      - >-
        bootstrap_generate_playbook_repo_component_effective
        in bootstrap_generate_playbook_repo_component_map
    fail_msg: >-
      Invalid component
      '{{ bootstrap_generate_playbook_repo_component_effective }}'.
      Valid components:
      {{ bootstrap_generate_playbook_repo_component_map.keys() | list }}

- name: Generate playbook repo | Select playbooks by component
  ansible.builtin.set_fact:
    bootstrap_generate_playbook_repo_selected_playbooks: >-
      {{
        bootstrap_generate_playbook_repo_generated_playbooks
        if bootstrap_generate_playbook_repo_component_effective == 'all'
        else
        bootstrap_generate_playbook_repo_generated_playbooks
        | selectattr(
            'app',
            'in',
            bootstrap_generate_playbook_repo_selected_apps
          )
        | list
      }}

- name: Generate playbook repo | Ensure playbook component directories exist
  ansible.builtin.file:
    path: >-
      {{
        bootstrap_generate_playbook_repo_dest_resolved
      }}/{{ item.dest | dirname }}
    state: directory
    mode: "0755"
  loop: "{{ bootstrap_generate_playbook_repo_selected_playbooks }}"

- name: >-
    Generate playbook repo | Copy selected playbooks into existing
    playbooks directory
  ansible.builtin.copy:
    src: "playbooks/{{ item.src }}"
    dest: >-
      {{
        bootstrap_generate_playbook_repo_dest_resolved
      }}/{{ item.dest }}
    mode: "0644"
    force: >-
      {{ bootstrap_generate_playbook_repo_force | default(false) | bool }}
  loop: "{{ bootstrap_generate_playbook_repo_selected_playbooks }}"

- name: >-
    Generate playbook repo | Render controller project config from
    repo URL when provided
  ansible.builtin.template:
    src: controller_projects.yml.j2
    dest: >-
      {{
        bootstrap_generate_playbook_repo_dest_resolved
      }}/configs/controller_projects.yml
    mode: "0644"
  when: bootstrap_generate_playbook_repo_git_url | default('') | length > 0

- name: Generate playbook repo | Show generated repo summary
  ansible.builtin.debug:
    msg:
      - >-
        Repo root:
        {{ bootstrap_generate_playbook_repo_dest_resolved }}
      - >-
        Playbooks directory:
        {{ bootstrap_generate_playbook_repo_dest_resolved }}/playbooks
      - >-
        Configs directory:
        {{ bootstrap_generate_playbook_repo_dest_resolved }}/configs
      - >-
        Component:
        {{ bootstrap_generate_playbook_repo_component_effective }}
      - >-
        Selected apps:
        {{ bootstrap_generate_playbook_repo_selected_apps }}
      - >-
        Generated playbooks:
        {{
          bootstrap_generate_playbook_repo_selected_playbooks
          | map(attribute='dest')
          | list
        }}

- name: Generate playbook repo | Git init  # noqa command-instead-of-module
  ansible.builtin.command: >-
    git init -b
    {{ bootstrap_generate_playbook_repo_git_branch | default('main') }}
  args:
    chdir: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
    creates: "{{ bootstrap_generate_playbook_repo_dest_resolved }}/.git"
  changed_when: false
  when: bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'

- name: Generate playbook repo | Configure git credential helper
  ansible.builtin.shell: |
    set -euo pipefail
    git config credential.helper store
  args:
    chdir: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
    executable: /bin/bash
  changed_when: false
  when:
    - bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'
    - bootstrap_generate_playbook_repo_git_token | default('') | length > 0

- name: Generate playbook repo | Write git credentials
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME | default('/tmp') }}/.git-credentials"
    mode: "0600"
    content: >-
      {{
        bootstrap_generate_playbook_repo_git_url
        | regex_replace(
            '^(https?://)(.*)$',
            '\\1'
            ~
            (
              bootstrap_generate_playbook_repo_git_username
              | default('oauth2')
              | urlencode
            )
            ~ ':'
            ~ (bootstrap_generate_playbook_repo_git_token | urlencode)
            ~ '@\\2'
          )
      }}
  no_log: true
  when:
    - bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'
    - bootstrap_generate_playbook_repo_git_url | default('') | length > 0
    - bootstrap_generate_playbook_repo_git_token | default('') | length > 0

- name: Generate playbook repo | Disable git terminal prompts
  community.general.git_config:
    name: core.askPass
    value: "true"
    scope: local
    repo: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
  when: bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'

- name: Generate playbook repo | Configure git remote
  ansible.builtin.shell: |
    set -euo pipefail
    remote_name={{
      bootstrap_generate_playbook_repo_git_remote
      | default('origin')
      | quote
    }}
    remote_url={{ bootstrap_generate_playbook_repo_git_url | quote }}

    if git remote | grep -qx "$remote_name"; then
      git remote set-url "$remote_name" "$remote_url"
    else
      git remote add "$remote_name" "$remote_url"
    fi
  args:
    chdir: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
    executable: /bin/bash
  changed_when: true
  when:
    - bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'
    - bootstrap_generate_playbook_repo_git_url | default('') | length > 0

- name: Generate playbook repo | Commit generated files
  ansible.builtin.shell: |
    set -euo pipefail
    git add -A
    git diff --cached --quiet || \
      git commit -m "Generate bootstrap playbook repo"
  args:
    chdir: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
    executable: /bin/bash
  changed_when: true
  when:
    - bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'

- name: Generate playbook repo | Push generated repo
  ansible.builtin.shell: |
    set -euo pipefail
    git push \
      {{ bootstrap_generate_playbook_repo_git_remote | default('origin') }} \
      {{ bootstrap_generate_playbook_repo_git_branch | default('main') }}
  args:
    chdir: "{{ bootstrap_generate_playbook_repo_dest_resolved }}"
    executable: /bin/bash
  changed_when: >-
    'up-to-date'
    not in bootstrap_generate_playbook_repo_git_push_result.stderr
  register: bootstrap_generate_playbook_repo_git_push_result
  when:
    - bootstrap_generate_playbook_repo_git_mode | default('manual') == 'push'
    - bootstrap_generate_playbook_repo_git_url | default('') | length > 0

- name: Generate playbook repo | Pause for manual git push
  ansible.builtin.pause:
    prompt: >-
      {{
        bootstrap_generate_playbook_repo_pause_prompt
        | default(
              'Playbooks were generated. Push them to Git now, '
              ~ 'then press ENTER to continue.'
          )
      }}
  when:
    - >-
      bootstrap_generate_playbook_repo_pause_after_generate
      | default(false)
      | bool
    - bootstrap_generate_playbook_repo_git_mode | default('manual') == 'manual'
