---
- name: Generate playbook repo | Resolve destination
  ansible.builtin.set_fact:
    generate_playbook_repo_dest_resolved: "{{ generate_playbook_repo_dest | default(playbook_dir, true) }}"

- name: Generate playbook repo | Ensure repo root exists
  ansible.builtin.file:
    path: "{{ generate_playbook_repo_dest_resolved }}"
    state: directory
    mode: "0755"

- name: Generate playbook repo | Ensure playbooks directory exists
  ansible.builtin.file:
    path: "{{ generate_playbook_repo_dest_resolved }}/playbooks"
    state: directory
    mode: "0755"

- name: Generate playbook repo | Ensure configs directory exists
  ansible.builtin.file:
    path: "{{ generate_playbook_repo_dest_resolved }}/configs"
    state: directory
    mode: "0755"

- name: Generate playbook repo | Copy seed repo content
  ansible.builtin.copy:
    src: "{{ generate_playbook_repo_seed_src }}/"
    dest: "{{ generate_playbook_repo_dest_resolved }}/"
    mode: preserve
    force: "{{ generate_playbook_repo_force | default(true) | bool }}"
  when: generate_playbook_repo_seed_src is defined

- name: Generate playbook repo | Normalize component selector
  ansible.builtin.set_fact:
    generate_playbook_repo_component_effective: >-
      {{
        component
        | default(playbook_component, true)
        | default(generate_playbook_repo_component, true)
        | default('all', true)
      }}

- name: Generate playbook repo | Resolve selected apps from component
  ansible.builtin.set_fact:
    generate_playbook_repo_selected_apps: >-
      {{
        generate_playbook_repo_component_map[
          generate_playbook_repo_component_effective
        ] | default([])
      }}

- name: Generate playbook repo | Validate component selector
  ansible.builtin.assert:
    that:
      - generate_playbook_repo_component_effective in generate_playbook_repo_component_map
    fail_msg: >-
      Invalid component '{{ generate_playbook_repo_component_effective }}'.
      Valid components: {{ generate_playbook_repo_component_map.keys() | list }}

- name: Generate playbook repo | Select playbooks by component
  ansible.builtin.set_fact:
    generate_playbook_repo_selected_playbooks: >-
      {{
        generate_playbook_repo_generated_playbooks
        if generate_playbook_repo_component_effective == 'all'
        else
        generate_playbook_repo_generated_playbooks
        | selectattr('app', 'in', generate_playbook_repo_selected_apps)
        | list
      }}

- name: Generate playbook repo | Ensure playbook component directories exist
  ansible.builtin.file:
    path: "{{ generate_playbook_repo_dest_resolved }}/{{ item.dest | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ generate_playbook_repo_selected_playbooks }}"

- name: Generate playbook repo | Copy selected playbooks into existing playbooks directory
  ansible.builtin.copy:
    src: "playbooks/{{ item.src }}"
    dest: "{{ generate_playbook_repo_dest_resolved }}/{{ item.dest }}"
    mode: "0644"
    force: "{{ generate_playbook_repo_force | default(true) | bool }}"
  loop: "{{ generate_playbook_repo_selected_playbooks }}"

- name: Generate playbook repo | Render controller project config from repo URL when provided
  ansible.builtin.template:
    src: controller_projects.yml.j2
    dest: "{{ generate_playbook_repo_dest_resolved }}/configs/controller_projects.yml"
    mode: "0644"
  when: generate_playbook_repo_git_url | default('') | length > 0

- name: Generate playbook repo | Show generated repo summary
  ansible.builtin.debug:
    msg:
      - "Repo root: {{ generate_playbook_repo_dest_resolved }}"
      - "Playbooks directory: {{ generate_playbook_repo_dest_resolved }}/playbooks"
      - "Configs directory: {{ generate_playbook_repo_dest_resolved }}/configs"
      - "Component: {{ generate_playbook_repo_component_effective }}"
      - "Selected apps: {{ generate_playbook_repo_selected_apps }}"
      - "Generated playbooks: {{ generate_playbook_repo_selected_playbooks | map(attribute='dest') | list }}"

- name: Generate playbook repo | Git init
  ansible.builtin.command: git init -b {{ generate_playbook_repo_git_branch | default('main') }}
  args:
    chdir: "{{ generate_playbook_repo_dest_resolved }}"
    creates: "{{ generate_playbook_repo_dest_resolved }}/.git"
  when: generate_playbook_repo_git_mode | default('manual') == 'push'

- name: Generate playbook repo | Configure git credential helper
  ansible.builtin.command: git config credential.helper store
  args:
    chdir: "{{ generate_playbook_repo_dest_resolved }}"
  when:
    - generate_playbook_repo_git_mode | default('manual') == 'push'
    - generate_playbook_repo_git_token | default('') | length > 0

- name: Generate playbook repo | Write git credentials
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME | default('/tmp') }}/.git-credentials"
    mode: "0600"
    content: >-
      {{ generate_playbook_repo_git_url
         | regex_replace('^(https?://)(.*)$',
           '\\1' ~ (generate_playbook_repo_git_username | default('oauth2') | urlencode) ~ ':' ~ (generate_playbook_repo_git_token | urlencode) ~ '@\\2')
      }}
  no_log: true
  when:
    - generate_playbook_repo_git_mode | default('manual') == 'push'
    - generate_playbook_repo_git_url | default('') | length > 0
    - generate_playbook_repo_git_token | default('') | length > 0

- name: Generate playbook repo | Disable git terminal prompts
  ansible.builtin.command: git config --local core.askPass true
  args:
    chdir: "{{ generate_playbook_repo_dest_resolved }}"
  changed_when: false
  when: generate_playbook_repo_git_mode | default('manual') == 'push'

- name: Generate playbook repo | Configure git remote
  ansible.builtin.shell: |
    set -euo pipefail
    if git remote | grep -qx '{{ generate_playbook_repo_git_remote | default("origin") }}'; then
      git remote set-url {{ generate_playbook_repo_git_remote | default("origin") }} '{{ generate_playbook_repo_git_url }}'
    else
      git remote add {{ generate_playbook_repo_git_remote | default("origin") }} '{{ generate_playbook_repo_git_url }}'
    fi
  args:
    chdir: "{{ generate_playbook_repo_dest_resolved }}"
    executable: /bin/bash
  changed_when: true
  when:
    - generate_playbook_repo_git_mode | default('manual') == 'push'
    - generate_playbook_repo_git_url | default('') | length > 0

- name: Generate playbook repo | Commit generated files
  ansible.builtin.shell: |
    set -euo pipefail
    git add .
    if git diff --cached --quiet; then
      echo "No changes to commit"
    else
      git commit -m '{{ generate_playbook_repo_git_message | default("Generate bootstrap playbook repo") }}'
    fi
  args:
    chdir: "{{ generate_playbook_repo_dest_resolved }}"
    executable: /bin/bash
  register: generate_playbook_repo_git_commit_result
  changed_when: "'No changes to commit' not in generate_playbook_repo_git_commit_result.stdout"
  when: generate_playbook_repo_git_mode | default('manual') == 'push'

- name: Generate playbook repo | Push generated repo
  ansible.builtin.command: >-
    git push -u {{ generate_playbook_repo_git_remote | default('origin') }} {{ generate_playbook_repo_git_branch | default('main') }}
  args:
    chdir: "{{ generate_playbook_repo_dest_resolved }}"
  when:
    - generate_playbook_repo_git_mode | default('manual') == 'push'
    - generate_playbook_repo_git_url | default('') | length > 0

- name: Generate playbook repo | Pause for manual git push
  ansible.builtin.pause:
    prompt: "{{ generate_playbook_repo_pause_prompt | default('Playbooks were generated. Push them to Git now, then press ENTER to continue.') }}"
  when:
    - generate_playbook_repo_pause_after_generate | default(false) | bool
    - generate_playbook_repo_git_mode | default('manual') == 'manual'
