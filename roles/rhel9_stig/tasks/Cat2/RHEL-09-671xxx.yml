---

- name: "MEDIUM | RHEL-09-671015 | PATCH | RHEL 9 must employ FIPS 140-3 approved cryptographic hashing algorithms for all stored passwords."
  when: rhel_09_671015
  tags:
    - RHEL-09-671015
    - CAT2
    - CCI-000803
    - CCI-000196
    - SRG-OS-000073-GPOS-00041
    - SRG-OS-000120-GPOS-00061
    - SV-258231r1015135_rule
    - V-258231
    - NIST800-53R4_IA-7
    - NIST800-53R4_IA-5
    - fips
    - users
  block:
    - name: "MEDIUM | RHEL-09-671015 | AUDIT | RHEL 9 must employ FIPS 140-3 approved cryptographic hashing algorithms
             for all stored passwords. | Get user accounts not using FIPS 140-3 hashing"
      ansible.builtin.shell: >
        set -o pipefail &&
        awk -F: '$2 !~ /^(\*|!|\$6\$)/ {print $1}' /etc/shadow
      changed_when: false
      failed_when: false
      register: rhel9_stig_discovered_non_fips_hashed_accounts

    - name: "MEDIUM | RHEL-09-671015 | PATCH | RHEL 9 must employ FIPS 140-3 approved cryptographic hashing algorithms
             for all stored passwords. | Lock user not using FIPS 140-3 hashing"
      when:
        - rhel9_stig_discovered_non_fips_hashed_accounts.stdout | length > 0
        - rhel9_stig_disruption_high
      ansible.builtin.command: "passwd -l {{ item }}"
      changed_when: true
      loop:
        - "{{ rhel9_stig_discovered_non_fips_hashed_accounts.stdout_lines }}"

    - name: "MEDIUM | RHEL-09-671015 | AUDIT | RHEL 9 must employ FIPS 140-3 approved cryptographic hashing algorithms
             for all stored passwords. | Message out user accounts"
      when:
        - not rhel9_stig_disruption_high
        - rhel9_stig_discovered_non_fips_hashed_accounts.stdout | length > 0
      ansible.builtin.debug:
        msg:
          - >-
              WARNING!! The following accounts do not have FIPS 140-3 hashing. Please review the accounts and
              correct to conform to control 010120 of the RHEL9 STIG
          - "{{ rhel9_stig_discovered_non_fips_hashed_accounts.stdout_lines }}"

- name: "MEDIUM | RHEL-09-671020 | PATCH | RHEL 9 IP tunnels must use FIPS 140-2/140-3 approved cryptographic algorithms."
  when:
    - rhel_09_671020
    - "'ipsec' in ansible_facts.packages"
  tags:
    - RHEL-09-671020
    - CAT2
    - CCI-000068
    - SRG-OS-000033-GPOS-00014
    - SV-258232r1045440_rule
    - V-258232
    - NIST800-53R4_AC-17
    - fips
    - tunnel
  ansible.builtin.lineinfile:
    path: /etc/ipsec.conf
    regexp: ^(#|)\s*include /etc/crypto-policies/back-ends
    line: include /etc/crypto-policies/back-ends/libreswan.config

- name: "MEDIUM | RHEL-09-671025 | PATCH |  RHEL 9 pam_unix.so module must be configured in the password-auth
         file to use a FIPS 140-3 approved cryptographic hashing algorithm for system authentication."
  when: rhel_09_671025
  tags:
    - RHEL-09-671025
    - CAT2
    - CCI-000196
    - SRG-OS-000073-GPOS-00041
    - SV-258233r1015136_rule
    - V-258233
    - NIST800-53R4_AC-5
    - pam
  block:
    - name: "MEDIUM | RHEL-09-671025 | AUDIT |  RHEL 9 pam_unix.so module must be configured in the password-auth
             file to use a FIPS 140-3 approved cryptographic hashing algorithm for system authentication."
      ansible.builtin.shell: 'set -o pipefail && grep "password.*pam_unix.so" /etc/pam.d/password-auth'
      changed_when: false
      failed_when: rhel9_stig_discovered_fips_auth_status.rc not in [ 0, 1 ]
      register: rhel9_stig_discovered_fips_auth_status

    - name: "MEDIUM | RHEL-09-671025 | PATCH |  RHEL 9 pam_unix.so module must be configured in the password-auth
             file to use a FIPS 140-3 approved cryptographic hashing algorithm for system authentication."
      when: rhel9_stig_discovered_fips_auth_status.stdout | length == 0
      ansible.builtin.lineinfile:
        path: /etc/pam.d/password-auth
        regexp: '^password\s+sufficient\s+pam_unix\.so'
        line: 'password sufficient pam_unix.so sha512'
        insertafter: '^password'

    - name: "MEDIUM | RHEL-09-671025 | PATCH |  RHEL 9 pam_unix.so module must be configured in the password-auth
             file to use a FIPS 140-3 approved cryptographic hashing algorithm for system authentication."
      when: rhel9_stig_discovered_fips_auth_status.stdout | length > 0
      community.general.pamd:
        name: password-auth
        type: password
        control: sufficient
        module_path: pam_unix.so
        module_arguments: 'sha512'
        state: args_present
