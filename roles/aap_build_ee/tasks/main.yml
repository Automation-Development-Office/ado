---
# tasks file for aap_build_ee

- name: Assert required role inputs are not blank
  ansible.builtin.assert:
    that:
      - aap_build_ee_base_ee | trim | length > 0
      - aap_build_ee_source_image_repository | trim | length > 0
      - >-
        (aap_build_ee_collections | length > 0) or
        (aap_build_ee_collection_files | length > 0)
    fail_msg: >-
      Required variables aap_build_ee_base_ee,
      aap_build_ee_source_image_repository, and at least
      one of aap_build_ee_collections or
      aap_build_ee_collection_files must be provided with values.

- name: Normalize aap_build_ee_collections input
  ansible.builtin.set_fact:
    __aap_build_ee_collections: "{{ __aap_build_ee_normalized }}"
  vars:
    __aap_build_ee_input: "{{ aap_build_ee_collections | default({}, true) }}"
    __aap_build_ee_is_list: >-
      {{
        __aap_build_ee_input is sequence
        and __aap_build_ee_input is not string
        and __aap_build_ee_input is not mapping
      }}
    __aap_build_ee_is_flat_object: >-
      {{
        __aap_build_ee_input is mapping
        and __aap_build_ee_input | length > 0
        and ('name' in __aap_build_ee_input)
        and (__aap_build_ee_input.keys() | list | difference(['name', 'version']) | length == 0)
      }}
    __aap_build_ee_normalized: >-
      {%- set result = [] -%}
      {%- if __aap_build_ee_is_list -%}
      {%- for item in __aap_build_ee_input -%}
      {%- set _ = result.append({'name': item.name | string, 'version': item.version | default('') | string}) -%}
      {%- endfor -%}
      {%- elif __aap_build_ee_is_flat_object -%}
      {%- set _ = result.append({'name': __aap_build_ee_input.name | string, 'version': __aap_build_ee_input.version | default('') | string}) -%}
      {%- elif __aap_build_ee_input is mapping and __aap_build_ee_input | length > 0 -%}
      {%- for item in __aap_build_ee_input | dict2items -%}
      {%- set _ = result.append({'name': item.key | string, 'version': item.value | default('') | string}) -%}
      {%- endfor -%}
      {%- endif -%}
      {{ result }}

- name: Assert normalized collection requirements include collection names
  ansible.builtin.assert:
    that:
      - __aap_build_ee_collection.name | default('') | trim | length > 0
    fail_msg: >-
      Each item in aap_build_ee_collections must include a non-empty name.
      Accepted formats are dict keyed by collection name, a list of name/version
      objects, or a single flat object with name and version keys.
  loop: "{{ __aap_build_ee_collections }}"
  loop_control:
    loop_var: __aap_build_ee_collection
  when: __aap_build_ee_collections | length > 0

- name: Set resolved base EE image reference
  ansible.builtin.set_fact:
    aap_build_ee_base_image: >-
      {{ aap_build_ee_source_image_repository | regex_replace('/$', '') }}/{{ aap_build_ee_base_ee }}

- name: Ensure ansible-builder executable is available
  ansible.builtin.command:
    argv:
      - "{{ aap_build_ee_builder_executable }}"
      - --version
  register: aap_build_ee_builder_check
  changed_when: false

- name: Ensure build context directory exists
  ansible.builtin.file:
    path: "{{ aap_build_ee_build_context }}"
    state: directory
    mode: "0755"

- name: Check local collection artifact files
  ansible.builtin.stat:
    path: "{{ aap_build_ee_collection_file }}"
  loop: "{{ aap_build_ee_collection_files }}"
  loop_control:
    loop_var: aap_build_ee_collection_file
  register: aap_build_ee_collection_file_stats

- name: Assert local collection artifact files exist
  ansible.builtin.assert:
    that:
      - aap_build_ee_collection_file_stat.stat.exists
      - aap_build_ee_collection_file_stat.stat.isreg
    fail_msg: >-
      Local collection artifact not found or not a regular file:
      {{ aap_build_ee_collection_file_stat.stat.path | default('undefined path') }}
  loop: "{{ aap_build_ee_collection_file_stats.results }}"
  loop_control:
    loop_var: aap_build_ee_collection_file_stat

- name: Assert local collection artifact file names are unique
  ansible.builtin.assert:
    that:
      - >-
        (aap_build_ee_collection_files | map('basename') | list | unique | length) ==
        (aap_build_ee_collection_files | length)
    fail_msg: >-
      Local collection artifact file names must be unique when copied to build context.
      Rename duplicate basenames before running this role.
  when: aap_build_ee_collection_files | length > 0

- name: Ensure local collection artifact staging directory exists
  ansible.builtin.file:
    path: "{{ aap_build_ee_build_context }}/collection-artifacts"
    state: directory
    mode: "0755"
  when: aap_build_ee_collection_files | length > 0

- name: Create execution environment definition file
  ansible.builtin.template:
    src: execution-environment.yml.j2
    dest: "{{ aap_build_ee_build_context }}/execution-environment.yml"
    mode: "0644"

- name: Create collection requirements file
  ansible.builtin.template:
    src: requirements.yml.j2
    dest: "{{ aap_build_ee_build_context }}/requirements.yml"
    mode: "0644"

- name: Build custom execution environment image
  ansible.builtin.command:
    argv:
      - "{{ aap_build_ee_builder_executable }}"
      - build
      - --context
      - "{{ aap_build_ee_build_context }}"
      - --file
      - "{{ aap_build_ee_build_context }}/execution-environment.yml"
      - --tag
      - "{{ aap_build_ee_output_image }}"
  register: aap_build_ee_build
  changed_when: aap_build_ee_build.rc == 0
