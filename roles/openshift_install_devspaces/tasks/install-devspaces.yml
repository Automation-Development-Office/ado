# ----------------------------
# 0) Resolve namespaces
# ----------------------------
- name: Resolve DevSpaces namespaces
  ansible.builtin.set_fact:
    _devspaces_operator_ns: "{{ operator_namespace | default(name_space) }}"
    _devspaces_app_ns: "{{ app_namespace | default('devspaces') }}"

# ----------------------------
# 1) Wait for Dev Spaces CSV (operator install namespace)
# ----------------------------
- name: Wait for Dev Spaces CSV to reach 'Succeeded'
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ _devspaces_operator_ns }}"
  register: devspaces_csvs
  retries: 30
  delay: 10
  until: >
    (devspaces_csvs.resources | default([])) |
    selectattr('metadata.name', 'search', 'devspacesoperator') |
    selectattr('status.phase', 'equalto', 'Succeeded') |
    list | length > 0

# ----------------------------
# 2) Ensure app namespace exists
# ----------------------------
- name: Ensure DevSpaces app namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ _devspaces_app_ns }}"

# ----------------------------
# 3) Deploy CheCluster in app namespace (devspaces)
# ----------------------------
- name: Deploy CheCluster to enable DevSpaces (app namespace)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: org.eclipse.che/v2
      kind: CheCluster
      metadata:
        name: devspaces
        namespace: "{{ _devspaces_app_ns }}"
      spec:
        server:
          cheImageTag: "3.20.0"
          dashboardImage: "quay.io/eclipse/che-dashboard:3.20.0"
          devfileRegistryUrl: "https://che-devfile-registry.openshift.io"
          pluginsRegistryUrl: "https://che-plugin-registry.openshift.io"

# ----------------------------
# 4) Wait for CheCluster to become usable (cheURL present)
# ----------------------------
- name: Wait for CheCluster to report cheURL
  kubernetes.core.k8s_info:
    api_version: org.eclipse.che/v2
    kind: CheCluster
    name: devspaces
    namespace: "{{ _devspaces_app_ns }}"
  register: devspaces_checluster
  retries: 60
  delay: 10
  until: >
    (devspaces_checluster.resources | default([]) | length) > 0 and
    ((devspaces_checluster.resources[0].status.cheURL | default('')) | length) > 0

# Optional: show what URL it picked (useful for debugging)
- name: Show DevSpaces URL
  ansible.builtin.debug:
    msg:
      - "DevSpaces operator namespace: {{ _devspaces_operator_ns }}"
      - "DevSpaces app namespace: {{ _devspaces_app_ns }}"
      - "cheURL: {{ devspaces_checluster.resources[0].status.cheURL | default('') }}"
      - "pluginRegistryURL: {{ devspaces_checluster.resources[0].status.pluginRegistryURL | default('') }}"
      - "devfileRegistryURL: {{ devspaces_checluster.resources[0].status.devfileRegistryURL | default('') }}"
