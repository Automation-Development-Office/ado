---

- name: Validate required variables for publishing
  ansible.builtin.assert:
    that:
      - satellite_url is defined
      - satellite_username is defined
      - satellite_password is defined
      - organization is defined
      - content_view is defined
    fail_msg: "One or more required variables for publishing the Content View are missing."
    success_msg: "All required variables for publishing are defined."

- name: Publish Content View
  redhat.satellite.content_view_version:
    server_url: "{{ satellite_url }}"
    username: "{{ satellite_username }}"
    password: "{{ satellite_password }}"
    validate_certs: false
    content_view: "{{ content_view }}"
    organization: "{{ organization }}"
    state: present
  delegate_to: localhost
  register: platform_content_view_publish_result

- name: Debug published Content View version
  ansible.builtin.debug:
    var: platform_content_view_publish_result
    verbosity: 1
  when:
    - platform_content_view_publish_result is defined
