---
# tasks file for utilities_build_execution_environment

- name: Assert required role inputs are not blank
  ansible.builtin.assert:
    that:
      - utilities_build_execution_environment_base_ee | trim | length > 0
      - utilities_build_execution_environment_source_image_repository | trim | length > 0
      - >-
        (utilities_build_execution_environment_collections | length > 0) or
        (utilities_build_execution_environment_collection_files | length > 0)
    fail_msg: >-
      Required variables utilities_build_execution_environment_base_ee,
      utilities_build_execution_environment_source_image_repository, and at least
      one of utilities_build_execution_environment_collections or
      utilities_build_execution_environment_collection_files must be provided with values.

- name: Set resolved base EE image reference
  ansible.builtin.set_fact:
    utilities_build_execution_environment_base_image: >-
      {{ utilities_build_execution_environment_source_image_repository | regex_replace('/$', '') }}/{{ utilities_build_execution_environment_base_ee }}

- name: Ensure ansible-builder executable is available
  ansible.builtin.command:
    argv:
      - "{{ utilities_build_execution_environment_builder_executable }}"
      - --version
  register: utilities_build_execution_environment_builder_check
  changed_when: false

- name: Ensure build context directory exists
  ansible.builtin.file:
    path: "{{ utilities_build_execution_environment_build_context }}"
    state: directory
    mode: "0755"

- name: Check local collection artifact files
  ansible.builtin.stat:
    path: "{{ utilities_build_execution_environment_collection_file }}"
  loop: "{{ utilities_build_execution_environment_collection_files }}"
  loop_control:
    loop_var: utilities_build_execution_environment_collection_file
  register: utilities_build_execution_environment_collection_file_stats

- name: Assert local collection artifact files exist
  ansible.builtin.assert:
    that:
      - utilities_build_execution_environment_collection_file_stat.stat.exists
      - utilities_build_execution_environment_collection_file_stat.stat.isreg
    fail_msg: >-
      Local collection artifact not found or not a regular file:
      {{ utilities_build_execution_environment_collection_file_stat.stat.path | default('undefined path') }}
  loop: "{{ utilities_build_execution_environment_collection_file_stats.results }}"
  loop_control:
    loop_var: utilities_build_execution_environment_collection_file_stat

- name: Assert local collection artifact file names are unique
  ansible.builtin.assert:
    that:
      - >-
        (utilities_build_execution_environment_collection_files | map('basename') | list | unique | length) ==
        (utilities_build_execution_environment_collection_files | length)
    fail_msg: >-
      Local collection artifact file names must be unique when copied to build context.
      Rename duplicate basenames before running this role.
  when: utilities_build_execution_environment_collection_files | length > 0

- name: Ensure local collection artifact staging directory exists
  ansible.builtin.file:
    path: "{{ utilities_build_execution_environment_build_context }}/collection-artifacts"
    state: directory
    mode: "0755"
  when: utilities_build_execution_environment_collection_files | length > 0

- name: Copy local collection artifacts into build context
  ansible.builtin.copy:
    src: "{{ utilities_build_execution_environment_collection_file }}"
    dest: >-
      {{ utilities_build_execution_environment_build_context }}/collection-artifacts/{{
      utilities_build_execution_environment_collection_file | basename }}
    remote_src: true
    mode: "0644"
  loop: "{{ utilities_build_execution_environment_collection_files }}"
  loop_control:
    loop_var: utilities_build_execution_environment_collection_file

- name: Set staged local collection artifact paths
  ansible.builtin.set_fact:
    utilities_build_execution_environment_staged_collection_files: >-
      {{
        utilities_build_execution_environment_collection_files
        | map('basename')
        | map('regex_replace', '^', 'collection-artifacts/')
        | list
      }}

- name: Create execution environment definition file
  ansible.builtin.template:
    src: execution-environment.yml.j2
    dest: "{{ utilities_build_execution_environment_build_context }}/execution-environment.yml"
    mode: "0644"

- name: Create collection requirements file
  ansible.builtin.template:
    src: requirements.yml.j2
    dest: "{{ utilities_build_execution_environment_build_context }}/requirements.yml"
    mode: "0644"

- name: Build custom execution environment image
  ansible.builtin.command:
    argv:
      - "{{ utilities_build_execution_environment_builder_executable }}"
      - build
      - --context
      - "{{ utilities_build_execution_environment_build_context }}"
      - --file
      - "{{ utilities_build_execution_environment_build_context }}/execution-environment.yml"
      - --tag
      - "{{ utilities_build_execution_environment_output_image }}"
  register: utilities_build_execution_environment_build
  changed_when: utilities_build_execution_environment_build.rc == 0
