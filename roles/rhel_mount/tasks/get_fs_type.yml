---
- name: Use blkid to find the filesystem type
  ansible.builtin.command: "blkid {{ rhel_mount_target_device }}"
  register: rhel_mount_blkid_result
  changed_when: false # This command only reads data, it doesn't change the system

- name: Parse the FSTYPE from blkid output
  ansible.builtin.set_fact:
    rhel_mount_detected_fstype: "{{ rhel_mount_blkid_result.stdout | regex_search('TYPE=\"([^\"]+)\"', '\\1') | first | default('none detected') }}"

- name: Display the detected filesystem type
  ansible.builtin.debug:
    verbosity: 1
    msg: "The device {{ rhel_mount_target_device }} has filesystem type: {{ rhel_mount_detected_fstype }} "
