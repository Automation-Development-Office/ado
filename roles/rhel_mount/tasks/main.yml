---
# tasks file for mount

- name: Assert rhel_mount_action required variable is defined
  ansible.builtin.assert:
    that:
      - rhel_mount_action is defined
      - rhel_mount_action in ['mounted', 'unmounted', 'absent']
    fail_msg: "rhel_mount_action variable must be defined (either 'mounted', 'unmounted', or 'absent')"

- name: Assert rhel_mount_path required variable is defined when mounting or unmounting
  ansible.builtin.assert:
    that:
      - rhel_mount_path is defined
    fail_msg: "rhel_mount_path variable must be defined when mounting or unmounting or removing"

- name: Assert rhel_mount_fstype required variable is defined when mounting and detection is set to false
  ansible.builtin.assert:
    that:
      - rhel_mount_fstype is defined
    fail_msg: "rhel_mount_fstype variable must be defined when mounting without detection"
  when: rhel_mount_action == 'mounted' and not rhel_mount_fstype_detection

- name: Install latest efs-utils
  ansible.builtin.import_tasks: get_fs_type.yml
  when: rhel_mount_fstype_detection

- name: Mount filesystem tasks
  ansible.builtin.import_tasks:
    file: mount_filesystem.yml
  when: rhel_mount_path is defined and rhel_mount_target_device is defined and rhel_mount_action in ['mounted']

- name: Unmount filesystem tasks
  ansible.builtin.import_tasks: unmount_filesystem.yml
  when: rhel_mount_path is defined and rhel_mount_action in ['unmounted']

- name: Remove filesystem from fstab
  when: rhel_mount_action in ['absent']
  block:
    - name: Unmount filesystem tasks
      ansible.builtin.import_tasks: unmount_filesystem.yml

    - name: Remove mount from fstab if unmounted
      ansible.builtin.import_tasks: remove_mount_from_fstab.yml
