- name: Login to RHBK and get admin token
  ansible.builtin.uri:
    url: "https://{{ rhbk_host }}/realms/master/protocol/openid-connect/token"
    method: POST
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ rhbk_admin_user }}"
      password: "{{ rhbk_admin_password }}"
    validate_certs: "{{ rhbk_verify_ssl }}"
    return_content: true
  register: rhbk_users_auth

- name: Lookup user by username
  ansible.builtin.uri:
    url: "https://{{ rhbk_host }}/admin/realms/{{ rhbk_realm }}/users?username={{ rhbk_user_username }}"
    method: GET
    headers:
      Authorization: "Bearer {{ rhbk_users_auth.json.access_token }}"
    return_content: true
    validate_certs: "{{ rhbk_verify_ssl }}"
  register: rhbk_users_user_lookup

- name: Set rhbk_users_user_id fact if user is found
  ansible.builtin.set_fact:
    rhbk_users_user_id: >-
      {{
        (rhbk_users_user_lookup.json | selectattr('username', 'equalto', rhbk_user_username) | list | first).id
        if rhbk_users_user_lookup.json | length > 0 else ''
      }}

- name: Delete user
  ansible.builtin.uri:
    url: "https://{{ rhbk_host }}/admin/realms/{{ rhbk_realm }}/users/{{ rhbk_users_user_id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ rhbk_users_auth.json.access_token }}"
    status_code: [204, 404]
    validate_certs: "{{ rhbk_verify_ssl }}"
  when: rhbk_users_user_id != ''
