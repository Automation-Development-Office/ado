---

- name: Validate required variables for creation
  ansible.builtin.assert:
    that:
      - satellite_url is defined
      - satellite_username is defined
      - satellite_password is defined
      - organization is defined
      - content_view is defined
    fail_msg: "One or more required variables for creating the Content View are missing."
    success_msg: "All required variables for creation are defined."

- name: Create Content View in Satellite
  redhat.satellite.content_view:
    server_url: "{{ satellite_url }}"
    username: "{{ satellite_username }}"
    password: "{{ satellite_password }}"
    validate_certs: false
    name: "{{ content_view }}"
    organization: "{{ organization }}"
    state: present
  delegate_to: localhost
  register: satellite_content_view_create_result

- name: Debug Content View result
  ansible.builtin.debug:
    var: satellite_content_view_create_result
    verbosity: 1
  when: satellite_content_view_create_result is defined
