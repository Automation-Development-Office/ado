---
- name: Get all storage classes
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    kubeconfig: "{{ kubeconfig_tmp }}"
  register: openshift_configure_iscsi_storage_classes

- name: Set fact if default storage class exists
  ansible.builtin.set_fact:
    openshift_configure_iscsi_storage_has_default_storage_class: >-
      {{
        openshift_configure_iscsi_storage_classes.resources
        | selectattr('metadata.annotations.storageclass\\.kubernetes\\.io/is-default-class', 'equalto', 'true')
        | list
        | length > 0
      }}

- name: Create synology-csi namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: synology-csi
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Create client-info-secret from file
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    namespace: synology-csi
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: client-info-secret
      type: Opaque
      data:
        client-info.yml: "{{ lookup('file', synology_dir + '/client-info.yml') | b64encode }}"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply synology-csi-scc.yml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ synology_dir }}/synology-csi-scc.yml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply controller.yml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ deploy_dir }}/controller.yml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply csi-driver.yml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ deploy_dir }}/csi-driver.yml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply node.yml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ deploy_dir }}/node.yml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply storage-class.yml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ synology_dir }}/storage-class.yml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply snapshotter.yaml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ deploy_dir }}/snapshotter/snapshotter.yaml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class

- name: Apply volume-snapshot-class.yml
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_tmp }}"
    state: present
    src: "{{ deploy_dir }}/snapshotter/volume-snapshot-class.yml"
  when: not openshift_configure_iscsi_storage_has_default_storage_class
