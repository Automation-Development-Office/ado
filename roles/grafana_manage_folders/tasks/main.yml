- name: Normalize grafana_manage_folders variables
  ansible.builtin.set_fact:
    grafana_manage_folders_state: >-
      {{
        grafana_manage_folders_state
        | default(applications_grafana_manage_folder_state | default(state | default('present')))
      }}
    grafana_manage_folders_name: >-
      {{
        grafana_manage_folders_name
        | default(applications_grafana_manage_folder_name | default(grafana_folder | default('General')))
      }}
    grafana_manage_folders_hostname: >-
      {{
        grafana_manage_folders_hostname
        | default(applications_grafana_manage_folder_hostname | default(grafana_hostname | default('')))
      }}
    grafana_manage_folders_admin_user: >-
      {{
        grafana_manage_folders_admin_user
        | default(applications_grafana_manage_folder_admin_user | default(grafana_admin_user | default('')))
      }}
    grafana_manage_folders_admin_password: >-
      {{
        grafana_manage_folders_admin_password
        | default(
            applications_grafana_manage_folder_admin_password
            | default(grafana_admin_password | default(''))
          )
      }}
    grafana_manage_folders_validate_certs: >-
      {{
        grafana_manage_folders_validate_certs
        | default(
            applications_grafana_manage_folder_validate_certs
            | default(grafana_validate_certs | default(false))
          )
      }}

- name: Create grafana folder
  ansible.builtin.import_tasks: grafana-manage-folder.yml
  when: grafana_manage_folders_state == "present"
