- name: Create/Update a Folder in Grafana
  community.grafana.grafana_folder:
    title: "{{ grafana_manage_folders_name }}"
    uid: "{{ grafana_manage_folders_name }}-folder"
    url: "https://{{ grafana_manage_folders_hostname }}"
    url_username: "{{ grafana_manage_folders_admin_user }}"
    url_password: "{{ grafana_manage_folders_admin_password }}"
    state: "{{ grafana_manage_folders_state }}"
    validate_certs: "{{ grafana_manage_folders_validate_certs }}"
