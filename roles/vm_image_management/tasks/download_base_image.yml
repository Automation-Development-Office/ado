---
- name: Download base image if requested
  ansible.builtin.get_url:
    url: "{{ vm_image_management_base }}"
    dest: "/var/lib/libvirt/images/{{ vm_image_management_base | basename }}"
    mode: "0644"
  when:
    - vm_image_management_download
    - vm_image_management_base is match("http")
