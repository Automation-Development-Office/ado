---
- name: Assert that vm_image_management_base_path is not blank
  ansible.builtin.assert:
    that:
      - vm_image_management_base_path != ""
    fail_msg: "{{ vm_image_management_base_path }} is empty"
    success_msg: "Your new image will be based on {{ vm_image_management_base_path }}"
  when:
    - not vm_image_management_download
    - vm_image_management_action == "create"

- name: Assert that vm_image_management_dest_path is not blank
  ansible.builtin.assert:
    that:
      - vm_image_management_dest_path != ""
    fail_msg: "{{ vm_image_management_dest_path }} is empty"
    success_msg: "Your new image will be created at {{ vm_image_management_dest_path }}"
  when:
    - vm_image_management_action == "create"
    - not vm_image_management_download
