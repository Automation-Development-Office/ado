---
- name: Secret Replicator
  hosts: localhost
  gather_facts: false

  vars:
    # Replication toggles
    openshift_tools_secret_replicator_cluster_replication: true
    openshift_tools_secret_replicator_namespace_replication: true
    openshift_tools_secret_replicator_vault_push: false

    # Source secret
    openshift_tools_secret_replicator_source_secret_name: "source-secret-name"
    openshift_tools_secret_replicator_source_namespace: "source-namespace"

    # Target namespaces
    openshift_tools_secret_replicator_target_namespaces:
      - "dev-app"
      - "staging-app"
      - "qa-app"

    # Target clusters
    openshift_tools_secret_replicator_target_clusters:
      - { context: 'cluster-east', ns: 'prod' }
      - { context: 'cluster-west', ns: 'prod' }
      - { context: 'cluster-dev',  ns: 'sandbox' }

    # Hashicorp Vault
    openshift_tools_secret_replicator_vault_url: ""
    openshift_tools_secret_replicator_vault_token: ""
    openshift_tools_secret_replicator_vault_kv_mount: "secret"
    openshift_tools_secret_replicator_vault_kv_path: "{{ openshift_tools_secret_replicator_source_namespace }}/{{ openshift_tools_secret_replicator_source_secret_name }}"
    openshift_tools_secret_replicator_vault_namespace: ""
    openshift_tools_secret_replicator_vault_validate_certs: true
    openshift_tools_secret_replicator_vault_secret_values_base64: false
    openshift_tools_secret_replicator_vault_store_k8s_secret_type: true
    openshift_tools_secret_replicator_vault_k8s_secret_type_key: "k8s_secret_type"

  environment:
    K8S_AUTH_VERIFY_SSL: "no"
  #   K8S_AUTH_HOST: "{{ k8s[env].host }}"
  #   K8S_AUTH_API_KEY: "{{ k8s[env].token }}"
  #   K8S_AUTH_VERIFY_SSL: "{{ (k8s[env].verify_ssl | bool) | ternary('yes','no') }}"
  # pre_tasks:
  #   - name: Flatten all k8s[env] vars
  #     ansible.builtin.set_fact:
  #       "{{ item.key }}": "{{ item.value }}"
  #     loop: "{{ k8s[env] | dict2items }}"

  roles:
    - role: infra.ado.openshift_tools_secret_replicator