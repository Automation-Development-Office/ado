---
- name: Wait for Compliance Operator pods to be running
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ name_space | default('openshift-compliance') }}"
  register: openshift_install_compliance_operator_pods

- name: Check for running Compliance Operator pods
  ansible.builtin.set_fact:
    openshift_install_compliance_operator_running: >-
      {{ openshift_install_compliance_operator_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0 }}

- name: Wait until at least one Compliance Operator pod is running
  ansible.builtin.wait_for:
    timeout: 600
    path: "/dev/null"
  when: openshift_install_compliance_operator_running
