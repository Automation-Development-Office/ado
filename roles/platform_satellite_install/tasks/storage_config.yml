---
- name: storage_config | Check to see if LVM exists from previous install attempt
  ansible.builtin.set_fact:
    platform_satellite_install_lvm_exists: true
  when: ansible_facts['lvm']['vgs'][platform_satellite_install_satellite_vg_name] is defined

# - name: create platform_satellite_install_data_disk_list
#  ansible.builtin.set_fact:
#    platform_satellite_install_data_disk_list: ''

- name: storage_config | Find existing storage device
  ansible.builtin.set_fact:
    platform_satellite_install_satellite_data_disk: "{{ item['key'] }}"
  loop: "{{ ansible_facts['lvm']['pvs'] | dict2items }}"
  when: item['value']['vg'] == platform_satellite_install_satellite_vg_name and platform_satellite_install_lvm_exists

- name: storage_config | Debug devices
  ansible.builtin.debug:
    var: ansible_facts['devices']

- name: storage_config | Set variable for suitable disks
  ansible.builtin.debug:
    var: "item"
  loop: "{{ ansible_facts['devices'] | dict2items }}"
  when:
    - platform_satellite_install_satellite_data_disk is not defined
    - item['key'] is search("vd") or item['key'] is search("xvd") or item['key'] is search("sd")
    - item['value']['size'] | human_to_bytes >= platform_satellite_install_satellite_data_disk_min_size | string | human_to_bytes(default_unit="G")
    - not item['value']['partitions']
    - not item['value']['holders']       # Holders = Mountpoints


# TODO multiple when statements for the block, fix if needed
- name: storage_config | Find suitable disk device for installation
  when:
    - platform_satellite_install_satellite_data_device_name is not defined
    - platform_satellite_install_data_disk_list is not defined
  block:
    - name: storage_config | Set variable for suitable disks
      ansible.builtin.set_fact:
        platform_satellite_install_data_disk_list: "{{ platform_satellite_install_data_disk_list | default([]) + [item['key']] }}"
      loop: "{{ ansible_facts['devices'] | dict2items }}"
      when:
        - platform_satellite_install_satellite_data_disk is not defined
        - item['key'] is search("vd") or item['key'] is search("xvd") or item['key'] is search("sd")
        - item['value']['size'] | human_to_bytes >= platform_satellite_install_satellite_data_disk_min_size | string | human_to_bytes(default_unit="G")
        - not item['value']['partitions']
        - not item['value']['holders']       # Holders = Mountpoints
        - platform_satellite_install_data_disk_list is not defined

    - name: storage_config | Print list of suitable disks
      ansible.builtin.debug:
        var: platform_satellite_install_data_disk_list

      # TODO Add platform_satellite_install_data_disk_list to the fail_msg
    - name: storage_config | Assert that there is only one suitable disk for Satellite
      ansible.builtin.assert:
        that:
          - platform_satellite_install_data_disk_list | length == 1
        fail_msg: "There are multiple disks that can be used. Please manually define platform_satellite_install_satellite_data_device_name and rerun"

    - name: storage_config | Define Satellite data disk
      ansible.builtin.set_fact:
        platform_satellite_install_satellite_data_disk: "{{ platform_satellite_install_satellite_data_device }}/{{ platform_satellite_install_data_disk_list[0] }}"
      loop: "{{ ansible_facts['devices'] | dict2items }}"
      when:
        - platform_satellite_install_satellite_data_disk is not defined
        - item['key'] is search("vd") or item['key'] is search("xvd") or item['key'] is search("sd")
        - item['value']['size'] | human_to_bytes >= platform_satellite_install_satellite_data_disk_min_size | string | human_to_bytes(default_unit="G")
        - not item['value']['partitions']
        - not item['value']['holders']
        - platform_satellite_install_data_disk_list is not defined

- name: storage_config | Ensure lvm2 package is installed
  ansible.builtin.dnf:
    name: lvm2
    state: present

# https://access.redhat.com/documentation/en-us/red_hat_satellite/6.15/pdf/installing_satellite_server_in_a_connected_network_environment/red_hat_satellite-6.15-installing_satellite_server_in_a_connected_network_environment-en-us.pdf
# See Section 1.2 - Table 1.1
- name: storage_config | Create the directory path to Satellite's required dirs
  ansible.builtin.file:
    path: "{{ item['mount_point'] }}"
    state: directory
    mode: '0755'
  loop: "{{ platform_satellite_install_satellite_req_dirs }}"

- name: storage_config | Create the volume group.
  community.general.lvg:
    vg: "{{ platform_satellite_install_satellite_vg_name }}"
    pvs: "{{ platform_satellite_install_satellite_data_disk }}"

- name: storage_config | Create the logical volumes to be mounted to Satellite's required dirs
  community.general.lvol:
    vg: "{{ platform_satellite_install_satellite_vg_name }}"
    lv: "{{ item['lv_name'] }}"
    size: "{{ item['lv_size'] }}"
  loop: "{{ platform_satellite_install_satellite_req_dirs }}"

- name: storage_config | Create a filesystem on the logical volumes that were just created
  community.general.filesystem:
    fstype: xfs
    dev: /dev/mapper/{{ platform_satellite_install_satellite_vg_name }}-{{ item['lv_name'] }}
  loop: "{{ platform_satellite_install_satellite_req_dirs }}"

- name: storage_config | Mount the additional disk used to Satellite's data dir
  ansible.posix.mount:
    path: "{{ item['mount_point'] }}"
    src: /dev/mapper/{{ platform_satellite_install_satellite_vg_name }}-{{ item['lv_name'] }}
    fstype: xfs
    state: mounted
  loop: "{{ platform_satellite_install_satellite_req_dirs }}"
...
