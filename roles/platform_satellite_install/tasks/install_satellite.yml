---
- name: install_satellite | Get package facts
  ansible.builtin.package_facts:
    manager: auto

- name: install_satellite | Checking if services are running
  ansible.builtin.command: satellite-maintain service status
  ignore_errors: true
  register: platform_satellite_install_service
  changed_when: false

# TODO look for warnings and decide to stop/continue (disk speed)
# Check installer_output.std_err and std_out
- name: Block if satellite is not installed
  when: platform_satellite_install_service.rc != 0
  block:
    - name: install_satellite | Run satellite installer
      ansible.builtin.command: >-
        satellite-installer --scenario satellite
      register: platform_satellite_install_installer_output
      changed_when: true

    - name: install_satellite | Define tuning profile
      ansible.builtin.set_fact:
        platform_satellite_install_tuning_profile: "{{ lookup('ansible.builtin.template', 'tuning_profile.j2') }}"

    - name: install_satellite | Run performance tuning command
      ansible.builtin.command: "satellite-installer --scenario satellite --tuning {{ platform_satellite_install_tuning_profile }}"
      changed_when: true

- name: install_satellite | Ensure successful installation
  ansible.builtin.command: satellite-maintain service status
  register: platform_satellite_install_satellite_status
  changed_when: false
  failed_when: platform_satellite_install_satellite_status.rc != 0
...
