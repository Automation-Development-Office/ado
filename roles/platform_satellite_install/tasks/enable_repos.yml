---
- name: enable_repos | Checking pulp directory is owned by pulp
  ansible.builtin.file:
    path: /var/lib/pulp
    owner: pulp
    group: pulp
    mode: '0775'

- name: enable_repos | Enable Red Hat repos
  redhat.satellite.repository_set:
    username: "{{ platform_satellite_install_admin_username }}"
    password: "{{ platform_satellite_install_admin_password }}"
    server_url: "{{ platform_satellite_install_server_url }}"
    organization: "{{ platform_satellite_install_organization }}"
    label: "{{ item['label'] }}"
    repositories: "{{ item['repos'] | default(omit) }}"
    all_repositories: "{{ item['all'] | default(omit) }}"
    state: enabled
    validate_certs: "{{ platform_satellite_install_validate_certs }}"
  loop: "{{ platform_satellite_install_satellite_redhat_repos }}"

...
