---
- name: preliminary_check | Validate Operating System
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "RedHat"
      - (ansible_facts['distribution_major_version'] | int >= 9)
    fail_msg: "RHEL{{ ansible_facts['distribution_major_version'] }} is not supported with {{ platform_satellite_install_satellite_deployment_version }}."
    success_msg: "RHEL{{ ansible_facts['distribution_major_version'] }} detected. Proceeding with install."
  ignore_errors: true

- name: preliminary_check | Validate Red Hat Satellite version is defined
  ansible.builtin.assert:
    that:
      - platform_satellite_install_satellite_deployment_version is defined
      - platform_satellite_install_satellite_deployment_version | length > 0
    fail_msg: |
      Define a supported version of Red Hat Satellite. Supported versions can be found at https://access.redhat.com/support/policy/updates/satellite.
  ignore_errors: true

- name: Debug platform_satellite_install_satellite_rhn_org_id
  ansible.builtin.debug:
    var: platform_satellite_install_satellite_rhn_org_id

- name: preliminary_check | Check if RHN Organization and Activation Key is defined
  ansible.builtin.assert:
    that:
      - platform_satellite_install_satellite_rhn_org_id is defined
      - platform_satellite_install_satellite_rhn_org_id | length > 0
      - platform_satellite_install_satellite_rhn_activation_key is defined
      - platform_satellite_install_satellite_rhn_activation_key | length > 0
    success_msg: |
      - "RHN Organization ID: {{ platform_satellite_install_satellite_rhn_org_id }}"
      - "RHN Activation Key: {{ platform_satellite_install_satellite_rhn_activation_key }}"
    fail_msg: |
      Create an Access Key and get Organization ID from https://console.redhat.com/insights/connector/activation-keys
  when: platform_satellite_install_satellite_rhn_connected is true
  ignore_errors: true

- name: preliminary_check | Check location of where the Satellite will be located
  ansible.builtin.assert:
    that:
      - platform_satellite_install_satellite_location is defined
      - platform_satellite_install_satellite_location | length > 0
    fail_msg: |
      Define a location where Satellite will be installed

- name: preliminary_check | Verify Memory Size on Red Hat Satellite server
  ansible.builtin.assert:
    that:
      - ansible_facts["memtotal_mb"] >= platform_satellite_install_satellite_min_memory_size
    fail_msg: |-
      The total memory size is below the required threshold.
      Total memory must be greater than {{ (platform_satellite_install_satellite_min_memory_size / 1024) | round | int }} GB.
      Current memory size is {{ (ansible_facts["memtotal_mb"] / 1024) | round | int }} GB.
    success_msg: |-
      Current memory size: {{ (ansible_facts["memtotal_mb"] / 1024) | round | int }} GB

- name: preliminary_check | Verify CPU count on Red Hat Satellite server
  ansible.builtin.assert:
    that:
      - ansible_facts["processor_vcpus"] >= platform_satellite_install_satellite_min_cpu_count
    fail_msg: |-
      The total CPU count is below the required threshold.
      Total CPU must be greater than {{ platform_satellite_install_satellite_min_cpu_count }} CPUs.
      Current CPU count {{ ansible_facts["processor_vcpus"] }}.
    success_msg: |-
      Current CPU count {{ ansible_facts["processor_vcpus"] }}.

- name: preliminary_check | Ensure grubby is installed
  ansible.builtin.package:
    name: grubby
    state: present
  ignore_errors: true

- name: preliminary_check | Get current kernel args for all entries
  ansible.builtin.command: grubby --info=ALL
  register: platform_satellite_install_grubby_info
  changed_when: false

- name: preliminary_check | Remove ipv6.disable=1 if present
  ansible.builtin.command: grubby --update-kernel ALL --remove-args="ipv6.disable=1"
  when: "'ipv6.disable=1' in platform_satellite_install_grubby_info.stdout"
  changed_when: true
  notify: reboot system

- name: preliminary_check | Add ipv6.disable=0 if missing
  ansible.builtin.command: grubby --update-kernel ALL --args="ipv6.disable=0"
  when: "'ipv6.disable=0' not in platform_satellite_install_grubby_info.stdout"
  changed_when: true
  notify: reboot system

- name: preliminary_check | Get kernel args for all entries
  ansible.builtin.command: grubby --info=ALL
  register: platform_satellite_install_grubby_info
  changed_when: false

- name: preliminary_check | Remove ipv6.disable=1 from all kernels (only if present)
  ansible.builtin.command: grubby --update-kernel ALL --remove-args="ipv6.disable=1"
  when: "'ipv6.disable=1' in platform_satellite_install_grubby_info.stdout"
  changed_when: true
  notify: reboot system

- name: preliminary_check | Ensure SELinux is permissive (idempotent)
  ansible.posix.selinux:
    policy: targeted
    state: permissive
  notify: reboot system
