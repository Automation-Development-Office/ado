---
- name: dns_config | Ensure that there's a line for the short host name and full hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "{{ ansible_facts['fqdn'] | default(inventory_hostname) }}"
    line: >-
      {{ ansible_facts['default_ipv4']['address'] }}
      {{ ansible_facts['fqdn'] | default(inventory_hostname) }}
      {{ ansible_facts['hostname'] | default(inventory_hostname) }}
    state: present

- name: dns_config | Update NetworkManager DNS
  community.general.nmcli:
    conn_name: "{{ platform_satellite_install_satellite_dns_device }}"
    type: ethernet
    dns4:
      - "{{ item }}"
    state: present
  loop: "{{ platform_satellite_install_satellite_dns_servers }}"
  when: platform_satellite_install_satellite_dns_servers is defined

- name: dns_config | Update NetworkManager DNS search
  community.general.nmcli:
    conn_name: "{{ platform_satellite_install_satellite_dns_device }}"
    type: ethernet
    dns4_search:
      - "{{ item }}"
    state: present
  loop: "{{ platform_satellite_install_satellite_dns_search }}"
  when: platform_satellite_install_satellite_dns_search is defined

- name: dns_config | Update /etc/resolv.conf if defined
  ansible.builtin.template:
    dest: /etc/resolv.conf
    src: resolv.conf.j2
    mode: '0644'
    owner: root
    group: root
  when: platform_satellite_install_satellite_dns_servers is defined
...
