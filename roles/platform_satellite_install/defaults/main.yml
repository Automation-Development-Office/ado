---
platform_satellite_install_satellite_redhat_repos:
  - name: "Red Hat Satellite Capsule {{ platform_satellite_install_satellite_deployment_version }} for RHEL {{ ansible_distribution_major_version }} x86_64 (RPMs)"
    label: "satellite-capsule-{{ platform_satellite_install_satellite_deployment_version }}-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms"
    all: "true"
  - name: "Red Hat Satellite Maintenance {{ platform_satellite_install_satellite_deployment_version }} for RHEL {{ ansible_distribution_major_version }} x86_64 (RPMs)"
    label: "satellite-maintenance-{{ platform_satellite_install_satellite_deployment_version }}-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms"
    all: "true"
  - name: "Red Hat Satellite {{ platform_satellite_install_satellite_deployment_version }} for RHEL {{ ansible_distribution_major_version }} x86_64 (RPMs)"
    label: "satellite-{{ platform_satellite_install_satellite_deployment_version }}-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms"
    all: "true"
  - name: "Red Hat Satellite Client 6 for RHEL 9 x86_64 RPMs"
    label: "satellite-client-6-for-rhel-9-x86_64-rpms"
    all: "true"
  - name: "Red Hat Enterprise Linux 9 for x86_64 - BaseOS (RPMs)"
    label: rhel-9-for-x86_64-baseos-rpms
    repos:
      - releasever: "9"
    all: "false"
  - name: "Red Hat Enterprise Linux 9 for x86_64 - AppStream (RPMs)"
    label: rhel-9-for-x86_64-appstream-rpms
    repos:
      - releasever: "9"
    all: "false"
platform_satellite_install_satellite_rhn_repos:
  - "rhel-9-for-x86_64-baseos-rpms"
  - "rhel-9-for-x86_64-appstream-rpms"
  - "satellite-{{ platform_satellite_install_satellite_deployment_version }}-for-rhel-9-x86_64-rpms"
  - "satellite-maintenance-{{ platform_satellite_install_satellite_deployment_version }}-for-rhel-9-x86_64-rpms"
platform_satellite_install_pre_check: false
platform_satellite_install_satellite_packages:
  - satellite
  - chrony
  - sos
  - fapolicyd
  - vim
  - bash-completion
  - bind-utils
platform_satellite_install_satellite_deployment_version: ""
platform_satellite_install_satellite_location: ""
platform_satellite_install_satellite_min_memory_size: 1024
platform_satellite_install_satellite_min_cpu_count: 1
platform_satellite_install_satellite_rhn_connected: false
platform_satellite_install_satellite_rhn_org_id: ""
platform_satellite_install_satellite_rhn_activation_key: ""
platform_satellite_install_satellite_timezone: "UTC"
platform_satellite_install_satellite_selinux_state: "enforcing"
platform_satellite_install_satellite_proxy_server: ""
platform_satellite_install_satellite_proxy_port: ""
platform_satellite_install_satellite_proxy_scheme: ""
platform_satellite_install_satellite_vg_name: "satellite"
platform_satellite_install_satellite_req_dirs: []
platform_satellite_install_satellite_data_disk_min_size: "10G"
platform_satellite_install_satellite_data_device_name: ""
platform_satellite_install_satellite_data_device: "/dev"
platform_satellite_install_satellite_dns_device: ""
platform_satellite_install_satellite_dns_servers: []
platform_satellite_install_satellite_dns_search: []
