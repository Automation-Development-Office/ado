---
# defaults file for elastic

# Canonical role inputs
elastic_state: status
elastic_systemd_enabled: true
elastic_systemd_unit: elasticsearch
elastic_start_cmd: ""
elastic_pid_file: /var/run/elasticsearch.pid
elastic_url: http://localhost:9200
elastic_user: ""
elastic_pass: ""
elastic_http_timeout: 60

# Optional compatibility controls for Vault-style scenario docs
elastic_enable_live_checks: false
