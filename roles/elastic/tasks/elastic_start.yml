---
- name: Start via systemd (if enabled)
  when: elastic_systemd_enabled
  become: true
  ansible.builtin.systemd:
    name: "{{ elastic_systemd_unit }}"
    state: started
    enabled: true

- name: Start via custom command (when not using systemd)
  when: not elastic_systemd_enabled
  become: true
  ansible.builtin.assert:
    that: elastic_start_cmd | length > 0
    fail_msg: "elastic_start_cmd must be set when elastic_systemd_enabled=false."

- name: Check if Elasticsearch process is already running
  when: not elastic_systemd_enabled
  become: true
  ansible.builtin.shell: >
    pgrep -f "{{ elastic_start_cmd }}"
  register: elastic_running
  ignore_errors: true
  changed_when: false
  failed_when: false

- name: Launch Elasticsearch (background)
  when:
    - not elastic_systemd_enabled
    - elastic_running.rc != 0
  become: true
  ansible.builtin.shell: |
    nohup {{ elastic_start_cmd }} >/var/log/elasticsearch-ansible-start.out 2>&1 & echo $! > {{ elastic_pid_file }}
  args:
    creates: "{{ elastic_pid_file }}"
    executable: /bin/bash

- name: Report Elasticsearch already running
  when:
    - not elastic_systemd_enabled
    - elastic_running.rc == 0
  ansible.builtin.debug:
    msg: "Elasticsearch start command already running (pgrep matched)."

- name: Wait for HTTP to become ready
  ansible.builtin.uri:
    url: "{{ elastic_url }}/_cluster/health"
    method: GET
    return_content: true
    force_basic_auth: "{{ elastic_user != '' }}"
    url_username: "{{ elastic_user | default(omit) }}"
    url_password: "{{ elastic_pass | default(omit) }}"
    status_code: 200
  register: elastic_ready
  until: elastic_ready.status == 200
  retries: "{{ (elastic_http_timeout // 3) | int }}"
  delay: 3

- name: Report started status
  ansible.builtin.debug:
    msg: "Elasticsearch started and responding at {{ elastic_url }}"
