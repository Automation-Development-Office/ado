---
- name: install_satellite | Get package facts
  ansible.builtin.package_facts:
    manager: auto

- name: install_satellite | Checking if services are running
  ansible.builtin.shell: "satellite-maintain service status |grep foreman"
  ignore_errors: true
  register: satellite_install_service
  changed_when: false

- name: Block if satellite is not installed
  when: satellite_install_service.rc != 0 or (satellite_install_force_reinstall | default(false) | bool)
  block:
    - name: install_satellite | Run satellite installer
      ansible.builtin.command: >-
        satellite-installer --scenario satellite
      register: satellite_install_installer_output
      changed_when: true

    - name: install_satellite | Define tuning profile
      ansible.builtin.set_fact:
        satellite_install_tuning_profile: "{{ lookup('ansible.builtin.template', 'tuning_profile.j2') }}"

    - name: install_satellite | Run performance tuning command
      ansible.builtin.command: "satellite-installer --scenario satellite --tuning {{ satellite_install_tuning_profile }}"
      changed_when: true

    - name: install_satellite | Set password for admin user
      ansible.builtin.command:
        argv:
          - foreman-rake
          - permissions:reset
          - "password={{ satellite_install_admin_password }}"
      changed_when: true

- name: install_satellite | Ensure successful installation
  ansible.builtin.command: satellite-maintain service status
  register: satellite_install_status
  changed_when: false
  failed_when: satellite_install_status.rc != 0
...
