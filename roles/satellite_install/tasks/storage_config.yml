---
- name: storage_config | Ensure lvm2 package is installed
  ansible.builtin.dnf:
    name: lvm2
    state: present

- name: storage_config | Refresh hardware/LVM facts
  ansible.builtin.setup:
    gather_subset:
      - hardware

- name: storage_config | Check if Satellite volume group already exists
  ansible.builtin.set_fact:
    satellite_install_lvm_exists: true
  when: ansible_facts.lvm.vgs[satellite_install_vg_name] is defined

- name: storage_config | Find existing PV for Satellite VG
  ansible.builtin.set_fact:
    satellite_install_data_disk: "{{ item.key }}"
  loop: "{{ ansible_facts.lvm.pvs | dict2items }}"
  when:
    - satellite_install_lvm_exists | default(false)
    - item.value.vg == satellite_install_vg_name

- name: storage_config | Find suitable disks for Satellite
  ansible.builtin.set_fact:
    satellite_install_data_disk_list: >-
      {{ satellite_install_data_disk_list | default([]) + [item.key] }}
  loop: "{{ ansible_facts.devices | dict2items }}"
  when:
    - satellite_install_data_disk is not defined
    - item.key is match('^(vd|xvd|sd)')
    - item.value.size | human_to_bytes >= satellite_install_data_disk_min_size | string | human_to_bytes(default_unit='G')
    - not item.value.partitions
    - not item.value.holders

- name: storage_config | Display candidate disks
  ansible.builtin.debug:
    var: satellite_install_data_disk_list
  when:
    - satellite_install_data_disk is not defined
    - satellite_install_data_disk_list is defined

- name: storage_config | Verify only one suitable disk exists
  ansible.builtin.assert:
    that:
      - satellite_install_data_disk_list | length == 1
    fail_msg: >-
      Multiple suitable disks were found. Set
      satellite_install_data_device_name to the desired device and rerun.
  when:
    - satellite_install_data_disk is not defined
    - satellite_install_data_device_name is not defined

- name: storage_config | Use manually specified disk
  ansible.builtin.set_fact:
    satellite_install_data_disk: "{{ satellite_install_data_device }}/{{ satellite_install_data_device_name }}"
  when:
    - satellite_install_data_disk is not defined
    - satellite_install_data_device_name is defined

- name: storage_config | Use automatically discovered disk
  ansible.builtin.set_fact:
    satellite_install_data_disk: "{{ satellite_install_data_device }}/{{ satellite_install_data_disk_list[0] }}"
  when:
    - satellite_install_data_disk is not defined
    - satellite_install_data_device_name is not defined

- name: storage_config | Create required mount point directories
  ansible.builtin.file:
    path: "{{ item.mount_point }}"
    state: directory
    mode: "0755"
  loop: "{{ satellite_install_req_dirs }}"

- name: storage_config | Create volume group
  community.general.lvg:
    vg: "{{ satellite_install_vg_name }}"
    pvs: "{{ satellite_install_data_disk }}"

- name: storage_config | Create logical volumes
  community.general.lvol:
    vg: "{{ satellite_install_vg_name }}"
    lv: "{{ item.lv_name }}"
    size: "{{ item.lv_size }}"
  loop: "{{ satellite_install_req_dirs }}"

- name: storage_config | Create XFS filesystems
  community.general.filesystem:
    fstype: xfs
    dev: "/dev/mapper/{{ satellite_install_vg_name }}-{{ item.lv_name }}"
  loop: "{{ satellite_install_req_dirs }}"

- name: storage_config | Mount logical volumes
  ansible.posix.mount:
    path: "{{ item.mount_point }}"
    src: "/dev/mapper/{{ satellite_install_vg_name }}-{{ item.lv_name }}"
    fstype: xfs
    state: mounted
  loop: "{{ satellite_install_req_dirs }}"

