---
# roles/openshift_tools_update_pull_secrets_/tasks/main.yml

- name: Assert state is provided via -e or AAP survey
  ansible.builtin.assert:
    that:
      - state is defined
      - state in ['present', 'absent']
    fail_msg: >-
      You must pass state=present or state=absent (via AAP survey or ansible-playbook -e)

- name: Normalize state
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__state: "{{ state | lower }}"

- name: Set defaults for pull secret target
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__name: "{{ openshift_tools_update_pull_secrets__name | default('pull-secret') }}"
    openshift_tools_update_pull_secrets__namespace: "{{ openshift_tools_update_pull_secrets__namespace | default('openshift-config') }}"

- name: Read current pull-secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ openshift_tools_update_pull_secrets__name }}"
    namespace: "{{ openshift_tools_update_pull_secrets__namespace }}"
  register: openshift_tools_update_pull_secrets__obj

- name: Assert pull-secret exists
  ansible.builtin.assert:
    that:
      - openshift_tools_update_pull_secrets__obj.resources | length == 1
      - openshift_tools_update_pull_secrets__obj.resources[0].data is defined
      - openshift_tools_update_pull_secrets__obj.resources[0].data['.dockerconfigjson'] is defined
    fail_msg: >-
      pull-secret {{ openshift_tools_update_pull_secrets__namespace }}/{{ openshift_tools_update_pull_secrets__name }} not found or missing
      .dockerconfigjson

- name: Decode existing dockerconfigjson to dict
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__dockerconfig_dict: >-
      {{
        (openshift_tools_update_pull_secrets__obj.resources[0].data['.dockerconfigjson'] | b64decode)
        | from_json
      }}

# Require registry_host always (present/absent both need it)
- name: Assert registry_host is provided
  ansible.builtin.assert:
    that:
      - registry_host is defined
      - registry_host | length > 0
    fail_msg: "registry_host must be provided (via vars file, -e, or AAP survey)."

# When adding, require creds
- name: Assert registry creds provided when state=present
  ansible.builtin.assert:
    that:
      - registry_username is defined
      - registry_password is defined
    fail_msg: "registry_username and registry_password must be provided when state=present."
  when: openshift_tools_update_pull_secrets__state == 'present'

# Build auth only when adding
- name: Compute registry auth (base64 user:pass)
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__registry_auth_b64: "{{ (registry_username ~ ':' ~ registry_password) | b64encode }}"
  when: openshift_tools_update_pull_secrets__state == 'present'

- name: Add registry auth entry (merge, do not overwrite others)
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__dockerconfig_dict_updated: >-
      {{
        openshift_tools_update_pull_secrets__dockerconfig_dict
        | combine(
            {
              'auths': (
                openshift_tools_update_pull_secrets__dockerconfig_dict.auths | default({})
                | combine(
                    {
                      (registry_host): {
                        'auth': openshift_tools_update_pull_secrets__registry_auth_b64,
                        'email': registry_email | default('')
                      }
                    },
                    recursive=True
                  )
              )
            },
            recursive=True
          )
      }}
  when: openshift_tools_update_pull_secrets__state == 'present'

- name: Remove registry auth entry (leave others intact)
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__dockerconfig_dict_updated: >-
      {{
        openshift_tools_update_pull_secrets__dockerconfig_dict
        | combine(
            {
              'auths': (
                (openshift_tools_update_pull_secrets__dockerconfig_dict.auths | default({}))
                | dict2items
                | rejectattr('key', 'equalto', registry_host)
                | items2dict
              )
            },
            recursive=True
          )
      }}
  when: openshift_tools_update_pull_secrets__state == 'absent'

# Optional: compute if the update actually changes anything (idempotency guard)
- name: Determine if dockerconfig changed
  ansible.builtin.set_fact:
    openshift_tools_update_pull_secrets__changed: >-
      {{ openshift_tools_update_pull_secrets__dockerconfig_dict_updated | to_json != openshift_tools_update_pull_secrets__dockerconfig_dict | to_json }}

- name: Patch pull-secret with updated dockerconfigjson (only if changed)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ openshift_tools_update_pull_secrets__name }}"
        namespace: "{{ openshift_tools_update_pull_secrets__namespace }}"
      type: "{{ openshift_tools_update_pull_secrets__obj.resources[0].type | default('kubernetes.io/dockerconfigjson') }}"
      data:
        .dockerconfigjson: "{{ openshift_tools_update_pull_secrets__dockerconfig_dict_updated | to_json | b64encode }}"
  when: openshift_tools_update_pull_secrets__changed | bool

- name: Show whether entry is present after change
  ansible.builtin.debug:
    msg:
      - "state={{ openshift_tools_update_pull_secrets__state }}"
      - "changed={{ openshift_tools_update_pull_secrets__changed }}"
      - "pull-secret={{ openshift_tools_update_pull_secrets__namespace }}/{{ openshift_tools_update_pull_secrets__name }}"
      - "registry={{ registry_host }}"
      - "entry_present={{ (openshift_tools_update_pull_secrets__dockerconfig_dict_updated.auths | default({})).get(registry_host) is not none }}"
