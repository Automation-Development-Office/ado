---
# Namespace / pod selection
ocp_search_dirsrv_target_namespace: dirsrv
ocp_search_dirsrv_app_label: "app=dirsrv"
ocp_search_dirsrv_container_name: "dirsrv-container"

# LDAP connectivity inside the container
ocp_search_dirsrv_ldap_port: 3389
ocp_search_dirsrv_bind_dn: "cn=Directory Manager"
ocp_search_dirsrv_suffix: ""

# Behavior
ocp_search_dirsrv_print_only: true # prints output via debug
ocp_search_dirsrv_fail_if_no_pod: true
ocp_search_dirsrv_pretty_tables: true # awk pretty output for the two built-ins

# What to run: a list of "queries"
# Each query:
#  - name: label printed in output
#  - base: base DN
#  - filter: ldap filter
#  - attrs: list of attrs to request
#  - kind: users|groups|raw   (users/groups enable the pretty awk tables)
#  - scope: base|one|sub      (defaults to sub)
ocp_search_dirsrv_queries:
  - name: "Users (inetOrgPerson)"
    kind: users
    base: "ou=people,{{ ocp_search_dirsrv__suffix }}"
    filter: "(objectClass=inetOrgPerson)"
    attrs: ["dn", "uid", "cn", "mail"]
    scope: "sub"

  - name: "Groups (posixGroup / groupOfNames)"
    kind: groups
    base: "ou=groups,{{ ocp_search_dirsrv__suffix }}"
    filter: "(|(objectClass=posixGroup)(objectClass=groupOfNames))"
    attrs: ["dn", "cn", "gidNumber", "member", "memberUid"]
    scope: "sub"
