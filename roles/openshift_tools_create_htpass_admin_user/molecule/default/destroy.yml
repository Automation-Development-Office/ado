---
- name: Destroy — remove the HTPasswd IdP/secret and the dummy OIDC artifacts
  hosts: all
  gather_facts: false

  vars:
    htpasswd_idp_name: htpasswd-admin
    htpasswd_secret_name: htpasswd-admin-secret
    grant_cluster_admin: true)
    dummy_oidc: dummy_oidc
    oidc_idp_name: dummy-oidc
    state: absent
    validate_certs: false
  tasks:
    - name: Run role under test
      ansible.builtin.include_role:
        name: "{{ playbook_dir | dirname | dirname }}"

    - name: Remove dummy OIDC IdP from OAuth if present
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: OAuth
        name: "{{ htpasswd_idp_name }}"
        validate_certs: "{{ validate_certs }}"
      register: _oauth_before
      failed_when: false

    - name: Prune dummy OIDC from OAuth spec
      when: _oauth_before.resources | length > 0
      vars:
        _existing: "{{ _oauth_before.resources[0].spec.identityProviders | default([]) }}"
        _pruned: "{{ _existing | rejectattr('name','equalto', oidc_idp_name) | list }}"
      kubernetes.core.k8s:
        api_version: config.openshift.io/v1
        kind: OAuth
        name: "{{ htpasswd_idp_name }}"
        state: present
        definition:
          apiVersion: config.openshift.io/v1
          kind: OAuth
          metadata:
            name: "{{ htpasswd_idp_name }}"
          spec:
            identityProviders: "{{ _pruned }}"
        validate_certs: "{{ validate_certs }}"

    - name: Wait for OAuth to settle (after OIDC removal)
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterOperator
        name: authentication
        validate_certs: "{{ validate_certs }}"
      register: _auth_co_after
      retries: 30
      delay: 10
      until: >
        _auth_co_after.resources is defined and
        _auth_co_after.resources | length > 0 and
        (
          (_auth_co_after.resources[0].status.conditions | selectattr('type','equalto','Progressing') | list | first).status
          | default('False')
        ) == 'False'

    - name: Remove dummy OIDC clientSecret Secret (safe if absent)
      when: dummy_oidc.clientSecretName is defined
      kubernetes.core.k8s:
        api_version: v1
        kind: Secret
        name: "{{ dummy_oidc.clientSecretName }}"
        namespace: "{{ openshift_config_ns }}"
        state: absent
        validate_certs: "{{ validate_certs }}"

    - name: Assert both IdPs are now absent
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: OAuth
        name: "{{ htpasswd_idp_name }}"
        validate_certs: "{{ validate_certs }}"
      register: _oauth_final

    - name: Confirm HTPasswd and dummy OIDC IdPs are gone
      ansible.builtin.assert:
        that:
          - (_oauth_final.resources[0].spec.identityProviders | default([]) | selectattr('name','equalto', htpasswd_idp_name) | list | length) == 0
          - (_oauth_final.resources[0].spec.identityProviders | default([]) | selectattr('name','equalto', oidc_idp_name) | list | length) == 0
        fail_msg: "Expected both '{{ htpasswd_idp_name }}' and '{{ oidc_idp_name }}' IdPs to be removed."
