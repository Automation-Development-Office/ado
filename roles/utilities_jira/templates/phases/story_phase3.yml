template_stories_phase3:

  - story_summary: "{{ product }} - {{ group }} - {{ enviroment }}: Validation, Adoption, and Application Migration - Phase 3"
    story_description: |
      *As a:* "{{ role_name }}"  
      *I want to:* Validate {{ product }} functionality using real workloads  
      *So that:* the platform is production-ready and trusted by application and platform teams.

      Notes / Context:
      This phase focuses on validating {{ product }} in real-world scenarios by deploying pilot workloads,
      enforcing policies, validating drift detection, and ensuring monitoring, alerting, and lifecycle workflows
      operate as expected. Application teams should be onboarded, feedback collected, and readiness confirmed
      before broader rollout.

    custom_ac: |
      * Pilot workloads deployed via {{ product }}
      * Policies evaluated and enforced
      * Drift detection validated
      * Upgrade and lifecycle workflows tested
      * Monitoring and alerting validated
      * Application teams successfully onboarded
      * Stakeholder sign-off obtained
      * Metrics and feedback collected

    labels:
      - "{{ product }}"
      - "{{ section }}"

    subtasks:
      - summary: "Deploy pilot workloads via {{ product }}"
        description: |
          *As a:* "{{ role_name }}"  
          *I want to:* Deploy pilot workloads using {{ product }}  
          *So that:* real application scenarios can be used to validate the platform.

          Notes / Context:
          This subtask focuses on selecting representative workloads and deploying them
          using {{ product }} constructs such as placements, policies, and GitOps workflows.
        labels:
          - "{{ product }}"
          - "{{ section }}"
        component: "{{ group }}"

      - summary: "Validate policy enforcement"
        description: |
          *As a:* "{{ role_name }}"  
          *I want to:* Validate policy enforcement using {{ product }}  
          *So that:* governance controls behave as expected across managed clusters.

          Notes / Context:
          This includes validating policy placement, compliance status,
          remediation behavior, and visibility.
        labels:
          - "{{ product }}"
          - "{{ section }}"
        component: "{{ group }}"

      - summary: "Test drift detection and remediation"
        description: |
          *As a:* "{{ role_name }}"  
          *I want to:* Test drift detection and remediation capabilities  
          *So that:* configuration drift is detected and corrected automatically.

          Notes / Context:
          Validate drift scenarios by introducing controlled changes
          and observing detection and remediation behavior.
        labels:
          - "{{ product }}"
          - "{{ section }}"
        component: "{{ group }}"

      - summary: "Verify monitoring and alerts"
        description: |
          *As a:* "{{ role_name }}"  
          *I want to:* Verify monitoring and alerting for managed clusters and workloads  
          *So that:* operational visibility is available and actionable.

          Notes / Context:
          This includes validating dashboards, alerts, and notifications
          for both hub and managed clusters.
        labels:
          - "{{ product }}"
          - "{{ section }}"
        component: "{{ group }}"

      - summary: "Onboard application teams and validate workflows"
        description: |
          *As a:* "{{ role_name }}"  
          *I want to:* Onboard application teams and validate their workflows  
          *So that:* teams can successfully use {{ product }} in day-to-day operations.

          Notes / Context:
          This includes onboarding sessions, documentation walkthroughs,
          and validating end-to-end workflows with application teams.
        labels:
          - "{{ product }}"
          - "{{ section }}"
        component: "{{ group }}"

      - summary: "Collect metrics and stakeholder feedback"
        description: |
          *As a:* "{{ role_name }}"  
          *I want to:* Collect metrics and stakeholder feedback  
          *So that:* readiness, gaps, and improvement areas are clearly identified.

          Notes / Context:
          Metrics and feedback should be documented and used to determine
          readiness for broader rollout or next phases.
        labels:
          - "{{ product }}"
          - "{{ section }}"
        component: "{{ group }}"
