# roles/jira_stories/defaults/main.yml
---

utilities_jira_story_issuetype: Story
utilities_jira_subtask_issuetype: Sub-task
utilities_jira_create_subtasks: true
utilities_jira_templates_dir: templates

utilities_jira_feature_key: ""
utilities_jira_feature_field: ""
utilities_jira_custom_ac_field: ""

utilities_jira_track: platform_4phase

utilities_jira_track_map:
  platform_4phase:
    - { file: "{{ utilities_jira_templates_dir }}/phases/story_phase1.yml", section: "phase1" }
    - { file: "{{ utilities_jira_templates_dir }}/phases/story_phase2.yml", section: "phase2" }
    - { file: "{{ utilities_jira_templates_dir }}/phases/story_phase3.yml", section: "phase3" }
    - { file: "{{ utilities_jira_templates_dir }}/phases/story_phase4.yml", section: "phase4" }
  collections_2phase:
    - { file: "{{ utilities_jira_templates_dir }}/tracks/collections_phase1.yml", section: "phase1" }
    - { file: "{{ utilities_jira_templates_dir }}/tracks/collections_phase2.yml", section: "phase2" }
  mfa_2phase:
    - { file: "{{ utilities_jira_templates_dir }}/tracks/mfa_phase1.yml", section: "phase1" }
    - { file: "{{ utilities_jira_templates_dir }}/tracks/mfa_phase2.yml", section: "phase2" }
  day2:
    - { file: "{{ utilities_jira_templates_dir }}/day2/adhoc_day2.yml", section: "operations" }
  spike:
    - { file: "{{ utilities_jira_templates_dir }}/special/adhoc_spike.yml", section: "discovery" }
  bugfix:
    - { file: "{{ utilities_jira_templates_dir }}/special/adhoc_bugfix.yml", section: "delivery" }
  feature:
    - { file: "{{ utilities_jira_templates_dir }}/special/adhoc_feature.yml", section: "delivery" }
