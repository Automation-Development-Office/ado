# roles/jira_stories/tasks/main.yml
---

- name: Jira | Normalize variable aliases to utilities_jira_*
  ansible.builtin.set_fact:
    utilities_jira_url: "{{ utilities_jira_url | default(jira_url | default('')) }}"
    utilities_jira_username: "{{ utilities_jira_username | default(jira_username | default('')) }}"
    utilities_jira_token: "{{ utilities_jira_token | default(jira_token | default('')) }}"
    utilities_jira_project_key: "{{ utilities_jira_project_key | default(jira_project_key | default('')) }}"
    utilities_jira_track: "{{ utilities_jira_track | default(jira_track | default('')) }}"
    utilities_jira_track_map: "{{ utilities_jira_track_map | default(jira_track_map | default({})) }}"
    utilities_jira_story_issuetype: "{{ utilities_jira_story_issuetype | default(jira_story_issuetype | default('Story')) }}"
    utilities_jira_subtask_issuetype: "{{ utilities_jira_subtask_issuetype | default(jira_subtask_issuetype | default('Sub-task')) }}"
    utilities_jira_create_subtasks: "{{ utilities_jira_create_subtasks | default(jira_create_subtasks | default(true)) }}"
    utilities_jira_feature_key: "{{ utilities_jira_feature_key | default(jira_feature_key | default('')) }}"
    utilities_jira_feature_field: "{{ utilities_jira_feature_field | default(jira_feature_field | default('')) }}"
    utilities_jira_custom_ac_field: "{{ utilities_jira_custom_ac_field | default(jira_custom_ac_field | default('')) }}"

- name: Jira | Validate required vars
  ansible.builtin.assert:
    that:
      - utilities_jira_url | length > 0
      - utilities_jira_username | length > 0
      - utilities_jira_token | length > 0
      - utilities_jira_project_key | length > 0
      - utilities_jira_track in utilities_jira_track_map
    fail_msg: >-
      Missing/invalid vars. Need utilities_jira_url/utilities_jira_username/
      utilities_jira_token/utilities_jira_project_key (legacy jira_* aliases accepted)
      and utilities_jira_track must be one of: {{ utilities_jira_track_map.keys() | list }}.

- name: Jira | Build list of template files for selected track
  ansible.builtin.set_fact:
    utilities_jira_selected_templates: "{{ utilities_jira_track_map[utilities_jira_track] }}"

- name: Jira | Process templates for track
  ansible.builtin.include_tasks: process_one_template.yml
  loop: "{{ utilities_jira_selected_templates }}"
  loop_control:
    loop_var: tmpl
    label: "{{ tmpl.file }} (section={{ tmpl.section }})"
