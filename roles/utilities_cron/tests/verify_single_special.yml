---
- name: Verifying all special cron entries have been created
  hosts: molecule8
  remote_user: molecule
  become: true
  gather_facts: false

  tasks:
    - name: Get cron entries for root
      ansible.builtin.command: crontab -l -u molecule
      register: cron_output
      changed_when: false
      failed_when: false # avoid failing if no crontab yet

    # - name: Debug cron output
    #   ansible.builtin.debug:
    #     var: cron_output
    - name: Assert that the expected special cron jobs have been created # Post Converge
      ansible.builtin.assert:
        that:
          - cron_output.stdout is search(item.name)
        fail_msg: "One or more expected cron jobs are missing!"
        success_msg: "All expected cron jobs found in root's crontab."
      loop: "{{ cron_yearly_jobs }}"
      loop_control:
        label: "{{ item.name }}"
      # when: ansible_hostname == "rhel7-vm-molecule-test"

