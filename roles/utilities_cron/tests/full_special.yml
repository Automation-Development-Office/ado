---
- name: Converge — Create Special(ex .. @reboot) test crons across RHEL 7/8/9/10
  hosts: all
  become: false
  remote_user: molecule
  gather_facts: false

  roles:
    - role: ado.utilities.cron
      vars:
        cron_type: special
        cron_state: present
        cron_yearly_jobs:
          - { name: "yearly_test", job: "test" }
          - { name: "yearly_prod", job: "prod" }
        cron_monthly_jobs:
          - { name: "monthly_test", job: "test" }
          - { name: "monthly_prod", job: "prod" }
        cron_hourly_jobs:
          - { name: "hourly_test", job: "test" }
          - { name: "hourly_prod", job: "prod" }
        cron_daily_jobs:
          - { name: "daily_test", job: "test" }
          - { name: "daily_prod", job: "prod" }
        cron_reboot_jobs:
          - { name: "reboot_test", job: "test" }
          - { name: "reboot_prod", job: "prod" }
        cron_weekly_jobs:
          - { name: "weekly_test", job: "test" }
          - { name: "weekly_prod", job: "prod" }
        cron_annual_jobs:
          - { name: "annual_test", job: "test" }
          - { name: "annual_prod", job: "prod" }
