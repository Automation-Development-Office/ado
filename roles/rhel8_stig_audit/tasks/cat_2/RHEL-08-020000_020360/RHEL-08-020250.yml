---

{{ if not .Vars.skip_sssd_check }}
  {{ if .Vars.RHEL_08_020250 }}
file:
  sssd_smart_card:
    title: RHEL-08-020250 | RHEL 8 must implement smart card logon for multifactor authentication for access to interactive accounts.
    path: /etc/sssd/sssd.conf
    exists: true
    contents:
    - '/^pam_cert_auth = [tT]rue/'
    - '!/^pam_cert_auth = [fF]alse/'
    meta:
      Cat: 2
      CCI: CCI-000765
      NIST800-53R4: IA-2
      Group_Title:
      - SRG-OS-000105-GPOS-00052
      - SRG-OS-000106-GPOS-00053
      - SRG-OS-000107-GPOS-00054
      - SRG-OS-000108-GPOS-00055
      Rule_ID: SV-230372r1017184_rule
      STIG_ID: RHEL-08-020250
      Vul_ID: V-230372
  /etc/pam.d/smartcard-auth:
    title: RHEL-08-020250 | RHEL 8 must implement smart card logon for multifactor authentication for access to interactive accounts.
    exists: true
    contents:
    - '/^auth sufficient\s+pam_sss.so [try_cert_auth|require_cert_auth]/'
    meta:
      Cat: 2
      CCI: CCI-000765
      NIST800-53R4: IA-2
      Group_Title:
      - SRG-OS-000105-GPOS-00052
      - SRG-OS-000106-GPOS-00053
      - SRG-OS-000107-GPOS-00054
      - SRG-OS-000108-GPOS-00055
      Rule_ID: SV-230372r1017184_rule
      STIG_ID: RHEL-08-020250
      Vul_ID: V-230372
  /etc/pam.d/system-auth:
    title: RHEL-08-020250 | RHEL 8 must implement smart card logon for multifactor authentication for access to interactive accounts.
    exists: true
    contents:
    - '/^auth.*\spam_sss.so [try_cert_auth|require_cert_auth]/'
    meta:
      Cat: 2
      CCI: CCI-000765
      NIST800-53R4: IA-2
      Group_Title:
      - SRG-OS-000105-GPOS-00052
      - SRG-OS-000106-GPOS-00053
      - SRG-OS-000107-GPOS-00054
      - SRG-OS-000108-GPOS-00055
      Rule_ID: SV-230372r1017184_rule
      STIG_ID: RHEL-08-020250
      Vul_ID: V-230372
  {{ end }}
{{ end }}
