---

{{ if .Vars.rhel8stig_gui }}
  {{ if .Vars.RHEL_08_020080 }}
command:
  gnome_locks_delay:
    title: RHEL-08-020080 | RHEL 8 must prevent a user from overriding the session lock-delay setting for the graphical user interface. | live check
    exec: grep -i lock-delay /etc/dconf/db/local.d/locks/*
    exit-status: 0
    stdout:
    - /org/gnome/desktop/screensaver/lock-delay
    meta:
      Cat: 2
      CCI: CCI-000057
      NIST800-53R4: AC-11
      Group_Title:
      - SRG-OS-000029-GPOS-00010
      - SRG-OS-000031-GPOS-00012
      - SRG-OS-000480-GPOS-00227
      Rule_ID: SV-230354r1069323_rule
      STIG_ID: RHEL-08-020080
      Vul_ID: V-230354
  dconf_user_lock_override:
    title: RHEL-08-020080 | RHEL 8 must prevent a user from overriding the session lock-delay setting for the graphical user interface. | config check
    exec: grep -E "screensave|lock-enabled" /etc/dconf/db/local.d/locks/session
    exit-status: 0
    stdout:
    - '/^\/org\/gnome\/desktop\/screensaver\/lock-delay/'
    meta:
      Cat: 2
      CCI: CCI-000057
      NIST800-53R4: AC-11
      Group_Title:
      - SRG-OS-000029-GPOS-00010
      - SRG-OS-000031-GPOS-00012
      - SRG-OS-000480-GPOS-00227
      Rule_ID: SV-230354r1069323_rule
      STIG_ID: RHEL-08-020080
      Vul_ID: V-230354
  {{ end }}
{{ end }}
