---

{{ if lt .Vars.OS_ver 8.3 }}
{{ if ne .Vars.OS_ver 8.10 }}
  {{ if .Vars.RHEL_08_020104 }}
command:
  system-auth_retry:
    title: RHEL-08-020104 | RHEL 8 systems, version 8.4 and above, must ensure the password complexity module is configured for three retries or less. | passwd-auth
    exec: grep -w retry /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    exit-status: 0
    stdout:
    - '/^.*:retry\s*=\s*[1-3]/'
    - '!/^.*:retry\s*=\s*(^0|[4-9]|[1-9][0-9]{2,9})/'
    meta:
      Cat: 2
      CCI: CCI-000366
      NIST800-53R4: CM-6
      Group_Title: SRG-OS-000480-GPOS-00227
      Rule_ID: SV-251716r1069329_rule
      STIG_ID: RHEL-08-020104
      Vul_ID: V-251716
  {{ end }}
{{ end }}
{{ end }}
