---

{{ if .Vars.rhel8stig_gui }}
  {{ if .Vars.RHEL_08_020082 }}
command:
  gnome_user_lock_enabled:
    title: RHEL-08-020082 | RHEL 8 must prevent a user from overriding the screensaver lock-enabled setting for the graphical user interface.
    exec: grep -i lock /etc/dconf/db/local.d/locks/*
    exit-status: 0
    stdout:
    - /org/gnome/desktop/screensaver/lock-enabled
    meta:
      Cat: 2
      CCI: CCI-000057
      NIST800-53R4: AC-11
      Group_Title:
      - SRG-OS-000029-GPOS-00010
      - SRG-OS-000031-GPOS-00012
      - SRG-OS-000480-GPOS-00227
      Rule_ID: SV-244539r1069325_rule
      STIG_ID: RHEL-08-020082
      Vul_ID: V-244539
file:
  dconf_session_lock_user_idle:
    title: RHEL-08-020082 | RHEL 8 must prevent a user from overriding the screensaver lock-enabled setting for the graphical user interface. | config check
    exec: grep -E "lock-enabled" /etc/dconf/db/local.d/locks/session
    exit-status: 0
    stdout:
    - '/^\/org\/gnome\/desktop\/screensaver\/lock-enabled/'
    meta:
      Cat: 2
      CCI: CCI-000057
      NIST800-53R4: AC-11
      Group_Title:
      - SRG-OS-000029-GPOS-00010
      - SRG-OS-000031-GPOS-00012
      - SRG-OS-000480-GPOS-00227
      Rule_ID: SV-244539r1069325_rule
      STIG_ID: RHEL-08-020082
      Vul_ID: V-244539
  {{ end }}
{{ end }}
