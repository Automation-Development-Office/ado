    meta:
      Cat: 2
      CCI: CCI-000162
      NIST800-53R4: AU-9
      Group_Title:
      - SRG-OS-000057-GPOS-00027
      - SRG-OS-000058-GPOS-00028
      - SRG-OS-000059-GPOS-00029
      Rule_ID: SV-230403r1017209_rule
      STIG_ID: RHEL-08-030122
      Vul_ID: V-230403
{{ end }}
