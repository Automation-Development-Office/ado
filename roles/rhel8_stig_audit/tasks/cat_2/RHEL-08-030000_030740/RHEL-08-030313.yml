---

{{ if .Vars.RHEL_08_030313 }}
command:
  audit_rules_semanage:
    title: RHEL-08-030313 | Successful/unsuccessful uses of semanage in RHEL 8 must generate an audit record. | config check
    exec: grep semanage /etc/audit/audit.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F path=/usr/sbin/semanage -F perm=x -F auid>=1000 -F auid!=unset -k privileged-unix-update'
    meta:
      Cat: 2
      CCI: CCI-000169
      NIST800-53R4: AU-12
      Group_Title:
      - SRG-OS-000062-GPOS-00031
      - SRG-OS-000037-GPOS-00015
      - SRG-OS-000042-GPOS-00020
      - SRG-OS-000392-GPOS-00172
      - SRG-OS-000462-GPOS-00206
      - SRG-OS-000471-GPOS-00215
      Rule_ID: SV-230429r1017230_rule
      STIG_ID: RHEL-08-030313
      Vul_ID: V-230429
  auditd_semanage_live:
    title: RHEL-08-030313 | Successful/unsuccessful uses of semanage in RHEL 8 must generate an audit record. | live check
    exec: auditctl -l | grep -w semanage
    exit-status: 0
    stdout:
    - '-a always,exit -S all -F path=/usr/sbin/semanage -F perm=x -F auid>=1000 -F auid!=-1 -F key=privileged-unix-update'
    meta:
      Cat: 2
      CCI: CCI-000169
      NIST800-53R4: AU-12
      Group_Title:
      - SRG-OS-000062-GPOS-00031
      - SRG-OS-000037-GPOS-00015
      - SRG-OS-000042-GPOS-00020
      - SRG-OS-000392-GPOS-00172
      - SRG-OS-000462-GPOS-00206
      - SRG-OS-000471-GPOS-00215
      Rule_ID: SV-230429r1017230_rule
      STIG_ID: RHEL-08-030313
      Vul_ID: V-230429
{{ end }}
