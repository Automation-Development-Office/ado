---

{{ if .Vars.RHEL_08_030320 }}
commmand:
  audit_rules_keysign:
    title: RHEL-08-030320 | Successful/unsuccessful uses of the ssh-keysign in RHEL 8 must generate an audit record. | config check
    exec: grep ssk-keysign /etc/audit/audit.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F path=/usr/libexec/openssh/ssh-keysign -F perm=x -F auid>=1000 -F auid!=unset -k privileged-ssh'
    meta:
      Cat: 2
      CCI: CCI-000169
      NIST800-53R4: AU-12
      Group_Title:
      - SRG-OS-000062-GPOS-00031
      - SRG-OS-000037-GPOS-00015
      - SRG-OS-000042-GPOS-00020
      - SRG-OS-000392-GPOS-00172
      - SRG-OS-000462-GPOS-00206
      - SRG-OS-000471-GPOS-00215
      Rule_ID: SV-230434r1017235_rule
      STIG_ID: RHEL-08-030320
      Vul_ID: V-230434
  auditd_ssh_keysign_live:
    title: RHEL-08-030320 | Successful/unsuccessful uses of the ssh-keysign in RHEL 8 must generate an audit record. | live check
    exec: auditctl -l | grep -w keysign
    exit-status: 0
    stdout:
    - '-a always,exit -S all -F path=/usr/libexec/openssh/ssh-keysign -F perm=x -F auid>=1000 -F auid!=-1 -F key=privileged-ssh'
    meta:
      Cat: 2
      CCI: CCI-000169
      NIST800-53R4: AU-12
      Group_Title:
      - SRG-OS-000062-GPOS-00031
      - SRG-OS-000037-GPOS-00015
      - SRG-OS-000042-GPOS-00020
      - SRG-OS-000392-GPOS-00172
      - SRG-OS-000462-GPOS-00206
      - SRG-OS-000471-GPOS-00215
      Rule_ID: SV-230434r1017235_rule
      STIG_ID: RHEL-08-030320
      Vul_ID: V-230434
{{ end }}
