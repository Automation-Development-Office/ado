---

{{ if .Vars.RHEL_08_030480 }}
command:
  audit_rules_lchown:
    title: RHEL-08-030480 | Successful/unsuccessful uses of the chown, fchown, fchownat, and lchown system calls in RHEL 8 must generate an audit record. | config check
    exec: grep chown /etc/audit/audit.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b32 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_mod'
    - '-a always,exit -F arch=b64 -S chown,fchown,fchownat,lchown -F auid>=1000 -F auid!=unset -k perm_mod'
    meta:
      Cat: 2
      CCI: CCI-000169
      NIST800-53R4: AU-12
      Group_Title:
      - SRG-OS-000062-GPOS-00031
      - SRG-OS-000037-GPOS-00015
      - SRG-OS-000042-GPOS-00020
      - SRG-OS-000392-GPOS-00172
      - SRG-OS-000462-GPOS-00206
      - SRG-OS-000471-GPOS-00215
      - SRG-OS-000064-GPOS-00033
      - SRG-OS-000466-GPOS-00210
      Rule_ID: SV-230455r1017251_rule
      STIG_ID: RHEL-08-030480
      Vul_ID: V-230455
  auditd_chown_live:
    title: RHEL-08-030480 | Successful/unsuccessful uses of the chown, fchown, fchownat, and lchown system calls in RHEL 8 must generate an audit record. | live check
    exec: auditctl -l | grep -w chown
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b32 -S lchown,fchown,chown,fchownat -F auid>=1000 -F auid!=-1 -F key=perm_mod'
    - '-a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=-1 -F key=perm_mod'
    meta:
      Cat: 2
      CCI: CCI-000169
      NIST800-53R4: AU-12
      Group_Title:
      - SRG-OS-000062-GPOS-00031
      - SRG-OS-000037-GPOS-00015
      - SRG-OS-000042-GPOS-00020
      - SRG-OS-000392-GPOS-00172
      - SRG-OS-000462-GPOS-00206
      - SRG-OS-000471-GPOS-00215
      - SRG-OS-000064-GPOS-00033
      - SRG-OS-000466-GPOS-00210
      Rule_ID: SV-230455r1017251_rule
      STIG_ID: RHEL-08-030480
      Vul_ID: V-230455
{{ end }}
