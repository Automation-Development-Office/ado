---

{{ if .Vars.RHEL_08_010201 }}
command:
  sshd_config_ClientAliveInterval:
    title: RHEL-08-010201 | RHEL 8 must be configured so that all network connections associated with SSH traffic are terminated after 10 minutes of becoming unresponsive.
    exec: grep ClientAliveInterval /etc/ssh/sshd_config /etc/sshd/conf.d
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:ClientAliveInterval ([1-9]|[1-5][0-9]{1,2}|600)$/'
    - '!/.*:ClientAliveInterval (60[1-9]|6[1-9][0-9]|[7-9][0-9][0-9]{1,3}|[1-9][0-9]{3,})$/'
    meta:
      Cat: 2
      CCI: CCI-001133
      NIST800-53R4: SC-10
      Group_Title:
      - SRG-OS-000163-GPOS-00072
      - SRG-OS-000126-GPOS-00066
      - SRG-OS-000279-GPOS-00109
      Rule_ID: SV-244525r1017331_rule
      STIG_ID: RHEL-08-010201
      Vul_ID: V-244525
{{ end }}
