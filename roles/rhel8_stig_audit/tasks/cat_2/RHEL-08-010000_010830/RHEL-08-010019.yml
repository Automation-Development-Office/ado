---

{{ if .Vars.RHEL_08_010019 }}
command:
  gpg_crypto_keys:
    title: RHEL-08-010019 | RHEL 8 must ensure cryptographic verification of vendor software packages. | {{ .Vars.rpm_gpg_key }}
    exit-status:
      or:
      - 0
      - 1
    timeout: {{ .Vars.timeout_ms }}
    exec: gpg -q --keyid-format short --with-fingerprint {{ .Vars.os_gpg_key_pubkey_content }}
    stdout:
    - "{{ .Vars.os_gpg_key_pubkey_name }}"
    - "{{ .Vars.os_gpg_key_pubkey_content }}"
    meta:
      Cat: 2
      CCI: CCI-001749
      NIST800-53R4: CM-5
      Group_Title: SRG-OS-000366-GPOS-00153
      Rule_ID: SV-256973r1017373_rule
      STIG_ID: RHEL-08-010019
      Vul_ID: V-256973
{{ end }}
