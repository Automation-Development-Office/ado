---

{{ if .Vars.RHEL_08_010620 }}
command:
  noexec_nosuid:
    title: RHEL-08-010620 | RHEL 8 must prevent files with the setuid and setgid bit set from being executed on file systems that are used with removable media.
    exec: grep -Ei "mnt|mount|usb" /etc/fstab | grep -Ev "^#|nosuid"
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '!/^.*/'
    meta:
      Cat: 2
      CCI: CCI-000366
      NIST800-53R4: CM-6
      Group_Title: SRG-OS-000480-GPOS-00227
      Rule_ID: SV-230305r1017115_rule
      STIG_ID: RHEL-08-010620
      Vul_ID: V-230305
{{ end }}
