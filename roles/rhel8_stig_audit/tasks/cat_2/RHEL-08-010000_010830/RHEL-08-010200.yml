---

{{ if .Vars.RHEL_08_010200 }}
command:
  sshd_config_clientalivecountmax:
    title: RHEL-08-010200 | RHEL 8 must be configured so that all network connections associated with SSH traffic terminate after becoming unresponsive.
    exec: grep ClientAliveCountMax /etc/ssh/sshd_config /etc/ssh/ssh_config.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:ClientAliveCountMax 1$/'
    - '!/.*:ClientAliveCountMax (0|[2-9]|1[0-9];{0,})/'
    meta:
      Cat: 2
      CCI: CCI-001133
      NIST800-53R4: SC-10
      Group_Title:
      - SRG-OS-000163-GPOS-00072
      - SRG-OS-000126-GPOS-00066
      - SRG-OS-000279-GPOS-00109
      Rule_ID: SV-230244r1069300_rule
      STIG_ID: RHEL-08-010200
      Vul_ID: V-230244
{{ end }}
