---

{{ if .Vars.RHEL_08_010600 }}
command:
  nodev_removable:
    title: RHEL-08-010600 | RHEL 8 must prevent special devices on file systems that are used with removable media.
    exec: grep -Ei "mnt|mount|usb" /etc/fstab | grep -Ev "^#|nodev"
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '!/^.*/'
    meta:
      Cat: 2
      CCI: CCI-000366
      NIST800-53R4: CM-6
      Group_Title: SRG-OS-000480-GPOS-00227
      Rule_ID: SV-230303r1017113_rule
      STIG_ID: RHEL-08-010600
      Vul_ID: V-230303
{{ end }}
