---

{{ if .Vars.RHEL_08_010130 }}
command:
  logins_def_sha_crypt:
    title: RHEL-08-010130 | The RHEL 8 shadow password suite must be configured to use a sufficient number of hashing rounds.
    exec: grep -i sha_crypt /etc/login.defs
    exit-status: 0
    stdout:
    - '/^SHA_CRYPT_M(A|I)(N|X)_ROUNDS ([1-9][0-9]{4,})/'
    - '!/^SHA_CRYPT_M(A|I)(N|X)_ROUNDS ([1-9][0-9]{0,4}$)/'
    meta:
      Cat: 2
      CCI: CCI-000196
      NIST800-53R4: IA-5
      Group_Title: SRG-OS-000073-GPOS-00041
      Rule_ID: SV-230233r1044790_rule
      STIG_ID: RHEL-08-010130
      Vul_ID: V-230233
{{ end }}
