---

{{ if .Vars.RHEL_08_010290 }}
command:
  show_crypto_policy1:
    title: RHEL-08-010290 | The RHEL 8 SSH server must be configured to use only Message Authentication Codes (MACs) employing FIPS 140-3-validated cryptographic hash algorithms to protect the confidentiality of SSH server connections. | live check
    exec: update-crypto-policies --show
    exit-status: 0
    stdout:
    - '/^FIPS/'
    meta:
      Cat: 1
      CCI: CCI-001453
      NIST800-53R4: AC-17
      Group_Title:
      - SRG-OS-000250-GPOS-00093
      - SRG-OS-000393-GPOS-00173
      - SRG-OS-000394-GPOS-00174
      - SRG-OS-000125-GPOS-00065
      Rule_ID: SV-230251r1184240_rule
      STIG_ID: RHEL-08-010290
      Vul_ID: V-230251
  crypto_policies_openssh_server_macs:
    title: RHEL-08-010290 | The RHEL 8 SSH server must be configured to use only Message Authentication Codes (MACs) employing FIPS 140-3-validated cryptographic hash algorithms to protect the confidentiality of SSH server connections. | crypto-policies - ssh_server
    exec: grep -i MACS /etc/crypto-policies/back-ends/opensshserver.config
    exit-status: 0
    stdout:
    - '/^CRYPTO_POLICY=.*-oMACS=hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256.*-o/'
    meta:
      Cat: 1
      CCI: CCI-001453
      NIST800-53R4: AC-17
      Group_Title:
      - SRG-OS-000250-GPOS-00093
      - SRG-OS-000393-GPOS-00173
      - SRG-OS-000394-GPOS-00174
      - SRG-OS-000125-GPOS-00065
      Rule_ID: SV-230251r1184240_rule
      STIG_ID: RHEL-08-010290
      Vul_ID: V-230251
{{ end }}
