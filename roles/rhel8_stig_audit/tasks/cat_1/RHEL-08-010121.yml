---

{{ if .Vars.RHEL_08_010121 }}
command:
  no_blank_passwds:
    title: RHEL-08-010121 | The RHEL 8 operating system must not have accounts configured with blank or null passwords.
    exec: cut -d ':' -f1,2 /etc/shadow | grep -Ei "(:\$|\s+)"
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '!/^.*/'
    meta:
      Cat: 1
      CCI: CCI-000366
      NIST800-53R4: CM-6
      Group_Title:  SRG-OS-000480-GPOS-00227
      Rule_ID: SV-251706r1017359_rule
      STIG_ID: RHEL-08-010121
      Vul_ID: V-251706
{{ end }}
