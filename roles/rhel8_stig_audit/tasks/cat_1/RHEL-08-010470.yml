---

{{ if .Vars.run_heavy_tests }}
  {{ if .Vars.RHEL_08_010470 }}
command:
  shosts_check:
    title: RHEL-08-010470 | There must be no .shosts files on the RHEL 8 operating system.
    exec: find / -name "*.shosts"
    timeout: {{ .Vars.timeout_ms }}
    exit-status:
        or:
        - 0
        - 1
    stdout:
    - '!/.*/'
    meta:
      Cat: 1
      CCI: CCI-000366
      NIST800-53R4: CM-6
      Group_Title: SRG-OS-000480-GPOS-00227
      Rule_ID: SV-230284r1017095_rule
      STIG_ID: RHEL-08-010470
      Vul_ID: V-230284
  {{ end }}
{{ end }}
