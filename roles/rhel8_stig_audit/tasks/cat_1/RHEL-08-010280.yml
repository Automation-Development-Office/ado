---

{{ if .Vars.RHEL_08_010280 }}
command:
  libreswan_crypto_policy:
    title: RHEL-08-010280 | RHEL 8 IP tunnels must use FIPS 140-3-approved cryptographic algorithms. | check crypto-policies backend
    exec: grep -r crypto-policies /etc/ipsec.conf 2>/dev/null || echo "libreswan not installed or not configured"
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/crypto-policies\/back-ends\/libreswan.config|libreswan not installed/'
    meta:
      Cat: 1
      CCI: CCI-000068
      NIST800-53R4: AC-17
      Group_Title: SRG-OS-000033-GPOS-00014
      Rule_ID: SV-279930r1184239_rule
      STIG_ID: RHEL-08-010280
      Vul_ID: V-279930
{{ end }}
