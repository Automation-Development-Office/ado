---

{{ if .Vars.RHEL_08_010020 }}
command:
  crypto_policy_show:
    title: RHEL-08-010020 | RHEL 8 must implement a FIPS 140-3-compliant systemwide cryptographic policy. | update-crypto-policies --show
    exec: update-crypto-policies --show
    exit-status: 0
    stdout:
    - '/^FIPS/'
    meta:
      Cat: 1
      CCI: CCI-000068
      NIST800-53R4: AC-17
      Group_Title: SRG-OS-000033-GPOS-00014
      Rule_ID: SV-230223r1155356_rule
      STIG_ID: RHEL-08-010020
      Vul_ID: V-230223
  crypto_policy_current:
    title: RHEL-08-010020 | RHEL 8 must implement a FIPS 140-3-compliant systemwide cryptographic policy. | CURRENT.pol hash and min_rsa_size
    exec: grep -E 'rsa_size|hash' /etc/crypto-policies/state/CURRENT.pol
    exit-status: 0
    stdout:
    - '/hash.*SHA2-256.*SHA2-384.*SHA2-512/'
    - '/min_rsa_size\s*=\s*2048/'
    meta:
      Cat: 1
      CCI: CCI-000068
      NIST800-53R4: AC-17
      Group_Title: SRG-OS-000033-GPOS-00014
      Rule_ID: SV-230223r1155356_rule
      STIG_ID: RHEL-08-010020
      Vul_ID: V-230223
{{ end }}
