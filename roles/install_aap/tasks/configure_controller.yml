---
- name: Wait for controller API to be reachable
  ansible.builtin.uri:
    url: "https://{{ controller_route_host }}/api/v2/ping/"
    method: GET
    validate_certs: false
    status_code: 200
  register: install_aap_ping
  retries: 60
  delay: 10
  until: install_aap_ping.status == 200

- name: Create Automation Hub credential (token)
  ansible.controller.credential:
    controller_host: "https://{{ controller_route_host }}"
    controller_username: "{{ admin_user }}"
    controller_password: "{{ ocp_aap26_admin_password }}"
    validate_certs: false
    name: "{{ ocp_aap26_hub_credential_name }}"
    organization: "{{ controller_bootstrap_organization | default('Default') }}"
    credential_type: "Ansible Galaxy/Automation Hub API Token"
    inputs:
      url: "{{ ocp_aap26_hub_url }}"
      token: "{{ ocp_aap26_hub_token }}"
  no_log: true

- name: Configure Galaxy server to use Automation Hub
  ansible.controller.settings:
    controller_host: "https://{{ controller_route_host }}"
    controller_username: "{{ admin_user }}"
    controller_password: "{{ ocp_aap26_admin_password }}"
    validate_certs: false
    settings:
      GALAXY_SERVER_URL: "{{ ocp_aap26_hub_url }}"
