---
- name: Guard — required vars
  ansible.builtin.assert:
    that:
      - name_space is defined and (name_space | string | length) > 0
      - rhbk_hostname is defined and (rhbk_hostname | string | length) > 0
    fail_msg: "name_space and rhbk_hostname are required."

# -----------------------
# Secrets: DB + Admin
# -----------------------

- name: Create Keycloak DB Secret
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ postgres_secret_name }}"
        namespace: "{{ name_space }}"
      type: Opaque
      stringData:
        username: "{{ rhbk_db_user }}"
        password: "{{ rhbk_db_password }}"

- name: Create Keycloak bootstrap ADMIN Secret (used by spec.bootstrapAdmin.user.secret)
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: keycloak-admin-creds
        namespace: "{{ name_space }}"
      type: Opaque
      stringData:
        username: "{{ rhbk_admin_user }}"
        password: "{{ rhbk_admin_password }}"

# -----------------------
# TLS: cert-manager vs manual
# -----------------------

- name: Guard — cert-manager mode requires issuer name
  ansible.builtin.assert:
    that:
      - rhbk_issuer_name is defined
      - (rhbk_issuer_name | string | length) > 0
      - rhbk_issuer_kind is defined
      - rhbk_issuer_kind in ['Issuer', 'ClusterIssuer']
    fail_msg: "cert_manager=true requires rhbk_issuer_name and rhbk_issuer_kind (Issuer or ClusterIssuer)."
  when: cert_manager | default(false) | bool

- name: Create cert-manager Certificate for Keycloak (cert_manager=true)
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "{{ rhbk_cert_name }}"
        namespace: "{{ name_space }}"
      spec:
        secretName: "{{ rhbk_tls_secret_name }}"
        dnsNames:
          - "{{ rhbk_hostname }}"
        issuerRef:
          name: "{{ rhbk_issuer_name }}"
          kind: "{{ rhbk_issuer_kind }}"
  when: cert_manager | default(false) | bool

- name: Guard — manual TLS requires tls_crt + tls_key
  ansible.builtin.assert:
    that:
      - tls_crt is defined and (tls_crt | string | length) > 0
      - tls_key is defined and (tls_key | string | length) > 0
    fail_msg: "cert_manager=false requires tls_crt and tls_key."
  when: not (cert_manager | default(false) | bool)

- name: Create Keycloak TLS Secret (cert_manager=false)
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ rhbk_tls_secret_name }}"
        namespace: "{{ name_space }}"
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ tls_crt | b64encode }}"
        tls.key: "{{ tls_key | b64encode }}"
  when: not (cert_manager | default(false) | bool)

# -----------------------
# Postgres: handle immutable SS changes safely
# -----------------------

- name: Get existing PostgreSQL StatefulSet (if any)
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    namespace: "{{ name_space }}"
    name: "{{ postgres_statefulset_name }}"
  register: rhbk_ss_info
  failed_when: false

- name: Decide if StatefulSet needs recreation due to immutable changes
  ansible.builtin.set_fact:
    rhbk_requires_ss_recreation: >-
      {{
        (rhbk_recreate_ss_on_immutable_change | bool) and
        (rhbk_ss_info.resources | length > 0) and (
          (
            (rhbk_ss_info.resources[0].spec.volumeClaimTemplates[0].spec.storageClassName | default('')) != (postgres_storage_class | default(''))
          )
          or
          (
            (rhbk_ss_info.resources[0].spec.serviceName | default('')) != postgres_service_name
          )
        )
      }}

