# -----------------------
# Postgres objects
# -----------------------

- name: Deploy PostgreSQL StatefulSet
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: "{{ postgres_statefulset_name }}"
        namespace: "{{ name_space }}"
      spec:
        serviceName: "{{ postgres_service_name }}"
        selector:
          matchLabels:
            app: "{{ postgres_statefulset_name }}"
        replicas: 1
        template:
          metadata:
            labels:
              app: "{{ postgres_statefulset_name }}"
          spec:
            containers:
              - name: postgresql-db
                image: "{{ postgres_image }}"
                ports:
                  - containerPort: 5432
                volumeMounts:
                  - name: data-volume
                    mountPath: /var/lib/pgsql/data
                env:
                  - name: POSTGRESQL_USER
                    valueFrom:
                      secretKeyRef:
                        name: "{{ postgres_secret_name }}"
                        key: username
                  - name: POSTGRESQL_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: "{{ postgres_secret_name }}"
                        key: password
                  - name: POSTGRESQL_DATABASE
                    value: "{{ postgres_db_name }}"
                  - name: POSTGRES_DB
                    value: "{{ postgres_db_name }}"
        volumeClaimTemplates:
          - metadata:
              name: data-volume
            spec:
              accessModes: ['ReadWriteOnce']
              resources:
                requests:
                  storage: "{{ postgres_storage_size }}"
              storageClassName: "{{ storage }}"
    wait: true

- name: Deploy PostgreSQL Service
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ postgres_service_name }}"
        namespace: "{{ name_space }}"
      spec:
        selector:
          app: "{{ postgres_statefulset_name }}"
        type: ClusterIP
        ports:
          - port: 5432
            targetPort: 5432

# -----------------------
# Keycloak CR (RHBK) with bootstrapAdmin wired correctly
# -----------------------

- name: Deploy Keycloak Custom Resource
  kubernetes.core.k8s:
    state: "{{ state }}"
    definition:
      apiVersion: k8s.keycloak.org/v2alpha1
      kind: Keycloak
      metadata:
        name: keycloak
        namespace: "{{ name_space }}"
      spec:
        instances: 1

        # IMPORTANT: This is what actually creates the real admin user at initial creation
        bootstrapAdmin:
          user:
            secret: keycloak-admin-creds

        db:
          vendor: postgres
          host: "{{ postgres_service_name }}"
          usernameSecret:
            name: "{{ postgres_secret_name }}"
            key: username
          passwordSecret:
            name: "{{ postgres_secret_name }}"
            key: password

        http:
          tlsSecret: "{{ rhbk_tls_secret_name }}"

        hostname:
          hostname: "{{ rhbk_hostname }}"

        proxy:
          headers: xforwarded
