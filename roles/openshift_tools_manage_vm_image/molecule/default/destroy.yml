---
- name: Destroy - clean up Molecule test artifacts
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    manage_vm_image_test_root: /tmp/manage_vm_image_molecule

  tasks:
    - name: Remove Molecule image test directory
      ansible.builtin.file:
        path: "{{ manage_vm_image_test_root }}"
        state: absent
