  selinux: { collection: "redhat.rhel_system_roles", role: "selinux" }
  tuned: { collection: "redhat.rhel_system_roles", role: "tuned" }
  network: { collection: "redhat.rhel_system_roles", role: "network" }
  storage: { collection: "redhat.rhel_system_roles", role: "storage" }
  kdump: { collection: "redhat.rhel_system_roles", role: "kdump" }
  nbde_client: { collection: "redhat.rhel_system_roles", role: "nbde_client" }
  nbde_server: { collection: "redhat.rhel_system_roles", role: "nbde_server" }
