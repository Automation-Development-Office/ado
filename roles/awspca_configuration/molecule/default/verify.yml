---
- name: Verify — namespace exists
  hosts: localhost
  gather_facts: false

  vars:
    name_space: test-namespace-molecule
    readme_path: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/README.md"
    # derive role dir from env (preferred) or from playbook path (fallback)
    role_dir_env: "{{ lookup('env','MOLECULE_PROJECT_DIRECTORY') | default('', true) }}"
    role_dir: "{{ (role_dir_env != '') | ternary(role_dir_env, (playbook_dir | dirname | dirname)) }}"
    detected_role_name: "{{ role_dir | regex_replace('^.*/', '') }}"
  tasks:
    - name: Show detected role name
      ansible.builtin.debug:
        msg: "Detected role name: {{ detected_role_name }}"

    - name: Verify role name does NOT use hyphens ('-')
      ansible.builtin.assert:
        that:
          - detected_role_name is match('^[A-Za-z0-9_]+$')
          - detected_role_name.find('-') == -1
        fail_msg: "❌ Role name '{{ detected_role_name }}' contains a hyphen. Use underscores only (e.g., 'kube_sched' not 'kube-sched')."
        success_msg: "✅ Role name '{{ detected_role_name }}' is valid (underscores allowed, no hyphens)."

    - name: Check if README.md exists
      ansible.builtin.stat:
        path: "{{ readme_path }}"
      register: awspca_configuration_readme_file

    - name: Print message if README.md exists
      ansible.builtin.debug:
        msg: "✅ README.md file exists in the role."
      when: awspca_configuration_readme_file.stat.exists

    - name: Print message if README.md does not exist
      ansible.builtin.debug:
        msg: "❌ README.md file is missing in the role."
      when: not awspca_configuration_readme_file.stat.exists

    # ------------------ Check file contents ------------------

    - name: Load README.md if present
      ansible.builtin.slurp:
        path: "{{ readme_path }}"
      register: awspca_configuration_readme_raw
      when: awspca_configuration_readme_file.stat.exists

    - name: Set README content fact
      ansible.builtin.set_fact:
        awspca_configuration_readme: "{{ awspca_configuration_readme_raw.content | b64decode }}"
      when: awspca_configuration_readme_file.stat.exists

    # H1 heading
    - name: Verify README has required heading
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is regex('(?m)^#\\s+Role:')
        fail_msg: "❌ README.md should start with '# Role: <collection.role>'."
        success_msg: "✅ README.md has correct heading format."
      when: awspca_configuration_readme_file.stat.exists

    # Variables table (already in your checks)
    - name: Verify README has variables table
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('\\|\\s*Variable\\s*\\|\\s*Description\\s*\\|', multiline=True)
        fail_msg: "❌ README.md should include a variables table with '| Variable | Description |'."
        success_msg: "✅ README.md includes a variables table."
      when: awspca_configuration_readme_file.stat.exists

    # At least one fenced example block
    - name: Verify README has example code block
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('```(yaml|yml|ansible|bash)[\\s\\S]*?```', multiline=True)
        fail_msg: "❌ README.md should include a fenced code block with an example (```yaml ... ```)."
        success_msg: "✅ README.md includes an example code block."
      when: awspca_configuration_readme_file.stat.exists

    - name: Verify Role Author section exists
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('(?m)^##\\s+Role Author')
        fail_msg: "❌ Missing '## Role Author' section."
        success_msg: "✅ Found '## Role Author'."
      when: awspca_configuration_readme_file.stat.exists

    - name: Verify Role Requirements section exists
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('(?m)^##\\s+✅\\s+Role Requirements')
        fail_msg: "❌ Missing '## ✅ Role Requirements' section."
        success_msg: "✅ Found '## ✅ Role Requirements'."
      when: awspca_configuration_readme_file.stat.exists

    - name: Verify Role Variables section exists
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('(?m)^##\\s+📦\\s+Role Variables')
        fail_msg: "❌ Missing '## 📦 Role Variables' section."
        success_msg: "✅ Found '## 📦 Role Variables'."
      when: awspca_configuration_readme_file.stat.exists

    - name: Verify Role Usage section exists
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('(?m)^##\\s+🚀\\s+Role Usage')
        fail_msg: "❌ Missing '## 🚀 Role Usage' section."
        success_msg: "✅ Found '## 🚀 Role Usage'."
      when: awspca_configuration_readme_file.stat.exists

    - name: Verify Role Molecule Testing section exists
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('(?m)^##\\s+🧪\\s+Role Molecule Testing')
        fail_msg: "❌ Missing '## 🧪 Role Molecule Testing' section."
        success_msg: "✅ Found '## 🧪 Role Molecule Testing'."
      when: awspca_configuration_readme_file.stat.exists

    - name: Verify Role Structure section exists
      ansible.builtin.assert:
        that:
          - awspca_configuration_readme is search('(?m)^##\\s+📁\\s+Role Structure')
        fail_msg: "❌ Missing '## 📁 Role Structure' section."
        success_msg: "✅ Found '## 📁 Role Structure'."
      when: awspca_configuration_readme_file.stat.exists
