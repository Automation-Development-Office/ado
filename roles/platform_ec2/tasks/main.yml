- name: Start an instance and Add EBS
  amazon.aws.ec2_instance:
    name: "{{ instance_name }}"
    aws_access_key: "{{ aws_access_key }}"
    aws_secret_key: "{{ aws_secret_key }}"
    image_id: "{{ image_id }}"
    vpc_subnet_id: "{{ vpc_subnet_id }}"
    region: "{{ region }}"
    instance_type: "{{ instance_type }}"
    key_name: "{{ key_name }}"
    security_group: "{{ security_group }}"
    subnet_id: "{{ subnet_id }}"
    volumes:
      - device_name: "{{ volume_device_name }}"
        ebs:
          volume_size: "{{ volume_size }}"
          delete_on_termination: "{{ volume_delete_on_termination }}"
  register: platform_ec2_instance_result

- name: Set ec2 instance id
  ansible.builtin.set_fact:
    platform_ec2_instance_id: "{{ platform_ec2_instance_result.instances[0].instance_id }}"

- name: Create snapshot
  amazon.aws.ec2_snapshot:
    instance_id: "{{ platform_ec2_instance_id }}"
    device_name: "{{ volume_device_name }}"
    description: "{{ snapshot_description }}"
    region: "{{ region }}"
    aws_access_key: "{{ aws_access_key }}"
    aws_secret_key: "{{ aws_secret_key }}"
  register: platform_ec2_snapshot_result

- name: Set ec2 snapshot id
  ansible.builtin.set_fact:
    platform_ec2_snapshot_id: "{{ platform_ec2_snapshot_result['snapshots'][0]['snapshot_id'] }}"

- name: Create AMI from instance
  amazon.aws.ec2_ami:
    aws_access_key: "{{ aws_access_key }}"
    aws_secret_key: "{{ aws_secret_key }}"
    instance_id: "{{ platform_ec2_instance_id }}"
    wait: true
    name: "{{ new_instance_name }}"
    region: "{{ region }}"
    tags:
      Name: "{{ name_tag }}"
      Service: TestService

