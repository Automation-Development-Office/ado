---
# Namespace where the Secret lives (AWSPCAClusterIssuer is cluster-scoped)
ocp_awspca_namespace: cert-manager

# Secret holding AWS creds
ocp_awspca_secret_name: awspca-creds

# ClusterIssuer name
ocp_awspca_issuer_name: awspca-clusterissuer

# AWS PCA
ocp_awspca_region: us-gov-west-1
ocp_awspca_pca_arn: ""

# Credentials (prefer vault vars). If not set, fall back to environment.
ocp_awspca_access_key_id: ""
ocp_awspca_secret_access_key: ""

# Secret key names expected by the AWS PCA issuer
ocp_awspca_secret_key_id_field: AWS_ACCESS_KEY_ID
ocp_awspca_secret_secret_key_field: AWS_SECRET_ACCESS_KEY

# Wait for Ready=True
ocp_awspca_wait_ready: true
ocp_awspca_wait_retries: 30
ocp_awspca_wait_delay: 10

# Safety
ocp_awspca_no_log: true
