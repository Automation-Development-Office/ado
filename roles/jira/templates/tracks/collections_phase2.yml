template_stories_collections_phase2:

  - story_summary: "Collections - {{ group }}: Role {{ role_name }} - Phase 2: Integration, Validation, and Adoption"
    story_description: |
      *As a:* Platform / Automation Engineer
      *I want to:* Integrate and validate the role in real automation workflows
      *So that:* it can be reliably consumed by pipelines, playbooks, and AAP.

      Notes / Context:
      This phase focuses on CI integration, real environment validation, dependency and variable documentation,
      compatibility with AAP execution environments, and finalizing adoption guidance.

      *Definition of Done:*
      - Role integrated into CI pipeline
      - Role works in target environments
      - Dependencies clearly documented
      - Versioning and compatibility validated
      - Consumers can adopt the role with clear examples

    custom_ac: |
      * Role executes successfully in target environments
      * CI pipeline runs ansible-lint and Molecule
      * Dependencies documented and validated
      * Variables and inputs clearly defined
      * Collection versioning aligned with release process
      * Compatibility confirmed with AAP execution environments
      * Consumer adoption validated and feedback incorporated
      * Backlog items created for enhancements/tech debt

    labels:
      - "collections"
      - "automation"
      - "{{ section }}"

    subtasks:
      - summary: "Integrate role into CI pipeline (ansible-lint + Molecule)"
        description: |
          *As a:* Platform / Automation Engineer
          *I want to:* Integrate quality gates into CI
          *So that:* linting and tests run automatically on every change.
        labels: ["collections", "automation", "{{ section }}"]
        component: "{{ group }}"

      - summary: "Validate role in target environments"
        description: |
          *As a:* Platform / Automation Engineer
          *I want to:* Validate the role in target environments
          *So that:* behavior matches real clusters and integrations.
        labels: ["collections", "automation", "{{ section }}"]
        component: "{{ group }}"

      - summary: "Document required variables, inputs, and dependencies"
        description: |
          *As a:* Platform / Automation Engineer
          *I want to:* Document variables and dependencies clearly
          *So that:* consumers know exactly what is required and supported.
        labels: ["collections", "automation", "{{ section }}"]
        component: "{{ group }}"

      - summary: "Validate versioning and release alignment"
        description: |
          *As a:* Platform / Automation Engineer
          *I want to:* Validate versioning and release approach
          *So that:* consumers can upgrade safely and predictably.
        labels: ["collections", "automation", "{{ section }}"]
        component: "{{ group }}"

      - summary: "Confirm compatibility with AAP execution environments"
        description: |
          *As a:* Platform / Automation Engineer
          *I want to:* Confirm compatibility with AAP execution environments
          *So that:* Controller jobs run reliably and dependencies are satisfied.
        labels: ["collections", "automation", "{{ section }}"]
        component: "{{ group }}"

      - summary: "Validate adoption with consumers and incorporate feedback"
        description: |
          *As a:* Platform / Automation Engineer
          *I want to:* Validate role usability with consumers
          *So that:* the interface and documentation are practical and correct.
        labels: ["collections", "automation", "{{ section }}"]
        component: "{{ group }}"
