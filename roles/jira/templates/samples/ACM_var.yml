template_stories:

  - story_summary: "{{ product }} - {{ group }} - {{ enviroment }}: kickoff, Readiness and Design"
    story_description: |
      *As a:* "{{ role_name }}"
      *I want to:* Validate all prerequisites and architectural decisions for ACM
      *So that:* ACM can be deployed consistently and support multi-cluster governance at scale.

      Notes / Context:
      This phase focuses on discovery, access validation, architectural alignment, and Automation expectations should be defined and gaps identified
      before any cluster-level changes are introduced.

    custom_ac: |
      * Stakeholders identified and kickoff completed
      * Meet with Red Hat architects/SMEs to validate design
      * Meet with Customer architects/SMEs to validate design and Implementation
      * Target clusters identified, categorized, and ownership confirmed
      * Network connectivity validated
      * Identity integration reviewed (IdM, SSO, RBAC)
      * Certificate and trust requirements documented
      * RBAC model defined for ACM users and automation
      * GitOps strategy confirmed (Collections, AAP, ArgoCD / GitOps operator)
      * Automation expectations documented (what will / will not be automated)
      * Open risks and gaps captured and reviewed
      * Follow-on backlog items created and prioritized (Automation, Observability, Policies, etc.)


    labels:
      - "{{ product }}"
      - "{{ section }}"

    subtasks:
      - summary: "Conduct ACM readiness workshop/kickoff"
      - summary: "Review and validate architecture and design with stakeholders and Red Hat architects and SMEs"
      - summary: "Validate network connectivity between (AWS, AAP hub, and managed clusters"
      - summary: "Define RBAC model for ACM users and automation"
      - summary: "Review certificate and trust requirements"
      - summary: "Document automation expectations and constraints"
      - summary: "Create backlog items for identified gaps (Automation, Observability, Policies, etc.)"

  - story_summary: "{{ product }} - {{ group }} - {{ enviroment }}: Deployment and Implementation"
    story_description: |
      *As a:* "{{ role_name }}"
      *I want to:* Deploy and configure ACM using approved architecture and automation
      *So that:* clusters can be managed consistently and securely.

    custom_ac: |
      * ACM operator installed and healthy
      * Hub cluster configured using declared configuration
      * Managed clusters successfully imported
      * RBAC enforced and validated
      * Observability components verified
      * GitOps integration functional
      * Automation is idempotent and repeatable
      * Configuration stored in version control
      * Documentation updated with deployment details


    labels:
      - "{{ product }}"
      - "{{ section }}"

    subtasks:
      - summary: "Install ACM operator"
      - summary: "Configure hub cluster settings"
      - summary: "Import managed clusters"
      - summary: "Validate RBAC and access control"
      - summary: "Configure observability"
      - summary: "Validate GitOps integration"
      - summary: "Document deployment and configuration details"

  - story_summary: "{{ product }} - {{ group }} - {{ enviroment }}: Validation, Adoption, and application migration"
    story_description: |
      *As a:* "{{ role_name }}"
      *I want to:* Validate ACM functionality using real workloads
      *So that:* the platform is production-ready and trusted by teams.

    custom_ac: |
      * Pilot workloads deployed via ACM
      * Policies evaluated and enforced
      * Drift detection validated
      * Upgrade and lifecycle workflows tested
      * Monitoring and alerting validated
      * Application teams successfully onboarded
      * Stakeholder sign-off obtained
      * Metrics and feedback collected


    labels:
      - "{{ product }}"
      - "{{ section }}"

    subtasks:
      - summary: "Deploy pilot workloads via ACM"
      - summary: "Validate policy enforcement"
      - summary: "Test drift detection and remediation"
      - summary: "Verify monitoring and alerts"
      - summary: "Collect stakeholder feedback"
      - summary: "Metrics collected and analyzed"

  - story_summary: "{{ product }} - {{ group }} - {{ enviroment }}: Operations handoff and long-term support"
    story_description: |
      *As a:* "{{ role_name }}"
      *I want to:* Operationalize ACM for long-term support
      *So that:* the platform is stable, maintainable, and auditable.

    custom_ac: |
      * Runbooks completed
      * Support ownership defined
      * TAMS engaged and trained
      * Backup and recovery validated
      * Upgrade procedures documented
      * Observability dashboards finalized
      * Missing automation identified and planned
      * Operational handoff completed

    labels:
      - "{{ product }}"
      - "{{ section }}"

    subtasks:
      - summary: "Create operational runbooks"
      - summary: "Define support and escalation model"
      - summary: "Validate backup and recovery"
      - summary: "Document upgrade procedures"
      - summary: "Customer and TAMS training conducted"
      - summary: "Automation gaps identified and backlog created"
      - summary: "Finalize handoff documentation"
