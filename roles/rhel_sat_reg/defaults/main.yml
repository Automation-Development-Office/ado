---
# defaults file for sat_reg

rhel_sat_reg_validate_certs: true # Whether to validate SSL certificates when connecting to Satellite
rhel_sat_reg_insights_enabled: false # Whether to enable Insights during registration
rhel_sat_reg_update_packages: false # Whether to update packages during registration
rhel_sat_reg_insecure: false
rhel_sat_reg_action: "register" # The action to perform (register or deregister)
rhel_sat_reg_force_registration: true # Whether to force registration even if the system is already registered
