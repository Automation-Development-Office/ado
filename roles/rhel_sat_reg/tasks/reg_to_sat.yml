---
- name: Gathering facts
  ansible.builtin.gather_facts:
    gather_subset:
      - distribution

- name: Fail if OS version earlier than 8 is detected (Out of Support)
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == "RedHat"
      - (ansible_facts['distribution_major_version'] | int >= 8)
    fail_msg: "RHEL {{ ansible_facts['distribution_major_version'] }} and earlier machines are out-of-support and will not be registered."
    success_msg: "RHEL{{ ansible_facts['distribution_major_version'] }} detected. Proceeding."

- name: Generate registration command
  redhat.satellite.registration_command:
    username: "{{ rhel_sat_reg_org_admin_account }}"
    password: "{{ rhel_sat_reg_org_admin_account_password }}"
    activation_keys:
      - "{{ rhel_sat_reg_activation_key_name }}"
    organization: "{{ rhel_sat_reg_satellite_org_name }}"
    server_url: "{{ rhel_sat_reg_satellite_host }}"
    force: "{{ rhel_sat_reg_force_registration }}"
    validate_certs: "{{ rhel_sat_reg_validate_certs }}"
    insecure: "{{ rhel_sat_reg_insecure }}"
    setup_insights: "{{ rhel_sat_reg_insights_enabled }}"
    update_packages: "{{ rhel_sat_reg_update_packages }}"
  register: rhel_sat_reg_command
  changed_when: false

- name: Debug
  ansible.builtin.debug:
    verbosity: 1
    msg: "{{ rhel_sat_reg_command.registration_command }}"

- name: Perform registration # noqa: command-instead-of-shell Because we need to run a shell command based on the output of the previous task
  ansible.builtin.shell: "{{ rhel_sat_reg_command.registration_command }}"
  register: rhel_sat_reg_script_result
  changed_when: "'system has been registered' in rhel_sat_reg_script_result.stdout"
  failed_when: rhel_sat_reg_script_result.rc != 0 and ("already registered" not in rhel_sat_reg_script_result.stderr | lower)
