---
# Preliminary tasks that should always be run

- name: "PRELIM | PATCH | Ensure libselinux is installed"
  when: '"libselinux" not in ansible_facts.packages'
  tags: always
  ansible.builtin.package:
    name: libselinux

- name: "PRELIM | AUDIT | Interactive Users"
  tags: always
  ansible.builtin.shell: >
    grep -E -v '^(root|halt|sync|shutdown)' /etc/passwd | awk -F: '(!index($7, "sbin/nologin") && $7 != "/bin/nologin" && $7 != "/bin/false" && $7 != "/dev/null")
    { print $1":"$3":"$6 }'
  changed_when: false
  check_mode: false
  register: prelim_interactive_users_raw

- name: "PRELIM | AUDIT | Interactive Users (reformat)"
  tags: always
  ansible.builtin.set_fact:
    prelim_interactive_users: "{{ prelim_interactive_users | default([]) + [dict([('username', item.split(':')[0]), ('uid', item.split(':')[1]), ('home', item.split(':')[2])])]
      }}"
  loop: "{{ prelim_interactive_users_raw.stdout_lines }}"

- name: "PRELIM | AUDIT | Interactive User accounts home directories"
  tags: always
  ansible.builtin.shell: >
    grep -E -v '^(root|halt|sync|shutdown)' /etc/passwd | awk -F: '(!index($7, "sbin/nologin") && $7 != "/bin/nologin" && $7 != "/bin/false" && $7 != "/dev/null")
    { print $6 }'
  changed_when: false
  check_mode: false
  register: prelim_interactive_users_home

- name: "PRELIM | AUDIT | Interactive UIDs"
  tags: always
  ansible.builtin.shell: >
    grep -E -v '^(root|halt|sync|shutdown)' /etc/passwd | awk -F: '(!index($7, "sbin/nologin") && $7 != "/bin/nologin" && $7 != "/bin/false") { print $3 }'
  changed_when: false
  check_mode: false
  register: prelim_interactive_uids

- name: "PRELIM | AUDIT | Discover Interactive UID_MIN and UID_MAX from /etc/login.defs"
  when: rhel8cis_discover_int_uid
  tags: always
  block:
    - name: "PRELIM | AUDIT | Capture UID_MIN from /etc/login.defs"
      ansible.builtin.command: awk '/^UID_MIN/ {print $2}' /etc/login.defs
      changed_when: false
      failed_when: false
      check_mode: false
      register: prelim_uid_min_id

    - name: "PRELIM | AUDIT | Capture UID_MAX from /etc/login.defs"
      ansible.builtin.command: awk '/^UID_MAX/ {print $2}' /etc/login.defs
      changed_when: false
      failed_when: false
      check_mode: false
      register: prelim_uid_max_id

- name: "PRELIM | AUDIT | Set facts for interactive UID/GID ranges"
  tags: always
  ansible.builtin.set_fact:
    prelim_min_int_uid: "{{ prelim_uid_min_id.stdout | default(min_int_uid) }}"
    prelim_max_int_uid: "{{ prelim_uid_max_id.stdout | default(max_int_uid) }}"

- name: "PRELIM | AUDIT | Set facts based on boot type"
  tags: always
  block:
    - name: "PRELIM | AUDIT | Check whether machine is UEFI-based"
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: prelim_efi_boot

    - name: "PRELIM | AUDIT | Set legacy boot and grub path fact | Bios"
      when: not prelim_efi_boot.stat.exists
      ansible.builtin.set_fact:
        rhel8cis_legacy_boot: true
        grub2_path: /etc/grub2.cfg
        rhel8cis_boot_path: /boot/grub2/

    - name: "PRELIM | AUDIT | Set grub fact | UEFI"
      when: prelim_efi_boot.stat.exists
      ansible.builtin.set_fact:
        grub2_path: /etc/grub2-efi.cfg
        rhel8cis_boot_path: "/boot/efi/EFI/{{ ansible_facts.distribution | lower }}/"

- name: "PRELIM | AUDIT | Ensure permissions on bootloader config are configured | Get grub config file stats"
  tags: always
  ansible.builtin.stat:
    path: "{{ grub2_path }}"
  changed_when: false
  check_mode: false
  register: prelim_grub_cfg

- name: "PRELIM | AUDIT | Gather the package facts before prelim"
  tags: always
  ansible.builtin.package_facts:
    manager: auto

- name: PRELIM | Include audit specific variables
  when: run_audit or audit_only or setup_audit
  tags:
    - setup_audit
    - run_audit
  ansible.builtin.include_vars:
    file: audit.yml

- name: PRELIM | Include pre-remediation audit tasks
  when: run_audit or audit_only or setup_audit
  tags: run_audit
  ansible.builtin.import_tasks:
    file: pre_remediation_audit.yml

##### Section requirements #####

- name: PRELIM | AUDIT | Section 1.1 | Create list of mount points
  tags: always
  ansible.builtin.set_fact:
    prelim_mount_names: "{{ ansible_facts.mounts | map(attribute='mount') | list }}"

- name: PRELIM | AUDIT | Section 1.1 | Retrieve mount options
  tags: always
  block:
    - name: PRELIM | AUDIT | Section 1.1 | Retrieve mount options - call mount # noqa command-instead-of-module
      ansible.builtin.shell: |
        mount | awk '{print $1, $3, $5, $6}'
      changed_when: false
      check_mode: false
      register: prelim_mount_output

    - name: PRELIM | AUDIT | Section 1.1 | Retrieve mount options - build fact # This is inherited and used in mountpoints tasks
      ansible.builtin.set_fact:
        prelim_mount_point_fs_and_options: >-
          {%- set prelim_mount_point_fs_and_options = {} -%}
          {%- for line in prelim_mount_output.stdout_lines -%}
          {%- set fields = line.split() -%}
          {%- set _ = prelim_mount_point_fs_and_options.update({fields[1]: {'src': fields[0], 'fs_type': fields[2], 'original_options': fields[3][1:-1].split(','),
          'options': fields[3][1:-1].split(',')}}) -%}
          {%- endfor -%}
          {{ prelim_mount_point_fs_and_options }}

    - name: "PRELIM | AUDIT | Debug of mount variables to assist in troubleshooting"
      when: rhel8cis_debug_mount_data
      ansible.builtin.debug:
        msg: "{{ prelim_mount_point_fs_and_options }}"

- name: "PRELIM | PATCH | Setup crypto-policy"
  when:
    - rhel8cis_rule_1_6_1 or rhel8cis_rule_1_6_2 or rhel8cis_rule_1_6_3 or rhel8cis_rule_1_6_4
  tags:
    - level1-server
    - level1-workstation
    - rule_1.6.1
    - rule_1.6.2
    - rule_1.6.3
    - rule_1.6.4
    - crypto
  block:
    - name: "PRELIM | PATCH | Install crypto-policies | pkgs present"
      ansible.builtin.package:
        name:
          - crypto-policies
          - crypto-policies-scripts
        state: present

    - name: "PRELIM | AUDIT | Gather system-wide crypto-policy"
      ansible.builtin.command: update-crypto-policies --show
      changed_when: false
      check_mode: false
      register: prelim_system_wide_crypto_policy

    - name: "PRELIM | AUDIT | Gather system-wide crypto-policy | set fact system policy"
      ansible.builtin.set_fact:
        current_crypto_policy: "{{ prelim_system_wide_crypto_policy.stdout.split(':')[0] }}"

    - name: "PRELIM | AUDIT | Gather system-wide crypto-policy module | set fact system policy submodule"
      when: "':' in prelim_system_wide_crypto_policy.stdout"
      ansible.builtin.set_fact:
        current_crypto_module: "{{ prelim_system_wide_crypto_policy.stdout.split(':')[1] }}"

- name: "PRELIM | PATCH | Install dconf if gui"
  when:
    - "'gdm' in ansible_facts.packages"
    - "'dconf' not in ansible_facts.packages"
    - rhel8cis_desktop_required
  tags: always
  ansible.builtin.package:
    name: dconf
    state: present

- name: "PRELIM | AUDIT | Wireless adapter pre-requisites"
  when:
    - rhel8cis_rule_3_1_2
    - not system_is_container
  tags: always
  block:
    - name: "PRELIM | AUDIT | Discover is wireless adapter on system"
      ansible.builtin.shell: find /sys/class/net/*/ -type d -name wireless
      register: discover_wireless_adapters
      changed_when: false
      check_mode: false
      failed_when: discover_wireless_adapters.rc not in [ 0, 1 ]

    - name: "PRELIM | PATCH | Install Network-Manager | if wireless adapter present"
      when:
        - discover_wireless_adapters.rc == 0
        - "'NetworkManager' not in ansible_facts.packages"
      ansible.builtin.package:
        name: NetworkManager
        state: present

- name: "PRELIM | PATCH | Cron Package"
  when: "'cronie' not in ansible_facts.packages"
  tags: always
  ansible.builtin.package:
    name: cronie
    state: present

- name: "PRELIM | PATCH | sshd_config.d/50-redhat.conf exists"
  when:
    - rhel8cis_rule_5_1_10 or rhel8cis_rule_5_1_11
  tags: always
  ansible.builtin.stat:
    path: /etc/ssh/sshd_config.d/50-redhat.conf
  register: prelim_sshd_50_redhat_file

- name: "PRELIM | AUDIT | Find all sudoers files."
  when:
    - rhel8cis_rule_5_2_5
  tags: always
  ansible.builtin.command: "find /etc/sudoers /etc/sudoers.d/ -type f ! -name '*~' ! -name '*.*'"
  changed_when: false
  failed_when: false
  check_mode: false
  register: prelim_sudoers_files

- name: "PRELIM | AUDIT | Find sshd config files"
  ansible.builtin.find:
    path: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: prelim_sshd_configs

- name: "PRELIM | AUDIT | Gather UID 0 accounts other than root"
  when: rhel8cis_rule_5_4_2_1
  tags:
    - rule_5.4.2.1
    - level1-server
    - level1-workstation
    - users
  ansible.builtin.shell: "cat /etc/passwd | awk -F: '($3 == 0 && $1 != \"root\") {i++;print $1 } END {exit 1}'"
  failed_when: prelim_uid_zero_accounts_except_root.rc not in [ 0, 1 ]
  changed_when: false
  check_mode: false
  register: prelim_uid_zero_accounts_except_root

- name: "PRELIM | PATCH | Journald config directory"
  when:
    - rhel8cis_syslog == 'journald'
    - rhel8cis_rule_6_2_1_1_3 or rhel8cis_rule_6_2_1_1_4
  tags: always
  block:
    - name: "PRELIM | PATCH | Create journald config directory"
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: "u+rwx,go-w"
        owner: root
        group: root
      register: prelim_journald_confdir_created

    - name: "PRELIM | AUDIT | 6.2.2.x Journald | find upload conf files"
      when: not prelim_journald_confdir_created.changed
      ansible.builtin.find:
        paths: /etc/systemd/journald.conf.d
        patterns: "*.conf"
        read_whole_file: true
      register: prelim_journald_conf_files

- name: "PRELIM | PATCH | Section 6.3 | Configure System Accounting (auditd)"
  when:
    - rhel8cis_level_2
    - "'audit' not in ansible_facts.packages"
  tags: always
  ansible.builtin.package:
    name: audit
    state: present

- name: "PRELIM | AUDIT | Discover audit logfile"
  when: rhel8cis_rule_6_3_4_1 or rhel8cis_rule_6_3_4_2 or rhel8cis_rule_6_3_4_3 or rhel8cis_rule_6_3_4_4
  tags: always
  ansible.builtin.shell: grep ^log_file /etc/audit/auditd.conf | awk '{ print $NF }'
  changed_when: false
  check_mode: false
  register: prelim_auditd_logfile

- name: "PRELIM | AUDIT | 6.3.4.5/6/7 | Audit conf and rules files | list files"
  when:
    - rhel8cis_rule_6_3_4_5 or rhel8cis_rule_6_3_4_6 or rhel8cis_rule_6_3_4_7
  tags:
    - level2-server
    - level2-workstation
    - patch
    - auditd
    - rule_6.3.4.5
    - rule_6.3.4.6
    - rule_6.3.4.7
  ansible.builtin.find:
    path: /etc/audit
    file_type: file
    recurse: true
    patterns: "*.conf,*.rules"
  register: prelim_auditd_conf_files

- name: "PRELIM | AUDIT | Interactive User accounts home directories"
  tags: always
  ansible.builtin.shell: >
    grep -E -v '^(root|halt|sync|shutdown)' /etc/passwd | awk -F: '(!index($7, "sbin/nologin") && $7 != "/bin/nologin" && $7 != "/bin/false") { print $6 }'
  changed_when: false
  check_mode: false
  register: prelim_interactive_users_home

##### Optional #####

#### Optional #####

# Added to ensure ssh drop in file exists if not default /etc/ssh/sshd_config
- name: "PRELIM | PATCH | SSH Config file does not exist"
  when:
    - rhel8cis_sshd_config_file != '/etc/ssh/sshd_config'
    - "'openssh-server' in ansible_facts.packages"
  tags: always
  block:
    - name: "PRELIM | AUDIT | Check SSH Config drop in is supported for distribution version"
      ansible.builtin.assert:
        that: ansible_distribution_version is version_compare('8.6', '>=')
        fail_msg: "{{ ansible_distribution }} {{ ansible_distribution_version }} does not support SSH Config drop in"

    - name: "PRELIM | PATCH | SSH Config drop in directory does not exist"
      ansible.builtin.file:
        path: "{{ rhel8cis_sshd_config_file | dirname }}"
        owner: root
        group: root
        mode: "go-rwx"
        state: directory

    - name: "PRELIM | PATCH | SSH Config file does not exist"
      ansible.builtin.file:
        path: "{{ rhel8cis_sshd_config_file }}"
        owner: root
        group: root
        mode: "go-rwx"
        state: touch

- name: "PRELIM | Optional | If IPv6 disable to stop ssh listening"
  when:
    - rhel8cis_ipv6_sshd_disable
    - not rhel8cis_ipv6_required
  tags: always
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: ^AddressFamily
    line: AddressFamily inet
  notify: Restart sshd

- name: "PRELIM | Optional | If IPv6 disable to stop chronyd listening"
  when:
    - rhel8cis_ipv6_chrony_disable
    - not rhel8cis_ipv6_required
  tags: always
  notify: Restart chronyd
  block:
    - name: "PRELIM | Optional | If IPv6 disable to stop chronyd listening | Check existence"
      ansible.builtin.shell: grep -E "OPTIONS=.*-4" /etc/sysconfig/chronyd
      changed_when: false
      failed_when: prelim_chrony_ipv6_exists.rc not in [ 0, 1]
      check_mode: false
      register: prelim_chrony_ipv6_exists

    - name: "PRELIM | Optional | If IPv6 disable to stop chronyd listening"
      when: prelim_chrony_ipv6_exists.stdout | length == 0
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/chronyd
        regexp: '^OPTIONS="(?!.* -4.*)(.*)"'
        line: OPTIONS="\1 -4"
        backrefs: true

# Optional extra keys to extend auditd not part of CIS but can influence a system
# e.g. admin_space_left: '10%'

- name: PRELIM | Optional | Configure other keys for auditd.conf
  when:
    - rhel8cis_auditd_extra_conf.keys() | length > 0
    - rhel8cis_level_2
  tags: always
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "^{{ item }}( |=)"
    line: "{{ item }} = {{ rhel8cis_auditd_extra_conf[item] }}"
  notify: Restart auditd
  loop: "{{ rhel8cis_auditd_extra_conf.keys() }}"
