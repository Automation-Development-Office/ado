- name: "6.3.3.6 | PATCH | Ensure use of privileged commands is collected"
  when: remediate_rhel8_cis_rule_6_3_3_6
  tags:
    - level2-server
    - level2-workstation
    - automated
    - patch
    - NIST800-53R5_AU-3
    - auditd
    - rule_6.3.3.6
  block:
    - name: "6.3.3.6 | PATCH | Ensure use of privileged commands is collected"
      ansible.builtin.shell: set -o pipefail; for i in  $(df | grep '^/dev' | awk '{ print $NF }'); do find $i -xdev -type f -perm /6000 2>/dev/null; done
      changed_when: false
      failed_when: false
      check_mode: false
      register: remediate_rhel8_cis_discovered_privilege_procs

    - name: "6.3.3.6 | PATCH | Ensure use of privileged commands is collected"
      ansible.builtin.set_fact:
        remediate_rhel8_cis_update_audit_template: true
      notify: Update auditd rules

