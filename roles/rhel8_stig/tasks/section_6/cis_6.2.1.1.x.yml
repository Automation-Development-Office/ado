---
- name: "6.2.1.1.1 | PATCH | Ensure journald service is active"
  when: rhel8cis_rule_6_2_1_1_1
  tags:
    - level1-server
    - level1-workstation
    - audit
    - journald
    - rule_6.2.1.1.1
    - CCI-001665
    - NIST800-53R5_SC-24
  ansible.builtin.systemd:
    name: systemd-journald.service
    masked: false
    state: started

- name: "6.2.1.1.2 | PATCH | Ensure journald log file access is configured"
  when: rhel8cis_rule_6_2_1_1_2
  tags:
    - level1-server
    - level1-workstation
    - audit
    - journald
    - rule_6.2.1.1.2
    - NIST800-53R5_AC-3
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-12
    - NIST800-53R5_MP-2
    - NIST800-53R5_SI-5
  block:
    - name: "6.2.1.1.2 | PATCH | Ensure journald log file access is configured | Default file permissions"
      ansible.builtin.file:
        path: /usr/lib/tmpfiles.d/systemd.conf
        mode: "u-x,g-wx,o-rwx"

    - name: "6.2.1.1.2 | AUDIT | Ensure journald log file access is configured | Check for override file"
      ansible.builtin.stat:
        path: /etc/tmpfiles.d/systemd.conf
      register: remediate_rhel8_cis_discovered_tmpfile_override

    - name: "6.2.1.1.2 | AUDIT | Ensure journald log file access is configured | If override file check for journal"
      when: remediate_rhel8_cis_discovered_tmpfile_override.stat.exists
      ansible.builtin.shell: grep -E 'z /var/log/journal/%m/system.journal \d*' /usr/lib/tmpfiles.d/systemd.conf
      register: remediate_rhel8_cis_discovered_journald_fileperms_override
      changed_when: false
      failed_when: remediate_rhel8_cis_discovered_journald_fileperms_override.rc not in [ 0, 1 ]

    - name: "6.2.1.1.2 | AUDIT | Ensure journald log file access is configured | Warning if override found"
      when:
        - remediate_rhel8_cis_discovered_tmpfile_override.stat.exists
        - remediate_rhel8_cis_discovered_journald_fileperms_override.stdout | length > 0
      ansible.builtin.debug:
        msg: "Warning!! - tmpfiles override found /usr/lib/tmpfiles.d/systemd.conf affecting journald files please confirm matches site policy"

    - name: "6.2.1.1.2 | AUDIT | Ensure journald log file access is configured | Warning if override found"
      when:
        - remediate_rhel8_cis_discovered_tmpfile_override.stat.exists
        - remediate_rhel8_cis_discovered_journald_fileperms_override.stdout | length > 0
      ansible.builtin.import_tasks:
        file: warning_facts.yml
      vars:
        warn_control_id: "6.2.1.1.2"

- name: "6.2.1.1.3 | PATCH | Ensure journald log file rotation is configured"
  when: rhel8cis_rule_6_2_1_1_3
  tags:
    - level1-server
    - level1-workstation
    - patch
    - journald
    - rule_6.2.1.1.3
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-7
    - NIST800-53R5_AU-12
  notify: Restart journald
  block:
    - name: "6.2.1.1.3 | PATCH | Ensure journald log file rotation is configured | Add file"
      ansible.builtin.template:
        src: etc/systemd/journald.conf.d/rotation.conf.j2
        dest: /etc/systemd/journald.conf.d/rotation.conf
        owner: root
        group: root
        mode: "u-x,g-wx,o-rwx"

    - name: "6.2.1.1.3 | PATCH | Ensure journald log file rotation is configured | comment out current entries"
      ansible.builtin.lineinfile:
        path: /etc/systemd/journal.conf
        regexp: "{{ item }}"
        line: "#\\1"
        backrefs: true
      failed_when: remediate_rhel8_cis_discovered_journald_conf.rc not in [ 0, 257 ]
      register: remediate_rhel8_cis_discovered_journald_conf
      loop:
        - "^(\\s*SystemMaxUse\\s*=.*)"
        - "^(\\s*SystemKeepFree\\s*=.*)"
        - "^(\\s*RuntimeMaxUse\\s*=)"
        - "^(\\s*RuntimeKeepFree\\s*=.*)"
        - "^(\\s*MaxFileSec\\s*=.*)"

- name: "6.2.1.1.4  | PATCH | Ensure journald ForwardToSyslog is disabled"
  when: rhel8cis_rule_6_2_1_1_4
  tags:
    - level1-server
    - level1-workstation
    - patch
    - journald
    - rule_6.2.1.1.4
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-6
    - NIST800-53R5_AU-7
    - NIST800-53R5_AU-12
  notify: Restart journald
  block:
    - name: "6.2.1.1.4 | PATCH | Ensure journald ForwardToSyslog is disabled | Add file"
      ansible.builtin.template:
        src: etc/systemd/journald.conf.d/forwardtosyslog.conf.j2
        dest: "/etc/systemd/journald.conf.d/forwardtosyslog.conf"
        owner: root
        group: root
        mode: "u-x,g-wx,o-rwx"

    - name: "6.2.1.1.4 | PATCH | Ensure journald ForwardToSyslog is disabled | comment out current entries"
      when:
        - prelim_journald_conf_files.files is defined
        - prelim_journald_conf_files.matched > 0
        - "'forwardtosyslog.conf' not in item.path"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: (?i)^(\s*ForwardToSyslog)
        replace: "#\\1"
      loop: "{{ prelim_journald_conf_files.files }}"

- name: "6.2.1.1.5 | PATCH | Ensure journald Storage is configured"
  when: rhel8cis_rule_6_2_1_1_5
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - journald
    - NIST800-53R5_AU-3
    - NIST800-53R5_AU-12
    - rule_6.2.1.1.5
  notify: Restart journald
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: ^(#?)\s*Storage\s*=
    line: Storage=persistent
    insertafter: ^#Storage
    validate: /usr/bin/bash -n %s

- name: "6.2.1.1.6 | PATCH | Ensure journald Compress is configured"
  when: rhel8cis_rule_6_2_1_1_6
  tags:
    - level1-server
    - level1-workstation
    - patch
    - journald
    - rule_6.2.1.1.6
    - NIST800-53R5_AU-4
  notify: Restart journald
  block:
    - name: "6.2.1.1.6 | PATCH | Ensure journald Compress is configured | Add file"
      ansible.builtin.template:
        src: etc/systemd/journald.conf.d/storage.conf.j2 # Added to the same file as 6.2.2.4
        dest: "/etc/systemd/journald.conf.d/storage.conf"
        owner: root
        group: root
        mode: "u-x,g-wx,o-rwx"

    - name: "6.2.1.1.6 | PATCH | Ensure journald Compress is configured | comment out current entries"
      when:
        - prelim_journald_conf_files.files is defined
        - prelim_journald_conf_files.matched > 0
        - "'storage.conf' not in item.path"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: (?i)^(\s*compress=)
        replace: "#\\1"
      loop: "{{ prelim_journald_conf_files.files }}"

- name: "6.2.1.1.4 | PATCH | Ensure only one logging system is in use"
  when: rhel8cis_rule_6_2_1_1_4
  tags:
    - level1-server
    - level1-workstation
    - patch
    - journald
    - syslog
    - rule_6.2.1.1.4
  block:
    - name: "6.2.1.1.4 | PATCH | Ensure only one logging system is in use | when rsyslog"
      when: rhel8cis_syslog == "rsyslog"
      ansible.builtin.systemd:
        name: systemd-journald
        state: stopped
        enabled: false

    - name: "6.2.1.1.4 | PATCH | Ensure only one logging system is in use | when journald"
      when: rhel8cis_syslog == "journald"
      ansible.builtin.systemd:
        name: rsyslog
        state: stopped
        enabled: false
