---
- name: "6.2.2.1 | PATCH | Ensure rsyslog installed"
  when: remediate_rhel8_cis_rule_6_2_2_1
  tags:
    - level1-server
    - level1-workstation
    - patch
    - rsyslog
    - NIST800-53R5_CM-6
    - rule_6.2.2.1
  ansible.builtin.package:
    name: rsyslog
    state: present

- name: "6.2.2.2 | PATCH | Ensure rsyslog service is enabled and active"
  when:
    - remediate_rhel8_cis_rule_6_2_2_2
    - remediate_rhel8_cis_rsyslog_ansiblemanaged
  tags:
    - level1-server
    - level1-workstation
    - patch
    - rsyslog
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-3
    - NIST800-53R5_AU-12
    - rule_6.2.2.2
  ansible.builtin.systemd:
    name: rsyslog
    enabled: true
    state: started

- name: "6.2.2.3 | PATCH | Ensure journald is configured to send logs to rsyslog"
  when: remediate_rhel8_cis_rule_6_2_2_3
  tags:
    - level1-server
    - level1-workstation
    - patch
    - NIST800-53R5_AC-3
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-4
    - NIST800-53R5_AU-12
    - NIST800-53R5_MP-2
    - rsyslog
    - rule_6.2.2.3
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: ^(#?)ForwardToSyslog\s*
    line: ForwardToSyslog=yes
  notify: Restart journald

- name: "6.2.2.4 | PATCH | Ensure rsyslog log file creation mode is configured"
  when:
    - remediate_rhel8_cis_rule_6_2_2_4
    - remediate_rhel8_cis_rsyslog_ansiblemanaged
  tags:
    - level1-server
    - level1-workstation
    - patch
    - NIST800-53R5_AC-3
    - NIST800-53R5_AC-6
    - NIST800-53R5_MP-2
    - rsyslog
    - rule_6.2.2.4
  ansible.builtin.lineinfile:
    path: /etc/rsyslog.conf
    regexp: ^\$FileCreateMode
    line: "$FileCreateMode 0640"
  notify: Restart rsyslog

- name: "6.2.2.5 | PATCH | Ensure rsyslog logging is configured"
  when:
    - remediate_rhel8_cis_rule_6_2_2_5
    - remediate_rhel8_cis_rsyslog_ansiblemanaged
  tags:
    - level1-server
    - level1-workstation
    - patch
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-7
    - NIST800-53R5_AU-12
    - rsyslog
    - rule_6.2.2.5
  notify: Restart rsyslog
  block:
    - name: "6.2.2.5 | AUDIT | Ensure logging is configured | rsyslog current config message out"
      ansible.builtin.command: cat /etc/rsyslog.conf
      changed_when: false
      failed_when: false
      check_mode: false
      register: remediate_rhel8_cis_discovered_captured_rsyslog_conf

    - name: "6.2.2.5 | AUDIT | Ensure logging is configured | rsyslog current config message out"
      ansible.builtin.debug:
        msg:
          - "These are the current logging configurations for rsyslog, please review:"
          - "{{ remediate_rhel8_cis_discovered_captured_rsyslog_conf.stdout_lines }}"

    - name: "6.2.2.5 | PATCH | Ensure logging is configured | mail.* log setting"
      when: remediate_rhel8_cis_rsyslog_ansiblemanaged
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.conf
        marker: "# {mark} MAIL LOG SETTINGS - CIS benchmark - Ansible-lockdown"
        block: |
          # mail logging additions to meet CIS standards
          mail.*                                                  -/var/log/mail
          mail.info                                               -/var/log/mail.info
          mail.warning                                            -/var/log/mail.warning
          mail.err                                                /var/log/mail.err
        insertafter: "# Log all the mail messages in one place."

    - name: "6.2.2.5 | PATCH | Ensure logging is configured | Misc. log setting"
      when: remediate_rhel8_cis_rsyslog_ansiblemanaged
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.conf
        state: present
        marker: "# {mark} MISC. LOG SETTINGS - CIS benchmark - Ansible-lockdown"
        block: |
          # misc. logging additions to meet CIS standards
          *.=warning;*.=err                                        -/var/log/warn
          *.crit                                                   /var/log/warn
          *.*;mail.none;news.none                                  /var/log/messages
        insertafter: "#### RULES ####"

    - name: "6.2.2.5 | PATCH | Ensure logging is configured | Local log settings"
      when: remediate_rhel8_cis_rsyslog_ansiblemanaged
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.conf
        state: present
        marker: "#{mark} LOCAL LOG SETTINGS - CIS benchmark - Ansible-lockdown"
        block: |
          # local log settings to meet CIS standards
          local0,local1.*                                          -/var/log/localmessages
          local2,local3.*                                          -/var/log/localmessages
          local4,local5.*                                          -/var/log/localmessages
          local6,local7.*                                          -/var/log/localmessages
          *.emerg                                                    :omusrmsg:*
        insertafter: "#### RULES ####"

    - name: "6.2.2.5 | PATCH | Ensure logging is configured | Auth Settings"
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.conf
        state: present
        marker: "#{mark} Auth SETTINGS - CIS benchmark - Ansible-lockdown"
        block: |
          # Private settings to meet CIS standards
          auth,authpriv.*                                           /var/log/secure
        insertafter: "#### RULES ####"

    - name: "6.2.2.5 | PATCH | Ensure logging is configured | Cron Settings"
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.conf
        state: present
        marker: "#{mark} Cron SETTINGS - CIS benchmark - Ansible-lockdown"
        block: |
          # Cron settings to meet CIS standards
          cron.*                                                   /var/log/cron
        insertafter: "#### RULES ####"

- name: "6.2.2.6 | PATCH | Ensure rsyslog is configured to send logs to a remote log host"
  when:
    - remediate_rhel8_cis_rule_6_2_2_6
    - remediate_rhel8_cis_remote_log_server
    - remediate_rhel8_cis_rsyslog_ansiblemanaged
  tags:
    - level1-server
    - level1-workstation
    - patch
    - NIST800-53R5_AU-6
    - rsyslog
    - rule_6.2.2.6
  notify: Restart rsyslog
  ansible.builtin.blockinfile:
    path: /etc/rsyslog.conf
    block: |
      # target can be IP or FQDN
      *.* action(type="omfwd" target="{{ rhel8cis_remote_log_host }}" port="{{ rhel8cis_remote_log_port }}" protocol="{{ rhel8cis_remote_log_protocol }}" action.resumeRetryCount="{{ rhel8cis_remote_log_retrycount }}" queue.type="LinkedList" queue.size="{{ rhel8cis_remote_log_queuesize }}")
    insertafter: EOF
  register: remediate_rhel8_cis_set_remote_syslog
  failed_when:
    - remediate_rhel8_cis_set_remote_syslog is failed
    - remediate_rhel8_cis_set_remote_syslog.rc != 257

- name: "6.2.2.7 | PATCH | Ensure rsyslog is not configured to receive logs from a remote client"
  when:
    - remediate_rhel8_cis_rule_6_2_2_7
    - remediate_rhel8_cis_rsyslog_ansiblemanaged
  tags:
    - level1-server
    - level1-workstation
    - patch
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-7
    - NIST800-53R5_AU-12
    - NIST800-53R5_CM-6
    - rsyslog
    - rule_6.2.2.7
  notify: Restart rsyslog
  block:
    - name: "6.2.2.7 | PATCH | Ensure rsyslog is not configured to receive logs from a remote client. | When not log host"
      when: not remediate_rhel8_cis_system_is_log_server
      ansible.builtin.replace:
        path: /etc/rsyslog.conf
        regexp: "{{ item }}"
        replace: "#\\1"
      loop:
        - "^(\\$ModLoad imtcp)"
        - "^(\\$InputTCPServerRun)"
        - '^(module\(load="imtcp"\))'
        - '^(input\(type="imtcp")'

    - name: "6.2.2.7 | PATCH | Ensure rsyslog is not configured to receive logs from a remote clients. | When log host"
      when: remediate_rhel8_cis_system_is_log_server
      ansible.builtin.replace:
        path: /etc/rsyslog.conf
        regexp: "^#(.*{{ item }}.*)"
        replace: "\\1"
      loop:
        - "ModLoad imtcp"
        - "InputTCPServerRun"

- name: "6.2.2.8| PATCH | Ensure logrotate is configured"
  when: remediate_rhel8_cis_rule_6_2_2_8
  tags:
    - level1-server
    - level1-workstation
    - manual
    - patch
    - NIST800-53R5_AU-8
    - logrotate
    - rule_6.2.2.8
  block:
    - name: "6.2.2.8 | AUDIT | Ensure logrotate is configured | Get logrotate settings"
      ansible.builtin.find:
        paths: /etc/logrotate.d/
      register: remediate_rhel8_cis_discovered_log_rotate_conf

    - name: "6.2.2.8 | PATCH | Ensure logrotate is configured | conf files"
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: "^(\\s*)(daily|weekly|monthly|yearly)$"
        replace: "\\1{{ remediate_rhel8_cis_logrotate }}"
      loop: "{{ remediate_rhel8_cis_discovered_log_rotate_conf.files }}"

    - name: "6.2.2.8 | PATCH | Ensure logrotate is configured | logrotate.conf"
      ansible.builtin.replace:
        path: /etc/logrotate.conf
        regexp: "^(\\s*)(daily|weekly|monthly|yearly)$"
        replace: "\\1{{ remediate_rhel8_cis_logrotate }}"
