---
- name: "5.2.1 | PATCH | Ensure sudo is installed"
  when: rhel8cis_rule_5_2_1
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - NIST800-53R5_AC-6
    - sudo
    - rule_5.2.1
  ansible.builtin.package:
    name: sudo
    state: present

- name: "5.2.2 | PATCH | Ensure sudo commands use pty"
  when: rhel8cis_rule_5_2_2
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - NIST800-53R5_AC-6
    - sudo
    - rule_5.2.2
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "Defaults    use_pty"
    validate: "/usr/sbin/visudo -cf %s"

- name: "5.2.3 | PATCH | Ensure sudo log file exists"
  when: rhel8cis_rule_5_2_3
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - NIST800-53R5_AU-3
    - NIST800-53R5_AU-12
    - sudo
    - rule_5.2.3
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: "^Defaults\\s+logfile="
    line: "Defaults logfile={{ rhel8cis_sudolog_location }}"

- name: "5.2.4 | PATCH | Ensure users must provide password for escalation"
  when: rhel8cis_rule_5_2_4
  tags:
    - level2-server
    - level2-workstation
    - automated
    - patch
    - NIST800-53R5_AC-6
    - sudo
    - rule_5.2.4
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: "^([^#|{% if system_is_ec2 %}ec2-user{% endif %}].*)NOPASSWD(.*)"
    replace: "\\1PASSWD\\2"
    validate: "/usr/sbin/visudo -cf %s"
  loop: "{{ prelim_sudoers_files.stdout_lines }}"

- name: "5.2.5 | PATCH | Ensure re-authentication for privilege escalation is not disabled globally"
  when: rhel8cis_rule_5_2_5
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - NIST800-53R5_AC-6
    - sudo
    - rule_5.2.5
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: "^([^#].*)!authenticate(.*)"
    replace: "\\1authenticate\\2"
    validate: "/usr/sbin/visudo -cf %s"
  loop: "{{ prelim_sudoers_files.stdout_lines }}"

- name: "5.2.6 | PATCH | Ensure sudo timestamp_timeout is configured"
  when: rhel8cis_rule_5_2_6
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - NIST800-53R5_IA-11
    - sudo
    - rule_5.2.6
  block:
    - name: "5.2.6 | AUDIT | Ensure sudo timestamp_timeout is configured | Get files with timeout set"
      ansible.builtin.shell: set -o pipefail && grep -is 'timestamp_timeout' /etc/sudoers /etc/sudoers.d/* | cut -d":" -f1 | uniq | sort
      changed_when: false
      failed_when: false
      register: remediate_rhel8_cis_discovered_timeout_files

    - name: "5.2.6 | PATCH | Ensure sudo timestamp_timeout is configured | Set value if no results"
      when: remediate_rhel8_cis_discovered_timeout_files.stdout | length == 0
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: "Defaults timestamp_timeout="
        line: "Defaults timestamp_timeout={{ rhel8cis_sudo_timestamp_timeout }}"
        validate: "/usr/sbin/visudo -cf %s"

    - name: "5.2.6 | PATCH | Ensure sudo timestamp_timeout is configured | Set value if has results"
      when: remediate_rhel8_cis_discovered_timeout_files.stdout | length > 0
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: "timestamp_timeout=(\\d+)"
        replace: "timestamp_timeout={{ rhel8cis_sudo_timestamp_timeout }}"
        validate: "/usr/sbin/visudo -cf %s"
      loop: "{{ remediate_rhel8_cis_discovered_timeout_files.stdout_lines }}"

- name: "5.2.7 | PATCH | Ensure access to the su command is restricted"
  when: rhel8cis_rule_5_2_7
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - NIST800-53R5_AC-3
    - NIST800-53R5_MP-2
    - sudo
    - rule_5.2.7
  block:
    - name: "5.2.7 | PATCH | Ensure access to the su command is restricted | Ensure sugroup exists"
      ansible.builtin.group:
        name: "{{ rhel8cis_sugroup }}"
        state: present

    - name: "5.2.7 | PATCH | Ensure access to the su command is restricted | Setting pam_wheel to use_uid"
      ansible.builtin.lineinfile:
        path: /etc/pam.d/su
        regexp: "^(#)?auth\\s+required\\s+pam_wheel\\.so"
        line: "auth           required        pam_wheel.so use_uid group={{ rhel8cis_sugroup }}"
