---
- name: "5.3.3.1.1 | PATCH | Ensure password failed attempts lockout is configured"
  when: rhel8cis_rule_5_3_3_1_1
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - pam
    - rule_5.3.3.1.1
  block:
    - name: "5.3.3.1.1 | PATCH | Ensure password failed attempts lockout is configured | faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: "^(#?)\\s*deny\\s*=\\s*\\d"
        line: "deny = {{ rhel8cis_pam_faillock_deny }}"

    - name: "5.3.3.1.1 | PATCH | Ensure password failed attempts lockout is configured | pam_files"
      when: not rhel8cis_allow_authselect_updates
      ansible.builtin.replace:
        path: "/etc/pam.d/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+deny\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system

    - name: "5.3.2.2 | AUDIT | Ensure pam_faillock module is enabled | get current state"
      when: rhel8cis_allow_authselect_updates
      ansible.builtin.command: authselect current
      changed_when: false
      failed_when: remediate_rhel8_cis_discovered_authselect_current.rc not in [ 0, 1 ]
      check_mode: false
      register: remediate_rhel8_cis_discovered_authselect_current

    - name: "5.3.3.1.1 | PATCH | Ensure password failed attempts lockout is configured | authselect_files"
      when:
        - rhel8cis_allow_authselect_updates
        - remediate_rhel8_cis_discovered_authselect_current.rc != 0
      ansible.builtin.replace:
        path: "/etc/authselect/custom/{{ rhel8cis_authselect_custom_profile_name }}/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+deny\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system

- name: "5.3.3.1.2 | PATCH | Ensure password unlock time is configured"
  when: rhel8cis_rule_5_3_3_1_2
  tags:
    - level1-server
    - level1-workstation
    - automated
    - patch
    - pam
    - rule_5.3.3.1.2
  block:
    - name: "5.3.3.1.2 | PATCH | Ensure password unlock time is configured | faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: "^(#|)\\s*unlock_time\\s*=\\s*\\d"
        line: "unlock_time = {{ rhel8cis_pam_faillock_unlock_time }}"

    - name: "5.3.3.1.2 | PATCH | Ensure password unlock time is configured | pam_files"
      when: not rhel8cis_allow_authselect_updates
      ansible.builtin.replace:
        path: "/etc/pam.d/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+unlock_time\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system

    - name: "5.3.3.1.2 | PATCH | Ensure password unlock time is configured | authselect_files"
      when:
        - rhel8cis_allow_authselect_updates
        - "'example' not in rhel8cis_authselect_custom_profile_name"
      notify: Update authselect
      ansible.builtin.replace:
        path: "/etc/authselect/custom/{{ rhel8cis_authselect_custom_profile_name }}/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+unlock_time\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system

- name: "5.3.3.1.3 | PATCH | Ensure password failed attempts lockout includes root account"
  when: rhel8cis_rule_5_3_3_1_3
  tags:
    - level2-server
    - level2-workstation
    - automated
    - patch
    - pam
    - rule_5.3.3.1.3
  block:
    - name: "5.3.3.1.3 | PATCH | Ensure password failed attempts lockout includes root account | faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: ^(#?)\s*"{{ rhel8cis_pam_faillock_root_option }}"(\s*=\s*\d|.*)
        line: "{{ rhel8cis_pam_faillock_root_option }}"

    - name: "5.3.3.1.3 | PATCH | Ensure password failed attempts lockout includes root account | pam_files"
      when: not rhel8cis_allow_authselect_updates
      ansible.builtin.replace:
        path: "/etc/pam.d/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s"{{ rhel8cis_pam_faillock_root_option }}"(\s*=\s*\d|.*)\S+(.*$)
        replace: \1\2\3\4
      loop:
        - password
        - system

    - name: "5.3.3.1.3 | PATCH | Ensure password failed attempts lockout includes root account | authselect_files"
      when:
        - rhel8cis_allow_authselect_updates
        - "'example' not in rhel8cis_authselect_custom_profile_name"
      notify: Update authselect
      ansible.builtin.replace:
        path: "/etc/authselect/custom/{{ rhel8cis_authselect_custom_profile_name }}/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s"{{ rhel8cis_pam_faillock_root_option }}"(\s*=\s*\d|.*)\S+(.*$)
        replace: \1\2\3\4
      loop:
        - password
        - system
