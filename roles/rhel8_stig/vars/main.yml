---

rhel8stig_min_ansible_version: 2.12.1

# RHEL 8 STIG requirements
combined_crypto_policy_config: FIPS

rhel8stig_sysctl_reload: "{{ not system_is_container }}"

# Allow automated discovery of UIDs
rhel8stig_discover_int_uid: true

# Used to control warning summary
rhel8stig_warn_control_list: ""
rhel8stig_warn_count: 0
  
