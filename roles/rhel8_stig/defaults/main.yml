---

## metadata for Audit benchmark
remediate_rhel8_stig_benchmark_version: "v2r6"

## Benchmark name used by auditing control role
# The audit variable found at the base
remediate_rhel8_stig_benchmark: RHEL8-STIG

# Whether to skip the OS check for supported OS's
remediate_rhel8_stig_skip_os_check: false

remediate_rhel8_stig_cat1: true
remediate_rhel8_stig_cat2: true
remediate_rhel8_stig_cat3: true

# We've defined disruption-high to indicate items that are likely to cause
# disruption in a normal workflow. These items can be remediated automatically
# but are disabled by default to avoid disruption.
remediate_rhel8_stig_disruption_high: false

# tweak role to run in a chroot, such as in kickstart %post script
remediate_rhel8_stig_system_is_chroot: "{{ ansible_is_chroot | default(False) }}"

# tweak role to run in a non-privileged container (default value)- dynamically discovered in tasks/main.yml
remediate_rhel8_stig_system_is_container: false

# Place to find the container yml file for your environment - /vars/...
remediate_rhel8_stig_container_vars_file: is_container.yml

# rhel8cis/stig is left off the front of this var for consistency in testing pipeline
# system_is_ec2 toggle will disable tasks that fail on Amazon EC2 instances. Set true to skip and false to run tasks
remediate_rhel8_stig_system_is_ec2: false

# Whether to skip the reboot
remediate_rhel8_stig_skip_reboot: true

# Defined will change if control requires
remediate_rhel8_stig_change_requires_reboot: false

# Create managed not custom local_facts files
remediate_rhel8_stig_create_benchmark_facts: true
remediate_rhel8_stig_ansible_facts_path: /etc/ansible/facts.d

###
### Settings for associated Audit role using Goss
###

###########################################
### Goss is required on the remote host ###
### vars/auditd.yml for other settings  ###

# Allow audit to setup the requirements including installing git (if option chosen and downloading and adding goss binary to system)
remediate_rhel8_stig_setup_audit: false

# enable audits to run - this runs the audit and get the latest content
remediate_rhel8_stig_run_audit: false
# Run heavy tests - some tests can have more impact on a system enabling these can have greater impact on a system
remediate_rhel8_stig_audit_run_heavy_tests: true
# Ability to limit the number of concurrent processes used by goss (default 50)
remediate_rhel8_stig_audit_max_concurrent: 50

## Only run Audit do not remediate
remediate_rhel8_stig_audit_only: false

#############################

# How to retrieve audit binary
# Options are copy or download - detailed settings at the bottom of this file
# you will need access to either github or the file already downloaded
remediate_rhel8_stig_get_audit_binary_method: download

## if get_audit_binary_method - copy the following needs to be updated for your environment
## it is expected that it will be copied from somewhere accessible to the control node
## e.g copy from ansible control node to remote host
remediate_rhel8_stig_audit_bin_copy_location: /some/accessible/path

# how to get audit files onto host options
# options are git/copy/archive/get_url other e.g. if you wish to run from already downloaded conf
remediate_rhel8_stig_audit_content: git

# If using either archive, copy, get_url:
## Note will work with .tar files - zip will require extra configuration
### If using get_url this is expecting github url in tar.gz format e.g.
### https://github.com/ansible-lockdown/{{ OS_TYPE }}-{{ BENCHMARK_TYPE }}-Audit/archive/refs/heads/benchmark-{{ benchmark_version }}.tar.gz
remediate_rhel8_stig_audit_conf_source: "some path or url to copy from"

# Destination for the audit content to be placed on managed node
# note may not need full path e.g. /opt with the directory being the {{ benchmark }}-Audit directory
remediate_rhel8_stig_audit_conf_dest: "/opt"

# Where the audit logs are stored
remediate_rhel8_stig_audit_log_dir: "/opt"

## Ability to collect and take audit files moving to a centralized location
# This enables the collection of the files from the host
remediate_rhel8_stig_fetch_audit_output: false

# Method of getting,uploading the summary files
## Ensure access and permissions are available for these to occur.
## options are
# fetch - fetches from server and moves to location on the ansible controller (could be a mount point available to controller)
# copy - copies file to a location available to the managed node
remediate_rhel8_stig_audit_output_collection_method: fetch

# Location to put the audit files
remediate_rhel8_stig_audit_output_destination: /opt/audit_summaries/

### Goss Settings ##
####### END ########

