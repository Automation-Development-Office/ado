# Whether or not to run tasks related to auditing/patching the desktop environment
rhel8_stig_gui: "{{ prelim_gnome_present.stat.exists | default(false) }}"

# Whether or not you need kdump. False will disable service and true will leave service
rhel8_stig_kdump_needed: false

# Whether to configure dconf rules unconditionally (ignoring presence of dconf
# or rhel8stig_gui)
rhel8_stig_always_configure_dconf: false

# Set the file that sysctl should write to
rhel8_stig_sysctl_file: /etc/sysctl.d/99_stig_sysctl.conf

# Whether or not system uses remote automounted home directories via autofs
rhel8_stig_autofs_remote_home_dirs: false

# The local mount point used by autofs to mount remote home directory to.
# This location will be excluded during getent user enumeration, if
# rhel8_stig_autofs_remote_home_dirs is true
rhel8_stig_auto_mount_home_dirs_local_mount_point: "/home/"

# The default shell command to gather local interactive user directories
## NOTE: You will need to adjust the UID range in parenthesis below.
## ALSO NOTE: We weed out any user with a home dir not in standard locations
## because interactive users shouldn't have those paths as a home dir. Add or
## removed directory paths as needed below.
rhel8_stig_local_interactive_user_dir_command: |
  getent passwd {{ '{' }}{{ min_int_uid }}..65535{{ '}' }} |
  grep -v '/sbin/nologin' |
  cut -d: -f6 |
  sort -u |
  grep -Ev '/var/|/nonexistent/|/run/*'

# IPv6 required
rhel8_stig_ipv6_required: true

# RHEL-08-010380
# rhel8_stig_sudoers_exclude_nopasswd_list is exception list for not having the NOPASSWD removed
#
rhel8_stig_sudoers_exclude_nopasswd_list:
  - rocky
  - ec2-user
#    - vagrant

# RHEL-08-020250
# This is a check for a "supported release"
# These are the minimum supported releases.
# (Red Hat has support for older versions if you pay extra for it.)
rhel8_stig_min_supported_os_ver:
  RedHat: "8.10"
  CentOS: "8.10"
  Rocky: "8.10"
  AlmaLinux: "8.10"
  OracleLinux: "8.10"

# RHEL-08-040260
# If system is not router, run tasks that disable router functions.
rhel8_stig_system_is_router: false

rhel8_stig_time_service: chronyd

rhel8_stig_firewall_service: firewalld
rhel8_stig_start_firewall_service: true

### Aide
# AIDE is a file integrity checking tool, similar in nature to Tripwire.
# While it cannot prevent intrusions, it can detect unauthorized changes
# to configuration files by alerting when the files are changed. Review
# the AIDE quick start guide and AIDE documentation before proceeding.
# By setting this variable to `true`, all of the settings related to AIDE will be applied!
rhel8_stig_use_aide: true

# If DB file older than below will automatically rebuild DB
# e.g. options:1w = 1 week, 1d = 1day 1h = 1 hour
rhel8_stig_aide_db_file_age: 1w

# If aide already setup this forces a new DB to be created despite age
rhel8_stig_aide_db_recreate: false

# New db file
rhel8_stig_aide_db_new_file: /var/lib/aide/aide.db.new.gz
# Active db file
rhel8_stig_aide_db_file: /var/lib/aide/aide.db.gz

rhel8_stig_workaround_for_disa_benchmark: true

rhel8_stig_cron_special_disable: "{{ rhel8_stig_workaround_for_disa_benchmark or rhel8_stig_workaround_for_ssg_benchmark or false }}"

# Set maximum number of simultaneous system logins (RHEL-08-040000)
rhel8_stig_maxlogins: 10
rhel8_stig_logon_banner: >-
  {{ rhel8_stig_workaround_for_disa_benchmark | ternary(
      rhel8_stig_logon_banner_nice | regex_replace('(?s)(?<!\\n)\\n(?!(\n|$))', ' '),
      rhel8_stig_logon_banner_nice) }}
rhel8_stig_logon_banner_nice: |
  You are accessing a U.S. Government (USG) Information System (IS) that is
  provided for USG-authorized use only.

  By using this IS (which includes any device attached to this IS), you consent
  to the following conditions:

  -The USG routinely intercepts and monitors communications on this IS for
  purposes including, but not limited to, penetration testing, COMSEC monitoring,
  network operations and defense, personnel misconduct (PM), law enforcement
  (LE), and counterintelligence (CI) investigations.

  -At any time, the USG may inspect and seize data stored on this IS.

  -Communications using, or data stored on, this IS are not private, are subject
  to routine monitoring, interception, and search, and may be disclosed or used
  for any USG-authorized purpose.

  -This IS includes security measures (e.g., authentication and access controls)
  to protect USG interests--not for your personal benefit or privacy.

  -Notwithstanding the above, using this IS does not constitute consent to PM, LE
  or CI investigative searching or monitoring of the content of privileged
  communications, or work product, related to personal representation or services
  by attorneys, psychotherapists, or clergy, and their assistants. Such
  communications and work product are private and confidential. See User
  Agreement for details.

rhel8_stig_sssd_conf: /etc/sssd/sssd.conf
rhel8_stig_sssd_domain: testing.test
rhel8_stig_sssd_certmap: "certmap/{{ rhel8_stig_sssd_domain }}/rule_name"
rhel8_stig_sssd_matchrule: "=.*EDIPI@mil"
rhel8_stig_sssd_maprule: (userCertificate;binary={cert!bin})
rhel8_stig_sssd_domains: "{{ rhel8_stig_sssd_domain }}"

# RHEL-08-010200 | All network connections associated with SSH traffic must
# terminate at the end of the session or after 10 minutes of inactivity, except
# to fulfill documented and validated mission requirements.
# Timeout value is in seconds. (60 seconds * 10 = 600)
rhel8_stig_ssh_session_timeout: 600

# RHEL-08-020320
# If vsftpd is required, remove 'ftp' from rhel8_stig_unnecessary_accounts.
#
# By default, files owned by removed users will be retained, but this may
# trigger RHEL-08-020320 (all files and directories must have a valid owner).
# Set rhel8_stig_remove_unnecessary_user_files to yes to remove old files,
# but this could remove files you intended to keep. And it's probably best to
# avoid removing 'dbus', 'nobody', 'systemd-network', and 'polkitd', as they all
# have home directories of '/' by default.
rhel8_stig_unnecessary_accounts:
  - ftp
  - games
rhel8_stig_remove_unnecessary_user_files: false

# /etc/login.defs settings
# RHEL-08-010110
# RHEL-08-020190
# RHEL-08-020200
# RHEL-08-020310
rhel8_stig_login_defaults_encrypt_method: SHA512
rhel8_stig_login_defaults_pass_min_days: 1
rhel8_stig_login_defaults_pass_max_days: 60
rhel8_stig_login_defaults_fail_delay_secs: 4
rhel8_stig_login_defaults_umask: "077"

rhel8_stig_availability_override: false
# auditd_failure_flag
# 2 Tells your system to perform an immediate shutdown without
# flushing any pending data to disk when the limits of your
# audit system are exceeded. Because this shutdown is not a clean shutdown.
# restrict the use of -f 2 to only the most security conscious environments
# 1 System continues to run, issues a warning and audit stops.
# Use this for any other setup to avoid loss of data or data corruption.
rhel8_stig_auditd_failure_flag: "{{ rhel8_stig_availability_override | ternary(1, 2) }}"

rhel8_stig_dns_servers: # The order needs to be set as expected. If you have 3 you will need to amend playbook (not ideal)
  - 8.8.8.8
  - 8.8.4.4

# Add list of additional crypto subpolicies to be added to FIPS
# 10020 - additional crypto subpolicies

rhel8_stig_additional_fips_crypto_subpolicies: false
# !!!! add additional crypto subpolicies here
# Examples can be seen below
rhel8_stig_additional_fips_crypto_subpolicies_list:
# - AD-SUPPORT
# - NO-ENFORCE-EMS

# RHEL-08-010100
rhel8_stig_path_to_sshkey: "/root/.ssh/"

# RHEL-08-010130
# The rounds parameter goes into the SHA_CRYPT_MIN_ROUNDS element of the /etc/login.defs file. The value shoudl be set no lower than 100000
rhel8_stig_hashing_rounds: 100000

# RHEL-08-010140 and RHEL-08-020280
# Password protect the boot loader
rhel8_stig_bootloader_password_hash: grub.pbkdf2.sha512.changethispassword # pragma: allowlist secret
rhel8_stig_boot_superuser: bootloader_admin

# now in prelim
# Enable UID discovery:
rhel8_stig_discover_int_uid: true
# If discovery set to false use these values
rhel8_stig_min_int_uid: 1000
rhel8_stig_max_int_uid: 65534

# RHEL-08-010290 and 010296
# This will be the MACs setting. It is a string that will be the entirety of the MAC's setting in the openssh.config file
# to conform to STIG standard control RHEL-08-010290 and 010296 this variable must include hmac-sha2-512,hmac-sha2-256

rhel8_stig_ssh_macs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"

# RHEL-08-010291 and 010297
# to conform to STIG standard control RHEL-08-010291 and 010297 this variable must include aes256-ctr,aes192-ctr,aes128-ctr
rhel8_stig_ssh_ciphers: "aes256-gcm@openssh.com,aes256-ctr,aes128-gcm@openssh.com,aes128-ctr"

# RHEL-08-010360 | AIDE Cron Job
rhel8_stig_aide_cron_user: root
rhel8_stig_aide_cron_cron_file: aide
rhel8_stig_aide_cron_job: '/usr/sbin/aide --check | /bin/mail -s "$HOSTNAME - Daily aide integrity check run" root@sysname.mil'
rhel8_stig_aide_cron_special_time: daily
rhel8_stig_aide_cron_notify_by_mail: true
rhel8_stig_aide_cron_notify_cmd: ' | /bin/mail -s "$(hostname) - Daily aide integrity check run" root@localhost'
rhel8_stig_aide_cron_file: /etc/cron.daily/aide  # NOTE the path may change if not running daily
rhel8_stig_aide_cron_day: '*'
rhel8_stig_aide_cron_hour: '4'
rhel8_stig_aide_cron_minute: '30'
rhel8_stig_aide_cron_name: 'Aide Job runs Daily at 0430'

# RHEL-08-010380
# Setting to enable or disable fixes that depend on password-based authentication
# i.e. if users authenticate with a means other than passwords (pubkey)
# and will not know or use passwords then this should be 'no'
rhel8_stig_using_password_auth: true

# RHEL-08-010384
# The value given to Defaults timestamp timeout= in the sudo file.
# Value must be greater than 0 to conform to STIG standards
rhel8_stig_sudo_timestamp_timeout: 1

# RHEL-08-010680
# This can be managed using a template ensure settings are correct
rhel8_stig_use_resolv_template: false
rhel8_stig_resolv_domain: example.com
rhel8_stig_resolv_search:
#    - 'example.com'
#    - 'blah'
rhel8_stig_resolv_options:
#    - 'rotate 2'
#    - 'timeout:1'

# RHEL-08-010690
rhel8_stig_change_user_path: false

# RHEL-08-010700
# rhel8_stig_ww_dir_owner is the owner of all world-writable directories
# To conform to STIG standards this needs to be set to root, sys, bin, or an application group
rhel8_stig_ww_dir_owner: root

# RHEL-08-010710
# rhel8_stig_ww_dir_grpowner is the owner of all world-writable directories
# To conform to STIG standards this needs to be set to root, sys, bin, or an application group
rhel8_stig_ww_dir_grpowner: root

# RHEL-08-020010
# RHEL-08-020011
# RHEL-08-020012
# RHEL-08-020013
# pam_faillock settings - accounts must be locked for max time period after 3 unsuccessful attempts within 15 minutes.
# dir: is set to /var/log/faillock which is the non-default folder. Control 020017 states to not use the standard directory which is /var/run/faillock:
rhel8_stig_pam_faillock_attempts: 3
rhel8_stig_pam_faillock_interval: 900
rhel8_stig_pam_faillock_unlock_time: 0
rhel8_stig_pam_faillock_fail_for_root: "{{ rhel8_stig_020023 }}"
rhel8_stig_pam_faillock_dir: /var/log/faillock

# RHEL-08-020035
rhel8_stig_idlesessiontimeout: 600

# RHEL-08-020102
# RHEL-08-020103
# rhel8_stig_pam_pwquality_retry is the number of retries set to the password required pam_pwquality.so in system and password auth files
# To conform to STIG standards this value needs to be 3 or less
rhel8_stig_pam_pwquality_retry: 3

# RHEL-08-020100 and RHEL-08-020101 Password complexity settings
# Password complexity settings
rhel8_stig_password_complexity_ucredit: -1
rhel8_stig_password_complexity_lcredit: -1
rhel8_stig_password_complexity_dcredit: -1
rhel8_stig_password_complexity_ocredit: -1
rhel8_stig_password_complexity_difok: 8
rhel8_stig_password_complexity_minclass: 4
rhel8_stig_password_complexity_maxrepeat: 3
rhel8_stig_password_complexity_maxclassrepeat: 4
rhel8_stig_password_complexity_minlen: 15
rhel8_stig_password_complexity_dictcheck: 1

# RHEL-08-030020
rhel8_stig_auditd_mail_acct: root

# RHEL-08-030040 - Options are SYSLOG, SINGLE, and HALT to fit STIG standards
rhel8_stig_auditd_disk_error_action: HALT

# RHEL-08-030050 - Options are SYSLOG or KEEP_LOGS to fit STIG standards
rhel8_stig_auditd_max_log_file_action: SYSLOG

# RHEL-08-030060
# rhel8_stig_auditd_disk_full_action options are SYSLOG, HALT, and SINGLE to fit STIG standards
rhel8_stig_auditd_disk_full_action: HALT

rhel8_stig_audit_bins:
  - "/usr/sbin/auditctl"
  - "/usr/sbin/aureport"
  - "/usr/sbin/ausearch"
  - "/usr/sbin/autrace"
  - "/usr/sbin/auditd"
  - "/usr/sbin/rsyslogd"
  - "/usr/sbin/augenrules"

# RHEL-08-030690 uncomment and set the value to a remote IP address that can receive audit logs
# NOTE different protocol configs '@''=UDP '@@''=TCP '':omrelp:'=RELP
rhel8_stig_remotelog_server: 10.10.10.10
rhel8_stig_remotelog_server_port: 9999
rhel8_stig_remotelog_server_protocol: "@"

# RHEL-08-030700
# rhel8_stig_audisp_overflow_action - Options are syslog, single, or halt to fit STIG standards
rhel8_stig_audisp_overflow_action: syslog

# RHEL-08-030740
# rhel8_stig_ntp_server_name is the name of the NTP server
rhel8_stig_ntp_server_name: 0.us.pool.ntp.mil

# RHEL-08-040010
# rhel8_stig_epel_required is the flag to enable or disable the installation of the EPEL repository
rhel8_stig_epel_required: false

# RHEL-08-040090
# rhel8_stig_custom_firewall_zone is the desired name for the new customer firewall zone
rhel8_stig_custom_firewall_zone: "new_fw_zone"

# rhel8_stig_copy_existing_zone - if you wish to copy an existing zones rules to the new zone
rhel8_stig_copy_existing_zone: true
# rhel8_stig_existing_zone_to_copy - name of the zone that you wish to copy from
rhel8_stig_existing_zone_to_copy: public

# RHEL-08-040090
# This designed not work with rhel8_stig_existing_zone_to_copy and when deploy new rules
# rhel8_stig_white_list_services is the services that you want to allow through initially for the new firewall zone
# This can also be a port number if no service exists
rhel8_stig_white_list_services:
  - dns
  - ssh
  - http
  - https

# RHEL-08-040137
# rhel8_stig_fapolicy_white_list is the whitelist for fapolicyd, the last item in the list must be deny all
rhel8_stig_fapolicy_white_list:
  - "deny_audit perm=any pattern=ld_so : all"
  - "deny perm=any all : all"

# RHEL-08-040160
# RHEL-08-040310
# Install and enable ssh on networked systems
rhel8_stig_ssh_required: true

# RHEL-08-040330
# Network interface promiscuous mode setting will be disabled unless set to true
rhel8_stig_net_promisc_mode_required: false

# RHEL-08-040500
# If not required, remove tftp
rhel8_stig_tftp_required: false
