---
- name: Change_requires_reboot
  ansible.builtin.set_fact:
    rhel8_stig_change_requires_reboot: true

- name: Systemctl daemon-reload
  when: not system_is_container
  ansible.builtin.systemd:
    daemon_reload: true

- name: Remount_tmp
  ansible.posix.mount:
    name: /tmp
    state: remounted

- name: Remount_var_log
  ansible.posix.mount:
    name: /var/log
    state: remounted

- name: Remount_var_log_audit
  ansible.posix.mount:
    name: /var/log/audit
    state: remounted

- name: Remount_var_tmp
  ansible.posix.mount:
    name: /var/tmp
    state: remounted

- name: Restart_systemd_login
  ansible.builtin.systemd:
    name: systemd-logind
    state: restarted

- name: Sysctl system
  when: "'procps-ng' in ansible_facts.packages"
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart sshd
  when:
    - not rhel8_stig_system_is_chroot
    - "'openssh-server' in ansible_facts.packages"
    - not rhel8_stig_change_requires_reboot
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: ReInstall crypto policies
  ansible.builtin.command: "set -o pipefail && dnf -y reinstall crypto-policies"
  changed_when: true
  listen: Reinstall_crypto_policies

- name: Set crypto policies
  ansible.builtin.command: "set -o pipefail && update-crypto-policies --set {{ rhel8_stig_combined_crypto_policy_config }}"
  changed_when: true
  notify: Change_requires_reboot
  listen: Reinstall_crypto_policies

- name: AIDE - Check for DB file
  ansible.builtin.stat:
    path: "{{ rhel8_stig_aide_db_file }}"
  register: rhel8_stig_discovered_aide_db_file
  listen: Build_aide_db

- name: AIDE - Discover age of DB
  when: rhel8_stig_discovered_aide_db_file.stat.exists
  ansible.builtin.find:
    path: "{{ rhel8_stig_aide_db_file | dirname }}"
    pattern: "{{ rhel8_stig_aide_db_file | basename }}"
    age: "{{ rhel8_stig_aide_db_file_age }}"
  register: rhel8_stig_discovered_aide_db_age
  listen: Build_aide_db

- name: "AIDE - Create DB if absent, forced or older than {{ rhel8_stig_aide_db_file_age }}"
  when: not rhel8_stig_discovered_aide_db_file.stat.exists or (rhel8_stig_discovered_aide_db_age.files | length > 0) or rhel8_stig_aide_db_recreate
  ansible.builtin.command: set -o pipefail && /usr/sbin/aide --init
  changed_when: true
  register: rhel8_stig_discovered_new_aide_db_created
  listen: Build_aide_db

- name: "AIDE - Rename DB file if DB created"
  when:
    - not rhel8_stig_discovered_aide_db_file.stat.exists or (rhel8_stig_discovered_aide_db_age.files | length > 0) or rhel8_stig_aide_db_recreate
    - rhel8_stig_discovered_new_aide_db_created.changed # noqa: no-changed-when
  ansible.builtin.command: "mv -f {{ rhel8_stig_aide_db_new_file }} {{ rhel8_stig_aide_db_file }}"
  changed_when: true
  listen: Build_aide_db

- name: AIDE - If DB exists run check comparison
  when:
    - rhel8_stig_discovered_aide_db_file.stat.exists
    - not rhel8_stig_discovered_new_aide_db_created.changed # noqa: no-changed-when
  ansible.builtin.command: set -o pipefail && /usr/sbin/aide --check
  changed_when: true
  failed_when: rhel8_stig_discovered_aidedb_check.rc not in [ 0, 1, 4, 7 ]
  register: rhel8_stig_discovered_aidedb_check
  listen: Build_aide_db

- name: AIDE - Warning if checks fail
  when: rhel8_stig_discovered_aidedb_check.rc != 0
  vars:
    warn_control_id: "MEDIUM | RHEL-09-651010-Aide-Check"
  ansible.builtin.import_tasks:
    file: warning_facts.yml
  listen: Build_aide_db

- name: Restart sssd
  when: "'sssd' in ansible_facts.packages"
  ansible.builtin.service:
    name: sssd
    state: restarted

- name: Restart snmpd
  when:
    - not rhel8_stig_system_is_chroot
    - not rhel8_stig_change_requires_reboot
  ansible.builtin.service:
    name: snmpd
    state: restarted

- name: Restart rngd
  when: rhel8_stig_010471
  ansible.builtin.service:
    name: rngd.service
    state: restarted

- name: Restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted

- name: Restart firewalld
  ansible.builtin.service:
    name: firewalld
    state: restarted

- name: Restart fapolicyd
  ansible.builtin.service:
    name: fapolicyd
    state: restarted

- name: Generate fapolicyd rules
  ansible.builtin.command: set -o pipefail && fagenrules --load
  changed_when: true

- name: Restart usbguard
  ansible.builtin.service:
    name: usbguard
    state: restarted

- name: Confirm grub2 user cfg
  ansible.builtin.stat:
    path: "/etc/grub.d/01_users"
  changed_when: false
  register: rhel8_stig_discovered_grub2_user_cfg
  listen: Make grub2 config

- name: Rebuild grub
  when: not rhel8_stig_system_is_container
  ansible.builtin.command: "set -o pipefail && /usr/sbin/grub2-mkconfig -o {{ rhel8_stig_prelim_bootloader_path }}/grub.cfg"
  changed_when: true
  listen: Make grub2 config

- name: Copy grub2 config to BIOS/UEFI to satisfy benchmark
  when:
    - rhel8_stig_discovered_grub2_user_cfg.stat.exists
    - not rhel8_stig_system_is_chroot
  ansible.builtin.copy:
    src: "{{ rhel8_stig_prelim_bootloader_path }}/grub.cfg"
    dest: "{{ rhel8_stig_prelim_bootloader_path }}/grub.cfg"
    remote_src: true
    owner: root
    group: root
    mode: "u+x,go-w"
  listen: Make grub2 config

- name: "Restart {{ rhel8_stig_time_service }}"
  when:
    - not rhel8_stig_system_is_container
    - not rhel8_stig_change_requires_reboot
  ansible.builtin.service:
    name: "{{ rhel8_stig_time_service }}"
    state: restarted

- name: Update auditd
  ansible.builtin.template:
    src: audit/99_auditd.rules.j2
    dest: /etc/audit/rules.d/99_auditd.rules
    owner: root
    group: root
    mode: "u-x,go-rwx"
  notify: Restart auditd

- name: Restart auditd # noqa: command-instead-of-module
  when:
    - not rhel8_stig_system_is_chroot
    - not rhel8_stig_system_is_container
    - not rhel8_stig_change_requires_reboot
  ansible.builtin.command: /usr/sbin/service auditd restart
  changed_when: true

- name: Rebuild initramfs
  when: not rhel8_stig_system_is_container
  ansible.builtin.command: set -o pipefail && dracut -f
  changed_when: true

- name: Undo existing prelinking
  ansible.builtin.command: set -o pipefail && prelink -ua
  changed_when: true

- name: Update running audit failure mode
  ansible.builtin.command: set -o pipefail && auditctl -f {{ rhel8_stig_auditd_failure_flag }}
  failed_when: false
  changed_when: true

- name: Clean up ssh host key
  with_items:
    - /etc/ssh/ssh_host_rsa_key
    - /etc/ssh/ssh_host_rsa_key.pub
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent

- name: AIDE - Check for DB file
  ansible.builtin.stat:
    path: "{{ rhel8_stig_aide_db_file }}"
  register: rhel8_stig_discovered_aide_db_file
  listen: Build_aide_db

- name: AIDE - Discover age of DB
  when: rhel8_stig_discovered_aide_db_file.stat.exists
  ansible.builtin.find:
    path: "{{ rhel8_stig_aide_db_file | dirname }}"
    pattern: "{{ rhel8_stig_aide_db_file | basename }}"
    age: "{{ rhel8_stig_aide_db_file_age }}"
  register: rhel8_stig_discovered_aide_db_age
  listen: Build_aide_db

- name: "AIDE - Create DB if absent, forced or older than {{ rhel8_stig_aide_db_file_age }}"
  when: not rhel8_stig_discovered_aide_db_file.stat.exists or (rhel8_stig_discovered_aide_db_age.files | length > 0) or rhel8_stig_aide_db_recreate
  ansible.builtin.command: set -o pipefail && /usr/sbin/aide --init
  changed_when: true
  register: rhel8_stig_discovered_new_aide_db_created
  listen: Build_aide_db

- name: "AIDE - Rename DB file if DB created"
  when:
    - not rhel8_stig_discovered_aide_db_file.stat.exists or (rhel8_stig_discovered_aide_db_age.files | length > 0) or rhel8_stig_aide_db_recreate
    - rhel8_stig_discovered_new_aide_db_created.changed # noqa: no-changed-when
  ansible.builtin.command: "mv -f {{ rhel8_stig_aide_db_new_file }} {{ rhel8_stig_aide_db_file }}"
  changed_when: true
  listen: Build_aide_db

- name: AIDE - If DB exists run check comparison
  when:
    - rhel8_stig_discovered_aide_db_file.stat.exists
    - not rhel8_stig_discovered_new_aide_db_created.changed # noqa: no-changed-when
  ansible.builtin.command: set -o pipefail && /usr/sbin/aide --check
  changed_when: true
  failed_when: rhel8_stig_discovered_aidedb_check.rc not in [ 0, 1, 4, 5, 7 ]
  register: rhel8_stig_discovered_aidedb_check
  listen: Build_aide_db

- name: AIDE - Warning if checks fail
  when: rhel8_stig_discovered_aidedb_check.rc != 0
  ansible.builtin.import_tasks:
    file: warning_facts.yml
  vars:
    warn_control_id: "MEDIUM | RHEL-09-651010-Aide-Check"
  listen: Build_aide_db

- name: Dconf update
  when:
    - "'dconf' in ansible_facts.packages"
    - rhel8_stig_always_configure_dconf
  ansible.builtin.command: dconf update
  changed_when: true
