---

- name: Using the DNF module to get a list of upgradable packages
  ansible.builtin.dnf:
    list: updates
  register: platform_patching_yum_updates

- name: Displaying upgradable packages
  ansible.builtin.debug:
    msg: "Package: {{ item.name }} Current Version: {{ item.version }}) needs update."
    verbosity: 1
  loop: "{{ platform_patching_yum_updates.results }}"
  loop_control:
    label: "{{ item.name }}"
  when: platform_patching_yum_updates is defined
